  - {type: variant, offset: 13065, length: 3, content: 獨吾忘, WYG: 欲上人非欲先人也葢下之後之其道不得不上且先耳呂注江海之所以能為百谷王者以其善下之故能為百谷王則能為}
  - {type: 'kr:newline', offset: 13068, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl982}
  - {type: line-break, offset: 13068, content: '', id: KR5h0056_HFL_002-045b04}
  - {type: indent, offset: 13068, content: 　, id: KR5h0056_krp_002-bkkind699}
  - {type: variant, offset: 13070, length: 0, content: '', WYG: 王者}
  - {type: variant, offset: 13071, length: 3, content: 能使天, WYG: 善}
  - {type: variant, offset: 13075, length: 3, content: 忘我故, WYG: 之而已則𤣥德者乃所以下下之道也莊周以為以此處下則𤣥聖素王之道而舜之在下則曰𤣥徳升聞則𤣥德者固聖人所以處下之道也以處下之道而居人上乃所以下之}
  - {type: variant, offset: 13082, length: 3, content: 妙雖智, WYG: 有天下也以言其位則固欲上人也然以孤寡不穀為稱而受國之垢與不祥則以其言下之也以言其序則固欲先人也然迫而後動感而後應不得已而後起則以其身後之也夫惟以其言下之則處上而人不重不重則以戴之為輕矣以其身後之則處前而人不害不害則以從之為利矣不重不害此天下所以樂推而不厭也夫以其言下之以其身後之則不争}
  - {type: 'kr:newline', offset: 13084, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl983}
  - {type: line-break, offset: 13084, content: '', id: KR5h0056_HFL_002-045b05}
  - {type: indent, offset: 13084, content: 　, id: KR5h0056_krp_002-bkkind700}
  - {type: variant, offset: 13086, length: 2, content: 有所, WYG: 也樂推而}
  - {type: page-break, offset: 13086, content: '', id: KR5h0056_WYG_002-55b, image: WYG1055/WYG1055-0394d.png}
  - {type: variant, offset: 13089, length: 1, content: 喻, WYG: 厭則天下莫能與之争者也非體𤣥徳者其能若是乎}
  - {type: variant, offset: 13092, length: 2, content: 要妙, WYG: 夫唯不争故天下莫能與之争息齋注聖人不得已臨蒞天下其視首出庶物與在民上為何等事哉故有天下而能以言下民能以身後民非㤀天下者不能也是以處民上而民不重不}
  - {type: 'kr:newline', offset: 13094, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl984}
  - {type: line-break, offset: 13094, content: '', id: KR5h0056_HFL_002-045b06}
  - {type: variant, offset: 13096, length: 2, content: 雄守, WYG: 有君也處民前而民不害不知}
  - {type: variant, offset: 13099, length: 2, content: 雌爲, WYG: 有民也惟其上下相㤀是以}
  - {type: variant, offset: 13103, length: 2, content: 谿爲, WYG: 樂推而不厭葢吾之取者非民之所争也無為之為}
  - {type: variant, offset: 13107, length: 3, content: 谿常德, WYG: 且}
  - {type: 'kr:newline', offset: 13111, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl985}
  - {type: line-break, offset: 13111, content: '', id: KR5h0056_HFL_002-045b07}
  - {type: variant, offset: 13111, length: 7, content: 離復歸于嬰兒知, WYG: 見}
  - {type: variant, offset: 13119, length: 5, content: 白守其黑爲, WYG: 朕况欲與之争乎}
  - {type: variant, offset: 13126, length: 2, content: 式爲, WYG: 皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫我有三寳寳而持之一曰慈二曰儉三曰不敢為}
  - {type: 'kr:newline', offset: 13128, content: '

