      ', id: KR5h0056_krp_002-bkkkrnewl499}
  - {type: line-break, offset: 6555, content: '', id: KR5h0056_HFL_002-023b05}
  - {type: indent, offset: 6555, content: 　, id: KR5h0056_krp_002-bkkind340}
  - {type: variant, offset: 6556, length: 1, content: 去, WYG: 能安也}
  - {type: variant, offset: 6558, length: 0, content: '', WYG: 曰不善人之所保葢道不逺人而人則逺之今誠有人美言之則可}
  - {type: variant, offset: 6559, length: 0, content: '', WYG: 為市于世尊行之則可以加于人矣朝為}
  - {type: variant, offset: 6560, length: 2, content: 去名, WYG: 義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄}
  - {type: page-break, offset: 6560, content: '', id: KR5h0056_WYG_002-47a, image: WYG1055/WYG1055-0390c.png}
  - {type: variant, offset: 6563, length: 1, content: 唯, WYG: 哉立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能汙也呂注萬物負陰而抱陽沖氣以為和則}
  - {type: variant, offset: 6565, length: 2, content: 嘗去, WYG: 有一物而不足于道者也室之有奥深邃燕閒而尊者之所處也萬物莫不有深邃燕閒尊高之處則道是也}
  - {type: variant, offset: 6568, length: 12, content: 能以閱衆有之變矣甫美也雖, WYG: 曰道者}
  - {type: 'kr:newline', offset: 6571, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl500}
  - {type: line-break, offset: 6571, content: '', id: KR5h0056_HFL_002-023b06}
  - {type: indent, offset: 6571, content: 　, id: KR5h0056_krp_002-bkkind341}
  - {type: variant, offset: 6583, length: 0, content: '', WYG: 奥唯其如此故善人之寳而不善人之所保也何則善人知其善之所自出則得之而有無窮不貲之富非其寳耶不善人知其不善至于此而𤣥同則雖有萬惡渙然而釋矣非其所保耶夫言之}
  - {type: variant, offset: 6584, length: 0, content: '', WYG: 者可以市行之尊者可以加人則人無善}
  - {type: variant, offset: 6585, length: 1, content: 免, WYG: 善固知美所美而尊所尊也有道者之}
  - {type: 'kr:newline', offset: 6587, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl501}
  - {type: line-break, offset: 6587, content: '', id: KR5h0056_HFL_002-023b07}
  - {type: indent, offset: 6587, content: 　, id: KR5h0056_krp_002-bkkind342}
  - {type: variant, offset: 6587, length: 1, content: 變, WYG: 人猶天地}
  - {type: variant, offset: 6589, length: 1, content: 聖, WYG: 天無不覆地無不載非特美言尊行之比也則}
  - {type: variant, offset: 6591, length: 0, content: '', WYG: 之不善何棄之有故立天子置三公雖有拱璧以先駟馬}
  - {type: variant, offset: 6593, length: 1, content: 知, WYG: 享於上者禮之恭幣之重者也然不如坐進此道以道之為天下貴雖坐而進之過于恭禮重幣也天子三公所以坐而論者不過此而已矣古之所以貴此道者何也不曰求以得有罪以免耶求以得則所謂善人之寳有罪以免則所謂不善人之所保也唯其如此此所以為天下貴而古之所以不得不貴也息齋注奥者藏也道為}
