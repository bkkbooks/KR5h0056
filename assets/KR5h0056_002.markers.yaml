  - {type: variant, offset: 14987, length: 671, content: 賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣沖氣升降而合爲一而降甘露脗然被于萬物無不均遍聖人體至道以應諸有亦露之無不及者此所以能賔萬物也聖人散樸爲器因器制名豈其狥名而忘樸逐末而喪本哉蓋亦知復于性是以乘萬變而不殆也江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗筆乘道常首章所謂常道也無名首章所謂無名也以其未彫未琢故謂之樸以其曰希曰微故謂之小然能見小而守之者鮮矣侯王若能守是見小曰明者也知子守母者也如此則靜爲動君而動爲之臣一爲萬主而萬爲之賔又孰有臣樸者哉始即無名天地之始制者裁其樸而分之也始本無名制之則有名矣苟其逐于名而莫止則一生二二生三將巧歷不能筭而種種名相皆以爲實與接爲構窮萬世而不悟隂陽之慘殆孰甚焉所謂不知常妄作凶也誠知無可以適有則有亦可以之無是故貴其止止者鎮以無名之樸也知止則不隨物遷淡然自足殆無從生矣此非强之也物生于道生物滅以道滅萬物皆作于道萬物皆歸于道我之性宅我自復之夫何難之有故江海水之宗也川谷水之派也異派必會于宗殊名必統于道知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所者久死而不亡者壽不失其所即易之止其所也羅什曰在生而不生曰久在死而不死曰壽蘇註分别爲智蔽盡爲明分别之心未除故止于知人而不能自知蔽盡則無復分别故能自知而又可以及人也力能及人而不能及我能克己復性則非力之所及故可謂之强也知足者所遇而足則未嘗不富矣雖有天下而常挾不足之心以處之是終身不能富也不與物爭而自强不息物莫能奪其志也物變無窮而心未嘗失則乆矣死生之變大亦大矣而其性湛然不亡此古之至人能不生不死者也大, WYG: 太}
