  - {type: variant, offset: 6515, length: 1, content: 僞, WYG: 下以取謂大國能下以取小國之附下而取謂小國能下而取大國之容}
  - {type: variant, offset: 6517, length: 4, content: 眞僞既雜, WYG: 大國下小國者欲兼畜小國而已小國下大國者欲入事大國而已兩者皆能下則大小各得其所欲然小者素在人下不患乎不能下大者非在人下或恐其不能下故曰大者宜為下章首下流之喻以喻大國非在人下而能下者牝牡之喻以喻小國素在人下而能下者林希逸注大國不過欲兼畜乎人小國不過欲入事乎人二者皆非}
  - {type: variant, offset: 6522, length: 13, content: 一而爲二自二而爲三紛然錯出, WYG: 下}
