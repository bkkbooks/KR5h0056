  - {type: variant, offset: 13252, length: 159, content: 倡者也故爲天下谿谿之爲物受于谷而輸于江海受而不拒輸而不積物之能通而無迕者也能通則常德不離矣人之生也常德内全與物無迕反爲物之所遷則日益以離唯能篤靜致柔和而不倡則常德不離而復歸于嬰兒矣白于色爲受采于物爲明于行爲金于數爲四黑于色爲不受染于物爲晦于行爲水于數爲一知其白守其黑不受萬物之染若晦若水終之于抱一抱一則能曲能枉能窪能蔽, WYG: 辭}
