  - {type: variant, offset: 7544, length: 1, content: 足, WYG: ''}
  - {type: variant, offset: 7549, length: 1, content: 足, WYG: ''}
  - {type: variant, offset: 7551, length: 1, content: 用, WYG: 摶}
  - {type: variant, offset: 7554, length: 0, content: '', WYG: 得雖反覆尋繹之復歸于無物而已矣唯其如此故}
  - {type: 'kr:newline', offset: 7555, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl574}
  - {type: line-break, offset: 7555, content: '', id: KR5h0056_HFL_002-027a03}
  - {type: indent, offset: 7555, content: 　, id: KR5h0056_krp_002-bkkind394}
  - {type: variant, offset: 7555, length: 0, content: '', WYG: 以大可以小可以多可以少多少舉在于我而所謂怨者固無常心則不善者吾亦善之徳善不信者吾亦信之徳信而皆報之以徳矣人之所難㤀者怨也而以徳報之則它不足以累其心矣非徒然也而圖難于其易為大于其細以天下之難事必作于易天下之大事必作于細而我常無作也茍有所作必于易與細而見之則所謂知幾其神者是也能得之於吾心則其推之于天下國家無難矣是以聖人終不為大故能成其大以為大於其細而不為大于其大故也出諾易也復言難也不慎重于出諾之際則言難復矣易而圖之則易也難而圖之則難矣不圖之于易圖之始而圖之於難則難矣此俗人之所以寡信而多難也是以聖人由難之故終無難以難之于其易而不難之于難也息齋注為無為則已不勞事無事則人不煩味無味則物不費世所謂大小多少者以形言也聖人遊於形器之外故大小多少等而為一夫大小多少尚等而一之又況於恩怨報施之間乎吾所為所施者惟德而已豈知其有所怨豈知其有所報者哉}
  - {type: page-break, offset: 7555, content: '', id: KR5h0056_WYG_002-49b, image: WYG1055/WYG1055-0391d.png}
  - {type: variant, offset: 7556, length: 0, content: '', WYG: 無恩怨報施之别又無大小多少之異其于天下之故豈有心于為之哉事必求易大必由細自易而往則難者亦易自細而行則大者亦細是以聖人終不為大而大必歸之者由其無心也惟其無心於事故未嘗先事而期於物豈若世之小夫己未為而先諾事至而多易先諾則必寡信多易則必多難聖人于事未至則常若難之非難之也不以我必于物故若難之惟其難之故終無難筆乘夫事涉於形則有大小係乎數則有多少此怨所由起也惟道非形非數而聖人與之為一以無為為為以無事為事以無味為味愛惡妄除聖凡情盡而泊然棲乎宅則大小多少一以視之而奚怨之可報哉惟德以容之而已然此無為無事無味也不可力得至易也不可目窺至細也雖至易而至難者待此以解雖至細而至大者待此以成豈可以其易與細而忽之哉學道者亦或有見於此而又以為大之心奪之故易與細不常為我有唯聖人自始至終為無為事無事味無味而不以世俗所謂大者分其心故難者大者當處寂然了無留礙而大道自此全矣}
  - {type: page-break, offset: 7556, content: '', id: KR5h0056_WYG_002-50a, image: WYG1055/WYG1055-0392a.png}
  - {type: variant, offset: 7559, length: 5, content: 希言矣隂陽, WYG: 成其大者也嗟乎此非特起大丈夫見理明用心剛者}
  - {type: variant, offset: 7565, length: 5, content: 爭風雨時至, WYG: 能信}
  - {type: 'kr:newline', offset: 7571, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl575}
  - {type: line-break, offset: 7571, content: '', id: KR5h0056_HFL_002-027a04}
  - {type: indent, offset: 7571, content: 　, id: KR5h0056_krp_002-bkkind395}
  - {type: variant, offset: 7571, length: 1, content: 疾, WYG: 能守而可與輕諾多易之流道哉其安易持其未兆易謀其脆異判其微易散為之於未有治之于未亂合抱之木生於豪末九成之臺起于累土千里之行始於足下為者敗之執者失之是以聖人無為故無敗無執故無失民之從事常於幾成而敗之慎終如始則無敗事是以聖人欲}
  - {type: page-break, offset: 7571, content: '', id: KR5h0056_WYG_002-50b, image: WYG1055/WYG1055-0392b.png}
  - {type: variant, offset: 7573, length: 4, content: 徐盡其勢, WYG: 欲不貴難得之貨學不學復衆人}
  - {type: variant, offset: 7579, length: 15, content: 至而後止若夫陽亢于上隂伏於下否, WYG: 過以恃萬物之自然}
  - {type: 'kr:newline', offset: 7587, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl576}
  - {type: line-break, offset: 7587, content: '', id: KR5h0056_HFL_002-027a05}
  - {type: indent, offset: 7587, content: 　, id: KR5h0056_krp_002-bkkind396}
  - {type: variant, offset: 7596, length: 2, content: 得洩, WYG: 敢為脆此芮反判一作破成一作層今從傅奕古本未有者心未起時未亂者心未染時幾平聲復反也恃一作輔非既曰自然矣而又輔之非自然也今從韓非本蘇注方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈}
  - {type: variant, offset: 7599, length: 19, content: 是爲飄風暴雨若將不勝然其勢不能以終日古, WYG: 既成也故為}
  - {type: 'kr:newline', offset: 7603, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl577}
  - {type: line-break, offset: 7603, content: '', id: KR5h0056_HFL_002-027a06}
  - {type: indent, offset: 7603, content: 　, id: KR5h0056_krp_002-bkkind397}
  - {type: 'kr:newline', offset: 7619, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl578}
  - {type: line-break, offset: 7619, content: '', id: KR5h0056_HFL_002-027a07}
  - {type: indent, offset: 7619, content: 　, id: KR5h0056_krp_002-bkkind398}
  - {type: variant, offset: 7619, length: 0, content: '', WYG: 于未有者上也治之於未亂者次也木也臺也行也積小成大治亂禍福之來皆如彼三者}
  - {type: page-break, offset: 7619, content: '', id: KR5h0056_WYG_002-51a, image: WYG1055/WYG1055-0392c.png}
  - {type: variant, offset: 7621, length: 2, content: 言出, WYG: 待之以無為守之以無執故能使福自生使禍自亾譬如種苗深耕而厚耘之及秋自穰譬如被盗危坐而熟視之盗將自卻世人不知物之自然以為非為不成非執不留故常與禍爭勝與福生贅是以禍至}
  - {type: variant, offset: 7624, length: 3, content: 希行出, WYG: 不救福至}
  - {type: variant, offset: 7628, length: 1, content: 夷, WYG: 不成葢其理然也聖人知有為之害不以人助天始終}
  - {type: 'kr:newline', offset: 7635, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl579}
  - {type: line-break, offset: 7635, content: '', id: KR5h0056_HFL_002-027a08}
  - {type: indent, offset: 7635, content: 　, id: KR5h0056_krp_002-bkkind399}
  - {type: variant, offset: 7635, length: 1, content: 乆, WYG: 無不成者世人心存于得䘮方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以為敗之者矣故曰慎終如始則無敗事人皆狥其所欲以傷物信其所學以害理聖人非無欲也欲}
  - {type: variant, offset: 7638, length: 4, content: 窮世或厭, WYG: 欲故雖欲而不傷于物非無學也學而不學故雖學而不害於理然後内外空明廓然無為可以輔萬物之自然而待其自成矣呂注其安易持危而持之則難矣其未兆易謀已動而謀之則難矣其脆易破則不可使至於堅其微易散則不可使至于著物皆然心為甚通諸其心則于天下國家無難矣安也未兆也則是為之于未有也脆也微也則是治之于未亂也合抱之木生于毫末大生于小也九層之臺起于累土高起于下也千里之行起于足下逺起于近也則為之于未有治之于未亂其本末常如此也為之于未有則是以不為為之也治之于未亂則是以不治治之也已有而為之則為之欲成而反敗之已亂而治之則執之欲固而反失之也是以聖人為之于未有則我固無為也故無敗治之于未亂則我固無執也故無失民之從事常在既有之後故至于幾成而敗}
  - {type: page-break, offset: 7638, content: '', id: KR5h0056_WYG_002-51b, image: WYG1055/WYG1055-0392d.png}
  - {type: variant, offset: 7644, length: 13, content: 爲不若詭辯之悅耳怪行之驚世, WYG: ''}
  - {type: 'kr:newline', offset: 7651, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl580}
  - {type: line-break, offset: 7651, content: '', id: KR5h0056_HFL_002-027a09}
  - {type: indent, offset: 7651, content: 　, id: KR5h0056_krp_002-bkkind400}
  - {type: variant, offset: 7660, length: 0, content: '', WYG: 本故也使知大生于小高起于下逺始于近慎終如始則無敗事也是以聖人欲}
  - {type: variant, offset: 7661, length: 2, content: 能久, WYG: 欲不貴難得之貨則滑欲于俗思以求致其明非知此者}
  - {type: variant, offset: 7664, length: 5, content: 孔子曰苟志, WYG: 學不學以復衆人之所過以輔萬物之自然而不敢為則繕性}
  - {type: 'kr:newline', offset: 7667, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl581}
  - {type: line-break, offset: 7667, content: '', id: KR5h0056_HFL_002-027a10}
  - {type: indent, offset: 7667, content: 　, id: KR5h0056_krp_002-bkkind401}
  - {type: variant, offset: 7670, length: 1, content: 仁, WYG: 俗學以求復其初者非知此者}
