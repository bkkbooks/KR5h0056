  - {type: variant, offset: 15883, length: 0, content: '', WYG: 是能廣也不敢為天下先為後人矣而聖人用之以為官長者皆從我者也是能成器長也今舍其慈且勇舍其儉且廣舍其後且先則剛强之徒而已死不亦宜乎夫自事觀之則軍旅之事愛克厥威允罔功則慈宜若有所不行也然自本觀之則所以能立其威者以慈而已故曰夫慈以戰則勝以守則固夫唯慈故儉儉故不敢為天下先則慈者三寶之所自而始也舍其慈則死保其慈則生則慈乃所以衛吾生者也故曰天將救之以慈衛之慈立而三寶舉矣元澤注肖者有所似道為萬物祖故體道者物當似我我豈似物乎葢有所似則是象彼則彼必大而我小矣凡此三寳皆俗情所謂小而乃至人之所以為大也慈主于愛愛物仁也而獨稱慈者仁則廣德以覆下于末為盛矣老子方語其本故不曰仁曰慈慈者父道仁之本而不假為者也儉之為德寡欲也貴本也愛物也一言而三善至者其儉乎若孔子曰禮與其奢也寧儉葢聖人制禮將以為儉而方其為禮也不得獨儉非禮則無末非老子則不知本本乎本乎聖人之道于是為至乎于易則謙是也天地人神皆以謙為貴故聖人寳之慈者不爭而勝勇莫大焉區區以奢侈自廣者其狹甚矣唯無以末傷本無以外滅内者至廣也此聖人之行故但為器長而已若道之長則未嘗在物後也以人滅天以事勝道借使幸免葢失所以生矣三寶皆天徳而立本者也正如正兵之正正兵之言師整而不動也愛民如子則民愛之如父不令而齊矣彼倒戈攻于後以北者上不慈故也一本作以戰則勝戰守主于殺伐而尚以慈為徳則餘事可知韓非解愛子者慈於子重生者慈於身貴功者慈於事慈母之於弱子也務致其福務致其福則事除其禍事除其禍則思慮熟思慮熟則得事理得事理則必成功必成功則其行之也不疑不疑之謂勇聖人之於萬事也盡如慈母之為弱子慮也故見必行之道見必行之道則明其從事亦不疑不疑之謂勇不疑生於慈故曰慈故能勇周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈常費而况於人乎故萬物必有盛衰萬事必有弛張國家必有文武官治必有賞罰是以智士儉用其材則家富聖人愛寳其神則精盛人君重戰其卒則民衆民衆則國廣是以舉之曰儉故能廣董注此假用兵以明道貴在于守慈也或云若以人身言之則邪念多于敵國利欲勝于鋒銛盍亦寡欲以至于無欲以全其所寳乎夢得注我自處也易物無所不濟難故即三者推慈以為先而終復明之以為戰則勝守則固是今之所急也天若救斯民必使有為慈者出而衞之此老氏之所怛然有期于天下者與善為士者不武善戰者不怒善勝敵者不争善用人者為之下是謂不争之徳是謂用人之力是謂配天古之極古者車戰為士甲士三人在車上左執弓右持矛中御車掌旗鼓皆欲其强武戰卒七十二人在車下葢至争者惟兵故借之以明不爭之徳也羅竹曰心形既空孰能與無物者爭蘇注士當以武為本行之以怯若以武行武則死矣聖人不得已而後戰若出于怒是以我故殺人也以我故殺人天必殃之以吾不爭故能勝彼之争若皆出于争則未必勝矣人皆有相上之心故莫能相為用誠能下之則天下皆吾用也呂注士之為言事道而以將人為任者也事道則以不爭而勝將人則用人之力若然者何所事武哉故曰善為士者不武為士而無所事武則善戰者不怒善勝敵者不争善用人者為之下固其宜也何則體道者不争不爭則天下莫能與之爭則善為士者不武善戰者不怒善勝敵者不爭是謂不爭之徳也體道者能下人能下人者樂為之用而不自用則善用人者為之下是謂用人之力也徳則不爭力則用人雖用兵之危我猶無為況其它乎無為為之之謂天德至于無為則與天同而無以加矣故曰是謂配天古之極息齋注聖人身且不有而況于争由其不争凡所應物者皆其不得已也故為士則不武當戰則不怒勝敵而不必與之爭用人而不必加其上故能以徳服人而人亦樂為之死是謂配天古之極也用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾䘮吾寳故抗兵相加哀者勝矣用兵有言古兵家有此言也行上如宇下户剛反言行列也仍就也詩曰仍執醜虜兵五兵戈矛殳㦸千也説文云拱手執斤曰兵幾平聲䘮去也抗舉也}
