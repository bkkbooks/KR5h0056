  - {type: line-break, offset: 13145, content: '', id: KR5h0056_HFL_002-045b09}
  - {type: variant, offset: 13149, length: 2, content: 谷爲, WYG: 先故能成器長今舍其慈且勇舍其儉且廣舍其後且先死矣夫慈以戰則勝以守則固}
  - {type: page-break, offset: 13149, content: '', id: KR5h0056_WYG_002-56a, image: WYG1055/WYG1055-0395a.png}
  - {type: variant, offset: 13152, length: 5, content: 下谷常德乃, WYG: 將救之以慈衛之肖似也夫並音符長舍並上聲衛護也蘇注夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以為大也若似于物則亦一物耳而何}
  - {type: variant, offset: 13158, length: 2, content: 復歸, WYG: 大哉道以不似物為大故其運而為徳則亦悶然以鈍為利以退為進不合}
  - {type: variant, offset: 13161, length: 1, content: 樸, WYG: 世俗今夫世俗貴勇敢尚廣大夸進銳而吾之所寶則慈忍儉約廉退此三者皆世之所謂不肖者也世以勇决為賢而以慈忍為不及事不知勇决之易挫而慈忍之不可勝其終必至於勇也世以廣大葢物而以儉約為陋不知廣大之易窮而儉約之易足其終必至于廣也世以進鋭為能而以不敢先為耻不知進鋭之多惡于人而不敢先之樂推于世其終卒為器長也葢}
  - {type: 'kr:newline', offset: 13162, content: '

