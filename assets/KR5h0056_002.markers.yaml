  - {type: variant, offset: 13130, length: 3, content: 式常德, WYG: 先夫慈故能勇儉故能廣}
  - {type: variant, offset: 13134, length: 13, content: 忒復歸于無極知其榮守其辱爲, WYG: 敢為}
  - {type: 'kr:newline', offset: 13145, content: '

