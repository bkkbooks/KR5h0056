  - {type: variant, offset: 13414, length: 632, content: 爲天下式爲天下式無徃而非一則常德不忒矣不離者不離其故處而已而未必能不忒也不忒則不差矣嬰兒之爲物專氣致柔不失其一體之和而已復歸于無極則嬰兒不足以言之也草木之蕃也爲榮其謝也辱人之所以爲榮辱亦若是而已知其榮守其辱去華歸根雖被以天下之所甚惡而不能累焉故爲天下谷谷之爲物虛而能盈應而不藏而江海之源所自出者也能爲天下谷則反乎其源矣故常德乃足則又非特不忒而已復歸其樸樸者眞之全而物之混成者也唯其混成而未爲器故能大能小能曲能直能短能長能圜能方無施而不可則無極不足以言之也然則守其雌守其黑守其辱足矣安用知其雄與白與榮哉蓋守之以爲母知之以爲子守之以爲經知之以爲變也樸散則爲器器之爲物能大而不能小能曲而不能直能短而不能長能圜而不能方故聖人用之爲官長而已非容乃公公乃王之道也若夫抱樸以制天下其視天下之理猶庖丁之視牛未嘗見全牛也行之于所無事而已恢恢乎其于游刃有餘地矣何事于割哉故曰大制不割將欲取天下而爲之吾見其不得已天下神器不可爲也爲者敗之執者失之故物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰取如左氏取我田疇而伍之史記取高帝約束紛更之之取爲治之也司馬温公曰爲之則傷自然執之則乖通變呴音許一音虛羸力爲反載始也又任載也隳許規反去上聲陸農師云去甚慈也去奢儉也去泰不敢爲天下先也三者聖人所以取天下也蘇註聖人之有天下非取之也萬物歸之不得已而受之其治天下非爲之也因萬物之自然而除其害耳若欲取而爲之則不可得矣凡物皆不可爲也雖有百人之聚不循其自然而妄爲之必有齟齬不服者而況天下乎雖然小物寡衆猶有, WYG: 戰}
