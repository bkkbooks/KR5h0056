  - {type: variant, offset: 7180, length: 361, content: 鏡不自照故能照物如使自見自照則自爲之不暇而何暇及物哉不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之世以直爲是以曲爲非將循理而行于世則有不免于曲者矣故終篇復言之曰此豈虛言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其爲直也大矣筆乘曲則全枉則直窪則盈敝則新凡以明少則得也一少之極也抱一而天下式則其得多矣故一國三公不知誰適十羊九牧詎可得芻喪生者繇其多方亡羊者苦于岐路希言自然飄風不終朝驟雨不終日孰爲此者天地天地尚不能乆而況于人乎故從事於道者道者同于道德者同于德失者同于失同于道者道亦樂得之同于德者德亦樂得之同于失者失亦樂得之信不足有不信飄風疾風也驟雨暴雨也自旦及晡爲終朝自早及莫爲終日風雨震蕩飄忽必不能乆岐伯所謂亢則害承乃制也樂入聲蘇註言出于自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味, WYG: ''}
