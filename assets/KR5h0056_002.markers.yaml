  - {type: variant, offset: 2936, length: 0, content: '', WYG: 希聲注夫天下有道之世雖有甲兵無所用雖有健馬無所乘天下無道之時天子則外攘四夷諸矦則外侵鄰國故兵甲動于境内戎馬馳于四郊桑梓盡于樵薪荆棘生于隴畝矣夫無道之君毒痡天下原其所以其惡有三心見可欲非理而求故罪莫大焉求而不已必害於人故禍莫大焉欲而必得其心愈熾故咎莫重焉然自非聖人不能無欲欲則不能無求求而不知足禍之甚者也嗟乎凡非真性皆外物也夫焉得而有之人皆有至足者能知至足之足則無所不足矣}
