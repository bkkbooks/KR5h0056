  - {type: line-break, offset: 5085, content: '', id: KR5h0056_HFL_002-018b06}
  - {type: variant, offset: 5085, length: 0, content: '', WYG: 呂注天下有始以為天下母則經所謂吾不知其名字之曰道者是也無名天地之始有名萬物之母道常無名而為天下母何也葢有名徒為萬物母而未足為天下母無名天地之始則自天而下皆生于無名故曰天下有始以為天下母也聞道易得道難得道易守道難今我既得其母以與心契矣非特聞之而已也則知天下之物皆我之所出也知天下之物皆我之所出而我常守之而不失則天下孰能以其所出而害其所自出哉此其所以歿身不殆也塞其兊閉其門終身不勤此則守其母之謂也心動于内而吾縱焉是之謂有兊有兊則心出而交物我則塞其兊而不通不通則心不出矣物引于外而吾納焉是之謂有門有門則物入而擾心我則閉其門而不納不納則物不入矣内不出外不入雖萬物之變芸芸于前各歸其根而不知矣夫何勤之有哉古之人有能廢心而用形者以此道也若開其兊而不塞濟其事而不損則我之心直為物之逆旅莫適守者何恃而不亾哉此所以終身不救也夫惟守其母者毎見其心於動之㣲則寂然不動矣寂然不動感而遂通天下之故故曰見小曰明守無形之至柔而物莫之能勝也故曰守柔曰强既用其光以照其動之㣲復歸其明以反于寂然也則未嘗開兊濟事以至于不救何殃之有哉如是則襲于知和而深不可見矣故曰用其光復歸其明無遺身殃是謂襲常息齋注道為物母物為道子古之得道者能使子母不離而道物為一葢物從道出物不異道子從母出子不異母物不異道而世欲棄物以求道子不異母而世欲棄子而求母本不異而自異之是以終不得而一也使人知物即道子即母知之守之則左右逢其原有不難者凡物不自道而用物以遺道者以人開其兊也兊者突也穴其突以濟其欲心蕩而精衰則物隨而䘮必閉其兊塞其門神不外出旋元自歸自然子母不離道與物一矣古之至人保其身而身存者用此道也人之患在于不謹其小不養其㣲若自小而謹之自㣲而養之雖小必明雖㣲必强故曰見小曰明知柔曰强明者本也光者明之所自出也元明為本其末分而為視為聴為覺為觸者皆其光也道自本流于末學自末求其本故曰用其光復其明是謂襲常常即本明光自明而光今以光歸其明故曰襲常}
