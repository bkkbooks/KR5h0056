  - {type: variant, offset: 9421, length: 317, content: 所知故介然不出畦畛聖人兼涉有無無入而不可則荒兮其未可央也人各溺于所好其美如享太牢其樂如春登臺囂然從之而不知其非唯聖人深究其妄遇之泊然不動如嬰兒之未能孩也乘萬物之理而不自私故若無所歸衆人守其所知各自以爲有餘聖人包舉萬物而不主于一超然其若遺也沌沌若愚而非愚也世俗以分别爲知聖人知群妄之不足辨也故其外若昏其中若悶忽焉若海不見其津涯漂然無定不見其宿止也人各有能故世皆得而用之聖人才全德備若無所施故疑于頑鄙道者萬物之母衆人狥物忘道而聖人脫遺萬物以道爲宗譬如嬰兒無所雜食食于母而已筆乘人之爲學憂不得善也吾能絶學則奚憂之有然非强絶也知性本無善也彼爲學者雖異于惡而離性則一其少異者如唯與阿之間耳夫以善惡之同而聖人亦不廢善者蓋人之所畏不得不畏所謂吉凶與, WYG: ''}
