  - {type: line-break, offset: 2810, content: '', id: KR5h0056_HFL_002-010b07}
  - {type: variant, offset: 2810, length: 0, content: '', WYG: 呂注萬物始乎是終乎是是大成也然始無所始終無所止故若缺唯其若缺故其用日新而不敝萬物酌焉而不竭是盈也然益之而不加益故若沖唯其若沖故其用日給而不窮大直者曲之而全枉之而直者也故若屈大巧者刻彫衆形而不為巧者也故若拙大辯者不言而辯者也故若訥如是無它凡以有本故也本者何也今夫寒熱者天地之所為有形之所不免也而一躁焉則可以勝寒一静焉則可以勝熱以一時之躁静猶可以勝天地之所行況夫體無為之清静以為天下正則安往而不勝者乎故以言其成則若缺而不敝以言其盈則若沖而不窮其直若屈而伸其巧若拙而工其辯若訥而諭此之謂有本息齋注成與缺沖與盈直與屈巧與拙辯與訥皆物之形似者也惟道無名以形求之皆不可得故雖成若缺雖盈若沖雖直若屈雖巧若拙雖辯若訥葢其成不以形其盈不以器其直不以壯其巧不以心其辯不以口故世以形似求之皆不可得也葢世之言道術未有不偏如躁勝寒而不可以勝熱静勝熱而不可以勝寒要其各有所止也惟清静無為雖不求勝物而天下之物莫能勝之故曰清静為天下正葉夢得注寒暑者天地之氣也有人于此躁猶可以勝寒静猶可以勝熱茍知其所勝孰往而不可為則清勝濁静勝動其効亦可見矣而况于缺之勝成沖之勝盈屈之勝直拙之勝巧訥之勝辯惟其不察此故必求其能勝之者茍求勝之終非其正也唯清静為天下正吳注以成為成以盈為盈以直為直以巧為巧以辯為辯小矣若缺則非成若沖則非盈若屈則非直若拙則非巧若訥則非辯乃為成之大盈之大直之大巧之大辯之大者也}
