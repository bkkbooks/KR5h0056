  - {type: variant, offset: 16612, length: 0, content: '', WYG: 均收之八家所得均平而無多寡之異司左契者任人來取無心計較其人故曰有德司徹法者患其}
  - {type: variant, offset: 16613, length: 1, content: 爲, WYG: 均有心計較故曰無徳和怨者恐善人受害有心為}
  - {type: variant, offset: 16615, length: 2, content: 動終, WYG: 亦如司徹者有心于為力弱之家恐其所得者寡矣小國寡民使有什伯之器而不用使民重死而不逺徙雖有舟車無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之音相聞民至老死不相往來漢書詔天下吏舍無得置什器顔師古注云五人為伍十人為什則共器物故通謂什伍之具為什物不用者無往來免儲俯省徭役也舟輿甲兵舉其重者言之樂入聲望平聲相望相聞近也至老死久也近而且久不相往來者各足故也道足則無事咨詢財足則不相乞假蘇注老子生于衰周文勝俗弊將}
  - {type: page-break, offset: 16615, content: '', id: KR5h0056_WYG_002-76a, image: WYG1055/WYG1055-0405a.png}
  - {type: variant, offset: 16619, length: 1, content: 名, WYG: 為救}
  - {type: variant, offset: 16621, length: 0, content: '', WYG: 故于書之終言其所志願得小國寡民以試焉而不可得耳民各安其分則小有材者不求用于世什伯人之器則材堪什夫伯夫之長者也事少民朴雖結繩足矣内足而外無所慕故以其所有為美以其所處為樂而不復求也民物繁夥而不相求則彼此皆足故也呂注三代以來至于周衰其文弊甚矣民失其性命之情故老子之言救之以質以反太古之治小國寡民使有什伯之器而不用使民重死而不逺徙雖有舟輿無所乘之雖有甲兵無所陳之此救之以質而反乎太占之道也莊周稱至德之世曰昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏犧氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞犬之音相聞民至老死而不相往來則若此者非特老子之言而已古固有是道也然詩書之所言則止于堯舜三代而老子欲反太古之治何哉曰夫道與世之交相䘮久矣非大道不足使人反性命之情言道而不及其世不足以知大道之已試此其所以必反太古之治也然則世去太古也久矣遂可以盡復乎曰未可也然則其言之何也曰禮至于兼三王樂至於備六代其文極矣然而禮不以𤣥水大羮而措之醴酒和羮之下樂不以嘒管清聲加之朱絃疏越之上者使人知禮樂之意所不得已者如彼而所欲反本復始如此也方斯時也孔子方求文武周公之墜緒而賡之老子論其道與世如此其意猶是而已矣譬之月建已而火始王而金氣已生于其間矣此五材所以相繼而不絶也故聞古之治雖有什伯之器而不用有舟輿而不乘有甲兵而不陳則舉大事用大衆非得已也聞其民結繩而用之鄰國相望雞犬相聞至老死而不相往來則煩文倦令督稽留而足迹接乎諸矦之境車軌結乎千里之外非得已也則不得已者常在於此而所欲復者常在於彼也則其肯煩事為以深治人之過乎然則欲天下不安平泰不可得也即歿而不言猶屏𤣥水徹疏越其孰知禮之能儉而樂之節樂為反本復始之意乎夫聖人之言豈小補哉元澤注小國寡民則民淳厚葢國大民衆則利害相摩巧偽日生觀都邑與聚落之民質詐殊俗則其驗也無道之世民貧土瘠而利欲勝乎好生末盛本衰而貪求在乎外慕故觸刑犯險如履平地而車轍足跡交乎四方矣樂生遂性則重死安土無求則不逺徙此盡性之治民亦盡其性者也竊嘗考論語與孟子之終篇皆稱堯舜禹湯聖人之事業葢以為舉是書而加之政則其効可以為此也老子大聖人也而所遇之變適當反本盡性之時故獨明道徳之意以收斂事物之散而一之于}
