  - {type: variant, offset: 4479, length: 0, content: '', WYG: 希聲注夫物生而後畜畜而後形形而後成其所由生者道也其所以畜者徳也形其材者事也成其用者勢也萬物以能生故尊道以能畜故貴徳道徳以生畜之故自然為萬物所仰豈有授之爵位而後見尊貴哉然道者真精之體徳者妙物之用體可以兼用用不可以兼體道可以體徳徳不可以兼道故稟其精謂之生含其炁謂之畜遂其形謂之長字其材謂之育權其成謂之亭量其用謂之毒保其和謂之養䕶其傷謂之覆此之謂大道既生之而不執有既為之而不矜恃既長之而不宰制此之謂𤣥徳營章言人同于道徳今此章言道徳同于人是以其辭同而其理通也}
