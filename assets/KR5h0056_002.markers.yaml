  - {type: variant, offset: 11238, length: 1824, content: 註言出于自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣隂陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏於下否而不得洩于是爲飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故久而不窮世或厭之以爲不若詭辯之悅耳怪行之驚世不知其不能久也孔子曰苟志于仁也無惡也故曰仁者之過易辭志于仁猶若此而况志于道者乎夫苟從事于道矣則其所爲合于道者得道合于德者得德不幸而失雖失于所爲然必有得於道德矣不知道者信道不篤因其失而疑之于是益以不信夫唯知道然後不以得失疑道也筆乘道以自然爲至而世希言之者喜于作也有作必有輟惡能乆乎即飄風驟雨之不能乆焉亦可見也從事于道者不然從事于道則自然矣自然則本無所得亦復何失無得無失而隨世之得失故爲德爲失皆信其所至而無容心焉無不同矣無不同亦無不樂乃其理也夫無不同則求其信且不可得況不信乎苟離道而爲德不能同于失矣離德而爲失不能同于德矣不能同于德同于失而欲其同于道者未之有也所謂信不足焉有不信也皆飄風驟雨之類也或曰首楞嚴言非因縁非自然而老氏以自然爲宗有以異乎余曰無以異也夫所惡夫自然者有所自而自有所然而然也有所自而自有所然而然則是自然也在有物之上出非物之下是釋氏之所訶也老聃明自然矣獨不曰無名天地之始乎知無名則其自也無自其自也無自則其然也無然其自無自其然無然而因若縁曷能囿之故曰精覺妙明非因非縁非自然非不自然離一切相即一切法蓋所謂不可道之常道如此跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處跂與企同薛云舉踵曰跂張足曰跨立欲增高則反害其立行欲增闊則反害其行贅疣贅也行當作形古字通也食餘人必惡之形贅人必醜之左氏人將不食吾餘莊子附疣縣贅出乎形而侈乎性是也惡去聲處上聲有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然混渾通先悉薦寥遠也羅什曰妙理常存故曰有物萬道不能分故曰混成鍾會曰廓然無偶曰獨立古今常一曰不改無所不在曰周行所在皆通曰不殆蘇註夫道非清非濁非高非下非去非來非善非惡混然而成體其于人爲性故曰有物混成此未有知其生者蓋湛然常存而天地生于其中耳寂兮無聲寥兮無形獨立無匹而未常變行于群有而未嘗殆俯以化育萬物則皆其母矣道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也自大而求之則逝而徃矣自徃而求之則遠不及矣雖逝雖遠然反而求之一心足矣由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重爲輕根靜爲躁君是以聖人終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失根躁則失君根本也躁者動之甚而煩擾也君主也韓非云制在己曰重不離位曰靜重則能使輕靜則能使躁故曰重爲輕根靜爲躁君管子曰動則失位靜則自得離去聲輜莊持反古者凡吉行乘乘車師行乘兵車皆有輜車在後輜車衣車前後有蔽所以載行者之衣食器械以其累重故稱輜重榮觀紛華之觀也公羊傳曰常事曰視非常曰觀處上聲燕處猶燕居超然高出而無繫著也奈如也乘去聲失根一作失本一作失臣非今從王輔嗣本蘇註凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重爲根躁以靜爲君行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此人主以身任天下而輕其身則不足以任天下矣輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志于利故曰輕則失臣躁則失君善行無轍迹善言無瑕謫善計不用籌策善閉無關楗而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是爲要妙瑕玉玷也謫直革反責也籌策計數者所用之筭以竹爲之楗其偃反拒門木也横曰關堅曰楗結繫也繩索也約束也襲相傳襲也一作掩襲之襲言宻用也傅奕云是以聖人常善救人二十字獨見河上本古本無之蘇註乘理而行故無迹時然後言故言滿天下無口過萬物之數畢陳于前不計而知安用籌筭全德之人其于萬物如母之于子雖縱之而不去故無關而能閉無繩而能約彼方挾策以計設關以閉持繩以結其力之所及者少矣聖人之于人非特容之又善救之我不棄人而人安得不歸我乎夫救人于危難之中非救之大者也方其流轉生死爲物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則謂善救人矣聖人無心于教故不愛其資天下無心于學故不貴其師, WYG: 注}
