  - {type: variant, offset: 6289, length: 0, content: '', WYG: 呂注知至于知常則知之至也知之至則黙而成之而無不理也何所容心哉茍為不能無言則不能無我雖知之非真知者也故曰知者不言言者不知塞其兑閉其門挫其鋭解其紛和其光同其塵是謂𤣥同則黙而成之之道也若然者萬物一府死生同狀無所甚親無所甚踈故不可得而親不可得而疎不就利不違害故不可得而利不可得而害不榮通不醜窮故不可得而貴不可得而賤夫可得而親疎利害貴賤者則貴在于物而物能賤之不可得而親疎利害貴賤者貴在于我而物不能賤也其為天下貴不亦宜乎然則知道者固終不言故曰今以言言道則言非道也而知者乃以言為知則是知知矣斯言所以不得不出也以其言出于無言雖言猶不言也夫道豈黙然也哉碧虛注君平曰五味在口五音在耳如甘非甘如苦非苦如商非商如羽非羽而易牙師曠能别之其所以别之者口不能言也音味尚爾况妙道乎所以曰知者不言言者不知也塞兊閉門已見第五十二章然彼則約道清淨以塞耆欲愛悦之端此則宗道無言故興損聰棄明之説夫道無形不可以目眡不可以口傳故心困焉不能知口辟焉不能議此至人不待收視緘口而自塞兊閉門也挫銳解紛和光同塵已見第四章然彼則就道以論功此則據人以明行至人與天同心而無知與道同身而無體則進鋭紛亂之心於何而有光塵分别之意於何而生哉故至人之遊處顯則與萬物共其本晦則與虛無混其根語黙隨時而不殊巵言日出而應變是以謂之𤣥同也元澤注不言者非密而不言誠無所事言何則不見一法故也不見一法故物物而不物于物况可得而親疎貴賤之乎可得而親疎貴賤者物而已矣彼物物而不物于物故冀之爵而常貴也息齋注世之所有皆為夢境故知者不言知言之未盡也世之昧者以夢為實譊譊誦説終不離夢故言不知由其見之未至也塞其兌謹其出也閉其門其入也挫其鋭者治其内也解其紛者理其外也和其光者抑其在已也同其塵者隨其在物也無出無入無内無外無已無物是謂𤣥同既得其同謂之親而逺謂之疎而近謂之利而不喜謂之害而不懼謂之貴而不高謂之賤而不下凡物不足以名之故能為天下貴}
