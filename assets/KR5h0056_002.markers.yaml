  - {type: variant, offset: 16599, length: 2, content: 變至, WYG: 病病是以不病南伯子綦曰我悲人之自䘮者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日逺矣若子綦者可謂病病者乎息齋注知者逐物故多偽不知者返本故近真人能知不知為近真知知為多偽則為上矣儻不知知之為偽而徒益其知則是以病為藥其病}
