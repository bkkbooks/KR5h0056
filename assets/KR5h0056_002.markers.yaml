  - {type: variant, offset: 10301, length: 394, content: 以閱衆有之變矣甫美也雖萬物之美不免于變也聖人所以知萬物之所以然者以能體道而不去故耳筆乘道無形容不可形容即屬之德然知德容則道亦可從而識如所謂恍惚窈冥是也人之學道喜于有作至恍惚窈冥類若其芒蕩難於凑泊矣不知惚恍無象即象也恍惚無物即物也窈冥無精即精也如釋典云若見諸相非相即見如來也暫爲假常爲眞恍惚窈冥則不以有而存不以無而亡夫孰眞且信于此故曰自古及今其名不去也昧者乃謂恍惚窈冥之中眞有一物者夫恍惚窈冥則無中邊之謂也而物奚麗乎況有居必有去又何以亘古今而常存乎然則曷謂閱衆甫也甫始也人執衆有爲有而不能玄會于徼妙之間者未嘗閱其始耳閱衆有之始則知未始有始則衆有皆衆妙而其爲恍惚窈冥也一矣是所以知衆有即眞空者以能閱而知之故也釋氏多以觀門示人悟入老子之言豈復異此故閱衆始則前際空觀其徼則後際空萬物並作觀其復則當處空一念歸根上際永斷而要以能觀得之學者誠有意乎知常也則必自此始矣曲則全枉則直窪則盈敝則新少則得多則惑, WYG: 為百谷王}
