  - {type: variant, offset: 3022, length: 0, content: '', WYG: 呂注天下有道民之智能已于耕食之間而盜爭銷于無欲之際而其死已脱矣故曰郤走馬以糞天下無道見可欲以為造兵之本雖有封彊之界不能定也故曰戎馬生于郊然則罪之所由生者何耶可欲而已矣故曰罪莫大于可欲由可欲故不知足則雖有餘而不止也平為福有餘為禍故曰禍莫大于不知足由不知足故欲得欲而得之則怨咎之招而兵之所以不已也故曰咎莫大于欲得故不知足者雖足而不足則知足之足常足也可知矣息齋注天下有道則能使兵為民天下無道則能使民為兵人能知道則能使色為空人不知道則能使空成色可欲者愛也不知足者取也欲得者有也由愛生取由取生有衆有横生遂為無窮之咎若知取不必外是謂知足知足則無不足矣}
