  - {type: variant, offset: 16629, length: 1, content: 止, WYG: 至}
  - {type: variant, offset: 16631, length: 0, content: '', WYG: 凡物有所利則有所不利有所不利則不能不害矣唯天之道無所利則無所不利無所不利則利而不害矣凡物之有為者莫不有我有我故有爭}
  - {type: variant, offset: 16633, length: 1, content: 中, WYG: 之道雖為而}
  - {type: variant, offset: 16635, length: 2, content: 抱樸, WYG: 為無為故無我無我故不爭是天}
  - {type: variant, offset: 16638, length: 2, content: 念外, WYG: 道而已矣筆乘或曰老氏之為書使人得以受而味焉則近乎美窮萬物之理而}
  - {type: 'kr:newline', offset: 16639, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl1250}
  - {type: line-break, offset: 16639, content: '', id: KR5h0056_HFL_002-057b08}
  - {type: indent, offset: 16639, content: 　, id: KR5h0056_krp_002-bkkind887}
  - {type: variant, offset: 16641, length: 2, content: 抱樸, WYG: 不至則近乎辯察萬事}
  - {type: variant, offset: 16644, length: 1, content: 迹, WYG: 變而無不該則近乎博然不知其有信而不美善而不辯知而不博者存何也則以五千言所言皆不積之道耳不積者心無所住之謂也夫積而不積則言而無言矣言而無言}
  - {type: page-break, offset: 16644, content: '', id: KR5h0056_WYG_002-79b, image: WYG1055/WYG1055-0406d.png}
  - {type: variant, offset: 16646, length: 2, content: 樸全, WYG: 非不為人也}
  - {type: variant, offset: 16649, length: 5, content: 用大苟欲樸, WYG: 未嘗分已}
  - {type: 'kr:newline', offset: 16655, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl1251}
  - {type: line-break, offset: 16655, content: '', id: KR5h0056_HFL_002-057b09}
  - {type: indent, offset: 16655, content: 　, id: KR5h0056_krp_002-bkkind888}
  - {type: variant, offset: 16655, length: 0, content: '', WYG: 有非不予人也而未嘗損已之多斯何惡於辯且博哉茍非不積之道而苐執其意見以與天下争則多言數窮者流非天道也天之道利而不害聖人之道為而不爭學者于此而刳}
  - {type: variant, offset: 16656, length: 2, content: 尚存, WYG: 焉老氏之書亦思過半矣故曰敎而無敎何必杜口於毗耶言乃㤀言自可了心}
  - {type: variant, offset: 16659, length: 7, content: 胷中則失之遠矣, WYG: 柱下讀者其勉旃哉}
