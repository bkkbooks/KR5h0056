  - {type: variant, offset: 2300, length: 0, content: '', WYG: 呂注道之在天下莫與之偶者英與之偶則一而已矣故曰道生一既謂之一則謂之者與所謂為二故曰一生二有一有二則有三矣故曰二生三故唯無名則已茍謂之一則其適遂至于三三立而萬物生矣故曰三生萬物凡幽而不測者陰也明而可見者陽也有生者莫不背于幽而不測之陰向于明而可見之陽故曰萬物負陰而抱陽負則背之抱則向之也雖然必有冲氣以為之和葢陰與陽二也冲氣一也萬物不得一無以生故也故人之所欲者軒冕富貴也而其所惡者孤寡不榖也軒冕在身非性命也物之儻來寄也而遂有之以為固則向陽而不知反之甚者也古之制名者以其所惡為王公稱者欲其貴而不㤀賤高而不㤀下抱而知所負向而知所反以不失乎沖一之和而已故物或損之而益益之而損滿招損謙受益時乃天道也人之所敎亦我義敎之我之所敎道也敎而不以我義者則亦非道而已葢唯通于道者為得一得一則無我無我不爭夫唯不爭故天下莫能與之爭反是死之徒而已君子之敎人雖或不同然至于反一而無我敎之所自而生也故曰强梁者不得其死吾將以為敎父息齋注道生一方其為道則一亦未生一既不生則安得有二無二則一不散故所以謂之不二言其未有一也及其有一即有二有陽即有陰有陰有陽則又有陰陽之交故有二則有三至于三則無所不有矣萬物抱陽一也負陰二也陰陽交而沖氣為和三也萬物孰不具此三者然要其本則必歸于道道者未有一之謂也由其本生于道故末而不失道是以天下之物或損之而益或益之而損孤寡不榖而王公以為稱葢損之生益也强梁者不得其死葢益之生損也夫惟損益同源故自損則必益自益則必損聖人未嘗益而自以孤寡不榖為稱葢欲使人知强梁者不得其死也是謂人之所敎我亦教之亦其應世之跡不得不然歟}
