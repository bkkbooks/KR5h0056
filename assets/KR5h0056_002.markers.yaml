  - {type: variant, offset: 2484, length: 0, content: '', WYG: 呂注天下之至柔馳騁天下之至堅觀于物則水是也無有入于無間觀于物則氣是也水以其柔弱故幾于道然而不能無形者也而猶攻堅强者莫之能先氣以其無質故于神然而不能無氣者也猶能入于無間而况以無形之至柔太易之未見氣於以馳騁天下之至堅而入于無間則孰不為之動而亦何入而不自得哉故曰吾是以知無為之有益也而不言之教無為之益天下希及之是亦不知反其宗而已矣息齋注物本非物堅者偽體也雖天下之至堅其極必歸于無今天下之至柔已能馳騁天下之至堅況於無之真豈不足以破有之偽乎故無有能入無間無間者蹈水火入金石其精不亾之謂也無為之為其為以道不言之教其敎以天故無有能及之者}
