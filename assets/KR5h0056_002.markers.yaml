  - {type: variant, offset: 5627, length: 0, content: '', WYG: 呂注凡物以建而立者未有不拔者也唯為道者建之以常無有則善建而不抜矣凡物以抱而固者未有不脱者也唯為道者抱神以静則善抱而不脫矣夫唯所建所抱者如此則其傳豈有窮哉此子孫所以祭祀不輟也世之所謂修徳者或修之于天下國家而不知其本真乃在吾身也故曰修之身其徳乃真或修諸其身而不能推之于天下國家者故曰修之家其徳乃餘修之鄉其徳乃長修之國其徳乃豐修之天下其德乃普也莊周以為道之其以治身其緒餘以為國家其土苴以治天下其説出于此也然則何觀而修之身哉以身觀身而已矣何謂以身觀身今吾觀吾身之所有何自也則知吾身之所自而有矣又觀吾身之所以觀者何自也則知吾觀之所自而觀矣既知吾身之所自而有又知吾觀之所自而觀則所以修之身者已足而無待于外也以家觀家以國觀國以天下觀天下亦若是而已矣古之所以藏天下于天下者用是道也}
