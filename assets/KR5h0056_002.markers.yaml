  - {type: variant, offset: 4396, length: 0, content: '', WYG: 程俱論萬物之變莫大乎死生人之為道超然于死生之際則無餘事耳生果來乎死果往乎以生為實來則吾之所從來者宜可知矣南北邪東西邪上下邪審不可以言也而謂之實來可乎以死為實住則吾之所從往者宜可知矣心邪物邪人邪天邪審不可以言也而謂之實往可乎然則吾之生也前不知其所起後不知其所斷貫萬古而常存者湛然也然後曉然知我之未嘗生未嘗死也將以奚為死地哉}
