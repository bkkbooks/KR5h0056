  - {type: variant, offset: 511, length: 0, content: '', WYG: 吕注道之可道非常道則庸有得而有之者乎上德者以無得為得唯其無得乃所以得也故曰上德不德是以有德下徳者以不失之為得者也唯其不失故雖得而非徳故曰下徳不失徳是以無徳上徳無為非故無為也率徳之自然而實無以為也下德不知出此而為之故不能不有以為也夫徳無以為足矣而且有仁焉則是為之也然上仁者之于仁無所事仁而仁者也是為之而無以為也仁則不可獨者也必有義焉雖上義不得不為者也是為之而有以為也仁者施之而已義則擇所施之宜者也未責所報也禮則施報矣來而不往非禮往而不來亦非禮施報之義也上禮為之而莫之應則攘臂而仍之以其往而不來雖不以禮繼之猶不為非禮以禮之理固如是也上仁上禮上義猶如此則其下者不論而見矣由是觀之失道而後德失徳而後仁失仁而後義失義而後禮豈虛言哉禮之相責望者如彼則忠信自此薄亂爭自此起而智謀之所以用也是禮雖所以治亂適所以首亂也前識雖所以用智乃所以始愚也夫何故人之治常生于厚厚則其性薄則其偽去性而作偽未有不亂者也人之自知常在于明明則其實智則其蕐離實而務華則未有不愚者也是以大丈夫處其厚不處其薄居其實不居其蕐故忘仁義絶禮學遺智慧而志于道徳之大全是之謂去彼取此息齋注上德不徳則在仁而仁在義而義惟其所之未嘗執也下徳不失徳則仁之不可為義義之不可為禮既已為之則不可得而變故上徳不失道道常無為而無為之之心下徳不失徳徳則有為而有為之之跡矣上徳無為仁是也仁近于道故曰仁者人也合而言之道也仁近于道故亦無為亦無以為降而為義義者宜也以義宜物則有以為為不失宜為而未失又降而為禮禮者理也以禮理物茍莫之應而吾必欲理之則有攘臂而仍之者蓋不可得謂之道可得謂之徳徳在人謂之仁仁不失其宜謂之義義以正物謂之禮故失道而徳失徳而仁失仁而義失義而禮自然之次也自道五降而至于禮五降之後不足觀矣夫禮由亂而作因其有長幼無禮則亂故立禮以救之然至攘臂而仍之則禮亦隨喪然則禮者亂之首也多知不足以為道由其多知惑亂本真知不從真浮無實然則多知者愚之始也故禮為忠信之薄而識為知道之蕐聖人處厚不處薄貴實不貴蕐故常不失道本宏甫注無為也而亦無無為也是謂上徳黄帝是也其次雖為之而實無為是謂上仁堯之仁如天是也又其次不惟為之而且有必為之心是上義也舜禹以下聖人是也夫失道而徳失徳而仁失仁而義至于失義而後禮則所以為之者極矣故為而不應則至于攘臂攘臂不應則刑罰甲兵相因而起矣是亂之首而忠信之薄也凡此者皆以識智在前為道之障不知徳也仁也義也禮也皆道之蕐而愚民之始有真智者所不處也夫蕐者不實實則厚蕐則不厚安有大丈夫而不知處厚乎欲處厚者所當去識求智而後無為大道可幾也嚴君平解虛無無為開導萬物謂之道人清静因應無所不為謂之徳人兼愛萬物博施無窮謂之仁人理名正實處事之宐謂之義人謙退辤遜恭以守和謂之禮人此五者皆可道之陳迹非至至者也至至者一尚不存安有其五故帝王根本道為之元徳為之始道失而徳次之徳失而仁次之仁失而義次之義失而禮次之禮失而亂次之凡此五者道之以一體而世主之長短也故所為非其所欲所求非其所得不務自然而務小薄也夫禮之為事中外相違華盛而實虧末隆而本衰禮薄於忠權輕於威信不及義徳不逮仁為治之末為亂之元詐偽所起忿爭所因故莊子曰聖人行不言之敎道不可致徳不可至仁可為也義可虧也禮相偽也此之謂也韓非解仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍也生心之所不能已也非求其報也故曰上仁為之而無以為也義者君臣上下之禮父子貴賤之差也知交朋友之接也親疎内外之分也臣事君宐下懷上子事父宐賤敬貴宐知交朋友之相助也宐親者内而疎者外宐義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以貌情也羣義之文章也君臣父子之交也貴賤賢不肖之所以别也中心懷而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外飾之所以諭内也故曰禮以情貌也凡人之為外物動也不知其為身之禮也衆人之為禮也以尊他人也故時勸時衰君子之為禮以為其身故神之為上禮上禮神而衆人貳故不能相應故曰上禮為之而莫之應衆人雖貳聖人之復恭敬盡手足之禮也不衰故曰攘臂而仍之禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黄其質至美物不足以飾之夫物之待飾而後行者其質不美也是以父子之間具禮而不明故曰禮薄也凡物不並盛陰陽是也理相奪予威徳是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰也然則為禮者事通人之樸心者也衆人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能無爭乎有爭則亂故曰夫禮者忠信之薄也而亂之首乎}
