  - {type: variant, offset: 6492, length: 0, content: '', WYG: 虛無服從於道理以稱蚤服故曰夫唯嗇是謂蚤服知治人者其思慮静知事天者其孔竅虛思慮静故徳不去孔竅虛則和氣日入夫能令故德不去新和氣日至者蚤服者也故曰蚤服是謂重積德蘇注凡物方則割廉則劌直則肆光則耀唯聖人方}
  - {type: page-break, offset: 6492, content: '', id: KR5h0056_WYG_002-41a, image: WYG1055/WYG1055-0387c.png}
  - {type: variant, offset: 6493, length: 3, content: 精存乎, WYG: 不割廉而不劌直而不肆光而不耀此所謂嗇也夫嗇者有而不用者也世患無以服人茍誠有而能嗇雖未嘗與物較而物知}
  - {type: variant, offset: 6497, length: 1, content: 中, WYG: 非不能也則其服之早}
  - {type: variant, offset: 6500, length: 0, content: '', WYG: 既已服斂藏其用}
  - {type: variant, offset: 6502, length: 0, content: '', WYG: 歿身而終不試則德重積矣德積既厚雖天下之剛强無不能克則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也孟子曰存其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固蔕者是也古之聖人保其性命之常不以外耗内則根深而不可拔蔕固而不可脱雖以長生久視可也葢治人事天雖有内外之異而莫若嗇則一也呂注治人而不以人之所以為人者治之則人不可得而治矣事天而不以天之所以為天者事之則天不可得而事矣精神四達並流而無所不極化育萬物其名為同帝則人之所以為人而天之所以為天者也純素之道唯神是守守而勿失與神為一則人其有不可得而治天其有不可得而事者乎故曰治人事天莫如嗇也夫唯嗇其精神而不用則早復者也茍為不嗇而費之至于神敝精勞雖欲反其精神亦無由入矣其於復也不亦晚乎故曰夫唯嗇是謂早復人之生也固足于徳夫誠能嗇而早復之則德日益以充故曰早復謂之重積徳重積徳則德之至者也至徳者火不能熱水不能溺寒暑不能害而禽獸不能滅則安往而不克哉故曰重積徳則無不克夫有所不克則其道有時而極也無所不克則執知其極哉故曰無不克則莫知其極夫有土者有大物也有大物者不可以物物而不物故能物物莫知其極則不物而能物物者也雖有土而無其累矣故曰莫知其極可以有國既得其母以知其子既知其子復守其母殁身不殆故曰有國之母可以長久然則嗇之為道是謂深根固蔕長生久視之道也精神者生之根嗇而藏之則根深而生長矣長生者視之蔕衛而保之則蔕固而視久矣息齋注外以治人内以事天皆莫若嗇嗇者無所不嗇之謂也謹于内閑於外内心不馳外心不起之謂嗇故能早服内服其心外服其形寂然不動則徳有所積積于不積則無不勝無不勝則無不治雖有國猶可也人知其可以有國而不知其可以有國者由其有本也本積既厚則其塵垢糠秕猶將陶鑄堯舜况其下者哉此所謂深根固蔕治人事天之道治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷之夫兩不相傷故徳交歸焉蒞力至反聖人亦不傷之一作傷人以下徳交歸焉觀之作之為是之指神而言也韓非解工人數變業則失其功作者數揺徙則亾其功一人之作日亾半日十日則亾五人之功矣萬人之作日亾半日十日則亾五萬人之功矣然則數變業者其人弼衆其虧彌大矣凡法令更則利害易利害易則民務變務變之謂變業故以理觀之事大衆而數揺之則少}
  - {type: page-break, offset: 6502, content: '', id: KR5h0056_WYG_002-41b, image: WYG1055/WYG1055-0387d.png}
  - {type: page-break, offset: 6502, content: '', id: KR5h0056_WYG_002-42a, image: WYG1055/WYG1055-0388a.png}
  - {type: page-break, offset: 6502, content: '', id: KR5h0056_WYG_002-42b, image: WYG1055/WYG1055-0388b.png}
  - {type: variant, offset: 6503, length: 1, content: 形, WYG: 功藏大器而數徙之}
  - {type: variant, offset: 6505, length: 2, content: 真僞, WYG: 多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴静不重變法故曰治大國者若烹小鮮人處疾則貴有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫内無痤疽癉痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道蒞天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不傷人也其神不傷人也鬼祟也疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民民不犯法則上亦不行刑上不行刑之謂上不傷人故曰聖人亦不傷民上不與民相害而人不與鬼相傷故曰兩不相傷民不犯法則上内不用刑罰而外不事利其產業上内不用刑罰而外不事利其産業則民蕃息民蕃息而畜積盛民蕃息而畜積盛之謂有德凡所謂祟者䰟去精神亂精神亂則無徳鬼不祟人則䰟不去䰟不去則精神不亂精神不亂之謂有徳上盛畜積而鬼不亂其精神則徳盡在于民矣故曰兩不相傷則徳交歸焉言其徳上下交盛而俱歸于民也蘇注烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛聖人無為使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用其神矣非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未嘗傷人故其鬼無能為耳人鬼所以不相傷者由上有聖人也故徳交歸之呂注得有國之母以治國雖大無難也烹魚者不可以煩而烹小鮮者尤當全之而不割者也治大國者亦若是而已烹而割之則傷矣以道蒞天下者謂之大制亦不割以傷之而已及其至也則其鬼不神凢以不傷之所致也何以言之鬼之為道非不神也厥與人}
  - {type: page-break, offset: 6505, content: '', id: KR5h0056_WYG_002-43a, image: WYG1055/WYG1055-0388c.png}
  - {type: page-break, offset: 6505, content: '', id: KR5h0056_WYG_002-43b, image: WYG1055/WYG1055-0388d.png}
  - {type: 'kr:newline', offset: 6507, content: '

      ', id: KR5h0056_krp_002-bkkkrnewl496}
  - {type: line-break, offset: 6507, content: '', id: KR5h0056_HFL_002-023b02}
  - {type: indent, offset: 6507, content: 　, id: KR5h0056_krp_002-bkkind337}
  - {type: variant, offset: 6508, length: 0, content: '', WYG: 擾而見其神則不能不傷人而所以不神者以聖人為能以道蒞天下使人不淫其性不遷其德無大喜大怒以干陰陽之和所謂處混之中與一世而得澹漢焉者也則是聖人亦不傷人也唯聖人為能不傷人故陰陽和静鬼神不擾萬物不傷羣生不天則其神不傷人也神不傷人則無以見其靈響而神焉由此觀之其鬼不神非其鬼不神也由其神不傷人故不神也非其神不傷人由聖人亦不傷人故其神不傷人也使聖人之于人不能全其樸而傷之而人失其性至于四時不至寒暑之和不成人之所以傷神者為多則神其能不傷人乎夫唯神不傷人則神歸徳于人神不傷人而人亦歸徳于神}
  - {type: page-break, offset: 6508, content: '', id: KR5h0056_WYG_002-44a, image: WYG1055/WYG1055-0389a.png}
  - {type: variant, offset: 6509, length: 0, content: '', WYG: 故曰夫兩不相傷故徳交歸焉息齋注治國者聖人之餘事不啻如烹小鮮雖恢奇譎怪道通為一故其鬼不神非其鬼不神使鬼而有神凡恢奇譎怪皆化而為道道豈有傷人者乎本欲吾不傷人故其幽至于鬼神皆不能以神傷物大而政治幽而鬼神兩不傷故人鬼之心交歸焉非至德其能如是乎程俱論聖人不傷氏固也而能使鬼神亦不傷人何哉蓋人之在道道之在人猶魚之在水水之在魚也亦何生死之辨乎}
  - {type: variant, offset: 6511, length: 0, content: '', WYG: 以道蒞天下天下之民其生也泊焉所以善其生也其死也寂然所以善其死也寂然而已鬼安得而神乎生也如彼死也如此尚安得}
  - {type: page-break, offset: 6511, content: '', id: KR5h0056_WYG_002-44b, image: WYG1055/WYG1055-0389b.png}
  - {type: variant, offset: 6512, length: 1, content: 精, WYG: 靈響祟厲之為哉宏甫注烹小鮮者攪之則爛故聖人以無為治天下雖有神姦無所用之非聖人能絶之使}
  - {type: variant, offset: 6514, length: 0, content: '', WYG: 神也雖神而自不能為人之傷也何也以聖人未嘗傷人也夫聖人不傷人神亦不能為人之傷是兩不相傷也但不傷則徳歸焉豈别有徳以不傷之哉夫徳即傷之矣大國者下流天下之交天下之牝牝常以静勝牡以静為下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜為下蘇注天下之歸大國猶衆水之趨下流也衆動之赴静猶衆高之赴下也大國能下則小國附之小國能下則大國納之大國下以取人小國下而取于人呂注知以道治其國固不傷其人矣而不知所以交天下者則已雖不傷人而有傷其人者矣大國者下流天下之交天下之交牝牝常以静勝牡以静為下是乃所以交天下而保其人之道也葢天下之交牝而牝常以静勝牡而所以勝者由以静為下故也大國誠能居下流以致天下之交則牝以静為下而勝牡之道也故大國以下小國則取小國則所謂或下以取之也下以取之者言大之于小宜若可以無下而下之者以取之故也小國以下大國則取大國則所謂或下而取之者也下而取之者言小之于大不得不下而取之故也葢大國不欲兼畜人而小國不過欲入事人今大者下小小復下大兩者各得其所欲則其有不取之者乎取之者言得其心而不失之謂也然則大者小者莫不為宜下而獨曰大者宜為下何也小而不能下大非徒不能取大國而亦災禍及之矣則不嫌于不宜故曰大者宜為下而已息齋注國大而能降以求物則物必交歸之牝以静而下物故牝常勝牡以大國而下小國則必得小國以小國而下大國則必得大國故大國或下小國以取小國或下大國而取者各獲其心之謂也故大國不過欲畜小國小國不過欲事大國夫如是而後兩者各得其所孟子曰以小事大者畏天者也以大事小樂天者也樂天者保天下畏天者保其國故大國尤宜為下吳注交㑹也大國者諸小國之交㑹如水之下流為天下衆水之交㑹也牝不先動以求牡牡常先動以求牝動求者招損静俟者受益故曰以静勝牡動求者居上静俟者居下故曰以静為下或曰牝字其一疑衍大國不恃其尊謙降以下小國則能致小國之樂附小國甘處于卑俯伏以下大國則能得大國之見}
  - {type: page-break, offset: 6514, content: '', id: KR5h0056_WYG_002-45a, image: WYG1055/WYG1055-0389c.png}
