  - {type: variant, offset: 16609, length: 0, content: '', WYG: 知之也筆乘道以知入以不知化知即釋氏之知無也不知即釋氏之無知也始以知無遣其有隨以不知遣其知萬法歸無無亦不立非上而何彼於虛空之中横生意見清浄之内忽起山河揑目生華迷頭認影則病矣凡有知皆妄也凡有妄皆病也學者}
  - {type: variant, offset: 16610, length: 0, content: '', WYG: 狃以為𤣥覽寶而持之病奚從瘳乎聖人之不能廢知猶夫人也而知不為病者知知之為病故耳知其為病則勿藥而病瘳矣知不知上所謂生而無生真性湛然也不知知病所謂無生而生業果宛然也唯其病病是以不病所謂知幻即離不作方便也民不畏威則大威至矣無狹其所居無厭其所生夫唯不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此威畏古通用人不畏其所當畏則大可畏者至矣下文皆畏其所當畏之事狹胡夾反一作狎厭於豔反蘇注夫性自有威高明光大赫然物莫能加此所謂大威也人常患溺于衆妄畏生死而憚得䘮萬物之威雜然乘之終身惴惴之不暇雖有大威而不自知也茍誠知之一生死齊得䘮坦然無所怖畏則大威然見于前矣性之大可以包絡天地彼不知者以四肢九竅為已也守之而不厭是以見不出視聞不出聴蕞然其甚陋也故敎之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脱而不得不知有厭有慕之方囿于物也故敎之曰無厭其所生夫唯聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也聖人雖自知之而不自見雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未㤀則猶有畏也畏去而後大威至也呂注民不冥于道而唯識知之尚故生生厚生生厚故輕死輕死故不畏威民至于不畏威則無所不為此天之所自以明威而大降其虐也故曰民不畏威則大威至矣夫唯以道治天下者知夫充滿天地包裹六極凡命于天者其居之所同然也勿狹之而已精神四達並流無所不極凡命于天者其生之所同然也勿厭之而已夫民無常在我而已夫唯我不厭是以民亦不厭也則奚不畏威之有哉是故聖人自知以常而不自見以外其身知常而外其身乃所以不狹其居也自愛以嗇而不自貴以遺其生愛嗇而遺其生乃所以不厭其生也故去彼知識之病而取此不識不知之不病也元澤注民樸而主厚則畏威上失其道多乎有為以小其道塞其生故民巧偽彫薄而威不能服也夫如是則天誅所加禍亂將起故曰大威至民性本自廣大流通而世教下衰不能使之復樸乃蹙其居之廣而使狹厭其生之通而使塞夫唯狹其居故民不淳而偽唯厭其生故民不厚而薄聖人不然使民逍遥乎天下之廣居而各遂其浩然之性則其有干威者乎莊子曰狶韋氏之國黄帝之囿堯舜之宮湯武之室此明世世下衰漸狹其居也彼聖人豈有優劣乎而居乃漸狹者所遭之時則然也上不自厭其生而盡性故民亦得盡性也莊子曰不厭其天此之謂也厭者天厭之之厭自見則矜成自貴則賤物此所以自狹其居自厭其生亦以狹民之居厭民之生也自知則明乎性而不為妄自愛則保其身而不為非夫然則豈至于干天之威也董注居者性之地居天下之廣居則與太虛同其體矣生者氣之聚含太一之至精則與造化同其用矣惟曲士不可以語道茍不溺于小術而實所無以自狹其居則必棄有著無而蔽于斷滅以厭其所生矣是以告之以無狹無厭使學者知夫性者氣之帥而其大無量當擴而充之以全其大生者道之寓而其用不窮當葆而養之以致其用則養氣全生盡性至命而不生厭慕之心所以體無非彊無而無非頑也長生非貪生而生非礙也夫如是則生與道居而道亦未嘗厭棄于人矣見賢遍切顯也去上聲自知則返照無畏而不狹其居自愛則絶外嗜欲而不厭其生惟自知自愛所以居之安也而不自見以矜能不自貴以賤物故無知之之見忘愛之之心也息齋注夫欲人之畏愛者皆内不足而外慕者也聖人足於内視人之喜不加益其不畏不加損是以皆與之無為葢居物之上使人畏已者易使人不畏已者難使我㤀人者易使天下兼㤀我者難民不畏威非天下兼㤀我者不能也此豈非所謂道德之威乎聖人之遇物随所遇而安故不狹其所居不厭其所生葢知其所居所生者皆非其實也我惟不自厭故生亦莫吾厭由其自知而不自見其有知由其自愛而不自貴其有愛使其有自見自貴之心則狹其所居厭其所生有不能一日安矣吳注威可畏者損壽戕身之事大威大可畏者死也人不畏其所可畏必戕身損壽以速其死有大可畏者至矣莊子曰人之所取畏者衽席之上飲食之間而不知為之戒者過也狎玩習也所居身之所處厭猶惡而棄之也平日所處凡損壽戕身之事無所畏憚狎習為常安然為之言不畏威也厭所生謂傷生速死是厭惡其所生而棄其命大威至矣夫惟不狎舊本作不厭廬陵劉氏云上句不厭當作不狎今從之夫惟不狎其所居而畏所畏是以不厭其所生而大可畏者不至矣自知自知愛身之道自見自顯著所知以示人自貴即後章貴生言貪生之心太重也聖人于自愛之道雖自知于中然含德襲明知若不知不表表示人自見于外雖自愛之篤然體道自然若無以生為亦不切切貪生自貴之過彼謂自見自貴此謂自知自愛上文言不畏則有大威之禍不狎則有不厭之福皆為衆人言爾若聖人則不侍畏而自無可畏不待毋狎而自無所狎内有自知自愛之實而外無自見自貴之迹所無者所去也所有者所取也勇于敢則殺勇于不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來繟然而善謀天恢恢踈而不失殺猶死也利謂活害謂殺惡去聲繟音闡舒緩也王作坦嚴作黙不如作繟為長葢黙則重不言坦則近不爭也蘇注勇于敢則死勇于不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂僥倖其或然而忍其常理夫天道之逺其有一或然者孰知其好惡之所從來哉故雖聖人猶以常為正其于勇敢未嘗不難之列子曰迎天意揣利害不如其已患天道之難知是以歴陳之不與物爭于一時要于終勝之而已天何言哉四時行焉百物生焉未有求而不應者也神之格思不可度思矧可射思夫誰召之哉繟然舒緩若無所營而其謀度非人之所及也世以耳目觀天見其一曲而不覩其大全有以善而得禍惡而得福者未有不疑天網之疎而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖踈而不失也呂注用其剛强而必於物者勇于敢者也則死之徒是已故曰勇于敢則殺致其柔弱而無所必者勇于不敢者也則生之徒是已故曰勇于不敢則活勇于敢者人以為利而害或在其中矣勇于不敢者人以為害而利或在其中矣然則天之所惡殆非可以知知而識識也故曰此兩者或利或害天之所惡孰知其故是以聖人之動也豫若冬涉川猶若畏四鄰猶難之若此者以天之惡為不可知故也夫唯不可知則不識不知乃所以順帝之則也葢天之生物因其材而篤焉栽者培之傾者覆之則未嘗與物争者也而物莫能違之者故曰不争而善勝天何言哉四時行焉百物生焉其行其生未嘗差也故曰不言而善應莫之為而為者天也莫之致而至者命也故曰不召而自來易則易知而其道盈虛與時消息而未嘗違故曰坦然而善謀天聦明自我民聦明天明威自我民明威其聦明明威未嘗自用而惠吉逆凶猶影響也故曰天網恢恢疎而不失夫唯天之道不可知為如此聖人所以勇于不敢而不識不知乃而所以順之也息齋注人皆知勇于敢不知勇于不敢勇于敢者蹈白刃也勇于不敢者蹈中庸也故曰白刃可蹈也中庸不可能也以兩者較之蹈白刃者有害而人輕其害蹈中庸者有利而人不知其利此中庸所以為難者歟輕于用勇人之所嫉天之所惡孰知其故雖聖人猶難之況衆人乎葢天之道不争而善勝不言而善應不召而自來繟然而善謀知其惡于用勇也自其天之未勝天之未應及來之未至謀之未定而言之則强者或得勇者或勝葢有之矣要其後而徐觀之然後知天網恢恢疎而不夫也吳注敢為惡之人乃天所惡然天之所惡深昧難測何以知其果為天所惡之人乎其人雖可殺聖人猶有難之之意而不敢輕易殺之也聖人不輕易殺之則為惡者皆得漏網而天網不漏也天之于惡人非如人之以力與争而天定自能勝人非如人之以口與言而其應如響應聲其報應之速不待召之而自來至惡有惡報雖用智計不可逃免天雖無心坦然平易而巧于報應有非人謀之所能及此天網恢恢廣大似若疏而不宻然未嘗失一惡人無得漏網者聖人雖不殺之而天自殺之也宏甫注勝以不争應以不言求以不召正天之疎而不失也若争而後勝雖不疎必有失矣民常不畏死奈何以死懼之若使人常畏死而為奇者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斵夫代大匠斵希有不傷其手矣斵陟角反蘇注政煩刑重民無所措手足則常不畏死雖以死懼之無益也民安于政常樂生畏死然後執其詭異亂羣者而殺之孰敢不服哉司殺者天也方世之治而有詭異亂羣之人恣行于其間則天之所棄也而吾殺之則是天殺之而非我也非天之所殺而吾自殺之是代司殺者殺也代大匠斵則傷其手矣代司殺者殺則及其身矣呂注民之為道固常不畏死者也唯無狹其所居無厭其所生則可以使之畏威而重死矣奈何以死而懼之而欲其畏死乎何以知其然也若使民常畏死而為奇者吾得執而殺之則孰敢不畏死而為奇乎然而執之而不勝殺之而不止者則民之不畏死而不可以死懼之明矣然則以道治天下者宜如何哉常有司殺者殺勿代之而已矣何謂常有司殺者殺天網恢恢疎而不失天討有罪五刑五用則司殺者天之謂也刑戮有出于好惡而不用于天討則是代司殺者殺也代司殺者殺是代大匠斵代大匠斵希有不傷其手者矣則代司殺者殺其傷可知也張耒夫人之生不殺之于袵席飲食之疾病則殺之盗賊刑戮者過半矣則人之于死實未嘗知畏也而世之馭物者而欲物之畏不過示之以死亦惑矣故曰民不畏死奈何以死懼之茍畏死邪則吾取為奇者而殺之宜民之不復為奇也天下未嘗無刑而為奇者不止則死之不足以懼物也明矣故曰若使人畏死而為奇者吾得執而殺之孰敢也夫物不患無殺之者也萬物冺冺必歸于滅盡而後止則常有司殺者殺矣竊司殺者之常理而移之以行其畏非徒不足以懼物而亦有所不及者也故曰常有司殺者殺夫代冇司殺是代大匠斵希有不傷其手矣然則操政刑死生之柄驅一世之民使從之殆非也息齋注此言世之刑法不足恃以為治也民不畏死吾奈何以死懼之使民果畏死有為奇者執而殺之則殺一人足以為治矣然愈殺而愈不可禁則刑之不足恃也秦人用法嚴其網密而姦宄不勝漢用法疎網漏吞舟之魚而天下歸於漢此亦足以見矣天道福善禍淫是有司殺者于㝠㝠之中不可逃也若必代司殺者殺如代大匠斵未有不傷手者也薛注我朝太祖皇帝道徳經序曰朕自即位以來罔知前代哲王之道問道諸人人皆我見一日試覽羣書有道徳經一卷見其文淺意奥久之見本經云民不畏死奈何以死懼之當是時天下初定民頑吏弊雖朝有十人棄市暮有百人仍為之如此者豈不應經之所云朕乃罷極刑而囚役之不逾年而朕心減朕知斯經乃萬物之至根王者之上師臣民之極寳非金丹之術也於戲太祖盖天縱大聖人故其聰明睿智知言之奥如此亶聰明作元后太祖之謂矣仁人之言其利溥哉老子之謂矣民之飢以其上食税之多也是以飢民之難治以其上之有為也是以難治民之輕死以其生生之厚也是以輕死夫唯無以生為者是賢于貴生税租也純甫云無以生為者賢于貴生即吾無吾身吾有何患之意此章之言由粗及精要歸其重于此耳蘇注上以有為導民民亦以有為應之故事多而難治上以利欲先民民亦争厚其生故雖死而求利不厭貴生之極必至于輕死惟無以生為而生自全矣呂注一夫之耕足以食數口則奚至於飢哉而至於飢者非以其上食税之多故飢邪織而衣耕而食是謂同徳奚難治哉而至于難冶者非以其上之有為故難治耶甘其食美其服安其俗樂其居則奚至于輕死哉而至於輕死者非以其生生之厚故輕死耶是以聖人無事而民自富無欲而民自樸則至于食税之多而飢無有也無為而民自化好静而民自正則至于有為而難治無有也自富自樸自化自正而不飢以難治則至於生生之厚而輕死無有也葢所以生生之厚而至于輕死者以其踶跂好知争歸于利而不可止故也夫唯生生之厚遂至于輕死則無以生為者賢于貴生可知矣是故聖人不自見以外其身不自貴以遺其生知其無以生為而已矣息齋注上多取則下貧上有為則下亂必然之理也我欲厚其生則不顧人之生我厚而彼薄彼安得不輕死聖人之于生葢不得已彼視其生若無以生為也豈肯厚吾之生而奪人之生哉是之謂賢於貴生人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則共强大處下柔弱處上脆輭也徒𩔖也合手曰共商桑榖生於朝七日大共秦伯怒蹇叔曰墓木拱矣皆合拱也董音如字言人共伐之也處上聲蘇注冲氣在焉則體無堅强之病至理在焉則事無堅强之累兵以義勝者非强也强而不義其敗必速木自拱把以上必伐矣物之常理精者在上粗者在下其精必柔弱其粗必强大呂注道之為物無形而不爭則天下之至柔弱而人莫之喻也故以有形喻之人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁則雖有形者亦以堅强而死柔弱而生而況體無形之道而不致其柔弱其可得乎是以兵强則恃之而驕而敵國之所謀也我驕而敵謀所以不勝也木强則伐伐之所以共而舉之也非徒然也而以位言之則天以氣在上地以形在下氣則柔弱形則堅强臣以有為事上君以無為畜下有為則堅强無為則柔弱堅强居下柔弱處上物之理也然則柔弱之能勝剛强可知矣息齋注此章汎言柔弱之必生剛强之必死柔弱雖非所以為道而近于無為剛强雖木離于道而涉于有為無為則去道不逺有為則吉凶悔吝隨之益逺于道矣吳注用兵示弱者謀深而工敵輕而玩之故勝恃强者慮淺而驕敵懼而備之故不勝兵法始如處女敵人開户示之弱也後如脱兎敵不及距則能勝之矣秦兵過周超乘三百竟敗于殽齊兵入晉桀石投人竟敗于鞌此侍强不勝之驗也共兩手所圍也禾之弱而揺動者為近末之小枝强而不揺動者則為近根合共之大榦也因言兵而并及于木上文言兵强者為人所勝是處下也不能如勝人者之處上木强者近根之榦是處下也不得如小枝之處上推此物理則知人之德行凡堅强者矜已凌人必蹷其貴髙而反處人下矣柔弱者衆所尊戴而得一處人上矣天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足人之道則不然損不足而奉有餘孰能以有餘奉天下唯有道者是以聖人為而不恃成功而不居其不欲見賢耶抑之舉之二句言張弓有餘不足二句言天道凡弛弓俯其體則弣在上弰向下張之而仰其體則弣向下弰在上是抑弣之高者使之向下舉弰之下者使之在上天之損有餘如抑其弣而使之下其補不足如舉其弰而使之高見賢遍反希聲注易曰立天之道曰陰與陽陽主升陰主降陽升極天則降陰降極地則升此則抑高舉下葢張弓之象也天道盈虛一章七閏損日之有餘補月之不足人道則不然損其不足之民而奉有餘之君孰能法天之道以為人道損已之有餘以奉天下之不足其唯有道者乎在易損下益上曰損損上益下曰益以下為本也是以聖人能為之而不恃其事能成功而不居其所以其不欲見賢于人故天下謂之似不肖皆損有餘奉不足之㫖也蘇注張弓上筋弛弓上角故以况天之抑高舉下天無私故均人多私故不均有道者贍足萬物而不辭既以為人已愈有既以予人已愈多非有道者無以堪此為而恃成而處則賢見于世賢見于世則是以有餘自奉也呂注天之道無為而已矣無為則無私無私則均猶之張弓也高者抑之下者舉之有餘者損之不足者補之適于均而已矣夫天之道非故以抑高而舉下也無為任物之自然則高者為有餘不得不抑而損下者為不足不得不舉而益滿招損謙受益時乃天道是也人之道不能無為不能無為則不能無私不能無私則至于損不足以奉有餘不足異也夫唯有道者知未始有物而有為之與功名皆我所餘而天下之所不足而爭之故損之以奉天下而不有此故曰孰能損有餘以奉天下唯有道者聖人則有道者也是以為而不恃功成不居其不欲見賢者無它凡以法天之道而已矣息齋注裒多以益寡者天之道也裒寡而益多者人之道也惟聖人能以己有餘而奉人不足故其能及萬物而不恃其能功葢天下而不居其功利澤施于天下而不欲見其賢唯有道者而後如此天下莫柔弱于水而攻堅彊者莫之能先以其無以易之也故柔之勝剛弱之勝彊天下莫不知莫能行是以聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反蘇注正言合道而反俗俗以受垢為辱受不祥為殃故也呂注天下之物唯水為能因物之曲直方圓而從之則是柔弱莫過于水者也而流大物轉大石穿突陵谷浮載天地唯水為能則是攻堅强者無以先之也所以然者以其雖曲折萬變而終不失其所以為水是其無以易之也夫水之為柔弱而柔弱之勝剛强天下莫不知而老子數數稱之何也以天下雖莫不知而莫能行也夫聦明睿智足以有臨矣則其患者豈在于材力之不足也顧未能損有餘以奉天下持之以柔弱而常為名尸智主事任謀府之所累耳故老子論道徳之將終而數數及此又引聖人言以信之曰受國之垢是謂社稷主受國之不祥是謂天下王明所以服天下者在此而不在彼也夫三代之王必先其令聞而曰受國之垢與不祥而為社稷主為天下王何也葢必先其令聞非過名之言也不及名之言也受國之垢與不祥則過名之言也名不足以言之也不及名之言應事應事言之變也過名之言體道體道言之正也正言而曰受國之垢與不祥故曰正言若反湯武之言曰萬方有罪在予一人此知以國之垢與不祥而受之者也宏甫注以堅强攻堅强雖能勝之終必缺陷故攻堅强者莫勝于柔弱柔弱者不期勝而自勝也故又戒之曰其無以輕易柔弱為也畢竟柔弱能勝剛强而剛强者不與焉夫山藪藏疾至柔也川澤納汙至弱也茍為社稷之主而不能受多方之垢為天下之王而必欲國家之無夭孽四海之無凶人可得耶雖欲剪除而撲滅之祗自勞耳此葢若反于正言其實天下之正言也不可不察也和大怨必有餘怨安可以為善是以聖人執左契而不責于人故有徳司契無徳司徹天道無親常與善人契苦訃反徹徹法也直列反蘇注夫怨生於妄而妄出于性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未㤀也契之有左右所以為信而息爭也聖人與人均有是性人方以妄為常馳騖于爭奪之塲而不知性之未始少妄也是以聖人以其性示人使知除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不侍責之而自服也然則雖有大怨懟將渙然氷解知其本非有矣而安用和之彼無徳者乃欲人人而通之則亦勞而無功矣徹通也天道無私惟善人則與之契之無私也呂注復讎者不折鏌干雖有忮心不怨飄瓦是以天下平均不由此道則怨之所生也而人欲和之不可勝解矣故曰和大怨者必有餘怨不善者吾亦善之乃所以為徳善和大怨而不免于有餘怨安可以為善哉是以聖人執左契而不責于人是乃使復讎者不折鏌干雖有忮心不怨飄瓦而天下平均之道也葢古之獻車馬執右契右契所以取左契所以與則左契者常以與人而不為物主者也聖人為而不恃功成不居毎以有餘奉天下至于殺人則有司殺者殺而未嘗尸之則是執左契以與人而不為物主此其所以無怨而不責于人之道也夫豈以和之為悦乎故有德司契則不責于人而己無德司徹以通物為事者也天道無親常與善人無親而唯善人之與是亦以執左契而不責于人之道也息齋注怨之不可和猶火之不可寒水之不可熱若强和之必有餘怨以此為善未足也是以聖人治天下如執左契以求于右契恩怨取與吾何心哉如契之合適於符而已茍有不合不强其所無不責之也葢大小長短彼各有契自合其合而吾無容私焉若必欲强通之是司徹非司契也天道亦然天道無親常不失善葢亦司契而已吳注執左契不責于人無心待物也契者刻木為劵中分之各執其一而合之以表信取財物于人曰責契有左右左契在主財物者之所右契以付來取財物之人王元澤曰史記云操右契以責事禮記云獻田宅者操右契則知左契為受責者之所執澂謂執左契者已不責于人待人來責于已有持右契來合者即與之無心計較其人之善否和怨者有心于為善人也不若無心待物如執左契而不責于人静中觀物而任其自然也有德無心待物無徳有心待物徹通也古者助法周改助為徹法恐八家私田所收之不均故八家私田亦令通力合}
