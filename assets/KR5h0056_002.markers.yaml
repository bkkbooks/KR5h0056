  - {type: variant, offset: 1896, length: 0, content: '', WYG: 呂注孔子曰朝聞道夕死可矣則聞道者死生固不足以累其心豈茍知之而已哉上士聞道真聞之者也真聞之則無所復疑特勤而行之而已矣夫道亦何以勤行為哉曰觀諸心以契其所聞則勤行之謂也中士聞道聞之而未審焉者也故若存若亾若存若亾則不能勤行之一出焉一入焉而已矣下士聞道聞之而不信者也故大笑之所以大笑者以情求之而不得故也使道而可以情求則彼不笑之矣故曰不笑不足以為道若古之建言者有之凡皆不可以情求之謂也冥冥之中獨見曉焉無聲之中獨聞和焉是之謂明道若昧和之以是非而休乎天均則無物不然無物不可是之謂夷道若𩔖為道者日損損之又損之以至于無為是之謂進道若退上徳者無為而無以為者也然其應如響斯不亦若谷乎大白者滌除𤣥覽而無疵者也然受天下之垢斯不亦若辱乎廣徳者廓乎其無不容也而未嘗自見自是自矜自伐也斯不亦若不足乎善建者不拔而建之以常無有乃然有見者也故曰建徳若偷體性抱神以遊世俗之間而非所驚也故曰質真若渝大方體之無南無北奭然四解淪於不測無東無西始於𤣥冥反於大通此大方之無隅也大成若缺然日計之而不足歲計之而有餘此大器之晚成也大音者聽之不可聞故希聲大象者視之不可見故無形凡此者皆道也然謂之明而若昧謂之夷而若𩔖謂之進而若退以至音而希聲象而無形名與實常若相反者也唯道為能如此故既以為人已愈有既以與人已愈多而生之畜之長之育之成之熟之養之覆之莫非道也故曰夫唯道善貸且成元澤注竊嘗論此篇曰道不逺人而世莫能覩者不明故也故首之以明道大道甚夷而惟明者能由之以進故次曰夷道也進道也進于道而復乎性命之常則不德之徳也故次之以上徳上徳者自得其徳而不同乎庶物者也故不染而白以其白自異于物則安能若谷乎故次之以若辱不辱而潔則是伯夷之隘也安能廣乎故若辱而后曰廣徳上徳而能廣則是與人為徒而可以為君師矣故曰建徳若偷偷者不汲汲乎有建者也建徳則有所立而離本近偽矣故又要在乎不易吾真故次之以質真其序至此則道之在我者體既具矣故曰大方無隅有大方以為體則所以應無方之傳而可以緒餘為人矣故曰大器大器者業也至人以其糠粃土苴為器而器未嘗不大也孔子以管仲為小器則帝王之功其大器乎道雖為此而要其終則未嘗為也未嘗有也故曰大音也大象也然則既盡之矣故能與道為一而供萬物之求成萬物之性也嗚呼是道也不可以識識而况于以言言乎而余論之者亦其粗而已矣息齋注上士聞道雖衆人識詆不能使之不勤中士聞道雖不能無信亦不能使之無疑下士聞道雖聖人復起不能使之不笑葢膠于有者天下皆是彼方以有為實今遂告以有之非實而無之為真其誰不疑且笑故不笑不足以為道亦理之當然不足怪也上士之勤非能勤也有見而勤下士之笑非故笑也無見而笑上不至于勤下不至于笑不能無見而又不能信其所見雖使之不疑不可得也古之立言葢有之矣明道者自明非色之明外不得而見其明故曰其明若昧進道者自進非力之進外不得而知其進故曰其進若退夷道無所不平彼以彼之平猶吾平也故曰若𩔖上德無所不容彼雖恢奇譎怪而吾以一視之故曰若谷大白不汙其性茍性不汙和其塵皆可也故曰若辱廣徳必有見於大茍見于大雖欲使之息不可得也故曰若不足建徳者内立自性自性有立則接物必簡故曰若偷質真者不徇于外外不徇則惟吾所之故曰若變大方無隅非廉隅可得而察也大器晚成非成不成可得而盡也大音希聲非聲音可得而知也大象無形非形器可得而執也中下之人方役其所見而議吾之跡以實昧實退實𩔖實辱實偷實渝其不侮笑者幾希矣葢大道無名隱而不可見至其貸以曲成乃其小小者爾非其實也上士知其無名略其貸而識其大故亦不可以議其名中下之士執其貸且成者以議全此其所以愈議而愈非也}
