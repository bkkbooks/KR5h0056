  - {type: variant, offset: 3474, length: 0, content: '', WYG: 呂注為學者未聞道者也未聞道而求之則不得不博故日益為道者已聞道者也已聞道者而為之則期至于無為而已故日損而損之者未免乎有為也并其損之者而損焉而後至于無為無為者無有而已無不為者乃所以無無也此之謂絶學無憂無憂之謂神神也者物物而非物者也則取于天下也何有由此觀之取天下常以無事及其有事不足以取天下觀莊周之所以應帝王者而深求之則可知已黄茂材注無所不知而後可以言學故學欲日益益者已化然後可以言道故道欲日損然益者可以進損者不可彊損而未能兼㤀其損未為損也直須瞥地脱落前後際斷乃至無為之地故能無所不為而應用不窮施于天下綽綽然矣息齋注為學所以求知故日益為道所以去故日損知不極則損不全故日益者所以為日損也若損之又損去真全則無為矣至于無為則凡有為未嘗不無此又未易以損益論也及其無為之至雖取天下而有之尚猶不見其事若以有事取之取一物尚不可得而况于取天下乎}
