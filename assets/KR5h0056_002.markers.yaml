  - {type: line-break, offset: 3191, content: '', id: KR5h0056_HFL_002-012a06}
  - {type: variant, offset: 3191, length: 1, content: 爲, WYG: 呂注天下之所以為天下者果何邪見天下之所以為天下則不出户而知之矣天道之所以為天道者果何邪見天道之所以為天道則不窺牖而見之矣今夫天下之大固無窮也必待出而後知之則足力之所及者寡矣所知者幾何哉天道之逺固不測也必待窺而後見之則目力之所及者寡矣所見者幾何哉故曰其出彌逺其知彌少是以聖人知天下之所以為天下故不行而知見天道之所以為天道故不見而名夫何故以其備于我故也知之于所不行名之于所不見則不為而成矣章安注出户而知知其所可知爾窺牖而見見其所可見爾天下之大天道之廣豈可以知知以見見乎出户則離此而有所知其知能幾也窺牖則即彼而有所見其見豈逺也聖人密運獨化不以知知故無所不知不以見見故無所不見天下者物之所在使然者也天道者道之所在自然者也其粗在物其妙在道皆不離當體而盡夫知見何事于出何待于窺出户則有行窺牖則有見聖人不行而本乎智不見而本乎心故天下之事皆可得而知天道之妙皆可得而名能知能名故不為而為成其所自成也息齋注出而求天地者求其形也天地不可以形盡而可理盡故其出彌逺其知彌少若知其理之在此則雖閉户可也聖人知不在形故不必行名不在色故不必見成不在事故不必為為}
