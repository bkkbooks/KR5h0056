  - {type: variant, offset: 1544, length: 0, content: '', WYG: 希聲注易曰形而上者謂之道道也者通乎形外者也形而下者謂之器器也者止乎形内者也上士知微知彰通乎形外故聞道而信則勤行之中士在微彰之際處道器之間故聞道而疑信相半故若存若亾下士知彰而不知微止乎形内故聞道則大笑之不唯笑之且將非之矣夫道也者微妙𤣥通深不可識茍不為下士所非笑則不足以為道矣夫體道者與日月合其貞明而其光不耀斯明道若昧也與天地合其易簡而其用不可為典要斯夷道若𩔖也與四時合其運行而其動必反於𤣥妙斯進道若退也常處卑下而終不可渝斯上徳若谷也常居溷濁而終不可涅斯大白若辱也衣被天下而不有其仁斯廣徳若不足也生畜萬物而不顯其功斯建徳若偷也復其性以御其情斯質真若渝也正乎内而行乎外斯大方無隅也以若拙之匠陶甄天下而不為近功斯大器晚成也以不言之教鼔動萬物而不事小説斯大音希聲也事无事莫覩其用斯大象无形也為无為莫識其體斯道隱无名也夫唯善濟貸于萬物而不責其報是以萬物受其生成而不知其徳故下士聞此道而笑之不信其能若此耳}
