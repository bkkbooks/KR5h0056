  - {type: variant, offset: 15887, length: 2, content: 大象, WYG: 此章全是借戰事以喻道推此則書中設喻處其例甚明蘇注主造事者也客應敵者也進者有意於爭者也退}
  - {type: variant, offset: 15891, length: 1, content: 象, WYG: 意於爭者也茍無意於爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵}
  - {type: variant, offset: 15893, length: 1, content: 象, WYG: 咎耶聖人以慈為寳輕敵則輕戰輕戰則輕殺人䘮其所以為慈矣兩敵相加而吾出於不得已則有哀心哀心見而天人助之雖欲不勝不可得}
  - {type: variant, offset: 15895, length: 0, content: '', WYG: 呂注道之動常在於迫而能以不争勝其施之于用兵之際宜若有所不行者也而用兵者有言吾不敢為主而為客不敢進寸而退尺則雖兵猶迫而後動而勝之以不争也而況其它乎何則主逆而客順主勞而客逸進驕而退卑進躁而退静以順待逆以逸待勞以卑待驕以静待躁皆非所敵也所以爾者道之為常出於無為故其動常出于迫而其勝常以不争雖兵亦由是故也誠知為常出於無為則吾之行常無行其攘常無臂其仍常無敵其執常無兵安往而不勝哉茍為不能出於無為知主而不知客知進而不知退是之謂輕敵輕敵則吾之所謂三寳保而持之者幾于䘮矣故曰禍莫大于輕敵輕敵幾䘮吾寶夫唯以不争為勝者則未有能勝之者也故曰抗兵相加哀者勝矣吳注此申言慈之寶用兵有言者用兵者嘗有是言為主肇兵端以伐人也為客不得已而應敵也進寸難進也退尺易退也仍就也不為首兵但為應兵雖為應兵亦不欲戰不敢近進寧于逺退進戰者整其行陣而行攘臂以執兵前進以仍敵不行則雖有行如無行不攘則雖有臂如無臂不執則雖有兵如無兵不仍之則雖有敵在前如無敵也吾言甚易知甚易行}
