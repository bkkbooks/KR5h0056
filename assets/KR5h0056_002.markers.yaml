  - {type: variant, offset: 15905, length: 0, content: '', WYG: 乎言者道之筌也事者道之迹也使道可以言盡則聴言而足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其居不可得也葢古之聖人無思無為而有漢然不自然不自知者存焉此則思慮所不及是以終莫吾知也使為衆人所能知亦不足貴矣被褐懷玉者聖人外與人同而中獨異也呂注道法自然其言亦希而自然自然則無為則知之行之也不乃甚易乎而}
