  - {type: variant, offset: 4177, length: 0, content: '', WYG: 呂注生者死之徒死者生之始則生死相為出入而已矣生之徒十有三則由生而得生非幸生者也死之徒十有三則由死而得死非不幸而死者也民之生動之死地十有三則豹養其内而虎食其外毅養其外而病攻其内非不以生為事顧不得其道而動之死地者也夫何故以其生生之厚葢由生得生由死得死者固不必論而以生為事而反之死地其失為在此也葢聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地焉老子之于此固已體之而言葢以疑之言聞以質之何也此莊周所謂重言耶嘗試論之人之所以遇虎兕被甲兵而虎兕甲兵之所以能傷人者以吾有身故也今我視吾心莫知其鄉則吾心不可得吾心不可得則吾身與物亦不可得内不見有身外不見有物則孰為死地孰為虎兕甲兵而投其角措其爪容其刃哉然則善攝生者夫何以加此元澤注至人不知死不知生故亦莫能死亦莫能生故曰未嘗死未嘗生也彼偏乎陰陽而與生死為徒者及徇欲為咎動之死地者凡是三𩔖所見則殊而原其所以迷大道之至正而不免于生死者由有其生而矜生過厚故耳或曰彼為道而至乎枯槁者豈生生之厚乎曰吾之所以為我不死不生湛爾常一唯當息而彼乃執其所見更為枯槁故雖志趨空寂而不知其為有我之尤者也無死地者由其無生彼無生者湛然常生而不自生故未嘗死未嘗生道至乎此則雖其形有禪而神未嘗變安得死乎此中國之神聖而西方之佛也若然者變化無常水火不能焦濡斫撻不能創病乘虛觸實往無不通則物欲有之而不得況能傷之哉或曰然則何以謂之攝生曰降此一等便為死生所有故攝生必至于此然後生常存也是比于含徳之厚者又為至矣}
