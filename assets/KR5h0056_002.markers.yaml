  - {type: variant, offset: 6602, length: 2, content: 能體, WYG: 道為寳故樂得其得不賢者非道莫保故樂免其罪由其根于人心之自然無使之者故言依于道則其美可市行依于道則其尊可加于人茍非人心之自然則言而不從行而不應矣由人各根于道不幸而陷于不善則聖人亦何忍棄之故立天子置三公非茍利其富貴也葢不欲遂棄人於不善還以斯道善之而已使雖有拱璧以先駟馬不如出一善言建一善行使天下之人不失其善則其利豈小補哉由其以道覺民是謂坐進此道古之所以貴此道者何也以其善者不日而得其善使不幸而至于不善則亦足以自免于惡此豈不足以為天下貴邪吳注萬物之奥萬物之最貴者奥室之西南隅寢廟之制有堂有室室在内故室為貴室中之制東南隅曰㝔東北隅曰宦西北隅曰屋漏奥尊者所居故奥為貴道之尊貴猶寢廟堂室之奥拱璧合拱之璧駟馬一乘之馬拱璧先駟馬猶春秋傳言乘韋先十二牛也坐跪也朝聘之享駟馬陳于外執拱璧以將命曰先朝聘以拱璧駟馬為至貴而未足貴也不如跪而進此道之尤貴葉注夫婦之愚未有求}
