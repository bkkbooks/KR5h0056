  - {type: line-break, offset: 4610, content: '', id: KR5h0056_HFL_002-017a04}
  - {type: variant, offset: 4610, length: 0, content: '', WYG: 呂注萬物之生常本于無名之物而其畜常在于一而未形而物得以生之際無名者道也一而未形物得以生者徳也及其為物則特形之而已非其所以生且畜也已有形矣則躶者不得不躶鱗介羽毛者不得不鱗介羽毛以至于㓜壯老死不得不㓜壯老死皆其勢之必然也故曰道生之徳畜之物形之勢成之然則勢出于形形出于徳徳出于道道徳本也形勢末也本尊而末卑本貴而末賤是以萬物奠不尊道而貴徳道之尊徳之貴夫莫之爵而常自然此其所以能以無為之柔弱而勝形勢之剛强則王矦之所以賓化萬物者在此而不在彼也然則雖曰道生之徳畜之物形之勢成之至本而言之則生之畜之長之育之亭之毒之養之覆之莫非道也而道終無名焉故曰生而不有為而不恃長而不宰是謂𤣥徳元澤注此四者皆道也以其各得其道故但為徳為徳則畜之而已然畜之所以為徳也及乎得其得而成形則物而已矣物有其形則逺近相取剛柔相交各因其勢而成狀故德者道之分物者徳之器勢者物之理明乎道徳則形勢不足知而應酢無難矣命于天則為天子命于天子則為諸矦有所受命則出命者能賤之矣唯道萬物之先而制其命孰能假之故常自然也息齋注物非道不生非徳不畜自其有形以至於勢長莫不以道徳為主道之尊徳之貴至於此極矣然不自尊其尊不自貴其貴其施於物非有心于物也莫之命而常自然自然而生自然而畜凡所以長育成熟以至于養之覆之莫非自然者由其自然故未嘗望物之報生不辭勞施不求報是謂𤣥徳}
