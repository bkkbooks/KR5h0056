  - {type: variant, offset: 5325, length: 0, content: '', WYG: 呂注君子之于道不可以不刳心心刳而無餘雖萬變陳于前而不足以撓吾之静夫何施而畏哉使我不能刳心而有介然之知行于大道則唯施是畏求其周行不殆不可得也况夫開其兊濟其事者耶大道之為體不知而知則夷之甚者也而民乃欲以有知求之是好徑而不知所由也人之生以食為本而食必出于田田治而倉實倉實而食足食足而財豐財豐而廷治以知其本之所自出故也今以介然有知之心而行于大道則已不得其母不得其母則其子非吾有也非吾有而取之猶之洒掃其庭内蕪其田虛其倉而服文采帶利劒厭飲食資財有餘亦非其有而取之矣非盗夸無以為也豈道也哉息齋注道不在知知者邪思也真道必明明而非知知不可及故施之不盡用之不窮使我介然以有知之心而行大道所知有限而道無窮怵怵然恐其施之不足是謂惟施是畏葢大道甚夷而民好徑好徑者知之為賊也使行于無知則凡所見聞無非道者豈不蕩然廣大心逸日休哉後世不然朝甚除除者治也除治其朝廷則外飾者至矣田甚蕪則心不治倉甚虛則行不修方且服文采以眩人帶利劒以威衆積飲食財貨而無所用之是謂盗夸如此則去道逺矣}
