  - {type: line-break, offset: 5211, content: '', id: KR5h0056_HFL_002-019a04}
  - {type: variant, offset: 5211, length: 0, content: '', WYG: 韓非解朝甚除也者獄訟繁也獄訟繁則田田則府倉虛府倉虛則國貧國貧而民俗淫侈民俗淫侈則衣食之業絶衣食之業絶則民不得無飾巧詐飾巧詐則知采文知采文之謂服文采獄訟繁倉庫虛而有以淫侈為俗則國之傷也若以利劒刺之故曰帶利劒諸夫飾智故以至於傷國者其私家必富私家必富故曰資貨有餘國有如是者則愚民不得無術而效之效之則小盗生由是觀之大姦作則小盗隨大姦唱則小盗和竽也者五聲之長者也故竽先則鍾瑟皆隨竽唱則諸樂皆和今大姦作則俗之民唱俗之民唱則小盗必和故服文采帶利劒厭飲食而資貨有餘者是之謂盗竽矣希聲注老氏言若吾囂然略無知道之心始欲希於當世則唯所行之為務務其茍合於當世也使我介然微有知常之明方將行于大道則唯所施而是畏畏其不合於大道也夫大道之云猶亨衢也亨衢平易無往不達以其大直不患小迂而世人欲速由于捷徑是以崎嶇迷惑不達所趨故聖人病之慎所施教畏其導民於邪路終不合于大道焉噫入其國其政教可知也觀朝闕甚修除墻宇甚雕峻則知其君好土木之功多嬉遊之娱矣觀田野甚蕪則知其君好力役奪民時矣觀倉廩甚空虛則知其君好末作廢本業矣觀衣服多文彩則知其君好淫巧蠹女工矣觀佩帶皆利劒則知其君好武勇生國患矣觀飲食常饜飫則知其君好醉飽忘民事矣觀資貨常有餘則知其君好聚斂困民財矣凡此數者皆盗用民力以為夸毗故謂之盗夸盗夸者非有道之治也然則盗用之云陰取之而民不知也所謂唯施是畏其在此乎}
