  - {type: variant, offset: 3785, length: 0, content: '', WYG: 呂注人心其神矣乎操則存舍則亾出入無時莫知其鄉操存舍亾則無常體之可測出入無時則非今昔之可求莫知其鄉則非方所之可得神則若是人心亦然聖人先得我心之盡者也故無常心而以百姓心為心猶之鑑也無常形以所應之形為形而已聖人之視已心也如此則其視百姓心亦若是而已則善不善信不信亦何常之有哉故善者吾善之不善者吾亦善之知其心之善不善無常而以徳善之故也信者吾信之不信者吾亦信之知其心之信不信亦無常而以德信之故也物得以生之謂徳形體保神各有儀則之謂性性修反徳徳至同于初則徳者性之所自出而無不善不信明矣聖人之在天下惵惵然不已為百姓渾其心渾其心也者使善信者不以自異而不善不信者不自棄故也百姓皆注其耳目唯聖人之為視聽而聖人皆孩之孩之也者遇之以慈侍之以厚雖有不善不信猶善而信之知其心之無常猶已而已矣元澤注善惡生乎見見生乎自私公于大道則雖目覩善惡而心無殊想矣故聖人因世之情强立毁譽而心知善惡本非其實故不善之善非憐而恕之乃不覺有異也㤀善惡之實真善也是以萬法雖殊等為實相信與不信混為一體知一切相無非者故能視不善猶善知一切相無非實者故能視不信猶信當知實當實知此聖智所以異于衆人也息齋注甚矣心之為天下害也莊子曰賊莫大於徳有心而心有眼盖心之為物潜天而天潜地而地無逺不至而世人但以分别為心分别心生有所見遂䘮其全此莊周所以謂之賊也聖人之心常與道俱道無所不在吾心亦無所不在故無常心及其出而應世知其相從于故取捨之心未嘗生也善吾從而善不善亦吾從而善于天下無不善是謂徳善信吾從而信不信亦吾從而信于天下無不信是謂徳信怵怵然常恐天下之人徳有心而心有眼穿鑿取與不見大全故每為天下渾其心百姓用耳目所接者為明而不知其非明也聖人皆孩而畜之使不為非明所亂然則非明者豈釋氏所謂無明者歟宏甫注百姓有善不善而聖人皆善之百姓有信不信而聖人皆信之夫聖人曷嘗有善信之心哉一以百姓之心為善信故也是謂同徳之善而非一人之善同德之信而非一已之信故曰徳善徳信也夫天下之人各一其心也久矣聖人則合天下之人而渾為一心百姓皆注其耳目以我觀彼以此視我各相是非不可一也聖人見此不喜聞彼不怒一以嬰兒遇之是以彼亦不矜此亦不愠釋然皆化而天下定矣聖人無常心以百姓之心為心也如此此太上治世之大㫖所以能無為者哉}
