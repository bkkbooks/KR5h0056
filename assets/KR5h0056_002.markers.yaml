  - {type: variant, offset: 9901, length: 398, content: 食母孔德之容唯道是從道之爲物惟恍惟惚惚兮恍兮其中有象恍兮惚兮其中有物窈兮冥兮其中有精其精甚眞其中有信自古及今其名不去以閱衆甫吾何以知衆甫之然哉以此孔大也窈烏了反恍惚窈冥皆不可見之意鄧錡云恍惚便是物非恍惚之中更别有物經云無狀之狀無物之象是謂怳惚是也窈冥便是精非窈冥之中更别有精張平叔云窈冥莫測是眞精是也王輔嗣曰信驗也閱自門出者一一而數之言道如門萬物皆自此徃也漢書此如傳舍所閱多矣陸機賦川閱水而成川世閱人而爲世其用字之義並同一訓經歷亦同此義甫美也又始也蘇註道無形也及其運而爲德則有容矣故德者道之見也自是推之則衆有之容皆道之見于物者也道非有無故以恍惚言之然及其運而成象著而成物未有不出于恍惚者也方有無之未定恍惚而不可見及夫有無之交則見其窈冥深眇雖未成形而精存乎其中矣物至于成形則眞僞雜矣方其有精不容僞也真僞既雜自一而爲二自二而爲三紛然錯出不可復信矣方其有精不吾欺也古今雖異而道則不去故以不去名之唯未嘗去, WYG: ''}
