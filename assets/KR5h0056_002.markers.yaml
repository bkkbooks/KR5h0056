  - {type: line-break, offset: 2563, content: '', id: KR5h0056_HFL_002-009b10}
  - {type: variant, offset: 2563, length: 0, content: '', WYG: 蘇注先身而後名貴身而賤貨猶未為忘我也忘我者身且不有而況于名與貨乎然貴以身為天下非忘我不能故使天下知名之不足親貨之不足多而后知貴身知貴身而后知㤀我此老子之意也不得者以亾為病及其既得而患失則病又有甚于亾者惟齊有無均得䘮而後無病也愛甚則凡可以求之者無所不為能無費乎藏之多則攻之者必衆能無亾乎呂注烈士之所狥者名也而至于殘生傷性則不知身之親于名也故曰名與身孰親貪夫之所狥者貨也而至于殘生傷性則不知身之多于貨也故曰身與貨孰多所狥者名則世謂之君子所狥者貨則世謂之小人君子小人之所狥雖或不同而亾其所存則一也然則得名與貨而亾其存則不知亾之病于得也故曰得與亾孰病是故愛名欲以貴其身也以甚愛之故并其良貴而失之是大費也蓄貨欲以富其身也以多藏之故并其至富而害之是厚亾也夫唯有徳者知至貴之在已而無待于名也故知足而不辱知至富之在已而無待于貨也故知止而不殆不辱不殆則可以長久矣息齋注名不親于身貨不多于身得不償其亾而世人毎貪于名溺于貨徇于得者由其無所見也我愛于物愛多則我費物藏于我物衆則我勞小則辱大則危有不可勝悔者君子則不然知物之備于我自反而足故于外無求雖欲辱之不可得也知吾之所止止于至道故非道不為雖欲危之不可得也是以為常常故能久}
