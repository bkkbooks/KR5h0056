      ', id: KR5h0056_krp_002-bkkkrnewl1249}
  - {type: line-break, offset: 16623, content: '', id: KR5h0056_HFL_002-057b07}
  - {type: indent, offset: 16623, content: 　, id: KR5h0056_krp_002-bkkind886}
  - {type: variant, offset: 16624, length: 2, content: 庶幾, WYG: 政則化民成俗此篇其効也故經之義終焉吳注十人為什百人為伯什伯之器重大之器衆所共也不用者不營為不貪求重大之器無所用也重死者視死為重事而愛養其生不逺徙者生於此死于此不他適也老子欲挽衰周復還太古國大則民衆難治得小國寡民而治之使其民母慕于外自足于内如此也舟車甲兵非一人所可獨用謂什伯之器也無所乘無所陳不用也無所往則無用乎舟輿無所爭則無用乎甲兵民淳事簡上古結繩之治可復雖有書契亦可不用不但不用什伯之器而已以所食之食為甘以所服之服為美充然自足愛養其生言重死也以此身之居為安而安之以此地之俗為樂而樂之言不逺徙也惟老死于所生之處孰肯輕易逺徙哉民皆懷土雖相鄰之國目可以相望雞犬之聲耳可以相聞如此至近至老死不相往來不但不逺徙而已信言不美美言不信善言不辯辯言不善知者不博博者不知聖人不積既以為人已愈有既以與人已愈多天之道利而不害聖人之道為而不爭為人之為去聲蘇注信則為實而已故不必美美則為觀而已故不必信以善為主則不求辯以辯為主則未必善有一以貫之則無所用博博學而日益者未必知道也聖人抱一而已他無所積也然施其所能以為人推其所有以與人人有盡而一無盡然後知一之為貴也勢可以利人則可以害人矣力足以為之則足以争之矣能利能害而未嘗害能為能争而未嘗争此天與聖人大過人而為萬物宗者也凡此皆老子之所以為書與其所以為道之大略也故于終篇復言之呂注道之為物視之不見聴之不聞摶之不得可以黙契不可以情求者也則信言者信此而已安事美善言者善此而已安事辯知言者知此而已安事博由是觀之則美者不信辯者不善博者不知可知已何則雖美與辯與博而不當于道故也道之為物未始有物者也聖人者與道合體夫何積之有哉唯其無積故萬物與我為一萬物與我為一則至富者也故既以為人已愈有既以與人已愈多使其有積也則用之有時而既矣安能愈有而愈多乎老子之言也内觀諸心外觀諸物仰觀諸天俯觀乎地無有不契是信也然而下士聞而笑之天下以為似不肖是不美也言之至近而指至逺是善也然而非以言為悦是不辯也其知至于無知是知也而其約不離乎吾心是不博也而學者以美與辯與博求之則疏矣老子之道也以有積為不足雖聖智猶絶而棄之是無積也故至無而供萬物之求則是愈有而愈多也而學者于是不能刳心焉則不}
