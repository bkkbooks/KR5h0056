  - {type: variant, offset: 1140, length: 0, content: '', WYG: 呂注道一而已而得之則得之者與道為二非一也唯其得之而無得故謂之得一也㫺之得一者莫不然也仰之而天也得一以清故覆焉而不傾俯之而地也得一以寧故載焉而不陷神無形而至寂者也以得一故妙乎有生而靈谷有形而至虛者也以得一故應乎所感而盈其衆為萬物以得一故生而無極其尊為矦王以得一故能制天下之動而貞夫一則一之不可不致也如此故一者天之所以清地之所以寧寂之所以靈虛之所以盈萬物之所以生而矦王之所以為天下貞者也使天無以清則裂地無以寧則發神無以靈則歇谷無以盈則竭萬物無以生則滅而矦王也無以為貞而唯貴高之知其得不蹷邪故貴以賤為本則未有貴者乃貴之所自而立也高以下為基則未有高者乃高之所自而起也然則貴而無其貴高而無其高乃侯王之所以為天下貞而不蹷者邪是以孤寡不榖人之所惡而賤也而貴高以為稱者以其所本為在此也故致數而極之以至于一則貴不異乎賤卑不離乎高而譽出於無譽矣譽無譽則毁無毁矣譽無譽則不可得而貴毁無毁則不可得而賤玉可貴故琭之石可賤故落之不欲琭琭如玉落落如石不可得而貴賤之謂也息齋注孔子曰吾道一以貫之一者何也天之清地之寧神之靈谷之盈物之生矦王之貞極其致無不同知天之所以清即知地之所以寧知神之所以靈即知谷之所以盈知物之所以生即知矦王之所以貞易曰天下殊途而同歸百慮而一致天下何思何慮言其未嘗不一也若不知一則必自異自異則絶物矦王絶物物亦絶之故貴以賤為本高以下為基矦王自稱孤寡不穀此豈非知貴以賤為本邪輪葢輻軫會而為車物物有名而車不可名仁義禮智合而為道仁義可名而道不可名賞罸刑政合而為治賞罰可名而治不可名茍有可執使其跡外見貴者如玉賤者如石皆可以指名而人始得而貴賤之矣宏甫注矦王不知致一之道與庶人同等故不免以貴自高高者必蹷下其基也貴者必蹷賤其本也何也致一之理庶人非下矦王非高在庶人可言貴在矦王可言賤特未知之耳今夫輪輻葢軫衡軛轂轊會而成車人但見有此數者曷嘗有車哉然而名之曰車而不曰輪輻葢軫衡軛轂轊也由此觀之則所謂高下䝿賤者可知矣人見其有貴有賤有高有下而不知其致之一也曷嘗有高下貴賤者哉彼䝿而不能賤賤而不能䝿據吾所見而不能致之一也則亦琭琭落落如玉如石而已矣}
