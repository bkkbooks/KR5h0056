  - {type: variant, offset: 6095, length: 0, content: '', WYG: 呂注人之初生其徳性至厚也比其長也耳目交于外心識受于内而益生日益多則其厚者薄矣為道者損其所益生性修反徳徳至同于初故曰含徳之厚比于赤子夫赤子之為物特以其受冲氣之和積而未散而猶毒蟲不螫猛獸不據攫鳥不搏況夫充純氣之守通乎物之所造而其和大同于物者夫孰能害之魏文侯之間卜商是也葢唯精為能致和何以言之今夫赤子不知所取而握固不知所與而䘒作則精也使赤子也介然有取與之知則不一而粗矣其能如是乎故曰骨弱筋柔而握固未知牝牡之合而䘒作精之至無所憂愠故雖終日號而嗌不嗄則和也使赤子也有所憂愠則氣戾而不和其能若是乎故曰終日號而嗌不嗄和之至夫形全精復與天為一精而又精反以相天精而至于相天則其充沖氣之和以至大同于物不足異也故致道之極則至于復命復命曰常含德之厚則至于知和知和亦曰常則道徳雖有間及其會于常則同也知常則常因其自然而不益生動不知所為行不知所之身若槁木之枝而心若死灰奚以心使氣為哉故益生則曰祥禍福無有則無人灾祥者禍福兆于此而人灾隨之矣心使氣則曰强强梁者死之徒夫致虛而守柔者道也道乃久沒身不殆致實而强則物而已物壯則老其道也哉故曰物壯則老是謂不道不道早已}
