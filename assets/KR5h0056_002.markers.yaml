  - {type: variant, offset: 14091, length: 870, content: 或行于前或隨于後或呴而暖之或吹而寒之或益而强之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也世之愚人私己而務得乃欲拒而違之其禍不覆則折唯聖人則知其不可逆順以待之去其甚去其奢去其泰使不至于過而傷物而天下無患矣此不爲之至也堯湯之于水旱雖不能免而終不至于敗者由此故也易之泰曰後以財成天地之道輔相天地之宜以左右民三陽在内三隂外物在泰極矣聖人懼其過而害生故財成而輔相之使不至于過此所謂去甚去奢去泰也矣以道佐人主者不以兵强天下其專好還師之所處荆棘生焉大兵之後必有凶年善者果而已不敢以取强果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂不道不得早已好去聲還旋通易曰師衆也處上聲善即有道者也不得已爲之難也莊子曰不得已而後動又一宅而寓于不得已又託不得已以養中皆與老子語合果而勿矜以下五而字當讀如於字人方果於彼我獨果于此也矜自恃也伐夸大也驕恣肆也已止也早已言不乆也蘇註聖人用兵皆出于不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而况以兵强天下者邪果決也德所不能綏政所不能服不得已而後以兵决之耳勿矜勿伐勿驕不得已四者所以爲勿强也壯之必老物無不然者惟有道者成而若缺盈而若沖未嘗壯故未嘗老未嘗死以兵强天下壯亦甚矣能無老乎無死乎夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志于天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之佳謂佳之也温公曰兵愈佳則害人愈多惡去聲處上聲下並同左爲陽爲生右爲隂爲死恬澹安靜也美即佳也樂去聲純甫云此章自兵者不祥之器以下似古之義䟽渾入于經者詳其文義可見蘇註以之濟難而不以爲常是謂不處道常無名樸雖小天下不敢臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之於江海蘇註樸性也道常無名則性亦不可名焉故其爲物舒, WYG: ''}
