  - {type: variant, offset: 6491, length: 0, content: '', WYG: 民多權謀則其上眩而昏矣人不務本業而趨末技則非常無益之物作矣患人之詐偽而多為法令以勝之民無所措手足則日入于盜賊矣呂注國容不入軍軍容不入國其來久矣則其所以治國用兵者固不同也治國者不可以不常且久者也故以正而不以奇正者所以常且久也兵者不祥之器非君子之器故有道者不處兵而常且久則是處之也故以奇而不以正奇者應一時之變者也以奇故不能不有以為以正故不以智治國國之福也治國而無所事智則有事之不可以取天下也明矣故曰以正治國以奇用兵以無事取天下何以知無事之足以取天下哉以有事不足以取天下而知之也夫唯為不出于無為而至于有事則天下多忌諱以避其所惡則失業者衆而民彌貧人多利器以趨其所好則下難知而國家滋昏民彌貧而多利巧國家滋昏而奇物滋起此法令所以滋彰而盜賊多有也法禁于法之所加而不能禁于法之所不加令行于令之所聽而不能行于令之所不聴民貧而多利巧則令有所不聴矣國家昏而奇物滋起則法有所不加矣此所以滋彰而盗賊多有也若然者凡以有事取天下之過也故聖人云我無為而民自化我好静而民自正我無事而民自富我無欲而民自樸此則取天下常以無事之證也盖其失之也由有事故天下多忌諱而民彌貧人多利器而國家滋昏惟其如此故民多利巧奇物滋起法令滋彰盗賊多有也其復之也由無為故好静無為故民自化而絶巧棄利奇物不起好静故民自正而盗賊無有由無為好静故無事而無欲以無事故民自富而無忌諱之貧以無欲故民自樸而無利器之昏其序然也息齋注我以正治人由人之本正也以奇用兵由兵之本奇也以無事取天下由天下之本無事也凡我之應物者豈以我哉亦由物而已矣古之聖人能以天下為一身中國為一人者其治自心出也我多忌諱則禁防必設禁防既設則民安得而不貧我以利示民則民多趨利民既趨利則國安得而不昏我以巧示民則民多伎巧伎巧既勝則奇物安得不滋我以法治民則民亦竊法以自便上下相冒則盗賊安得而不多聖人示以無為示以好静示以無事示以無欲天下各以其所示者報之故曰德猶風也民猶草也草上之風必偃其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復為奇善復為祅人之迷也其日固久矣是以聖人方而不割廉而不劌直而不肆光而不耀悶音門缺殘缺也一作失望貌以其察察宜無不及故人望之而卒失望也極終也奇衺也廉稜也劌居衞反割也皆謂芒利傷物也蘇注天地之大世俗之見有所眩而不知也葢福倚于禍禍伏于福譬如老穉生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知為至彼方且自以為福而不知禍之伏于後方且自以為善而不知妖之起于中區區以察為明至于察甚傷物而不悟其非也可不哀哉知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也此則世俗所謂悶悶也呂注以正治國以無事取天下則其政悶悶悶悶者言其不以察為快也故其民淳淳淳淳者言其不于薄也以智治國以有事為天下則其政察察察察者反悶悶者也故其民缺缺缺缺者言其不全于樸也淳淳故安于徳性而不為禍福奇正善祅之所遷是不染于薄也缺缺故避禍而未必免求福而未必得以為正也而有時乎為奇以為善也而有時乎為祅而禍福奇正善祅未知孰在也徒令智多而難治是不全于樸也何則時有終始世有變化禍福淳淳至有所拂者有所宜有所拂者世所謂禍而有所宜則福所倚也有所宜者世所謂福而有所拂則禍所伏也則孰知其極而避就之耶自殉殊而有所正者有所差則所謂正者果未可知也今為正者後或為奇此為奇者彼或為正善與祅亦然則天下之禍福正奇善祅果未可定也民自有知以來迷而執之其日久矣奈何重之以察察之政而使之不得反樸而全乎是以聖人方而不割故不以一人斷制利天下廉而不劌故勝物而不傷直而不肆故能曲全而枉直光而不耀故用其光復歸其明此無它取此悶悶而去彼察察故也息齋注其政悶悶若無求于民而民不以巧應上故其民醇醇察察若有得于已而民以巧求免故其民缺缺天下之事禍福之相為倚㐲所從來久矣政悶悶者無得在我而有得在民政察察者有失在民而有得在我我得則彼失我福則彼禍自然之理也昧者不知理道之正專以察為明以求僥倖之福遂使正復化而為奇善復化而為祅人之迷其日久矣是以聖人方而不割廉而不劌直而不肆光而不耀賞罰刑政葢有設而不用其極則能使奇者反而為正祅者變而為善故曰敎化之行引中人而納于君子之域敎化之廢引中人而陷于小人之途此不可不知也農師注其無正邪葢有正者有正正者所謂正正者無正是也夫唯無正故能超乎吉凶之表而無禍無福以知其極也若夫未能致于無正之地而流于吉凶之域則一禍一福其運如輪其循如環終于迷而已故曰正復為奇善復為妖民之迷其日固久治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積徳則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是謂深根固柢長生久視之道服一作復柢一作蒂花趺也韓非解衆人之用神也躁躁則多費多費之謂侈聖人之用神也静静則少費少費之謂嗇嗇之為術也生於道理夫能嗇也是從於道而服於理者也衆人離於患陷於禍猶未知退而不服從道理聖人雖未見患禍之}
