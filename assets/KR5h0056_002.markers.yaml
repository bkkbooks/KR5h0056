  - {type: line-break, offset: 1289, content: '', id: KR5h0056_HFL_002-005b01}
  - {type: variant, offset: 1289, length: 0, content: '', WYG: 介甫解道之用所以在于弱者以虛而已即在天者而觀之指我亦勝我䠓我亦勝我則風之行乎太虛可謂弱矣然無一物不在所鼔舞無一形不在所披拂則風之用在乎弱也即在地者而觀之決諸東方則東流決諸西方則西流則水之託于淵虛可謂弱矣然處衆人之所惡而攻堅强者莫之能先則水之用在乎弱也又曰反非所以為動然有所謂動者動于反也弱非所以為强然有所謂强者葢弱則能强也雖然言反而不言静言弱而不言强言動則知反之為静言弱則知用之為强天下之物生于有有生于無亦若此而已矣呂注道之周行萬物非不逝也而其動常在于反所謂樞始得其環中以應無窮者是也運動乎天地非不强也而其用常在于弱所謂天下之至柔馳騁天下之至堅無有入于無間者是也故天下之物生於有有生於無唯有為能生天下之物而無又能生天下之有則道之動在於反而其用在於弱可知已然則欲反而弱者無他致一以極乎無而已矣趙志堅注反歸本也凡人以移故就新為動為道者捨末反本故云道之動盖身安心寂不動也捨有歸無云動也亦猶逺曰返先既不去非逺也為無體名逺也今亦不來非近也為身有之名返也道無來往而有逺返之名心本安然亦有反動之義内心虛静外行柔弱者是反本之行故云弱者道之用有者氣也物雖未形已有是氣故云有天地萬法從一氣而生故云生于有無道也一氣從道生故言生于無推極生源指道為極欲令學者歸心有所前言反者反歸此無也息齋注天下萬物生而為有自有反無然後為道故曰反者道之動天下之有皆生于無有則必强反强為弱則可以漸求于道故曰弱者道之用反者自有而求無弱者致無而求道}
