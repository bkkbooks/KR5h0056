  - {type: variant, offset: 6540, length: 1, content: 方, WYG: 此句乃一章之結語}
  - {type: variant, offset: 6542, length: 0, content: '', WYG: 意但謂强者須能弱}
  - {type: variant, offset: 6543, length: 1, content: 精, WYG: 者須能無始為知道一書之意往往如此解者多以其説喻處作真實説以故失之獨黄茂材云此一篇全是借物明道此言最當但}
  - {type: page-break, offset: 6543, content: '', id: KR5h0056_WYG_002-46b, image: WYG1055/WYG1055-0390b.png}
  - {type: variant, offset: 6545, length: 2, content: 吾欺, WYG: 能推之于他章耳道者萬物之奥善人之寳不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不曰求以得有罪以免耶故為天下貴行去聲先悉薦反蘇注凡物之見于外者皆其門堂}
  - {type: variant, offset: 6548, length: 2, content: 古今, WYG: 道之在物譬如其奥物皆有之而人莫之見耳夫唯賢者得而有之故曰善人之寳愚者}
  - {type: variant, offset: 6551, length: 1, content: 異, WYG: 不能有然}
  - {type: variant, offset: 6553, length: 0, content: '', WYG: 非}
