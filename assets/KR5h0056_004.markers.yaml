  - {type: variant, offset: 899, length: 335, content: 今從韓非本蘇註方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈于既成也故爲之于未有者上也治之于未亂者次也木也臺也行也積小成大治亂禍福之來皆如彼三者聖人待之以無爲守之以無執故能使福自生使禍自亡譬如種苗深耕而厚耘之及秋自穰譬如被盜危坐而熟視之盜將自郤世人不知物之自然以爲非爲不成非執不留故常與禍爭勝與福爭贅是以禍至于不救福至于不成蓋其理然也聖人知有爲之害不以人助天始終皆因其自然故無不成者世人心存于得喪方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以爲敗之者矣故曰愼終如始則無敗事人皆狥其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷于物非無學也學而不學故雖學而不害于理然後内外空明廓然無爲可以輔萬物之自然而待其自成矣古之善爲道者非以明民將以愚之民之難治, WYG: 第六十五章}
