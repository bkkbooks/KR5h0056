  - {type: line-break, offset: 0, content: '', id: KR5h0056_HFL_004-001a01}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 老子翼考異古書傳世為人所竄易者多矣而老子尤甚開元注明言我獨異於人而貴求食於母先無求於兩字予所加也則後人之妄增而不及自}
  - {type: page-break, offset: 0, content: '', id: KR5h0056_WYG_004-1a, image: WYG1055/WYG1055-0436a.png}
  - {type: page-break, offset: 0, content: '', id: KR5h0056_SJB_004-360569a, image: sjb/36/360569a.png}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 可勝言哉史遷言著書五千餘言亦其大率耳妄者至盡削語助之詞以就五千之數是史遷一言為此書禍也薛君采氏作老子集解别為考異一篇附焉顧其所見裁十數本耳余覩卷軸既多異同滋甚其為余所安者已載正經而悉以其餘系之卷末仍名曰考異俟世之好古者參焉弱侯題第二章斯惡已蘇已作矣皆知善之為善皆上一有天下字故有無相生龍興碑無故字傅奕古本相上並有之字}
  - {type: page-break, offset: 2, content: '', id: KR5h0056_WYG_004-1b, image: WYG1055/WYG1055-0436b.png}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 作焉而不辭碑本作作而不為始功成而不居古本作功成不處夫唯不居古本作不處第三章使心不亂古本作使民心是以聖人}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 治古本治下有也一無之治使夫知者不敢為也一無敢字古本無也字則無不治古本作無不為矣彭耜本無不治矣第四章沖古本作盅或不盈陸本作不滿開元本蘇本或下有似紛碑本作忿淵兮河上陸兮作乎湛兮似或存碑本無兮或作常一或作若吾不知其誰之子陳碧虗司馬本無之第五章不屈河上陸作不詘多言碑本作多聞第六章天地根古本列子並作天地之根第七章天長地久碑本作天地長乆天地所以能長且乆黄茂材地下有之碑本無且故能長生碑本作長乆非以其無私耶河上陸作以其無私古本非作不第八章而不爭碧虚司馬曹而作又處衆人之所惡古本處作居故㡬於道葉本下有矣善仁古本作善人故無尤一下有矣第九章持司馬作恃揣而鋭之古本作㪜而棁之王弼亦作棁長保碑本作長寳滿堂古本作滿室驕司馬作憍功成名遂身退碑本作名成功遂身退王弼作功遂身退又名作事第十章抱古本作袌無離乎一無乎下同能嬰兒乎一能下有如生之畜之一無此四字第十一章埏司馬碧虚作挻第十三章何謂寵辱若驚一無若驚寵為下碧虚作寵為上辱為下吾所以有大患者一無者及吾無身古本作茍吾無身吾有何患古本下有乎故貴以身為天下者可以寄天下愛以身為天下者可以託天下古本作貴以身為天下者則可以託天下矣愛以身為天下者則可以寄天下矣開元本則作若無二矣一寄託下並有於第十四章此三者一無此故混而為一蘇故下有復古本一下有者上下古本作上之下之䋲䋲兮一無兮無物之象蘇作無象之象是謂惚怳碑本無四字古本作芴執古之道古本道下有可第十五章豫猶一下並有兮客碑本作容釋碑本作汋敦兮其若樸碑作混若樸曠兮其若谷碑無兮其渾兮其若濁碑本混若濁静古本上有澄徐清徐生古本二徐上有而安以久卲本安作谷故能敝不新成古本是以能敝而不成碑本李榮本作能敝復成第十六章觀其復王弼本無其静曰復命王弼本作是謂復命芸芸莊子作云云各歸其根各下一有復公乃王王乃天碑本作公能生生能天没身不殆葉本無此第十七章不知有之一作下知有之親之譽之王弼作親而譽之其次侮之彭本無其次陳作其次畏而侮之信不足有不信王弼有二焉猶兮其貴言王弼作悠兮一無兮碑本作其猶貴言事遂一作名遂皆曰司馬無皆陳蘇曹程黄曰作謂第十八章廢出古本下並有焉孝慈一作孝子忠臣古本作貞臣第十九章此三者以為文不足程無此古本以為文而未足也第二十章善古本作美荒兮其未央哉碑本作莽其未央古本無哉如享古本作若享如春登臺古如作若一春在登下怕兮古本作碑本作我未兆乘乘兮古本作儡儡沌沌碑作純純昭昭察察古作皆昭昭皆詧詧悶悶古作閔閔忽若晦寂若無所止晦一作海一作忽兮其若晦飄兮似無所止一作澹兮其若海飂兮若無止一作飄兮其若海飂兮若無所止異於人古本上有欲貴食毋開元本作求食于毋第二十一章怳惚古本並作芴惚兮怳兮其中有象一其字上無兮字一無其字句末有兮字下同其精甚真碑本無此第二十二章直古本碑本並作正豈虚言哉古本言下有也第二十三章故飄風不終朝一無故終古本作崇下同孰為此者天地古本地下有也徳者同於徳失者同於失古本作從事於徳者徳者同於徳從事於失者失者同於失同於道者道亦樂得之古本無同樂二字下同信不足古本足下有焉第二十四章跂王弼陸作企其在道也司馬曹陳蘇在並作於物或惡之或一作故不處一處下有也第二十五章寥兮陸王弼寥作寞强為之名曰大司馬程作强名之曰大域中有四大而王居其一焉一作而王處一焉陳無此兩句第二十六章柰何古本作如之何失根古本碑本作失本諸本作失臣第二十七章善行古本行下有者下並同善計不用籌策古本作善數者無籌策又策作筭是以聖人常善救人故無弃人常善救物故無弃物葉故作而傅奕云古無此獨河上有之善人古本人下有者下同第二十八章故大制不割古本作大制無割第二十九章而為之古本下有者天下神器古本上有夫為者碑本者作故下同故物蘇葉黄陳故並作凡呴陸王弼作歔一作嘘古本作噤羸古本作剉王作挫載古本作培碑本作接隳古本作墮是以司馬以作故第三十章大軍之後必有凶年碑本無此果而已古本下有矣取强古本下有焉果而弗强古本上有是一作是謂不道古本碑本並作非道第三十一章之器一無此二字恬淡為上勝而不美而美之者是樂殺人也夫樂殺人者不可得志於天下矣古本作以恬澹為上故不美也若美必樂之樂之者是樂殺人也夫樂人之殺人者不可以得志於天下矣碑本志作意無矣字言居上勢則以喪禮處之一作言以䘮禮處之衆多王弼作之衆古本下有則下同第三十二章樸雖小天下不敢臣一無樸雖小古本作莫能臣也矦王梁武本陸本古本並作王矦萬物將自賔萬物一作天下自均古本下有焉猶川谷古本猶作由之於一作之與江海古本下有也第三十三章知人者智古本下有也下並同有力葉無有不失其所邵所下有止第三十四章汎陸王弼作汜不居碑本作不名有愛養一作衣被可名於小一作可名為小一作可名於小矣下同歸焉古本作歸之不為主為一作知以其不自大古本其下有終第三十五章執大象古本下有者出口古本碑本口並作言淡乎古本作淡兮第三十六章歙古本作翕王弼作㒆柔勝剛弱勝强古本勝上有之脱古本作侻邦一作國第三十七章矦王古本作王矦鎮以一作鎮之以亦將不欲古本亦上有夫不欲以静一作無欲第三十八章上徳無為而無以為下徳為之而有以為古本作上徳無為而無不為下徳為之而無以為仍之王弼作扔亂之首也愚之始也一無二也處其厚古本四句並作處王弼作處其厚不居其薄處其實不居其華第三十九章矦王古本作王矦下同天下貞一作正其致之一也開元本無一也萬物得一以生君平本無此并下萬物無以生恐㓕十四字矦王無以為貞而貴高將恐蹷一作矦王無以貴高將恐蹷自稱古本作自謂此其古本作是其非乎古本作非歟數輿無輿輿古本作譽一作車琭一作録如玉如古本作若下同落落一作珞珞第四十一章聞道大笑之古本道下有而故建言一無故有之古本下有曰𩔖一作纇進道若退一在夷道若𩔖上辱古本作偷古本作婾渝古本作輸第四十二章王公以為稱古本作王侯以自稱也人之所教我亦教之古本作人之所以教我亦我之所以教人一作人之所教亦我義教之教父古本作學父第四十三章無有入於無間古本淮南子並作出於無有入於無間王弼作無有入無間吾是以知無為之有益也一無吾也二字希及之政和本下有矣第四十四章是故甚愛必大費程本無是故第四十五章沖古本作盅屈古本作詘清静為天下正古本為上有以第四十六章却走馬以糞古本糞作播呉㓜清本作以糞車罪莫大於可欲王弼本無此咎莫大於欲得韓非本古本作咎莫於欲得故知足之足常足矣司馬無之足又無矣第四十七章不出戶知天下不窺牖見天道古本出戸窺牖下俱有可以二字韓非作不出於戶可以知天下不窺於牖可以見天道其出彌逺彌古本作镾下同韓非逺下有者不行而知一作不行而至第四十八章為學為道古本下有二者又損之一無之無為而無不為矣古本作無為則無不為故取天下者王弼無故者二字不足以取天下古本作又不足以取天下矣第四十九章徳善矣一作得善一無矣下同惵惵古本作歙歙一下有焉渾其心古本作渾渾焉孩之陸王弼作咳第五十章人之生動之死地韓非本古本作民之生生而動動皆之死地生生之厚古本下有也夫何故古本下有也無死地古本下有焉第五十一章夫莫之爵一無夫一作莫之命畜之古本作徳畜之亭之毒之一作成之熟之養之古本作葢之第五十二章有始古本始下有可得其母得一作知襲常葉作襲裳非第五十三章而民好徑碧虛司馬蘇林並作民甚好徑資貨有餘古本作貨財一作資財盗竽舊俱作盗夸非道哉一道下有也趙志堅作盗夸非道第五十四章善建者韓非無者下同子孫祭祀不輟彭耜本孫下有以韓非作子孫以其世世祭祀不絶修之於身一無於下同乃真趙志堅乃作能下同乃餘趙作能有餘修之於邦邦舊俱作國下同何以古本作奚以第五十五章含徳之厚比於赤子古本作含徳之厚者比之于赤之也毒蟲古本作蜂蠆䘒古本作朘陸作全至也碧虛蘇曹無也下同而不嗄一作嗌不嗄黄茂材曰古本無嗌後人以莊子之文增入之古本嗄作㱊㱊於由切氣逆也曰强古本作則强是謂古本作謂之不道碑本作非道第五十六章知者不言古本言下有也不可得而䟽不可得而害不可得而賤古本上並有亦第五十七章以正古本正作政無事達真本事作為吾何以知天下之然哉一作吾何以知其然哉以此民多技巧竒物滋起古本作民多智慧衺事滋起滋彰古本作滋章我無欲而民自樸河上本此下有我無情而民自清第五十八章悶悶古本作閔閔醇醇古本作偆偆禍兮福所倚福兮禍所伏韓非及古本作禍兮福之所倚福兮禍之所伏人之迷也其日固久矣韓非作人之迷也其故以久矣一作民之迷其日固久劌纂微作穢非第五十九章莫若嗇若一作如是謂早服謂韓非作以服一作復謂之重積徳韓非作是謂重積徳則莫知其極莫知其極黄無下四字深根固柢韓非作深其根固其柢柢一作蔕第六十章治大國韓非作治大國者烹烹不當加火其神不傷人韓下有也聖人亦不傷之韓作不傷民第六十一章天下之交天下之牝一作天下之交牝以静為下古本作以其静故為之下也司馬作以其静為之下一無此句故大者冝為下一無故一作為之下第六十二章}
