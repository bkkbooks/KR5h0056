  - {type: variant, offset: 433, length: 296, content: 聖人齊大小一多少無所不畏無所不難而安有不濟者哉筆乘夫事涉於形則有大小係乎數則有多少此怨所由起也惟道非形非數而聖人與之爲一以無爲爲爲以無事爲事以無味爲味愛惡妄除聖凡情盡而泊然棲乎性宅則大小多少一以視之而奚怨之可報哉惟德以容之而已然此無爲無事無味也不可力得至易也不可目窺至細也雖至易而至難者待此以解雖至細而至大者待此以成豈可以其易與細而忽之哉學道者亦或有見於此而又以爲大之心奪之故易與細不常爲我有唯聖人自始至終爲無爲事無事味無味而不以世俗所謂大者分其心故難者大者當處寂然了無留礙而大道自此全矣此所謂成其大者也嗟乎此非特起大丈夫見理明用心剛者不能信不能守而可與輕諾多易之流道哉其安易持其未兆易謀其脆, WYG: 第六十四章}
