  - {type: variant, offset: 5291, length: 5, content: 盡然後知一, WYG: ''}
  - {type: variant, offset: 5297, length: 312, content: 爲貴也勢可以利人則可以害人矣力足以爲之則足以爭之矣能利能害而未嘗害能爲能爭而未嘗爭此天與聖人大過人而爲萬物宗者也凡此皆老子之所以爲書與其所以爲道之大略也故于終篇復言之筆乘或曰老氏之爲書使人得以受而味焉則近乎美窮萬物之理而無不至則近乎辯察萬事之變而無不該則近乎愽然不知其有信而不美善而不辯知而不愽者存何也則以五千言所言皆不積之道耳不積者心無所住之謂也夫積而不積則言而無言矣言而無言故非不爲人也而未嘗分己之有非不予人也而未嘗損己之多斯何惡於辯且愽哉苟非不積之道而第執其意見以與天下爭則多言數窮者流非天道也天之道利而不害聖人之道爲而不爭學者于此而刳心焉老氏之書亦思過半矣故曰教而無教何必杜口於毗耶言乃忘言自可了心於柱下讀者其勉旃哉, WYG: ''}
