  - {type: variant, offset: 6396, length: 8, content: 然後有征伐之事故, WYG: 以勝為不美以退為進以敗為功以福為禍以得為失以無知為知以無欲為欲以無名為名孰謂無為不足}
  - {type: variant, offset: 6406, length: 16, content: 國爲正以用兵爲竒雖然此亦未足以取, WYG: ''}
