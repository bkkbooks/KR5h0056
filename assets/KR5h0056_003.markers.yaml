  - {type: variant, offset: 4215, length: 0, content: '', WYG: 三三而九自十言之則出乎生死者一而已一者謂何意復命之人乎士之志於道者能修身以俟之直而推之曲而任之庶㡬乎可以語}
  - {type: page-break, offset: 4215, content: '', id: KR5h0056_WYG_003-46b, image: WYG1055/WYG1055-0430b.png}
  - {type: variant, offset: 4216, length: 4, content: 斷滅種性, WYG: 問命又曰或問老耼列禦冦莊周孟軻皆古之得道}
  - {type: variant, offset: 4222, length: 0, content: '', WYG: 其立言各欲取信後世何自相詆忤如此耼曰吾有大患為吾有身禦冦曰内觀者取信於身周曰吾身非吾有軻則曰萬物皆備於我反身而誠樂莫大焉或厭其身之為患而非其有或貴其身之皆備而取之足豈不詆忤邪余曰子未之思也子得其言而未得其所以言且四肢百骸五臓六腑該而存焉者謂之身視聽言貌思性所有也亦謂之身身之名則一而所以為身者殊有所謂體有所謂性老耼莊周蓋即體而言之者禦冦孟軻葢即性而言之者即體言之則四肢百骸五臓六腑有之則有患無之則無患故不可使之有也而所謂無者非亡失而身之謂}
  - {type: page-break, offset: 4222, content: '', id: KR5h0056_WYG_003-47a, image: WYG1055/WYG1055-0430c.png}
  - {type: variant, offset: 4223, length: 0, content: '', WYG: 動作語嘿不見而已即性言之則視聽言貌思一理所該萬物皆備茍内觀焉可以取足高之於天卑之於地俯仰洞鑒孰有不備於我者乎孰有不足於身者乎以是言之老耼莊周之言身不得不使之無列禦冦孟軻之言身不得不使之觀問身又曰或問何者為息余曰循隂陽以左右隨子午以消長者是也其運如未嘗止之輪其旋如不可盡之環與元氣交通晝夜不息老子列禦冦所謂沖氣者也子知所以守息則知所以養氣知所以養氣則知所以入道知所以入道則抱一禪定固無殊致也老子曰綿綿若存用之不勤子歸而求之斯有得也問息又曰莊周言養形之士吹呴呼吸}
  - {type: page-break, offset: 4223, content: '', id: KR5h0056_WYG_003-47b, image: WYG1055/WYG1055-0430d.png}
  - {type: variant, offset: 4224, length: 2, content: 十分, WYG: 特其淺淺者爾形神俱妙葢本於襲氣毋老子曰𤣥牝之門是為天地根不死之道本於是乎問氣又曰孔子曰毋意毋我老子曰及吾無身吾有何患瞿曇曰無眼耳鼻舌身意人之有生形色外具心意内知必使之無者何哉蓋無者萬善之所歸萬法之所宗人能外息諸縁心於無則與道俱矣其歸一致若所謂坐忘息氣面壁果殊途哉袤字仲長三衢人嚴谷山人則其自號也養素丘園以經術教諸生紹興間大臣薦於朝召對竟力辭還里士論高之並見嚴谷集光廟在潛邸程文簡公大昌時為宫僚嘗索其所著易老通言大昌以劄子繳納其略曰夫老子之可重者何也秉執樞要而能以道御物是其長也貴無賤有而䍐言世故者亦非其或短於此也故師老子而得者為漢文帝葢其為治大抵清心寡欲而淵黙朴厚以涵養天下其非不事事之謂也則漢以大治而基業綿固者得其要用其長故也至於西晉則聞其言常以無為為治本而不知無為者如何其無為也意謂解縱法度拱手無營可以坐治無何紀綱大壞而天下因以大亂故王通論之曰清虚長而晉室亂非老子之罪也蓋不得其要而昧其所長也區區之意深望殿下采其秉要之理而以西漢為法鑒其談治之略而以西晉不事事為戒則老子之精言妙道皆在殿下運用}
  - {type: page-break, offset: 4224, content: '', id: KR5h0056_WYG_003-48a, image: WYG1055/WYG1055-0431a.png}
  - {type: page-break, offset: 4224, content: '', id: KR5h0056_WYG_003-48b, image: WYG1055/WYG1055-0431b.png}
