  - {type: variant, offset: 18, length: 1, content: 德, WYG: 為為宗孟智周臧𤣥静以道徳為宗梁武帝以非有非無為宗孫登以重𤣥為宗宗㫖之中孫氏為妙矣廣川董逌蔵書志云唐𤣥宗既注老子始改定章句為道徳經凡言道者𩔖之}
