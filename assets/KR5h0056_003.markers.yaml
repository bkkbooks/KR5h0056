  - {type: indent, offset: 183, content: 　, id: KR5h0056_krp_003-bkkind5}
  - {type: variant, offset: 183, length: 1, content: 猶, WYG: 後世之士溺其和光同塵之説而流入於不羈毁之則清静為天下正之論其可毁乎既不譽又不毁其可不略言故止謂竊比於我老彭見羅先生語録或問龜山楊文靖公時曰說者謂老彭乃老氏與彭籛非謂彭之夀而謂之老彭也然老氏之書果述而不作信而好古乎答曰老氏以自然為宗謂之不作可也見龜山集龜山曰私意去盡然後可以應世老子曰公乃王見語録滎陽吕公希哲嘗大書治人事天莫若嗇於前坐壁上云修養家以此為養生要術然事事保謹常令}
  - {type: page-break, offset: 183, content: '', id: KR5h0056_WYG_003-27a, image: WYG1055/WYG1055-0420c.png}
  - {type: variant, offset: 185, length: 1, content: 爲, WYG: 餘持身保家安邦之道不越於此不止養生}
  - {type: substitution, offset: 185, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: variant, offset: 187, length: 1, content: 唯, WYG: 吕氏雜録東坡蘇文忠公軾奉詔撰上清儲祥宫碑云臣謹按道家者流本出於黄帝老子其道以清静}
  - {type: page-break, offset: 187, content: '', id: KR5h0056_WYG_003-27b, image: WYG1055/WYG1055-0420d.png}
  - {type: variant, offset: 189, length: 1, content: 爲, WYG: 為為宗以虚明應物為用以慈儉不争為行合於易何思何慮論語仁者静夀之説自秦漢以來始用方士言乃有飛仙變化之術黄庭大洞之法太上天真木公金母之號天皇太乙紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家嘗竊論之黄帝老子之道本也方士之言末也又葢公堂記云曹參為齊相聞膠西盖公善治黄老言使人請之用其言}
  - {type: page-break, offset: 189, content: '', id: KR5h0056_WYG_003-28a, image: WYG1055/WYG1055-0421a.png}
  - {type: substitution, offset: 189, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: variant, offset: 191, length: 1, content: 無, WYG: 齊大治其後}
  - {type: variant, offset: 193, length: 36, content: 爲者可謂無爲矣其下非爲不成然猶有以爲之非徒作而無術者也仁義皆不免于爲之矣, WYG: ''}
