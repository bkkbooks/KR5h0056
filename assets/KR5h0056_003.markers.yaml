  - {type: variant, offset: 9, length: 1, content: 德, WYG: 已為人子者無以有已自周反魯道彌尊逺方弟子之進者盖三千焉孔子歎曰自南宫敬叔之乘吾車吾道加行不然吾道㡬廢矣今禮記所引吾聞諸老聃皆是孔子問老子而得禮之要也王子秊拾遺記曰老君居景室之山與世人絶迹唯老叟五人或乘鳴鶴或著羽衣共譚天地之數所撰經書垂十萬言有浮提國獻善書二人乍老乍少隱形則出影聞聲則蔵形時出金壺器中有黑汁狀若淳漆洒木石皆成篆𨽻科斗之字記造化人倫之始老君所撰經皆寫以玉牒級以金繩貯以玉函及金壺汁盡二人乃欲刳心瀝血以代墨焉此乃洛州景山太室少室也所説九變長生等經有百萬篇多蔵名山石室秘而未行今所出者約六千卷闗尹子尹喜仕周昭王為大夫善天文豫占東南真氣狀若龍蛇而西是月融風三扇天理西行知有聖人度闗乞出為函谷闗令昭王癸丑五月壬午紫氣浮空有老人駕青牛白畚車諸子驂乘徐甲為御將度闗喜迎拜}
  - {type: page-break, offset: 9, content: '', id: KR5h0056_WYG_003-9b, image: WYG1055/WYG1055-0411d.png}
  - {type: page-break, offset: 9, content: '', id: KR5h0056_WYG_003-10a, image: WYG1055/WYG1055-0412a.png}
  - {type: variant, offset: 11, length: 1, content: 德, WYG: 風則老子也喜曰大道將隱强為我著書遂館終南艸樓師事之明年甲寅授道徳五千餘言包絡天地𤣥同造化君臣民物罔}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 賅僃尊道徳小仁義所以尊皇帝小王伯大抵以明天道明人道正君心正民心其曰以正治國以竒用兵曰偏將軍居左上將軍居右凡數章頗𩔖褒貶五伯之風學者疑昭王時伯業未著或指授經為敬王時殊不知夏商之衰昆吾大彭豕韋已自稱伯觀昭王江上不返固不待齊楚秦晉之出而伯者之風亦已見矣此老聖著道徳所以兼功力而言也按乾象河鼔三星主天子三軍中星大將軍左星左將軍右星右將軍夏官上大司馬王五軍大國三軍已載之周禮及考穆王内傳言王西還上終南修草樓則知授經為昭王時明矣闗尹亦自著書九篇名闗尹子自時其徒晉公孫辛銒字計然學於老子敬王二秊壬午南逰楚平王禮聘問道既而適越范蠡師之授蠡書十二篇名文子有平王問道章句踐位以大夫越伐呉蠡諫曰兵凶器戰逆徳隂謀逆徳好用凶器上帝禁之行將不利引文子語也句踐不聽敗於夫椒囚石室賂太宰噽得歸嘗膽圖報吳既沼計然曰句踐長頸烏喙可與共患難不可與共安樂蠡用其策從五湖遊計然亦佯狂遯封禺之地嘗登山籌隱今吳興計籌山是也列御冦居鄭圃四十秊人無識者安王四年著書八篇明老子之道莊周字子休號南華子顯王三十秊楚聘為相不就隱濠上漆園著書五十三篇名莊子今存三十三篇若夫庚桑楚南榮趎崔瞿柏矩士成綺尹文子之徒皆當時師事老子傳其道各有著述載在典籍然老子遊厯商周亦已久矣其親見猶龍如孔子者可無若人自司馬遷以老韓同傳而老氏之門人}
