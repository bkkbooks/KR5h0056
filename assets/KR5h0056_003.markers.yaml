  - {type: variant, offset: 7273, length: 283, content: 焉蒞力至反聖人亦不傷之一作傷人以下德交歸焉觀之作之爲是之指神而言也蘇註烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛聖人無爲使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用其神矣非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未嘗傷人故其鬼無能爲耳人鬼所以不相傷者由上有聖人也故德交歸之大國者下流天下之交天下之牝牝常以靜勝牡以靜爲下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜爲下蘇註天下之歸大國猶衆水之趨下流也衆動之赴靜猶衆高之赴下也大國能下則小國附之小國能下則大國納之大國下以取人小國下而取于人, WYG: 老子翼卷三}
