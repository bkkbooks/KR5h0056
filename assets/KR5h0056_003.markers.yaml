  - {type: variant, offset: 8, length: 0, content: '', WYG: 善兩離炳耀重日垂明永固洪基克隆鼎祚重以維城磐石多藝多才良佐寶臣允文允武為王室之蕃屛成神化之丹青致世俗於潤塗納烝民於夀域旄頭垂象窮髪成形獯獫作患其來久矣無上筭以制之用}
