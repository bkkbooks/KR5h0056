  - {type: indent, offset: 151, content: 　, id: KR5h0056_krp_003-bkkind3}
  - {type: variant, offset: 158, length: 3, content: 貴勉强, WYG: 書孔子未嘗譽亦未嘗毁葢}
  - {type: variant, offset: 162, length: 19, content: 求不失蓋僅自完耳而何德之有無爲而有以爲, WYG: 謂譽}
