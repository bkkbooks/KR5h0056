  - {type: variant, offset: 4228, length: 2, content: 率居, WYG: 矣又嘗著潛藩盛徳録内一篇曰某舊得侍談凡及大道常取易繫道器與孔子下學上達之語而參言葢道器學達可從上下立為形容正如燒火薪能生焰是上形之道必資下形之器學乎下可以達乎上是薪雖麤實而}
  - {type: page-break, offset: 4228, content: '', id: KR5h0056_WYG_003-49b, image: WYG1055/WYG1055-0431d.png}
  - {type: variant, offset: 4231, length: 1, content: 九, WYG: 英}
