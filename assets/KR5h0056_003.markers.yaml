  - {type: variant, offset: 25, length: 0, content: '', WYG: 私焉而天下治帝嗟嘆曰廣成之言也開元中再召至都𤣥宗詔於王屋山置壇室}
  - {type: variant, offset: 26, length: 4, content: 爲下德爲, WYG: 居善篆𨽻帝命以三體冩老子刋定文句見新唐書隱傳舊書本傳云𤣥宗令以三體冩老子經因刋正文句定著五千三百八十言為真本以奏上}
