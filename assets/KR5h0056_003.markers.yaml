  - {type: variant, offset: 1142, length: 170, content: 道之動弱者道之用天下之物生於有有生于無反復也湏溪云反者動之極則必歸也是其反也正以其動也非動無反蘇註復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也世不知靜之爲動弱之爲强故告之以物之所自生者蓋天下之物聞有母制子未聞有以子制母者也筆乘天下之物生于有所謂有名萬物之母是已有生于無, WYG: 夀釋氏}
