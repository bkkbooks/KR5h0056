  - {type: variant, offset: 4239, length: 1, content: 夫, WYG: 六經論孟説器多而説道少是蓄薪以求生焰者也老莊之書説無多於説}
  - {type: variant, offset: 4241, length: 1, content: 生, WYG: 是謂六經説薪已多不}
