  - {type: variant, offset: 4305, length: 1, content: 于, WYG: 教者舍道本不言而及方藥祈禳等事其譌失本意又益太逺惟唐人白居易詩語能明其曰何况𤣥元皇帝道徳五千言不言藥不言仙不言白日升青天𤣥元皇帝即老子也道家以老子為教祖而八}
