  - {type: variant, offset: 14, length: 1, content: 德, WYG: 紀遂使孔老通家之學後世無傳焉惜哉老子之稱經自漢景帝始也呉闞澤對大帝曰許成子原陽子老子莊子皆修身自玩放暢山谷縱汰其心學歸澹泊至漢景帝以黄帝老子義體尤深改子為經始立道學𠡠令朝野悉諷誦焉班固載老子鄰氏有傳傅氏徐氏劉向皆有說傅氏三十七篇鄰氏四篇徐氏六篇劉向四篇惜乎其書之亡久矣今世所傳老子道徳經或總為上下二篇或分八十一章或七十二章河上公分八十一章以上經法天天數竒故有三十七章下經法地地數偶故有四十四章嚴遵乃以隂道八陽道九以八行九故七十二章上四十章下三十二章全與河上公不合本既各異說亦不同蓋莫得而攷也觀復高士謝守灝曰道徳經唐傅奕考覈衆本勘數其字云項羽妾本齊武平五年彭城人開項羽妾塚得之安丘望之本魏太和中道士冦謙之得之河上丈人本齊處士仇嶽傳之三家本有五千七百二十二字與韓非喻老相參又洛陽有官本五千六百三十五字王弼本有五千六百八十三字或五千六百一十字河上公本有五千三百五十五字或五千五百九十字并諸家之注多少參差然歴年既乆各信所傳或以他本相參故舛戾不一史記司馬遷云老子著書言道徳之意五千餘言但不滿六千則}
  - {type: page-break, offset: 14, content: '', id: KR5h0056_WYG_003-12a, image: WYG1055/WYG1055-0413a.png}
