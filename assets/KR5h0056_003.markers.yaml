  - {type: line-break, offset: 19, content: '', id: KR5h0056_HFL_003-001a04}
  - {type: variant, offset: 20, length: 1, content: 德, WYG: 卷言徳者𩔖之下卷刻石渦口老子廟中又云唐道士張道相集注道徳經七卷凡三十家其名存者河上公節解嚴遵王弼何晏郭象鍾㑹孫登羊祜鳩摩羅什盧景裕劉仁㑹顧歡陶𢎞景松靈裴處思杜弼張憑張嗣臧𤣥静孟安期孟智周竇略宋文明禇柔劉進喜蔡子晃成𤣥英車恵弼今攷之新舊唐書藝文志則又有母丘望之湘逸其姓程韶王尚蜀才袁真釋恵嚴恵琳義盈梁曠𣗳鍾山傳奕楊上善李允愿陳嗣古任真子馮郭𤣥景先生楊上器韓杜梁武帝梁簡文帝賈大隱辟閭仁諝劉仲融王肅戴詵𤣥宗盧蔵用邢南和馮朝隱白履忠李播尹知章陸徳明陳庭玉陸希聲呉善經孫思邈李含光四十家而道相所集郭象劉仁㑹松靈裴處思杜弼張嗣臧𤣥静竇略宋文明禇柔劉進喜蔡子晃車恵弼此十四家不著於志按志稱道相集注四卷而董所收乃有七卷恐後人之所增也我朝崇寧中再校定道蔵經典此書蔵中已不復見其餘諸家僅存𤣥宗河上公嚴遵陸希聲四注及𫝊奕所傳古本道徳經耳外李約李榮賈清夷各有注說王顧等奉𤣥宗命撰所注經疏杜光庭又從而為廣聖義亦皆唐人並見蔵室始知志所著録猶有未盡惜乎名存而書亡者十葢八九也樂臣公學黄帝老子其本師號曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂臣公樂臣公教蓋公蓋公教於齊高宻膠西為曹相國師見史記樂毅傳漢桓譚曰㫺老耼著虚}
