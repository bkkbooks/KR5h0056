  - {type: variant, offset: 137, length: 0, content: '', WYG: 南面之治不可易也見本集延平先生羅}
  - {type: variant, offset: 138, length: 19, content: 心所欲不踰矩非有意于德而德自足其下知德, WYG: 彦仲素曰老子}
  - {type: 'kr:newline', offset: 151, content: '

