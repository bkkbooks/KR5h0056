  - {type: indent, offset: 0, content: 　　, id: KR5h0056_krp_003-bkkind1}
  - {type: variant, offset: 1, length: 1, content: 篇, WYG: 策而難服自我開運耀徳戢兵感義懷仁稱藩請朔稽顙款塞匍匐投掌䍧牱夜郎之所靡漠桑榆之地咸被聲教竝入提封閩越勾呉不愆貢職夫餘肅慎無絶夷邸遐邇禔福文軌大同自三代之餘六雄競逐秦居閏位漢雜霸道魏氏則虐深華夏有晉則化成夷狄降斯以後粹駁不分帝迹皇風寂寥千載天命聖徳㑹昌神道變億兆之視聽復三五之規模固以幽明贊協符瑞彪炳千年靈蔡著天性以效徴三足神烏感陽精而表質春泉如醴出自京師秋露凝甘徧於竹葦星光若月雲氣飛煙三農應銅爵之鳴五緯叶珠囊之度信可以揚鑾動蹕肆覲東后玉檢金繩登封岱岳而謙以自牧為而不宰尚寢馬卿之書未允梁松之奏在青蒲之}
  - {type: page-break, offset: 1, content: '', id: KR5h0056_WYG_003-5b, image: WYG1055/WYG1055-0409d.png}
  - {type: page-break, offset: 1, content: '', id: KR5h0056_WYG_003-6a, image: WYG1055/WYG1055-0410a.png}
