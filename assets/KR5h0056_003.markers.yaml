  - {type: variant, offset: 531, length: 0, content: '', WYG: 每出一章輒以示全全輒嘆曰皆佛說也予居筠五年而北歸全不久亦化去逮今二十餘年也凡老子解亦時有所刋定未有不與佛法合者時人無可與語思復見全而示之故書之老子之末大觀二年十二月十日子由題又曰予㫺南遷海康與子瞻兄邂逅于藤州相從十餘日語及平生舊學子瞻謂予子所作詩傳春秋傳古史三書皆古人所未至惟解老子差若不及予至海康閒居無事凡所為書多所更定乃再録老子書以寄子瞻自是䝉恩歸北子瞻至毗陵得疾不起逮今十餘年竟不知}
  - {type: page-break, offset: 531, content: '', id: KR5h0056_WYG_003-30a, image: WYG1055/WYG1055-0422a.png}
  - {type: variant, offset: 532, length: 0, content: '', WYG: 書于子瞻為可否也政和元年冬得姪邁等所編先公手澤其一曰昨日子由寄老子新解讀之不盡卷廢卷而嘆使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晉宋間有此書則佛老不為二不意老年見此竒特然後知此書當子瞻意然予自居潁川十年之間於此四書復多所删改以為聖人之}
