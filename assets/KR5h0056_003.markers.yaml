  - {type: variant, offset: 6383, length: 0, content: '', WYG: 所學咸脩已治人之事或得有淺深見有純駁爾柰何絶去使世諱言之老子之書殆於息矣余懷此意未有以明其後仕都質之今祭酒武城王純父先生孔老所以異柰何純父荅之耼與尼父意同而言異彼生於周末睹文之盛也疾欲還之古故激言之激則不能無過中已試言之仲尼曰人而不仁如禮何禮云禮云玉帛云乎哉禮與其奢也寧儉而耼則曰禮者忠信之薄而亂之首也故激如此去仲尼之辭逺矣故尼父之書誦法萬世而耼卒廢而為它也余藏其牘他日仕山西復質之今京尹曹徳芳先生其言聖人之言道也猶人之名天也中國謂之天矣彼匈奴則謂之撑犂豈有二哉特其辭異耳天固不自知而人强名之又爭辨之故學者誠求至於道凡支言可忘也達哉言乎葢二先生皆深於老子者今以觀考功之注尤信易大傳曰天下同歸而殊塗一致而百慮學者習而常聞如不見其同與一獨以其異也遽詆訶之蓋讀其篇未訖往往已驚豈但老子邪嗚呼難言矣百世倘有其人固自知之余何暇置譽毁哉記二先生之語篇首復作序李宏甫刻子由解於金陵題其後曰食之於飽一也南人食稻而甘北人食黍而甘此一南一北者未始相羡也然使兩者易地而食焉則又未始相弃也道之於孔老猶稻黍之於南北也足乎此者雖無羡於彼而顧可弃之哉何也至飽者各足而真饑者無擇也葢嘗北學而食於主人之家矣其初葢不知其美也天寒大雨雪三日絶糧七日饑凍困踣望主人而向往焉主人憐我炊黍餉我信口大嚼未暇辨也撤案而後問曰豈稻粱也歟奚其有此美也主人笑曰此黍稷也與稻粱埒且今之黍稷也非有異於向之黍稷者也惟甚饑故甚美惟甚美故甚飽子今以往更不作稻粱想亦不作黍稷想矣予聞之慨然而嘆使予之於道若今者之望食則孔老暇擇乎自此發憤學道窮日夜不寢不食而時獲子由老子解於焦弱矦氏解老子者衆矣而子由最高子由之引中庸曰喜怒哀樂之未發謂之中夫未發之中萬物之奥宋自明道以後逓相傳授每令門弟子看其氣象為何如者也子由乃獨得微言於殘篇斷簡之中宜其善發老子之藴使五千餘言爛然如皎日學者斷斷乎不可一日去手也解成示道全當道全意寄子瞻又當子瞻意今去子由五百餘年不意復見此竒特嗟夫亦惟真饑而後能得之也萬厯二年冬十二月二十日宏甫題李宏甫先生既刻子由老子解逾年復自著解老二卷序曰嘗讀韓非解老未始不為非惜也以非之才而卒見殺於秦安在其為善解老也是豈無為之謂哉夫彼以}
