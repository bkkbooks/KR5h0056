  - {type: variant, offset: 22, length: 1, content: 爲, WYG: 之言两篇後世好之者以為過於五經自漢文景之君及司馬遷皆有是言見揚雄傳嚴君平卜筮成都市人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善裁日閲數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴周之㫖著書十餘萬言阮籍著通老論曰道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道見太平御覽王輔嗣山陽高平人少而察慧十餘嵗便好莊老通辨能言何平叔注老子始成詣王見王注精竒迺神伏曰若斯人可與論天人之際矣因以所注為道徳二論魏氏春秋曰弼論道約美不如晏自然出㧞過之太原王濟好言老莊嘗云見弼易注所悟者多殷仲堪有思理能清言嘗云三日不讀道徳經便覺舌本間强見世說庾子嵩恢廓有度量自謂是老莊之徒曰昔未讀此書意嘗謂至理如此今見之正與人意暗同見晉陽秋阮宣子好老易能言理不喜見俗人時誤相逢即舍去傲然無營家無儋石之儲晏如也名士傳周彦倫善言名理每賓客㑹集周虗席晤語詞韻如流聽者忘倦尤善老易與張思光遇輒以𤣥言相滯彌日不解阮瞻咸之子也見司徒王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嗟良久即命辟之謂之三語掾見晉書本傳世說作阮修宗測少静不樂人間豫章王嶷徴為參軍答云何為謬傷海鳥横斤山木欲遊名山迺掛其祖所畫向子平圖於壁上齎老莊二書自隨子孫拜辭悲泣測長嘯不顧仲長子光字不曜往來河東傭力自給無室廬絶妻子開皇末始庵河渚間以息身焉賣藥為業人莫之知也汾隂生遊河渚一見而伏曰東方朔管輅不如也由是顯重守令來謁辭以瘖疾未嘗交語著獨遊頌河渚先生傳以自寓識者知其縣解人也有請道者書老易二字示之彈琴餌藥以終其世王績嗜酒不任事有奴婢數人種黍春秋釀酒養鳬雁蒔藥草自供以周易老子莊子置牀頭他書䍐讀也游北山東皋著書自號東皋子王希夷隱嵩山師黄賾學養生喜讀周易老子餌松柏葉雜花年七十餘筋力不衰刺史盧齊卿就謁問政答曰己所不欲勿施於人此言足矣貞一先生司馬承禎字子微廬天台不出睿宗命其兄承禕就起之既至引入中掖廷問其術對曰為道日損損之又損以至於無為夫心目所知見每損之尚不能已况攻異端而增智慮哉帝曰治身則爾治國若何對曰國猶身也故游心於淡合氣於漠與物自然}
