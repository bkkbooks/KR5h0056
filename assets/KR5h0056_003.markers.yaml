  - {type: line-break, offset: 2300, content: '', id: KR5h0056_HFL_003-008b10}
  - {type: variant, offset: 2304, length: 0, content: '', WYG: 神孰能與於此然後知伏羲神農黄帝至於堯舜世而相傳者皆不出乎易退而質諸老氏則與易異者無㡬又曰論語記竊比於我老彭後孔子者孟子孟子之於儒蓋秋毫不以少亂也其拒楊墨排儀秦過於桀紂終不及老氏乃其言盡心知性以至於命則老氏之所深致意也然後知老氏之書孔孟所未嘗廢又曰老氏之書其與孔子異者皆矯世之辭而所同者皆合於易後老氏數百年復有佛氏者出其辭益荒逺深妙而要其至到與老氏殆相為表裏並見經注葉夢得曰老氏論氣欲専氣致}
  - {type: page-break, offset: 2304, content: '', id: KR5h0056_WYG_003-40b, image: WYG1055/WYG1055-0427b.png}
  - {type: variant, offset: 2305, length: 2, content: 馳騁, WYG: 如嬰兒孟子論氣以至大至剛直養而無害充塞乎天地之間二者正相反從老氏則廢孟子從孟子則廢老氏以吾觀之二説正不相反人氣散之則與物敵而剛専之則反於已而柔剛不可以勝剛勝剛者必以柔則専氣者乃所以為直也直養而無害於外則不惟持其志毋暴其氣當如曾子之守約約之至積而反於㣲則直養者乃所以為柔也蓋知道之至者本自無二見石林巖下放言董思靖云老子之道以清淨無為自然為宗以虚明應物不滯為用以慈儉謙下不爭為行以無欲無事不先天以開人為治其於治身治人也至矣如用之則太古之治可復也以其所值之時俗尚文勝淳朴之風無復存者而老子抱純素之道與時偕極必待感而後應故不得位以推是於}
  - {type: page-break, offset: 2305, content: '', id: KR5h0056_WYG_003-41a, image: WYG1055/WYG1055-0427c.png}
  - {type: page-break, offset: 2305, content: '', id: KR5h0056_WYG_003-41b, image: WYG1055/WYG1055-0427d.png}
  - {type: variant, offset: 2309, length: 0, content: '', WYG: 蓋知夫時數之有所忤也然終不能恝然道之無傳是以有教無𩔖而且睠睠於西方之異俗則其憫當時慮後世之心何如哉猶幸斯文不墜故西闗伺駕東魯見龍而書與言之尚存也河上丈人黄石公樂臣公葢公之徒葢能究其㫖而體之斂厥用於一身則在我之天下已羲皇矣及其道之有所授則孝文以之為君子房以之佐漢曹參以之相齊果能通一脉於苛秦之後吁亦一驗也然使又有進於是如其人羲皇之則羲皇矣或者見是書詞意含洪寛大而不知致察於虚極静篤之時存乎體}
  - {type: page-break, offset: 2309, content: '', id: KR5h0056_WYG_003-42a, image: WYG1055/WYG1055-0428a.png}
  - {type: variant, offset: 2311, length: 1, content: 堅, WYG: 嚴至密者以為庶政庶事之本乃徒務為悶悶若昏之量而習弊反墮於優游姑息遂有清虚不及用之譏故不經而子視之嗚呼惜哉或謂㣲言隱訣多寓其間以故首章有}
  - {type: variant, offset: 2313, length: 0, content: '', WYG: 在二丹神氣水火也虚心實腹則鍊鉛之㫖用兵善戰則采鉛之方沖字從水從中乃喻氣中真一之水三十輻共一轂為取五蔵各}
  - {type: variant, offset: 2314, length: 0, content: '', WYG: 六氣之象及準一月火符之數如斯等義今皆略之何則性由自悟術假師𫝊使其果寓㣲㫖亦必已成之士口授纎悉然後無惑區區紙上烏足明哉况是經標道徳之宗暢無為之㫖高超象外妙}
  - {type: page-break, offset: 2314, content: '', id: KR5h0056_WYG_003-42b, image: WYG1055/WYG1055-0428b.png}
  - {type: variant, offset: 2315, length: 5, content: 於無間吾是, WYG: 環中遽容}
