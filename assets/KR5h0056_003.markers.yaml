  - {type: variant, offset: 1094, length: 1, content: 爲, WYG: 不同也見淮海集鼂文元公迥曰古今名賢多好讀老莊之書以其無為無事之中有至美至樂之理也又曰老子曰五色令人目盲五音令人耳聾五味令人口爽雖聖人矯激太過而善利之心極於深切人能不耽耳目之娯不縱口腹之美勿問有得決定無失並見昭徳新編又曰老子曰知常曰明處世之人止知晝夜是常而人如故出世之人以生死為晝夜又知生死是常而性如故是以明心坦然視生死而無怖見耄智餘書盱江李泰伯曰韓退之有言老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗云爾佛之説吾不能詳曾子問老子列傳則有問禮之事史未足盡信禮記經之屬也亦有妄乎見退居𩔖藁嵩山景迃生鼂說之曰伏羲文王周公贊易之後惟老氏得易之變通屈伸知柔而貴虚務應而不得殷勤以立言幸乎此書之存也又曰王弼注老子道徳經二篇真得老子之學歟蓋嚴君平指歸之流也其言仁義與禮不能自用必待道以用之}
