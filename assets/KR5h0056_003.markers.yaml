  - {type: variant, offset: 2321, length: 3, content: 知無爲, WYG: 他説小數雜}
  - {type: substitution, offset: 2323, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: variant, offset: 2325, length: 2, content: 有益, WYG: 乎白樂天云𤣥元皇帝五千言}
  - {type: variant, offset: 2329, length: 0, content: '', WYG: 藥不言仙不言白日升青天亦論也邵若愚號本來子紹興中作老子解序其首曰據史記老子為守蔵室}
  - {type: variant, offset: 2330, length: 1, content: 教, WYG: 史周衰遂去闗令尹喜曰子將隱矣强為我著書於是著書上下篇言道徳之意五千餘言而去莫知其所終緣史有上下篇目之文後人因之上卷説道下卷説徳今以理考道徳混説}
  - {type: page-break, offset: 2330, content: '', id: KR5h0056_WYG_003-43a, image: WYG1055/WYG1055-0428c.png}
  - {type: variant, offset: 2332, length: 1, content: 爲, WYG: 分上下此流俗}
  - {type: substitution, offset: 2332, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: 'kr:newline', offset: 2334, content: '

