  - {type: variant, offset: 3069, length: 716, content: 遠近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人爲物所蔽性分于耳目内爲身心之所紛亂外爲山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌遠而彌少也性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣爲學日益爲道日損損之又損之以至于無爲無爲而無不爲矣故取天下常以無事及其有事不足以取天下取開元䟽云猶攝化也無事即無爲也無爲自化清靜自正故曰取天下常以無事爲者敗之執者失之故曰有事不足以取天蘇註不知道而務學聞見日多而無以一之未免爲累也孔子曰多聞擇其善者而從之多見而識之知之次也苟一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予爲多學而識之者與曰然非與曰非也予一以貫之去妄以求復性可謂損矣而去妄之心猶存及其兼忘此心純性而無餘然後無所不爲而不失于無爲矣人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無爲故無事其心見于外而物安之雖不取天下而天下歸之矣聖人無常心以百姓心爲心善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣聖人在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之無常心心無所主也惵圖恊反爲去聲渾胡本反蘇註虛空無形因萬物之形以爲形在方爲方在圓爲圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以爲心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未嘗渝也可謂德善矣信不信在彼而吾之所以信者未嘗變也可謂德信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉天下善惡信僞方各自是以相非相賊不知所定聖人憂之故惵惵爲天下渾其心無善惡無信僞皆以一待之彼方注其耳目以觀聖人之予奪而吾一以嬰兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不愠釋然皆化而天下始定矣, WYG: 窮老氏言}
