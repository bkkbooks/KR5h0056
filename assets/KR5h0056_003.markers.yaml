  - {type: variant, offset: 6384, length: 1, content: 遠, WYG: 弱而此以堅强此勇於敢而彼勇於不敢已方圓冰炭若矣而謂道徳申韓宗祖可歟蘇子瞻求而不得乃强為之説曰老子之學重於無為而輕於治天下國家是以仁不足愛而禮不足敬韓非氏得其所以輕天下之術遂至忍刻薄而無疑嗚呼審若是則不可以治天下國家者也老子之學果如是夫老子者非}
  - {type: variant, offset: 6386, length: 1, content: 邇, WYG: 治之而不治乃不治以治之者也故善愛其身者不治身善愛天下者不治天下凡古聖王所謂仁義禮樂者皆非所以治之也而况一切刑名法術歟故其著書専言道徳而不言仁義以仁雖}
  - {type: page-break, offset: 6386, content: '', id: KR5h0056_WYG_003-56a, image: WYG1055/WYG1055-0435a.png}
  - {type: variant, offset: 6388, length: 2, content: 意于, WYG: 為而不免有為義則為之而有以為又甚矣是故其為道也以虚為常以因為綱以善下不争為百谷之王以好戰為樂殺人以}
  - {type: variant, offset: 6392, length: 1, content: 唯, WYG: 為}
