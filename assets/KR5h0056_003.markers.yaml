  - {type: variant, offset: 6483, length: 119, content: 上常使民無知無欲民多權謀則其上眩而昏矣人不務本業而趨末技則非常無益之物作矣患人之詐僞而多爲法令以勝之民無所措手足則日入于盜賊矣其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復爲竒善復爲祅人之迷也其日固久矣是以聖人方, WYG: 堅强}
