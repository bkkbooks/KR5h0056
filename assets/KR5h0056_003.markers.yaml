  - {type: variant, offset: 4243, length: 0, content: '', WYG: 贅言者也儒者之於求道自}
  - {type: variant, offset: 4244, length: 5, content: 死是生固死, WYG: 六經宜若無藉於老莊矣然老莊}
  - {type: variant, offset: 4250, length: 14, content: 地矣兕虎甲兵將安避之善攝生則, WYG: 書言㣲趣深助發道秘尤為精要茍能博取當大有補特不可如晉人談虚直謂弃捐禮樂刑政而天下可以自治焉耳天下嘗有}
  - {type: 'kr:newline', offset: 4259, content: '

