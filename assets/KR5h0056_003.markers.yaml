  - {type: variant, offset: 578, length: 0, content: '', WYG: 得言及於此涕泗而已十二月十一子由再題眉山蘇籀潁濱文定公之孫也記其遺言曰公為籀講老子數篇曰高於孟子二三等矣又曰言至道無如五千文又曰公老年作詩云近存八十一章注從道老耼門下人蓋老而所造益妙録録者莫測矣見遺言吕吉甫作道徳經傳成以元豐元年表進於朝曰臣恵卿言臣聞庖丁奏刀得養生於文恵輪扁釋鑿議讀書於齊桓志之}
