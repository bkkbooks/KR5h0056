  - {type: variant, offset: 31, length: 34, content: 而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之, WYG: 盧鴻一字顥然隱於嵩山開元六年徴至東都謁見不拜宰相遣通事人問其}
