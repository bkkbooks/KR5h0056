  - {type: variant, offset: 3801, length: 407, content: 人之生動之死地者亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地出謂自無而見于有入謂自有而歸于無莊子萬物皆出于機入于機又曰其出不忻其入不詎又曰有乎出有乎入皆以出爲生入爲死夫音符攝生如攝政攝官之攝不認生爲己有如暫焉管攝之也不期而會曰遇兕音似山海經兕出湘水之南蒼黑色爾雅云形如野牛一角重千斤蘇註性無生死出則爲生入則爲死用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知默知思而不知忘以趣于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無爲之妙也有生則有死故生之徒即死之徒也人之所頼于生者厚則死之道常十九聖人常在不生不死中生地且無焉有死地哉筆乘生之徒十有三此練形住世者也死之徒十有三此殉欲忘生者也人之生, WYG: ''}
