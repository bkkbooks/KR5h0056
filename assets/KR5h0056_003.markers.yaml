  - {type: line-break, offset: 104, content: '', id: KR5h0056_HFL_003-001a09}
  - {type: variant, offset: 104, length: 0, content: '', WYG: 山與劉海蟾种放結方外友事陳希夷先生無夢多得微㫖久之入天台山真宗召對問以長久之策無夢曰臣野人也山中嘗誦老子周易}
  - {type: variant, offset: 105, length: 1, content: 愚, WYG: 已不知其他除著作佐郎固辭還山賜金帛處士號並不受見高道傳了齋陳忠肅公瓘嘗著書二十餘篇曰昭語其序略云玉清昭應宫使王曾請校三館道經上因言其書不如老氏五千言清静而簡約張知白曰陛下留意於此乃治國無為}
  - {type: page-break, offset: 105, content: '', id: KR5h0056_WYG_003-25b, image: WYG1055/WYG1055-0419d.png}
  - {type: variant, offset: 107, length: 1, content: 始, WYG: 術見了齋集田諫議錫尺木贊序曰龍之興}
  - {type: variant, offset: 109, length: 1, content: 是, WYG: 階於木也君之起也人為階也抑有無位之聖韜之賢}
  - {type: variant, offset: 111, length: 0, content: '', WYG: 名迹相參以材能相濟如丘明之才乃仲尼之尺木乎故能發揮春秋以垂聲教也尹喜之賢乃老耼之尺木乎故能詢謀道徳以貽後世也見咸平集陳忠肅公曰老子言天下神器不可為也為者敗之又言治}
  - {type: variant, offset: 112, length: 1, content: 丈, WYG: 國若烹小鮮}
  - {type: variant, offset: 114, length: 1, content: 處, WYG: 烹魚者無所事於煩之也制水火之齊以熟之而已舜無為而治}
  - {type: page-break, offset: 114, content: '', id: KR5h0056_WYG_003-26a, image: WYG1055/WYG1055-0420a.png}
  - {type: variant, offset: 116, length: 1, content: 厚, WYG: ''}
  - {type: variant, offset: 118, length: 4, content: 處其薄居, WYG: 以此歟又曰武帝黜黄老而用儒術未嘗不本於仁義而觀}
  - {type: 'kr:newline', offset: 121, content: '

      ', id: KR5h0056_krp_003-bkkkrnewl9}
  - {type: line-break, offset: 121, content: '', id: KR5h0056_HFL_003-001a10}
  - {type: variant, offset: 124, length: 0, content: '', WYG: 效則}
  - {type: variant, offset: 125, length: 1, content: 居, WYG: 異於始皇者㡬希當此之時天下不一日而無事思慕文景不可復得然則黄老亦何負於天下哉又曰疏廣謂受曰知足不辱知止不殆宦成名立而不去懼有後悔於是父子相隨移病而歸當時賢之後世追誦然}
  - {type: variant, offset: 127, length: 1, content: 華, WYG: 知止之意發於老氏見了齋集歐陽文忠公脩曰前後之相隨長短之相形推而廣之萬物之理皆然也然老子為書其言雖若虚無而於治人之術至矣又曰道家者流本清虚去健羡泊然自守}
  - {type: page-break, offset: 127, content: '', id: KR5h0056_WYG_003-26b, image: WYG1055/WYG1055-0420b.png}
  - {type: variant, offset: 129, length: 6, content: 去彼取此蘇註, WYG: 曰我無為而民自化我好静而民自正雖}
  - {type: 'kr:newline', offset: 133, content: '

