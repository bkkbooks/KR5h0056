      ', id: KR5h0056_krp_003-bkkkrnewl2}
  - {type: line-break, offset: 2, content: '', id: KR5h0056_HFL_003-001a03}
  - {type: variant, offset: 3, length: 1, content: 德, WYG: 常若乘奔處黄屋之下無忘夕愓雖蒼璧黄琮事天事地南正火正屬神之禔猶恐祀典未𢎞秩宗廢禮永言仁里尚想𤣥極夀宫靈座麋鹿徙倚華蓋壇風霜凋弊乃詔上開府儀同三司亳州刺史武陵公元胄考其故迹營建祠堂皇上往因厯試總斯蕃部猶漢光司𨽻之所魏武兖州之地對苦相之兩城繞渦榖之三水芝田栁路北走梁園沃野平皋東連譙國望水置槷揆景瞻星擬𤣥圃以疏基横玉京而建宇雕楹畫栱磊砢相扶方井圓淵參差交映尊容肅穆仙衛儼而無聲神館虚閒滴瀝降而成響清心潔行之士存𤣥守一之儔四方輻凑千里波屬知如在之敬申醮祀之禮顯仁助於王者冥福資於黎獻允所謂天大道大難㡬者矣若夫名言頓絶幽泉之路莫開形器}
  - {type: page-break, offset: 3, content: '', id: KR5h0056_WYG_003-6b, image: WYG1055/WYG1055-0410b.png}
  - {type: page-break, offset: 3, content: '', id: KR5h0056_WYG_003-7a, image: WYG1055/WYG1055-0410c.png}
  - {type: variant, offset: 5, length: 2, content: 德是, WYG: 陳妙物之功難著騰茂實飛英聲圖丹青鏤金石不可以已而在兹乎嵗次敦牂律中姑洗大隋馭天下之六載也乃詔下臣建碑作頌其詞曰悠哉振古邈矣帝先四紀維地八柱承天叢生𩔖聚廣谷大川至道靈運神功自然五精應感三㣲相繼樹以司牧執其象契帝迹慙皇王猷謝帝上徳逾逺淳風漸替時乖澹泊俗異沖和尚賢飾智懸法張羅内修尊爼外事干戈魚驚網密鳥亂弓多真人出世星精下斗龍徳在躬鶴髪垂首解紛挫鋭去薄歸厚日角月角天長地久小茲五嶽隘此九州逝將髙蹈超然逺遊青牛已駕紫氣光浮𤣥門洞啟神化潛流賴鄉舊里渦川遺迹古往今來時移世易靈廟凋毁祠壇虛寂九井生桐雙碑碎石維皇受命乃神乃聖響發地鐘垂天鏡宇宙開朗妖氛蕩定曜魄同尊叅神取正流沙蟠木鳯穴龜林異𩔖歸款萬方宅心鴻臚納賮王㑹書琛青雲干吕薰風入琴化致鼎平家興禮讓永言柱下猶慙太上乃建清祠式圖靈狀原隰爽塏亭臯彌望梅梁桂棟曲檻叢楹煙霞舒卷風霧淒清仙官就位羽客來庭穰穰簡簡降福明靈至神不測理存繫象大音希聲時振髙響遐邇讚頌幽明資仰敬刋金石永播天壤敬叔師仲尼仲尼謂敬叔曰吾聞老聃博古而達今通禮樂之原明道徳之歸則吾師也敬叔言於魯君曰孔丘聖人之後將達者也受先臣之命屬臣則必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以車乘賚之臣請與往魯君與車一乘二馬二豎子敬叔俱至周問禮於老聃訪樂於萇𢎞厯郊社之所考明堂之則察朝廷之度觀明堂四門之墉有堯舜桀紂之象各有善惡之狀興廢之戒焉又有周公相成王抱之而負斧扆南面以朝諸侯之圖嘆曰吾乃今知周公之聖與周之所以王也將去周老子送之曰富者送人以財仁者送人以言吾竊仁者之號送子以言凡當世之士聰明深察而近於死者好議人之非者也博辨閎大而危其身者好發人之惡者也為人臣者無}
