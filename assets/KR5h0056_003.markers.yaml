  - {type: variant, offset: 6633, length: 510, content: 察察宜無不及故人望之而卒失望也極終也竒衰也廉稜也劌居衛反割也皆謂芒利傷物也蘇註天地之大世俗之見有所眩而不知也蓋福倚于禍禍伏于福譬如老稚生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知爲至彼方且自以爲福而不知禍之伏于後方且自以爲善而不知禍之起于中區區以察爲明至于察甚傷物而不悟其非也可不哀哉知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也此則世俗所謂悶悶也治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長乆是謂深根固柢長生乆視之道服一作復柢一作蒂花趺也蘇註凡物方則割廉則劌直則肆光則耀唯聖人方而不割廉而不劌直而不肆光而不耀此所謂嗇也夫嗇者有而不用者也世患無以服人苟誠有而能嗇雖未嘗與物較而物知其非不能也則其服之早矣物既已服歛藏其用至于殁身而終不試則德重積矣德積既厚雖天下之剛强無不能克則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也孟子曰存其心養其性, WYG: ''}
