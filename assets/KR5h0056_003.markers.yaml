  - {type: variant, offset: 1382, length: 0, content: '', WYG: 又曰惟道大}
  - {type: variant, offset: 1383, length: 2, content: 建言, WYG: 似不肖若肖乆矣其細也夫肖也者以所養者小故也俗之所養無非小是以大者為不肖是皆未足與語夫道又曰道大而物小人之營營而卒乎小者累于物也元者善之長而至於大之謂也至而不知其為大則同於道而與世俗不相似故天下皆謂我道大似不肖蓋衆方察察髪較而錐競我獨悶悶以天下為不足為者宜乎其不相似故能成其大大而}
