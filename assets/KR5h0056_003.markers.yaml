  - {type: variant, offset: 2276, length: 6, content: 貴重大然王公, WYG: 遂通天下}
  - {type: variant, offset: 2283, length: 17, content: 尊而自稱孤寡不穀古之達者蓋已知之矣, WYG: 故非}
