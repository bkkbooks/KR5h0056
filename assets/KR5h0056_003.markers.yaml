  - {type: variant, offset: 2261, length: 0, content: '', WYG: 溺而致所以濟之者云耳又嘗自作大慶居士序曰居士本儒學以孔氏為宗得老氏之説以明並見西塘集葉夢得曰刪書斷自堯舜而易獨及伏羲神農黄帝然後知堯而上蓋有其}
  - {type: page-break, offset: 2261, content: '', id: KR5h0056_WYG_003-40a, image: WYG1055/WYG1055-0427a.png}
  - {type: variant, offset: 2262, length: 0, content: '', WYG: 六經存而}
  - {type: variant, offset: 2263, length: 3, content: 知萬物, WYG: 論嘗試㑹}
  - {type: variant, offset: 2267, length: 4, content: 所自生莫, WYG: 以心則其説曰易無思也無為也寂然}
  - {type: variant, offset: 2272, length: 3, content: 賤寡小, WYG: 動感}
