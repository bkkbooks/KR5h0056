  - {type: variant, offset: 5005, length: 4, content: 神應物用, WYG: 靈異繇是遂為儒家所詘置為養生之書}
  - {type: variant, offset: 5010, length: 535, content: 光而已身不與也夫耳之能聽目之能見鼻之能臭口之能嘗身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣使我介然有知行于大道惟施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文采帶利劒厭飲食資貨有餘是謂盜竽非道哉介然有知猶言微有知也夸張曰施嗇之反也夷平也路狹而捷爲徑除治也傳曰糞除先人之敝廬是也青赤爲文色絲爲采傅奕云采是古文繡字資貨一作財貨盜竽誤作盜夸今從韓非本蘇註體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道夷易無有險阻世之不知者以爲迂遠而好徑以求捷故凡舍其自然而有所施設者皆欲速者也俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設爲事夸以誨盜哉善建者不拔善抱者不脫子孫祭祀不輟修之于身其德乃眞修之于家其德乃餘修之于鄉其德乃長修之于邦其德乃豐修之于天下其德乃普故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此邦一作國漢人避高帝諱改之於韻不叶今從韓非本蘇註世豈有建而不拔抱而不脫者乎唯聖人知性之眞審物之妄捐物而修身其德充積實無所立而其建有不可拔者實無所執而其抱有不可脫者故至其子孫猶以祭祀不輟也身既修推其餘以及外雖至于治天下可也天地外者世俗所不見矣然其理可推而知也修身, WYG: 徒守}
