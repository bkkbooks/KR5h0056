  - {type: variant, offset: 1325, length: 0, content: '', WYG: 長壯老已非升降則無以生長化收蔵升降出入無器不}
  - {type: variant, offset: 1326, length: 0, content: '', WYG: 四者之有而貴常守知此然後知谷神之所以不死又曰虚其心則腹自實弱其志則骨自强並見道鄉集邵伯温曰康節先公以老子為知易之體以孟子為知易之用論文中子謂佛為西方之聖人不以為過見卲氏聞見録西塘鄭俠曰俠聞之老子曰知足不辱知止不殆易曰亢之為言也知進而不知退知存而不知亡知得而不知喪知進退存亡而不失其正者其唯聖人乎然則進退存亡得喪之理其不一致乎何其知退知亡知足知止之難而聖人丁寧讚歎之深乎曰}
  - {type: page-break, offset: 1326, content: '', id: KR5h0056_WYG_003-37b, image: WYG1055/WYG1055-0425d.png}
