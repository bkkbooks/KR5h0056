  - {type: variant, offset: 4, length: 0, content: '', WYG: 三附録史記老子列傳曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽諡曰耼周守蔵室之史也孔子適周將問禮于老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則累而行吾聞之良賈深蔵若虛君子盛徳容貎若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能㳺獸吾知其能走走者可以為㒺㳺者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪老子脩道徳其學以自隱無名為務居周久之見周之衰迺遂去至闗闗令尹喜曰子將隱矣彊為我著書於是老子迺著書上下篇言道徳之意五千餘言而去莫知其所終或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時云蓋老子百有六十餘嵗或言二百餘嵗以其脩道而養夀也自孔子死之後百二十九年而史記周太史儋見秦獻公曰始秦與周合而離離五百嵗而復合合七十嵗而霸王者出焉或曰儋即老子或曰非也世莫知其然否老子隱君子也老子之子名宗宗為魏將封於段干宗子注注子宫宫𤣥孫假假仕於漢孝文帝而假之子解為膠西王卬太傅因家於齊焉世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪李耳無為自化清淨自正隋薛道衡老子廟碑曰自太極權輿上元開闢舉天維而懸日月横地角而載山河一消一息之精靈上生下生之氣候固以財成庶𩔖亭毒羣品有人民焉有君長焉至若上皇䆳古夏巢冬穴静神習智鶉居鷇飲大禮與天地同節非折疑於爼豆大樂與天地同和豈考擊於鐘鼓逮乎失道後徳失徳後仁皇王有歩驟之殊民俗有淳醨之變於是儒墨爭騖名法竝馳禮經三百不能檢其情性刑典三千未足息其奸宄故知潔其流者澄其源直其末者正其本源源本本其惟大道乎老君感星載誕莫測受氣之由指樹為姓未詳吹律之本含靈在孕七十餘年生而白首自以老子為號其狀也三門雙柱表耳目之竒蹈五把十形手足之異爰自伏羲至於周氏綿祀厯代見質變名在文王武王之時居蔵史柱史之職市朝屢易容貎不改宣尼一睹嘆龍徳之難知闗尹四望識真人之將隱乃發揮衆妙著書二篇率性歸道以無為用其辭簡而要其㫖深而逺飛龍成卦未足比其精微獲麟筆削不能方其顯晦用之治身則神清志静用之治國則反朴還淳既而鍊形物表卷迹方外蜺裳鶴駕往來紫府金漿玉酒讌衍清都叅日月之光華與天地而終始渉其流者則擯落囂塵得其門者則騰驤雲霧大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測盛矣哉固無徳而稱也莊周云老耼死秦佚弔}
