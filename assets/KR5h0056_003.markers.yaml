  - {type: variant, offset: 2340, length: 4, content: 馳騁役使, WYG: 間兀兀然夀千萬歲暫時易短為長報盡還復於死若不進道何異大椿耳此非論説是非恐殢神仙之術不進於道}
  - {type: variant, offset: 2345, length: 5, content: 堅猶剛强不, WYG: 嚴谷山人江袤}
  - {type: page-break, offset: 2345, content: '', id: KR5h0056_WYG_003-44b, image: WYG1055/WYG1055-0429b.png}
