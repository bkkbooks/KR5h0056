  - {type: variant, offset: 6, length: 1, content: 轂, WYG: 號而出是謂遯天之形雖復傲吏之寓言抑亦蟬蛻之微㫖皇帝誕靈縱叡接統膺期照舂陵之赤發芒山之紫氣珠衡月角天表冠於百王明鏡衢罇聖徳㑹於千祀周道云季多難在時九鼎共海水同飛兩日與洛川俱鬭天齊地軸之所蛇食鯨吞銅陵玉壘之區狼顧鴟跱黄延姧宄鄭阻兵禍大縱毒螫將遍函夏神謀内㫁靈武外馳應欃槍而掃除仗旄鉞而斬伐共工既翦重立乾坤蚩尤就戮更調風雨宰制同造化之功生靈荷魂魄之賜萬方欣戴九服謳謌乃允答天人祗膺揖讓升泰壇而禮上帝坐明堂而朝羣后昔軒轅顓頊建國不同大昊少昊邦畿各異舜改堯都夏遷虞邑厯選前辟義存創造惜十家之産愛兆民之力經始帝居不移天府規模紫極仍據皇圖下宇上棟務存卑儉右平左墄聿遵制度朝夕正殿不别起于鴛鸞升降靈臺豈更營于鳷鵲憂勞庶績矜育蒼生念茲在茲發於寤寐棘林肺石特降皇情祝泣辜深存寛簡草纓知恥畫服興慙天無入牢之星地絶城牛之氣延閣廣内考集羣典石渠璧水闡揚儒業綴五禮於將壞正六樂於已崩總章溺志之音大師咸功之頌承華養徳作貳東朝外正萬邦内𢎞}
  - {type: page-break, offset: 6, content: '', id: KR5h0056_WYG_003-4b, image: WYG1055/WYG1055-0409b.png}
