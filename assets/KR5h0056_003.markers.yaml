  - {type: variant, offset: 16, length: 0, content: '', WYG: 五千餘矣今道家相傳謂老子為五千丈蓋舉其全數也見老君實録杜光庭云五千餘言亦不定其數文質相半義理兼通局字數而妨文剪文勢而就數皆失其㫖也司馬遷云五千餘言則不定指五千字矣其有刪文約數俯就四千九百九十九言而云析三十輻字為三十以滿五千字此又膠柱刻舟執迷不通也杜光庭箋註六十餘家則有節解上下老君與尹喜解内解上下尹喜以内修之㫖解注想爾二卷三天法師張道陵所注河上公章句漢文帝時降居陜州河濵今有廟見存嚴君平指歸十四卷漢成帝時蜀人名遵山陽王弼注字輔嗣魏尚書郎南陽何晏字平叔魏駙馬都尉河南郭象字子𤣥魏晉閒人潁川鍾㑹字士季魏明帝時人隱士孫登字公和魏文明二帝時人晉僕射太山羊祜字叔子注四卷沙門鳩摩羅什本西胡人苻堅時自玉門闗入中國注二卷沙門佛圖澄後趙時西國胡僧注上下二卷沙門僧肇晉人注四卷梁隱居陶𢎞景武帝時人貞白先生注四卷范陽盧裕後魏國子博士一名白頭翁注二卷劉仁㑹後魏伊州梁縣人注二卷呉郡徴士顧歡字景怡南齊博士注四卷松靈仙人隱青溪山無名氏年代晉人河東裴楚恩注二卷秦人京兆杜弼注二卷宋人河南張憑字長宗明帝太常博士注四卷梁武帝注道徳經四卷梁簡文帝作道徳述義十卷清河張嗣注四卷不知年代梁道士臧𤣥静字道宗作疏四卷梁道士孟安排號大孟作經義二卷梁道士孟智周號小孟注五卷梁道士竇略注四卷與武帝羅什所宗無異陳道士諸糅作𤣥覧六卷隋道士劉進喜作疏六卷隋道士李播注上下二卷唐太史令傅奕注二卷併作音義唐魏徴作義五卷太宗相法師宗文明作義五卷胡超義疏十卷道士安丘作指歸五卷道士王𤣥辯作河上公釋義十卷諫議大夫肅明觀主尹愔作新義十五卷道士徐邈注四卷直翰林道士何思逺作指趣二卷𤣥示八卷衡嶽道士薛季昌作金繩十卷事數一卷洪源先生王鞮注二卷𤣥珠三卷口訣二卷法師趙堅作講疏六卷太子司議郎楊上善髙宗時人作道徳集注真言二十卷吏部侍郎賈至作述義十一卷金鈕一卷道士車若弼作疏七卷任真子李榮注上下二卷成都道士黎元興作注義四卷太原少尹王光庭作契源注二卷道士張惠超作志𤣥疏二卷龔法師作集解四卷通義郡道士任太𤣥注二卷道士沖虛先生殿中監申甫作疏五卷岷山道士張君相作集解四卷道士成𤣥英作講疏六卷漢州刺史王真作論兵述義上下二卷道士符少明作道譜策二卷𤣥宗皇帝所注道徳經上下二卷講疏六卷河上公嚴君平皆明理國之道松靈仙人魏代孫登梁朝陶隱居南齊顧歡皆明理身之道苻堅時羅什后趙圖澄梁武帝梁道士竇略皆明事理因果之道梁朝道士孟智周臧𤣥静陳朝道士諸糅隋朝道士劉進喜唐朝道士成𤣥英蔡子晃黄𤣥賾李榮車𤣥弼張恵超黎元興皆明重𤣥之道何晏鍾㑹杜元凱王輔嗣張嗣羊祜盧氏劉仁㑹皆明虗極無為理家理國之道此明注解之人意不同也又諸家稟學立宗不同嚴君平以虗𤣥為宗顧歡}
