  - {type: variant, offset: 93, length: 0, content: '', WYG: 不足可依山臣鴻一敢以忠信奉見見舊唐書隱傳宗元先生呉筠魯中之儒士也入嵩山為道士久之遊天台𤣥宗遣使徴之既至問以道法對曰道法之精無如五千言其諸枝詞蔓說徒費紙劄耳見舊唐書隱傳新書本傳云帝嘗問道對曰深於道者無如老子五千文其餘徒喪紙劄耳復問神仙冶煉曰此野人事積嵗月求之非人主宜留意與舊唐書少異故併録之秦系㑹稽人天寶末避亂剡溪客泉州南安有大松百餘系結廬其上穴石為硯註老子彌年不出人號其所居為高士峰唐憲宗顧宰臣曰神仙之事信乎李藩對曰神仙之說出於道家道家所宗老子五千文為本老子指歸與經無異彼代好怪之流假託老子神仙之說故秦始皇漢武帝二主受惑卒無所得上深然之見舊唐書憲宗紀唐相陸希聲著道徳經傳四卷其序略云夫老氏之術道以為體名以為用無為無不為}
  - {type: page-break, offset: 93, content: '', id: KR5h0056_WYG_003-21a, image: WYG1055/WYG1055-0417c.png}
  - {type: page-break, offset: 93, content: '', id: KR5h0056_WYG_003-21b, image: WYG1055/WYG1055-0417d.png}
  - {type: variant, offset: 94, length: 1, content: 亂, WYG: 格於皇極者也楊朱宗老氏}
  - {type: variant, offset: 96, length: 1, content: 首, WYG: 體失於不及以至於貴身賤物莊周述老氏之用失於太過故欲絶聖弃智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流於虛無放誕此六子者皆老氏之罪人}
  - {type: page-break, offset: 96, content: '', id: KR5h0056_WYG_003-22a, image: WYG1055/WYG1055-0418a.png}
  - {type: variant, offset: 98, length: 2, content: 前識, WYG: 乃為述傳以暢宗㫖又云昔伏羲氏畫八卦象萬物窮性命之理順道徳之和老氏先天地本隂陽推性命之極原道徳之奥此與伏羲同其原也文王觀太易九六之動貴剛尚變而要之以中老氏察太易七八之正致柔守静而統之以大此與文王通其宗也孔子祖述堯舜憲章文武導斯民以仁義之教老氏擬議伏羲彌綸黄帝冒天下以道徳之化此與孔子合其權也此三君子}
  - {type: page-break, offset: 98, content: '', id: KR5h0056_WYG_003-22b, image: WYG1055/WYG1055-0418b.png}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 聖人之極也老氏皆變而通之反而合之研至變之機探至精之歸斯可謂至神者矣唐兵部郎李約勉之子也注道徳經四卷其說謂世傳此書為神仙虛無言又詆太史遷先黄老而後六經之失此流俗之言也以我觀之六經乃黄老之枝葉爾開元初詔中書令張說舉能治易老莊者集賢直學士侯行果薦㑹稽康子元及平陽敬㑹真於說說籍以聞並得侍讀俄並兼集賢侍講學士始行果㑹真及長樂馮朝隱同進講能推索老莊秘義㑹真亦善老子每啟篇先熏盥乃讀見新唐書儒學傳李衛公徳裕諫敬宗捜訪道士疏曰臣聞}
  - {type: page-break, offset: 101, content: '', id: KR5h0056_WYG_003-23a, image: WYG1055/WYG1055-0418c.png}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 高者莫若廣成𤣥元人之聖者莫若軒皇孔子㫺軒皇問廣成子理身之要廣成子云無視無聽抱神以静形將自正神將自清無勞子形無揺子精乃可長生又云得吾道者上為皇下為王𤣥元語孔子云去子之驕氣與多慾態色與淫志是皆無益于子之身吾所告子若是已故軒皇發謂天之嘆孔子興猶龍之感前聖於道不其至乎若使廣成𤣥元混迹而至語陛下之道以臣度思無出於此見李文饒集香山白文公居易曰夫欲使人情儉樸時俗清和莫先於體黄老之道也其道在乎尚寛簡務儉素不眩聰察不役智能而已盖善用之者雖一邑一郡一國至于天下皆可以致清静之理焉㫺宓賤得之故不下堂而單父之人化汲黯得之故不出閣而東海之政成曹參得之故獄市勿擾齊國大和漢文得之故刑罰不用而天下大理其故無他清静之所致耳見白氏長慶集張薦明少以儒學遊河朔後去為道士通老子莊周之說晉高祖召見問道家可以治國乎對曰道也者妙萬物而為言得其極者尸居袵席之間可以治天下高祖大其言延入内殿講道徳經拜以為師賜號通𤣥先生後不知所終見五代史一行傳太祖征太原駐蹕鎮陽聞道士蘇澄隱五代之際屢聘不至召見于行宫澄隱時年八十太祖問以養生對曰臣養生不過精思鍊氣爾帝王則異於是老子曰我無為而民自化我無欲而民自樸無為無欲凝神泰和昔黄帝唐堯享國永秊得此道也太祖說其言見東都事略隱傳及高道傳宋太宗語近臣曰朕讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以為規戒鴻濛子張無夢字靈隱好清虚窮老易入}
  - {type: page-break, offset: 103, content: '', id: KR5h0056_WYG_003-23b, image: WYG1055/WYG1055-0418d.png}
