  - {type: variant, offset: 4307, length: 0, content: '', WYG: 一章自清浄寡欲之外别無一語他及如何鑿空妄云有藥有仙及祈禳勝厭等事邪恭䝉聖諭以某言為是且明誦白詩上語全文益深嘉居易之談老子能得要妙也並見本集永嘉鄭伯熊景望曰葢公治黄老曹相國參用於齊而稱治儒家多訾黄老言何哉吾嘗杜門終日黙坐謹動作薄滋味而心和氣平百病不侵節以備其無推以散其有不妄求不過憂而老}
  - {type: page-break, offset: 4307, content: '', id: KR5h0056_WYG_003-50b, image: WYG1055/WYG1055-0432b.png}
  - {type: variant, offset: 4308, length: 0, content: '', WYG: 穉者安於恬淡嘗意此理推}
  - {type: variant, offset: 4309, length: 301, content: 中闕一自擬其㫖微矣然聖人無生非故薄之也本無生也昔人云愛生者可殺也愛潔者可污也愛榮者可辱也愛完者可破也本無生孰殺之本無潔孰污之本無榮孰辱之本無完孰破之知此者可以出入造化遊戲死生道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有爲而不恃長而不宰是謂玄德畜許六反夫音符長上聲下同蘇註道者萬物之母故生萬物者道也及其運而爲德牧養羣衆而不辭故畜萬物者德也然而道德則不能自形因物而後形見物則不能自成遠近相取剛柔相交積而爲勢而後興亡治亂之變成矣形雖由物成雖由勢而非道不生非德不畜是以尊道而貴德尊如父兄貴如侯王道無位而德有名故也恃爵而後尊貴者非實尊貴也, WYG: ''}
