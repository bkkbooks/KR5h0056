  - {type: variant, offset: 5566, length: 813, content: 所及知也然安知聖人以天下觀天下亦若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳含德之厚比于赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不嗄和之至也知和曰常知常曰眀益生曰祥心使氣曰强物壯則老謂之不道不道早已毒蟲蜂蠆之類以尾端肆毒曰螫猛獸虎豹之類以爪按拏曰據攫鳥鵰鶚之類以羽距擊觸曰搏趙志堅曰以四指握拇指爲握固䘒子垂反說文云赤子隂也號平聲嗄所嫁反聲嘶也又啼極無聲曰嗄一作嗌不嗄黄茂材云古本無嗌字嗌不嗄莊子之文後人增入之祥吉凶之候也蘇註老子之言道德每以嬰兒况之者皆言其體而已未及其用也夫嬰兒泊然無欲其體則至矣然而物來而不知應故未可以言用也道無形體物莫得而見也况可得而傷之乎人之所以至于有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所以至此者唯無心也無執而自握無欲而自作是以知其精有餘而非心也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常生不可益而欲益之則非其正矣氣惡妄作而又以心使之則强梁甚矣益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣知者不言言者不知塞其兊閉其門挫其銳解其紛和其光同其塵是謂玄同不可得而親不可得而踈不可得而利不可得而害不可得而貴不可得而賤故爲天下貴蘇註道非言說亦不離言說然能知者未必言能言者未必知唯塞兊閉門以杜其外挫銳解紛和光同塵以治其内者默然不同而與道同也可得而親則亦可得而䟽可得而利則亦可得而害可得而貴則亦可得而賤體道者均覆萬物而孰爲親䟽等觀逆順而孰爲利害不知榮辱而孰爲貴賤情計之所不及此所以爲天下貴也以正治國以竒用兵以無事取天下吾何以知天下之然哉天下多忌諱而民彌貧民多利器國家滋昏人多技巧竒物滋起法令滋章盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸蘇註, WYG: ''}
