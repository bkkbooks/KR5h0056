  - {type: substitution, offset: 6412, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
  - {type: variant, offset: 6424, length: 4, content: 天下神器, WYG: 乎世固未知無為之有益也然則韓氏曷為愛之曰順而達者帝王之政也逆而能忍者黄老之術也順而達則以不忍之心行不忍之政是故順事恕施而後四達不禦其效非可以旦夕責也逆而能忍者不見可欲是也是故無政不達而亦無心可推無民不安而亦無賢可尚如是而已矣此至易至之道而一切急功利者之所尚也而一切功利者欲效之而不得是故不忍於無欲而忍於好殺不忍以已而忍以人不忍於忍而忍於不忍學者不察遂疑其原從而曰道徳之禍其後為申韓也如此夫道徳之後為申韓固矣獨不曰仁義之後其禍為弑乎古今學術亦多矣一再傳而遂失之其害}
