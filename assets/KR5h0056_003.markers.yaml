  - {type: variant, offset: 1318, length: 0, content: '', WYG: 涕唾津液歸於水暖氣歸火動轉歸風而以為其人真死矣然不知湛然常存未嘗死也見谿堂集道鄉鄒忠公浩曰𤣥牝}
