  - {type: variant, offset: 2043, length: 216, content: 死吾將以爲教父凡動物背止於後隂靜也耳目口鼻居前陽動也故曰負隂抱陽植物則背寒向暖而沖氣運乎其間木絶水曰梁木負棟亦曰梁取其力之强也故曰强梁金人銘曰强梁者不得其死好勝者必遇其敵蓋古人嘗以此爲教而我亦教之但老子獨尊之曰教父如言萬物之母之謂母主養父主教故言生則曰母言教則曰父蘇註夫道非一非二及其與物爲偶道一而物不一故以一名道然而道則非一也一與一爲二二與一爲三自是以徃而萬物生物雖有萬不同而莫不負隂抱陽沖氣以爲和者蓋物生于三而三生于一理之自然也, WYG: 實憂}
