  - {type: variant, offset: 232, length: 1, content: 異, WYG: 治齊}
  - {type: variant, offset: 234, length: 9, content: 仁以無以爲爲勝義以, WYG: 治天下天下至今稱賢焉吾為膠西守知公之為邦人也求其墳墓子孫而不可得慨然懷之師其言想見其為人夫曹參為漢宗臣而蓋公為之師可謂盛矣而史不記其所終豈非古之至人得道而不死者歟見本集蘇子由自題老子解後云予年四十}
  - {type: substitution, offset: 238, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3592}}
