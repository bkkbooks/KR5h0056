  - {type: line-break, offset: 2334, content: '', id: KR5h0056_HFL_003-009a02}
  - {type: variant, offset: 2334, length: 0, content: '', WYG: 言今除去又不知何人不審正文前後本意分為八十一章惟務其華圖象陽數此皆戱論無}
  - {type: variant, offset: 2335, length: 0, content: '', WYG: 於人今亦除去此書箋注者多雖能於理則不中雖辯於事則無法只如注𤣥牝為口鼻是不中理也死之後為涅槃是不中事也如是胸懷臆註語言散失者不欲備舉由其未至於道也孔子志於道縁道無形故據於徳以徳為基本本立而道生以其漸也豈可殢徳而不進道此所謂過其門而不入其室也又多以術為道者認穢汁為精以鈍濁為樸遲速為性拱手不動為無為不食滋味為恬淡儻來適去為自然休妻獨寢為清静如此之徒不可與言至道如抱朴子第八卷云五千文雖出老子然皆汎論較略耳其中了不肯首尾全舉其事有何按據者也葢其人多言房中黄白之術執有為為事將好利淫心測度無為之道是故不知首尾又况不及此子者乎又直以輕舉者為上士修道徳者其次夫舉身隱形變化物象在禁為妖孔子不語怪力亂神以其無益也老子所著長生久視務在進道而不専取且神仙之人居止三山不離於地跨鸞朝帝亦不離}
  - {type: page-break, offset: 2335, content: '', id: KR5h0056_WYG_003-43b, image: WYG1055/WYG1055-0428d.png}
  - {type: page-break, offset: 2335, content: '', id: KR5h0056_WYG_003-44a, image: WYG1055/WYG1055-0429a.png}
