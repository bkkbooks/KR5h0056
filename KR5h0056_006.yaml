front:
  text: 老子翼卷之六轂六光廟在潜邸程文簡公大昌時為宫僚嘗索其所著易老通言大昌以劄子徼納其略曰夫老子之可重者何也秉執樞要而能以道御物是其長也貴無賤有而罕言世故者亦非其或短於此也故師老子而得者為漢文帝蓋其為治大抵清心寡欲而淵默朴厚以涵養天下其非不事事之謂也則漢以大治而基業綿固者得其要用其長故也至於西晋則聞其言常以無為為治本而不知無為者如何其無為也意謂解縱法度拱手無營可以坐治無何紀綱大壞而天下因以大亂故王通論之曰清虛長而晋室亂非老子之罪也蓋不得其要而昧其所長也區區之意深望殿下采其秉要之理而以西漢為法鑒其談治之略而以西晋不事事為戒則老子之精言妙道皆在殿下運用之中矣又嘗著潜藩盛德録內一篇曰某舊得侍談凡及大道常取易繫道器與孔子下學上達之語而參言蓋道器學達可從上下立為形容正如燒火薪能生焰是上形之道必資下形之器學乎下可以達乎上是薪雖粗實而其英華能炎能上者也六經論孟說器多而說道少是蓄薪以求生焰者也老莊之書說無多於說有是謂六經說薪已多不必贅言者也儒者之於求道自有六經宜若無藉於老莊矣然老莊之書言微趣深助發道祕尤為精要苟能博取當大有補特不可如晋人談虛直謂棄捐禮樂刑政而天下可以自治焉耳天下嘗有無薪而能自起火焰者邪又曰今道士修老子教者舍道本不言而及方藥祈禳等事其訛失本意又益太遠惟唐人白居易詩語能明其確曰何況元元皇帝道德五千言不言藥不言仙不言白日升青天元元皇帝即老子也道家以老子為教祖而八十一章自清淨寡欲之外别無一語他及如何鑿空妄云有藥有仙及祈禳勝厭等事邪恭蒙聖諭以某言為是且明誦白詩上語全文益深嘉居易之談老子能得要妙也並見本集永嘉鄭伯熊景望曰蓋公治黃老曹相國參用於齊而稱治儒家多訾黃老言何哉吾嘗杜門終日默坐謹動作薄滋味而心和氣平百病不侵節以備其無推以散其有不妄求不過憂而老者稚者安於恬淡嘗意此理推之天下有餘地何獨數百里之齊孔孟之術豈有外是者而訾黃老言何哉蓋今道家所談清淨者捨此而趨誕也見鄭先生戇語薛蕙君采作老子集解成高叔嗣序之曰毫老子所産也初老子著書言天道玄虛自漢以下莫能遡其本㫖咸窺見一偏說繇此起故其書日離州人薛考功先生始覃思大道之原究意天人之一折衷群言舍於矩度老子之道則燦然大明書成嘉靖九年歲在庚寅之次序曰大道之歸一致而百慮聖人之㫖同情而異言昔仲尼之門罕言天道是以後世無得聞焉然周易乾爻配象六龍始於勿用終於窮亢不以吉凶告人用九見群龍無首則吉而仲尼贊之曰用九天德不可為首也乾元用九乃見天則蓋剛而能柔天之道也此與老子何異故稱吾見老子其猶龍乎夫學者獨患不知天人之一不知天人之一則其議聖人者陋矣自古言仁義禮樂有過於老子者乎然而非不知天也言隂陽剛柔有過於孔子者乎然而非不知人也顧聖人示人有不同其所言者學者之所信也所不言者學者之所疑也故世之學老子者則絀儒學儒學亦絀老子夫知人而不知天者近乎愚知天而不知人者近乎誣奈何以此議聖人也或曰老子養生之書夫聖人之道內之以養其身則壽而康外之以理乎物則順而治聖王之事同條共貫豈有他哉作者既皆已沒景嚮仆絶所謂其人與骨皆已朽者神而明之存乎其人薛氏老子集解二卷藏於家子録其副焉又曰考功薛先生既屏居毫一紀致崇於學庚寅始注老子號曰集解余為序其書刊之甚著先生意未覃盡時復損益丁酉乃成視豫讀之義加精微要以至道協於大中繇漢以來言老子者蓋至是决矣顧世莫有與知老子者又孰以知先生之注序曰始余少讀老子謂猶皇帝王伯之降所言殆上皇事爾朴而不華後世弗能用也誠竊之亦足寡營而致治壯益讀之則見與聖人之道亡抵牾可施於世特其辭所出抑揚已甚驟不能通愚者欲信之助以靈異繇是遂為儒家所詘置為養生之書其徒守之至言湮晦要之古之聖人所學咸修己治人之事或得有淺深見有純駁爾奈何絶去使世諱言之老子之書殆於息矣余懷此意未有以明其後仕都質之今祭酒武城王純父先生孔老所以異奈何純父答之聃與尼父意同而言異彼生於周末覩文之盛也疾欲還之古故激言之激則不能無過中已試言之仲尼曰人而不仁如禮何禮云禮云玉帛云乎哉禮與其奢也寧儉而聃則曰禮者忠信之薄而亂之首也故激如此去仲尼之辭遠矣故尼父之書誦法萬世而聃卒廢而為它也余藏其牘他日仕山西復質之今京尹曹德芳先生其言聖人之言道也猶人之名天也中國謂之天矣彼胸奴則謂之撑犁豈有二哉特其辭異耳天固不自知而人强名之又爭辨之故學者誠求至於道凡支言可忘也達哉言乎蓋二先生皆深於老子者今以觀考功之注尤信易大傳曰天下同歸而殊塗一致而百慮學者習而常聞如不見其同與一獨以其異也遽詆訶之蓋讀其篇未訖往往已驚豈但老子邪嗚呼難言矣百世倘有其人固自知之余何暇置譽毁哉記二先生之語篇首復作序李宏甫刻子由解於金陵題其後曰食之於飽一也南人食稻而甘北人食黍而甘此一南一北者未始相羡也然使兩者易地而食焉則又未始相棄也道之於孔老猶稻黍之於南北也足乎此者雖無羡於彼而顧可棄之哉何也至飽者各足而真饑者無擇也蓋嘗北學而食於主人之家矣其初蓋不知其美也天寒大雨雪三日絶糧七日饑凍困踣望主人而向往焉主人憐我炊黍餉我信口大嚼未暇辨也徹案而後問曰豈稻粱也歟奚其有此美也主人笑曰此黍稷也與稻粱埒且今之黍稷也非有異於向之黍稷者也惟甚饑故甚美惟甚美故甚飽子今以往更不作稻粱想亦不作黍稷想矣豫聞之慨然而嘆使豫之於道若今者之望食則孔老暇擇乎自此發憤學道窮日夜不寢不食而時獲子由老子解於焦弱侯氏解老子者衆矣而子由最高子由之引中庸曰喜怒哀樂之未發謂之中夫未發之中萬物之奧宋自明道以後遞相傳授每令門弟子看其氣象為何如者也子由乃獨得微言於殘篇斷簡之中宜其善發老子之藴使五千餘言爛然如皎日學者斷斷乎不可一日去手也解成示道全當道全意寄子瞻又當子瞻意今去子由五百餘年不意復見此竒特嗟夫亦惟真饑而後能得之也萬曆二年冬十二月二十日宏甫題李宏甫先生既刻子由老子解逾年復自著解老二卷序曰嘗讀韓非解老未始不為非惜也以非之才而卒見殺於秦安在其為善解老也是豈無為之謂哉夫彼以柔弱而此以堅强此勇於敢而彼勇於不敢己方圓冰炭若矣而謂道德申韓宗祖可歟蘇子瞻求而不得乃强為之說曰老子之學重於無為而輕於治天下國家是以仁不足愛而禮不足敬韓非氏得其所以輕天下之術遂至殘忍刻薄而無疑嗚呼審若是則不可以治天下國家者也老子之學果如是夫老子者非能治之而不治乃不治以治之者也故善愛其身者不治身善愛天下者不治天下凡古聖王所謂仁義禮樂者皆非所以治之也而況一切刑名法術歟故其著書專言道德而不言仁義以仁雖無為而不免有為義則為之而有以為又甚矣是故其為道也以虛為常以因為綱以善下不爭為百谷之王以好戰為樂殺人以用兵為不得已以勝為不美以退為進以敗為功以福為禍以得為失以無知為知以無欲為欲以無名為名孰謂無為不足以治天下乎世固未知無為之有益也然則韓氏曷為愛之曰順而達者帝王之愛也逆而能忍者黃老之術也順而達則以不忍之心行不忍之政是故順事恕施而後四達不禦其效非可以旦夕責也逆而能忍者不見可欲是也是故無政不達而亦無心可推無民不安而亦無賢可尚如是而已矣此至易至簡之道而一切急功利者之所尚也而一切功利者欲效之而不得是故不忍於無欲而忍於好殺不忍以己而忍以人不忍於忍而忍於不忍學者不察遂疑其原從而曰道德之禍其後為申韓也如此夫道德之後為申韓固矣獨不曰仁義之後其禍為篡弒乎古今學術亦多矣一再傳而遂失之其害不可勝言者豈少哉獨老子乎由此觀之則謂申韓原道德之意亦奚不可豫性剛使氣患在堅强而不能自克也喜讀韓非之書又不敢再以道德之流生禍也而非以道德故故深有味於道德而為之解並序其所以語道德者以自省焉先生名載贄溫陵人仕至姚安太守請老歸老子考異
