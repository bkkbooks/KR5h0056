body:
  text: 古書傳世為人所竄易者多矣而老子尤甚開元注明言我獨異於人而貴求食於母先無求於兩字豫所加也則後人之妄增而不及自道者可勝言哉史遷言著書五千餘言亦其大率耳妄者至盡削語助之詞以就五千之數是史遷一言為此書禍也薛君采氏作老子集解别為考異一篇附焉顧其所見裁十數本耳余覩卷軸既多異同滋甚其為余所安者已載正經而悉以其餘系之卷末仍名曰考異俟世之好古者參焉弱侯題苐二章斯惡已蘇已作矣皆知善之為善皆上一有天下字故有無相生龍興碑無故字傅奕古本相上並有之字萬物作焉而不辭碑本作作而不為始功成而不居古本作功成不處夫唯不居古本作不處苐三章使心不亂古本作使民心是以聖人之治古本治下有也一無之治使天知者不敢為也一無敢字古本無也字則無不治古本作無不為矣彭耜本無不治矣苐四章沖古本作盅或不盈陸本作不滿開元本蘇本或下有似紛碑本作忿淵兮河上陸兮作乎湛兮似或存碑本無兮或作常一或作若吾不知其誰之子陳碧虛司馬本無之苐五章不屈河上陸作不詘多言碑本作多聞苐六章天地根古本列子並作天地之根苐七章天長地久碑本作天也長久天地所以能長且久黃茂材地下有之碑本無且故能長生碑本作長久非以其無私耶河上陸作以其無私古本非作不苐八章而不爭碧虛司馬曹而作又處衆人之所惡古本處作居故幾於道葉本下有矣善仁古本作善人故無尤一下有矣苐九章持司馬作恃揣而鋭之古本作顓而梲之王弼亦作梲長保碑本作長寶滿堂古本作滿室驕司馬作憍功成名遂身退碑本作名成功遂身退王弼作功遂身退又名作事苐十章抱古本作袌無離乎一無乎下同能嬰兒乎一能下有如生之畜之一無此四字苐十一章埏司馬碧虛作挻苐十三章何謂寵辱若驚一無若驚寵為下碧虛作寵為上辱為下吾以有大患者一無者及吾無身古本作苟吾無身吾有何患古本下有乎故貴以身為天下者可以寄天下愛以身為天下者可以託天下古本作貴以身為天下者則可以託天下矣愛以身為天下者則可以寄天下矣開元本則作若無二矣一寄託下並有於苐十四章此三者一無此故混而為一蘇故下有復古本一下有者上下古本作上之下之繩繩兮一無兮無物之象蘇作無象之象是謂惚恍碑本無四字古本作芴芒執古之道古本道下有可苐十五章豫猶一下並有兮客碑本作容釋碑本作汋敦兮其若朴碑作混若朴曠兮其若谷碑無兮其渾兮其若濁碑本混若濁靜古本上有澄徐清徐生古本二徐上有而安以久邵本安作谷故能敝不新成古本是以能敝而不成碑本李榮本作能敝復成苐十六章觀其復王弼本無其靜曰復命王弼本作是謂復命藝藝莊子作云云各歸其根各下一有復公乃王王乃天碑本作公能生生能天沒身不殆葉本無此苐十七章不知有之一作下知有之親之譽之王弼作親而譽之其次侮之彭本無其次陳作其次畏而侮之信不足有不信王弼有二焉猶兮其貴言王弼作悠兮一無兮碑本作其猶貴言事遂一作各遂皆曰司馬無皆陳蘇曹程黃曰作謂苐十八章廢出古本下並有焉孝慈一作孝子忠臣古本作貞臣苐十丸章此三者以為文不足程無此古本以為文而未足也苐二十章善古本作美荒兮其未央哉碑本作莽其未央古本無哉如享古本作若享如春登臺古如作若一春在登下怕兮古作皆昭昭皆察察悶悶古作閔閔忽若晦寂若無所止晦一作海一作忽兮其若晦飄兮似無所止一作淡兮其若海飂兮若無止一作飄兮其若海飂兮若無所止異於人古本上有欲貴食母開元本作求食于母苐二十一章恍惚古本並作芒芴惚兮恍兮其中有象一其字上無兮字一無其字句末有兮字下同其精甚真碑本無此苐二十二章直古本碑本並作正豈虛言哉古本言下有也苐二十三章故飄風不終朝一無故終古本作崇下同孰為此者天地古本地下有也德者同於德失者同於失古本作從事於德者德者同於德從事於失者失者同於失同於道者道亦樂得之古本無同樂二字下同信不足古本足下有焉苐二十四章跂王弼陸作企其在道也司馬曹陳蘇在並作於物或惡之或一作故不處一處下有也苐二十五章寥兮陸王弼寥作寞强為之名曰大司馬程作强名之曰大域中有四大而王居其一焉作而王處一焉陳無此兩句苐二十六章奈何古本作如之何失根古本碑本作失本諸本作失臣苐二十七章善行古本行下有者下並同善計不用籌策古本作善數者無籌策又策作算是以聖人常善救人故無棄人常善救物故無棄物葉故作而傅奕云古無此獨河上有之善人古本人下有者下同苐二十八章故大制不割古本作大制無割苐二十九章而為之古本下有者天下神器古本上有夫為者碑本者作故下同故物蘇葉黃陳故並作凡詬陸王弼作歔一作噓古本作噤羸古本作銼王作挫載古本作培碑本作接隳古本作墮是以司馬以作故苐三十章大軍之後必有凶年碑本無此果而已古本下有矣取强古本下有焉果而勿强古本上有是一作是謂不道古本碑本並作非道苐三十一章之器一無此二字恬淡為上勝而不美而美之者是樂殺人也夫樂殺人者不可得志於天下矣古本作以恬淡為上故不失也若美必樂之樂之者是樂殺人也夫樂人之殺人者不可以得志於天下矣碑本志作意無矣字言居上勢則以喪禮處之一作言以喪禮處之衆多王弼作之衆古本下有則下同苐三十二章朴雖小天下不敢臣一無朴雖小古本作莫能臣也矦王梁武本陸本古本並作王矦萬物將自賔萬物一作天下自均古本下有焉猶川谷古本猶作由之於二作之與江海古本下有也苐三十三章知人者智古本下有也下並同有力葉無有不失其所邵所下有止苐三十四章泛陸王弼作汜不居碑本作不名有愛養一作衣被可名於小一作可名為小一作可名於小矣下同歸焉古本作歸之不為主為一作知以其不自大古本其下有終苐三十五章執大象古本下有者出口古本碑本口並作言淡乎古本作淡兮苐三十六章歙古本作翕王弼作㒆柔勝剛弱勝强古本勝上有之脫古本作侻邦一作國苐三十七章侯王古本作王矦鎮以一作鎮之以亦將不欲古本亦上有夫不欲以靜一作無欲苐三十八章上德無為而無以為下德為之而有以為古本作上德無為而無不為下德為之而無以為仍之王弼作扔亂之首也愚之始也一無二也處其厚古本四句並作處王弼作處其厚不居其薄處其實不居其華苐三十九章侯王古本作王矦下同天下貞一作正其致之一也開元本無一也萬物得一以生君平本無此並下萬物無以生恐滅十四字矦王無以為貞而貴高將恐蹶一作侯王無以貴高將恐蹶自稱古本作自謂此其古本作是其非乎古本作非歟數輿無輿輿古本作譽一作車碌一作録如玉如古本作若下同落落一作珞珞苐四十一章聞道大笑之古本道下有而故建言一無故有之古本下有曰類一作纇進道若退一在夷道若纇上辱古本作𪑾偷古本作偷渝古本作輸苐四十二章王公以為稱古本作王侯以自稱也人之所教我亦教之古本作人之所以教我亦我之所以教人一作人之所教亦我義教之教父古本作學父苐四十三章無有入於無間古本淮南子並作出於無有入於無間王弼作無有入無間吾是以知無為之有益也一無吾也二字希及之政和本下有矣苐四十四章是故甚愛必大費程本無是故苐四十五章沖古本作盅屈古本作詘清靜為天下正古本為上有以苐四十六章却走馬以糞古本糞作播吳幼清本作以糞車罪莫大於可欲王弼本無此咎莫大於欲得韓非本古本作咎莫僣於欲得故知足之足常足矣司馬無之足又無矣苐四十七章不出户知天下不窺牖見天道古本出户窺牖下俱有可以二字韓非作不出於户可以知天下不窺於牖可以見天道其出彌遠彌古本作下同韓非遠下有不行而知一作不行而至苐四十八章為學為道古本下有二者又損之無之無為而無不為矣古本作無為則無不為故取天下者王弼無故者二字不足以取天下古本作又不足以取天下矣苐四十九章德善矣一作得善一無矣下同惵惵古本作歙歙一下有焉渾其心古本作渾渾焉孩之陸王弼作咳苐五十章人之生動之死地韓非本古本作民之生生而動動皆之死地生生之厚古本下有也夫何故古本下有也無死地古本下有焉苐五十一章夫莫之爵一無夫一作莫之命畜之古本作德畜之亭之毒之一作成之熟之養之古本作蓋之苐五十二章有始古本始下有可得其母得一作知襲常葉作襲裳非苐五十三章而民好徑碧虛司馬蘇林並作民甚好徑資貨有餘古本作貨財一作資財盜竽舊俱作盜夸非道哉一道下有也趙志堅作盜夸非道苐五十四章善建者韓非無者下同子孫祭祀不輟彭耜本孫下有以韓非作子孫以其世世祭祀不絶修之於身一無於下同乃真趙志堅乃作能下同乃餘趙作能有餘修之於邦邦舊俱作國下同何以古本作奚以苐五十五章含德之厚比於赤子古本作含德之厚者比之于赤子也毒蟲古本作蜂蠆䘒古本作脧陸作全至也碧虛蘇曹無也下同而不嗄一作嗌不嗄黃茂材曰古本無嗌後人以莊子之文增入之古本嗄作㱊㱊於由切氣逆也曰强古本作則强是謂古本作謂之不道碑本作非道苐五十六章知者不言古本言下有也不可得而疏不可得而害不可得而賤古本上並有亦苐五十七章以正古本正作政無事達真本事作為吾何以知天下之然哉一作吾何以知其然哉以此民多技巧竒物滋起古本作民多智慧邪事滋起滋彰古本作滋章我無欲而民自朴河上本此下有我無情而民自清苐五十八章悶悶古本作閔閔醇醇古本作偆偆禍兮福所倚福兮禍所伏韓非及古本作禍兮福之所倚福兮禍之所伏人之迷也其日固久矣韓非作人之迷也其故以久矣一作民之迷其日固久劌纂微作穢非苐五十九章莫若嗇若一作如是謂早服謂韓非作以服一作復謂之重積德韓非作是謂重積德則莫知其極莫知其極黃無下四字深根固柢韓非作深其根固其柢柢一作蒂苐六十章治大國韓非作治大國者烹烹不當加火其神不傷人韓下有也聖人亦不傷之韓作不傷民苐六十一章天下之交天下之牝一作天下之交牝以靜為下古本作以其靜故為之下也司馬作以其靜為之下一無此句故大者宜為下一無故一作為之下苐六十二章奧一下有也善人之寶司馬程之下有所加人彭本加於人坐進此道古本作進此道也所以貴此道者何一作何也一無何不曰纂微曹陳曰作日有罪以免邪罪下一有可苐六十三章圖難於其易古本難下有乎下同一無其天下難事難上亦有之下同輕諾多易古本下各有者猶難之程猶作由故終無難古本下有矣苐六十四章易判判一作泮一作破為之於未有古本作為之乎其未有下同豪一作毫九成一作九層千里之行一作百仞之高聖人無為一上有是以一無聖人常於幾成一於下有其則無敗事一下有矣復衆人古本復上有以恃舊並作輔非不敢為一下有也苐六十五章以其智多古本作以其多智也國之賊國之福下古本各有也知此兩者亦楷式古本作常知此兩者亦稽式乃至古本作乃後至一上有然後苐六十六章以其善下之古本下有也以其言下之古本作必以其言下之一作必以言下之下句同民不害古本下有也苐六十七章夫惟大故似不肖清源本無此句其細也夫一無也夫寶而持之一作持而寶之寶一作保慈故能勇古本上有夫器長韓非作事長舍其慈且勇一無其下二句同死矣古本作是謂入死門以戰則勝一作以陳則正以慈衛之葉上有必苐六十八章善為士者不武古本作古之善為士者不武也善勝敵者不爭林希逸本作善勝戰者不與一無敵字古之極古本下有也苐六十九章用兵有言古本下有曰仍無敵執無兵古本作執無兵仍無敵王弼作扔輕敵古本作無敵輕敵幾喪吾寶古本作無敵則幾亡吾寶抗兵相加哀者勝矣古本作抗兵相若則哀者勝矣苐七十章天下莫能知莫能行古本作而人莫之能知莫之能行不我知也一無也則我貴矣一作則我者貴被褐一作披褐一褐下有而苐七十一章上古本作尚矣病古本作病矣聖人之不病也以其病病是以不病韓非作聖人之不病也以其不病是以無病也苐七十二章大威至矣一作則大威至無狹一作無狎夫唯不厭吳幼清作夫唯不狎苐七十三章此兩者一此上有知字非繟一作坦一作默苐七十四章民不畏死一民下有常吾得執而殺之孰敢古本作吾得而殺之孰敢也一得作豈而代司殺者而一作夫是代大匠斫是下一有謂希不自傷其手矣一作希有不傷手矣一作希不傷其手矣苐七十五章民之饑古本下有者下二句同食稅之多也一無也下同以其生生之厚也一作以其上求生之厚唯無以生為者一上有夫一為下有貴貴生政和本下有也苐七十六章草木一上有萬物二字柔脆脆一作弱之徒古本下有也下句同兵强古本下有者共一作折强大處下古本作故堅强處下苐七十七章其猶張弓乎古本作其猶張弓者歟邵猶作由非補之一作與之孰能有餘以奉天下唯有道者古本作孰能損有餘而奉不足于天下者其唯有道者乎功成而不居作功成不處見賢耶一無耶苐七十八章天下莫柔弱於水一作天下柔弱莫過於水能先先一作勝以其無以易之也一無以也柔之勝剛弱之勝强一上有故無二之莫不知莫能行古本作莫不知而莫之能行故聖人云故一作是以古本人下有之言是謂一作是為若反古本下有也苐七十九章和大怨一下有者必有餘怨一無必故有德司契一無故苐八十章使民有什伯之器一無民一作什伯人之器而不用一下有也使民重死而不遠徙葉本無此句甘其食古本上有至治極民各六字安其俗俗一作居樂其業業一作俗音一作聲使民至一無使而不相往來一無而相下有與苐八十一章善者不辨辨者不善古本作善言不辨辨言不善不積不一作無天之道一無之老子翼卷之六終
  hash: sha256:ddfdea3d743eeb4d2fe870bc376876592e7433a2d4971098cba034907f426846
