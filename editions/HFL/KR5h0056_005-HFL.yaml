front:
  text: 老子翼卷之五轂五
  hash: sha256:fbc6671e8715b02359570bed54c98231eaacf16d685166c21e3f1a27372cdee1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0056_HFL_005-001a, image: hfl/1116/1116-105.png}
body:
  text: 附錄史記老子列傳曰老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽謚曰聃周守藏室之史也孔子適周將問禮于老子老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬累而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以爲罔游者可以爲綸飛者可以爲矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪老子脩道德其學以自隱無名爲務居周久之見周之衰迺遂去至關關令尹喜曰子將隱矣彊爲我著書於是老子迺著書上下篇言道德之意五千餘言而去莫知其所終或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時云蓋老子百有六十餘歲或言二百餘歲以其脩道而養壽也自孔子死之後百二十九年而史記周太史儋見秦獻公曰始秦與周合而離離五百歲而復合合七十歲而霸王者出焉或曰儋即老子或曰非也世莫知其然否老子隱君子也老子之子名宗宗爲魏將封於段干宗子注注子宫宫玄孫假假仕於漢孝文帝而假之子解爲膠西王卬太傅因家於齊焉世之學老子者則絀儒學儒學亦絀老子道不同不相爲謀豈謂是邪李耳無爲自化清淨自正隋薛道衡老子廟碑曰自太極權輿上元開闢舉天維而懸日月横地角而載山河一消一息之精靈上生下生之氣候固以財成庶類亭毒羣品有人民焉有君長焉至若上皇邃古夏巢冬穴靜神習智鶉居鷇飲大禮與天地同節非折疑於俎豆大樂與天地同和豈考擊於鍾鼓逮乎失道後德失德後仁皇王有步驟之殊民俗有淳醨之變於是儒墨爭騖名法並馳禮經三百不能檢其情性刑典三千未足息其奸宄故知潔其流者澄其源直其末者正其本源源本本其惟大道乎老君感星載誕莫測受氣之由指樹爲姓未詳吹律之本含靈在孕七十餘年生而白首自以老子爲號其狀也三門雙柱表耳目之竒蹈五把十影手足之異爰自伏羲至於周氏綿祀歷代見質變名在文王武王之時居藏史柱史之職南朝屢易容貌不改宣尼一覩嘆龍德之難知關尹四望識眞人之將隱乃發揮衆妙著書二篇率性歸道以無爲用其辭簡而要其㫖深而遠飛龍成卦未足比其精微獲麟筆削不能方其顯晦用之治身則神清志靜用之治國則反樸還淳既而鍊形物表卷迹方外蜺裳鶴駕徃來紫府金漿玉酒讌衍清都參日月之光華與天地而終始涉其流者則擯落囂塵得其門者則騰驤雲霧大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測盛矣哉固無德而稱也莊周云老聃死秦佚弔之三號而出是謂遯天之形雖復傲吏之寓言抑亦蟬蛻之微㫖皇帝誕靈縱叡接統膺期照春陵之赤光發芒山之紫氣珠衡月角天表冠於百王明鏡衢罇聖德會於千祀周道云季多難在時九鼎共海水同飛兩日與洛川俱斷天齊地軸之所蛇食鯨吞銅陵玉壘之區狼顧鴟跱黄延奸宄鄭阻兵禍大縱毒螫將遍函夏神謀内斷靈武外馳應攙搶而掃除仗旄鉞而斬伐共工既翦重立乾坤蚩尤就戮更調風雨宰制同造化之功生靈荷魂魄之賜萬方欣戴九服謳謌乃允答天人祗膺揖讓升泰壇而禮上帝坐明堂而朝群后昔軒轅顓頊建國不同大昊少昊邦畿各異舜改堯都夏遷虞邑歷選前辟義存創造惜十家之産愛兆民之力經始帝居不移天府規模紫極仍據皇圖下宇上棟務存卑儉右平左墄聿遵制度朝夕正殿不别起于鴛鸞升降靈臺豈更營于鳷鵲憂勞庶績矜育蒼生念兹在兹發於寤寐棘林肺石特降皇情祝網泣辜深存寬簡草纓知恥畫服興慙天無入牢之星地絶城牛之氣延閣廣内考集群典石渠壁水闡揚儒業綴五禮於將壞正六樂於已崩緫章溺志之音大師咸功之頌承華養德作貳東朝外正萬邦内弘三善兩離炳耀重日垂明永固洪基克隆鼎祉重以維城磐石多藝多才良佐寳臣允文允武爲王室之蕃屏成神化之丹青致世俗於潤塗納烝民於壽域旄頭垂象窮髮成形獯獫作患其來久矣無上筭以制之用下策而難服自我開運耀德戢兵感義懷仁稱藩請朔稽顙款塞匍匐投掌䍧牱夜郎之所靡漠桑榆之地咸被聲教並入提封閩越勾吴不愆貢職夫餘肅愼無絶夷邸遐邇禔福文軌大同自三代之餘六雄競逐秦居閏位漢雜霸道魏氏則虐深華夏有晋則化成夷狄降斯以後粹駁不分帝迹皇風寂寥千載天命聖德會昌神道變億兆之視聽復三五之規模固以幽明贊恊符瑞彪炳千年靈蔡著天性以效徵三足神烏感陽精而表質春泉如醴出自京師秋露凝甘徧於竹葦星光若月云氣飛煙三農應銅爵之鳴五緯叶珠囊之度信可以揚鑾動蹕肆覲東后玉檢金繩登封岱岳而謙以自牧爲而不宰尚寢馬卿之書未允梁松之奏在青蒲之上常若乘奔處黄屋之下無忘夕惕雖蒼璧黄琮事天事地南正火正屬神之禔猶恐祀典未弘秩宗廢禮永言仁里尚想玄極壽宫靈座麋鹿徙倚華蓋罽壇風霜凋弊乃詔上開府儀同三司毫州刺史武陵公元胄考其故迹營建祠堂皇上徃因歷試緫斯蕃部猶漢光司隸之所魏武兖州之地對苦相之兩城繞渦穀之三水芝田柳路北走梁園沃野平皋東連譙國望水置槷揆景瞻星擬玄圃以䟽基横玉京而建宇雕楹畫栱磊砢相扶方井圓洲參差交映尊容肅穆仙衛儼而無聲神館虛閑泊瀝降而成嚮清心潔行之士存玄守一之儔四方輻凑千里波屬知如在之敬申醮祀之禮顯仁助於王者冥福資於黎獻允所謂天大道大難幾者矣若夫名言頓絶幽泉之路莫開形器不陳妙物之功難著騰茂實飛英聲圖丹青鏤金石不可以已而在兹乎歲次敦牂律中姑洗大隋馭天下之六載也乃詔下臣建碑作頌其詞曰悠哉振古邈矣帝先四紀維地八柱承天叢生類聚廣谷大川至道靈運神功自然五精應感三微相繼樹以司牧執其象契帝迹慙皇王猷謝帝上德逾遠淳風漸替時乖澹泊俗異沖和尚賢飾智懸法張羅内修尊俎外事干戈魚驚網宻鳥亂弓多眞人出世星精下斗龍德在躬鶴髮垂首解紛挫銳去薄歸厚日角月角天長地久小兹五嶽隘此九州逝將高蹈超然遠遊青牛已駕紫氣光浮玄門洞啓神化潜流賴鄉舊里渦川遺迹古徃今來時移世易靈廟凋毁祠壇虛寂九井生桐雙碑碎石維皇受命乃神乃聖響發地鍾光垂天鏡宇宙開朗妖氛蕩定曜魄同尊參神取正流沙蟠水鳳穴龜林異類歸款萬方宅心鴻盧納賮王會書琛青雲千吕薰風入琴化致鼎平家興禮讓永言柱下猶慙太上乃建清祠式圖靈狀原隰爽塏亭臯彌望梅梁桂棟曲檻叢楹煙霞舒卷風務凄清仙官就位羽客來庭穰穰簡簡降福明靈至神不測理存繫象大音希聲時振高響遐邇讚頌幽明資仰敬刊金石永播天壤敬叔師仲尼仲尼謂敬叔曰吾聞老聃愽古而通今通禮樂之原明道德之歸則吾師也敬叔言於魯君曰孔丘聖人之後將達者也受先臣之命屬臣則必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君盍以車乘賚之臣請與徃魯君與車一乘二馬二竪子敬叔俱至周問禮於老聃訪樂於萇弘歷郊杜之所考明堂之則察朝廷之度觀明堂四門之墉有堯舜桀紂之象各有善惡之狀興廢之戒焉又有周公相成王抱之而負斧扆南面以朝諸侯之圖嘆曰吾乃今知周公之聖與周之所以王也將去周老子送之曰富者送人以財仁者送人以言吾竊仁者之號送子以言凡當世之士聦明深察而近於死者好議人之非者也愽辨閎大而危其身者好發人之惡者也爲人臣者無以有己爲人子者無以有己自周反魯道彌尊遠方弟子之進者蓋三千焉孔子歎曰自南宫敬叔之乘吾車吾道加行不然吾道幾廢矣今禮記所引吾聞諸老聃皆是孔子問老子而得其禮之要也王子季拾遺記曰老君居景室之山與世人絶迹唯老叟五人或乘鳴鶴或著羽衣共譚天地之數所撰經書垂十萬言有浮提國獻善書二人乍老乍少隱形則出影聞聲則藏形時出金壺器中有黑汁狀若淳漆洒木石皆成篆隸科斗之字記造化人倫之始老君所撰經皆寫以玉牒級以金繩貯以玉函及金壺汁盡二人乃欲刳心瀝血以代墨焉此乃洛州景山太室少室也所說九變長生等經有百萬篇多藏名山石室秘而未行今所出者約六千卷關尹子尹喜仕周昭王爲大夫善天文豫占東南眞氣狀若龍蛇而西是月融風三扇天理西行知有聖人度關乞出爲函谷關令昭王癸丑五月壬午紫氣浮空有老人駕青牛白畚車諸子驂乘徐甲爲御將度關喜迎拜下風則老子也喜曰大道將隱强爲我著書遂館終南艸樓師事之明年甲寅授道德五千餘言包絡天地玄同造化君臣民物罔不賅備尊道德小仁義所以尊皇帝小王伯大抵以明天道明人道正君心正民心其曰以正治國以竒用兵曰偏將軍居左上將軍居右凡數章頗類褒貶五伯之風學者疑昭王時伯業未著或指授經爲敬王時殊不知夏商之衰昆吾大彭豕韋已自稱伯觀昭王江上不返固不待齊楚秦晋之出而伯者之風亦已見矣此老聖著道德所以兼功力而言也按乾象河鼓三星主天子三軍中星大將軍左星左將軍右星右將軍夏官上大司馬王五軍大國三軍已載之周禮及考穆王内傳言王西還上終南修草樓則知授經爲昭王時明矣關尹亦自著書九篇名關尹子自時其徒晋公孫辛鈃字計然學於老子敬王二年壬午南遊楚平王禮聘問道既而適越范蠡師之授蠡書十二篇名文子有平王問道章句踐位以大夫越伐吴蠡諫曰兵凶器戰逆德隂謀逆德好用凶器上帝禁之行將不利引文子語也句踐不聽敗於夫椒囚石室賂太宰嚭得歸嘗膽圖報吴既治計然曰勾踐長頸鳥喙可與共患難不可與共安樂蠡用其策從五湖遊計然亦佯狂遯封禺之地嘗登山籌隱今吴興計籌山是也列御寇居鄭圃四十年人無識者安王四年著書八篇明老子之道莊周字子休號南華子顯王三十年楚聘爲相不就隱濠上漆園著書五十三篇名莊子今存三十三篇若夫庚桑楚南榮趎崔瞿柏矩士成綺尹文子之徒皆當時師事老子傳其道各有著述載在典籍然老子遊歷商周亦已久矣其親見猶龍如孔子者可無若人自司馬遷以老韓同傳而老氏之門人失紀遂使孔老通家之學後世無傳焉惜哉老子之稱經自漢景帝始也吴闞澤對大帝曰許成子原陽子老子莊子皆修身自玩放暢山谷縱汰其心學歸澹泊至漢景帝以黄子老子義體尤深改子爲經始立道學勅令朝野悉諷誦焉班固載老子鄰氏有傳傅氏徐氏劉向皆有說傅氏三十七篇鄰氏四篇徐氏六篇劉向四篇惜乎其書之亡久矣今世所傳老子道德經或緫爲上下二篇或分八十一章或七十二章河上公分八十一章以上經法天天數竒故有三十七章下經法地地數偶故有四十四章嚴遵乃以隂道八陽道九以人行九故七十二章上四十章下三十二章全與河上公不合本既各異說亦不同蓋莫得而考也觀復高士謝守灝曰道德經唐傅奕考覈衆本勘數其字云項羽妾本齊武平五年彭城人開項羽妾塚得之安丘望之本魏太和中道士寇謙之得之河上丈人本齊處士仇嶽傳之三家本有五千七百二十二字與韓非喻老相參又洛陽有官本五千六百三十五字王弼本有五千六百八十三字或五千六百一十字河上公本有五千三百五十五字或五千五百九十字並諸家之注多少參差然歷年既久各信所傳或以他本相參故舛戾不一史記司馬遷云老子著書言道德之意五千餘言但不滿六千則是五千餘矣今道家相傳謂老子爲五千文蓋舉其全數也見老君實録杜光庭云五千餘言亦不确定其數文質相半義理兼通局字數而妨文剪文勢而就數皆失其㫖也司馬遷云五千餘言則不定指五千字矣其有删文約數俯就四千九百九十九言而云析三十輻字爲三十以滿五千字此又膠柱刻舟執迷不通也杜光庭箋註六十餘家則有節解上下老君與尹喜解内解上下尹喜以内修之㫖解注想爾二卷三天法師張道陵所注河上公章句漢文帝時降居陜州河濱今有廟見存嚴君平指歸十四卷漢成帝時蜀人名遵山陽王弼注字輔嗣魏尚書郎南陽何晏字平叔魏駙馬都尉河南郭象字子玄魏晋間人潁川鍾會字士季魏明帝時人隱士孫登字公和魏文明二帝時人晋僕射太山羊祜字叔子注四卷沙門鳩摩羅什本西胡人苻堅時自玉門關入中國注二卷沙門佛圖澄後趙時西國胡僧注上下二卷沙門僧肇晋人注四卷梁隱居陶弘景武帝時人貞白先生注四卷范陽盧裕後魏國子愽士一名白頭翁注二卷劉仁會後魏伊州梁縣人注二卷吴郡徵士顧歡字景怡南齊愽士注四卷松靈仙人隱青溪山無名氏年代晋人河東裴楚恩注二卷秦人京兆杜弼注二卷宋人河南張憑字長宗明帝太常愽士注四卷梁武帝注道德經四卷梁簡文帝作道德述義十卷清河張嗣注四卷不知年代梁道士臧玄靜字道宗作䟽四卷梁道士孟安排號大孟作經義二卷梁道士孟智周號小孟注五卷梁道士竇略注四卷與武帝羅什所宗無異陳道士諸糅作玄覽六卷隋道士劉進喜作䟽六卷隋道士李播注上下二卷唐太史令傅奕注二卷併作音義唐魏徵作義五卷太宗相法師宗文明作義五卷胡超義䟽十卷道士安丘作指歸五卷道士王玄辨作河上公釋義十卷諫議大夫肅明觀主尹愔作新義十五卷道士徐邈注四卷直翰林道士何思遠作指趣二卷玄示八卷衡嶽道士薛季昌作金繩十卷事數一卷洪源先生王鞮注二卷玄珠三卷口訣二卷法師趙堅作講䟽六卷太子司議郎楊上善高宗時人作道德集注眞言二十卷吏部侍郎賈至作述義十一卷金鈕一卷道士車若弼作䟽七卷任眞子李榮注上下二卷成都道士黎元興作注義四卷太原少尹王光庭作契源注二卷道士張惠超作志玄䟽二卷龔法師作集解四卷通義郡道士任太玄注二卷道士沖虛先生殿中監申甫作䟽五卷岷山道士張君相作集解四卷道士成玄英作講䟽六卷漢州刺史王眞作論兵述義上下二卷道士符少明作道譜策二卷玄宗皇帝所注道德經上下二卷講䟽六卷河上公嚴君平皆明理國之道松靈仙人魏代孫登梁朝陶隱居南齊顧歡皆明理身之道符堅時羅什後趙圖澄梁武帝梁道士竇略皆明事理因果之道梁朝道士孟智周臧玄靜陳朝道士諸糅隋朝道士劉進喜唐朝道士成玄英蔡子晃黄玄賾李榮車玄弼張惠超黎元興皆眀重玄之道何晏鍾會杜元凱王輔嗣張嗣羊祜盧氏劉仁會皆明虛極無爲理家理國之道此眀注解之人意不同也又諸家禀學立宗不同嚴君平以虛玄爲宗顧歡以無爲爲宗孟智周臧玄靜以道德爲宗梁武帝以非有非無爲宗孫登以重玄爲宗宗㫖之中孫氏爲妙矣廣川董逌藏書志云唐玄宗既注老子始改定章句爲道德經凡言道者類之上卷言德者類之下卷刻石渦口老子廟中又云唐道士張道相集注道德經七卷凡三十家其名存者河上公節解嚴遵王弼何晏郭象鍾會孫登羊祜鳩摩羅什盧景裕劉仁會顧歡陶弘景松靈裴處思杜弼張憑張嗣臧玄靜孟安期孟智周竇略宋文明褚柔劉進喜蔡子晃成玄英車惠弼今考之新舊唐書藝文志則又有母丘望之湘逸其姓程韶王尚蜀才袁眞釋惠嚴惠琳義盈梁曠樹鍾山傅奕楊上善李允愿陳嗣古任眞子馮郭玄景先生楊上器韓杜梁武帝梁簡文帝賈大隱辟閭仁諝劉仲融王肅戴詵玄宗廬藏用邢南和馮朝隱白履忠李播尹知章陸德眀陳庭玉陸希聲吴善經孫思邈李含光四十家而道相所集郭象劉仁會松靈裴處思杜弼張嗣臧玄靜竇略宋文明褚柔劉進喜蔡子晃車惠弼此十四家不著於志按志稱道相集注四卷而董所收乃有七卷恐後人之所增也我朝崇寧中再校定道藏經典此書藏中已不復見其餘諸家僅存玄宗河上公嚴遵陸希聲四注及傅奕所傳古本道德經耳外李約李榮賈清夷各有注說王顧等奉玄宗命撰所注經䟽杜光庭又從而爲廣聖義亦皆唐人並見藏室始知志所著録猶有未盡惜乎名存而書亡者十蓋八九也樂臣公學黄帝老子其本師號曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂臣公樂臣公教蓋公蓋公教於齊高宻膠西爲曹相國師見史記樂毅傳漢桓譚曰昔老聃著虛無之言兩篇後世好之者以爲過於五經自漢文景之君及司馬遷皆有是言見揚雄傳嚴君平卜筮成都市人有邪惡非正之問則依蓍龜爲言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善裁日閱數人得百錢足自養則閉肆下簾而授老子愽覽亡不通依老子嚴周之㫖著書十餘萬言阮籍著通老論曰道者法自然而爲化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道見太平御覽王輔嗣山陽高平人少而察慧十餘歲便好莊老通辨能言何平叔注老子始成詣王見王注精竒迺神伏曰若斯人可與論天人之際矣因以所注爲道德二論魏氏春秋曰弼論道約美不如晏自然出拔過之太原王濟好言老莊嘗云見弼易注所悟者多殷仲堪有思理能清言嘗云三日不讀道德經便覺舌本間强見世說庾子嵩恢廓有度量自謂是老莊之徒曰昔未讀此書意嘗謂至理如此今見之正與人意暗同見晋陽秋阮宣子好老易能言理不喜見俗人時誤相逢即舍去傲然無營家無儋石之儲晏如也名士傳周彦倫善言名理每賔客會集周虛席晤語詞韻如流聽者忘倦尤善老易與張思也遇輒以玄言相滯彌日不解阮瞻咸之子也見司徒王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嗟良久即命辟之謂之三語椽見晋書本傳世說作阮修宗測少靜𨓆不樂人間豫章王嶷徵爲參軍答云何爲謬傷海鳥横斤山木欲遊名山迺掛其祖所畫向子平圖於壁上齎老莊二書自隨子孫拜辭悲泣測長嘯不顧仲長子光字不曜徃來河東傭力自給無室廬絶妻子開皇末始庵河渚間以息身焉賣藥爲業人莫之知也汾隂生遊河渚一見而伏曰東方朔管輅不如也由是顯重守令來謁辭以瘖疾未嘗交語著獨遊頌河渚先生傳以自寓識者知其縣解人也有請道者書老易二字示之彈琴餌藥以終其世王績嗜酒不任事有奴婢數人種黍春秋釀酒養鳧雁蒔藥草自供以周易老子莊子置牀頭他書罕讀也游北山東皋著書自號東皋子王希夷隱嵩山師黄賾學養生喜讀周易老子餌松栢葉雜花年七十餘筋力不衰刺史盧齊卿就謁問政答曰己所不欲勿施於人此言足矣貞一先生司馬承禎字子微盧天台不出睿宗命其兄承禕就起之既至引入中掖廷問其術對曰爲道日損損之又損以至於無爲夫心目所知見每損之尚不能已况攻異端而增智慮哉帝曰治身則爾治國若何對曰國猶身也故游心於淡合氣於漠與物自然而無私焉而天下治帝嗟嘆曰廣成之言也開元中再召至都玄宗詔於王屋山置壇室以居善篆隸帝命以三體寫老子刊定文句見新唐書隠逸傳舊書本傳云玄宗令以三體寫老子經因刊正文句定著五千三百八十言爲眞本以奏上之盧鴻一字顥然隱於嵩山開元六年徵至東都謁見不拜宰相遣通事人問其故奏曰臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見見舊唐書隱逸傳宗元先生吴筠魯中之儒士也入嵩山爲道士久之遊天台玄宗遣使徵之既至問以道法對曰道法之精無如五千言其諸枝詞蔓說徒費紙劄耳見舊唐書隱逸傳新書本傳云帝嘗問道對曰深於道者無如老子五千文其餘徒喪紙劄耳復問神仙治煉曰此野人事積歲月求之非人主宜留意與舊唐書少異故併録之秦系會稽人天寳末避亂剡溪客泉州南安有大松百餘系結廬其上穴石爲硯註老子彌年不出人號其所居爲高士峰唐憲宗顧宰臣曰神仙之事信乎李藩對曰神仙之說出於道家道家所宗老子五千文爲本老子指歸與經無異彼代好怪之流假託老子神仙之說故秦始皇漢武帝二主受惑卒無所得上深然之見舊唐書憲宗紀唐相陸希聲著道德經傳四卷其序畧云夫老氏之術道以爲體名以爲用無爲無不爲而格於皇極者也楊朱宗老氏之體失於不及以至於貴身賤物莊周述老氏之用失於太過故欲絶聖棄智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流於虛無放誕此六子者皆老氏之罪人也乃爲述傳以暢宗㫖又云昔伏羲氏畫八卦象萬物窮性命之理順道德之和老氏先天地本隂陽推性命之極原道德之奥此與伏羲同其原也文王觀太易九六之動貴剛尚變而要之以中老氏察太易七八之正致柔守靜而統之以大此與文王通其宗也孔子祖述堯舜憲章文武導斯民以仁義之教老氏擬議伏羲彌綸黄帝冒天下以道德之化此與孔子合其權也此三君子者聖人之極也老氏皆變而通之反而合之研至變之機探至精之歸斯可謂至神者矣唐兵部郎李約勉之子也注道德經四卷其說謂世傳此書爲神仙虛無言又詆太史遷先黄老而後六經之失此流俗之言也以我觀之六經乃黄老之枝葉爾開元初詔中書令張說舉能治易老莊者集賢眞學士侯行果薦會稽康子元及平陽敬會眞於說說籍以聞並得侍讀俄並兼集賢侍講學士始行果會眞及長樂馮朝隱同進講能推索老莊秘羲會眞亦善老子每啓篇先熏盥乃讀見新唐書儒學傳李衛公德裕諫敬宗搜訪道士䟽曰臣聞道之高者莫若廣成玄元人之聖者莫若軒皇孔子昔軒皇問廣成子理身之要廣成子云無視無聽抱神以靜形將自正神將自清無勞子形無摇子精乃可長生又云得吾道者上爲皇下爲王玄元語孔子云去子之驕氣與多慾態色與淫志是皆無益于子之身吾所告子若是已故軒皇發謂天之嘆孔子興猶龍之感前聖於道不其至乎若使廣成玄元混迹而至語陛下之道以臣度思無出於此見李文饒集香山白文公居易曰夫欲使人情儉樸時俗清和莫先於體黄老之道也其道在乎尚寬簡務儉素不眩聦察不役智能而已蓋善用之者雖一邑一郡一國至于天下皆可以致清靜之理焉昔宓賤得之故不下堂而單父之人化汲黯得之故不出閣而東海之政成曹參得之故獄市勿擾齊國大和漢文得之故刑罰不用而天下大理其故無他清靜之所致耳見白氏長慶集張薦明少以儒學遊河朔後去爲道士通老子莊周之說晋高祖召見問道家可以治國乎對曰道也者妙萬物而爲言得其極者尸居衽席之間可以治天下高祖大其言延入内殿講道德經拜以爲師賜號通玄先生後不知所終見五代史一行傳太祖征太原駐蹕鎮陽聞道士蘇澄隱五代之際屢聘不至召見於行宫澄隱時年八十太祖問以養生對曰臣養生不過精思鍊氣爾帝王則異於是老子曰我無爲而民自化我無欲而民自樸無爲無欲凝神泰和昔黄帝唐堯享國永年得此道也太祖說其言見東都事畧隱逸傳及高道傳宋太宗語近臣曰朕讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以爲規戒鴻濛子張無夢字靈隱好清虛窮老易入華山與劉海蟾种放結方外友事陳希夷先生無夢多得微㫖久之入天台山眞宗召對問以長久之策無夢曰臣野人也山中嘗誦老子周易而已不知其他除著作佐郎固辭還山賜金帛處士號並不受見高道傳了齋陳忠肅公瓘嘗著書二十餘篇曰昭語其序畧云玉清昭應宫使王曾請校三館道經上因言其書不如老氏五千言清靜而簡約張知白曰陛下留意於此乃治國無爲之術見了齋集田諫議錫尺木贊序曰龍之興也階於木也君之起也人爲階也抑有無位之聖韜光之賢以名迹相參以材能相濟如丘明之才乃仲尼之尺木乎故能發揮春秋以垂聲教也尹喜之賢乃老聃之尺木乎故能詢謀道德以貽後世也見咸平集陳忠肅公曰老子言天下神器不可爲也爲者敗之又言治大國若烹小鮮夫烹魚者無所事於煩之也制水火之齊以熟之而已舜無爲而治其不以此歟又曰武帝黜黄老而用儒術未嘗不本於仁義而觀其實效則不異於始皇者幾希當此之時天下不一日而無事思慕文景不可復得然則黄老亦何負於天下哉又曰䟽廣謂受曰知足不辱知止不殆宦成名立而不去懼有後悔於是父子相隨移病而歸當時賢之後世追誦然其知止之意發於老氏見了齋集歐陽文忠公脩曰前後之相隨長短之相形推而廣之萬物之理皆然也然老子爲書其言雖若虛無而於治人之術至矣又曰道家者流本清虛去徤羨泊然自守故曰我無爲而民自化我好靜而民自正雖聖人南面之治不可易也見本集延平先生羅從彦仲素曰老子之書孔子未嘗譽亦未嘗毁蓋以謂譽之則後世之士溺其和光同塵之說而流入於不羈毁之則清靜爲天下正之論其可毁乎既不譽又不毁其可不畧言故止謂竊比於我老彭見羅先生語録或問龜山楊文靖公時曰說者謂老彭乃老氏與彭籛非謂彭之壽而謂之老彭也然老氏之書果述而不作信而好古乎答曰老氏以自然爲宗謂之不作可也見龜山集龜山曰私意去盡然後可以應世老子曰公乃王見語録滎陽吕公希哲嘗大書治人事天莫若嗇於前坐壁上云修養家以此爲養生要術然事事保謹常令有餘持身保家安邦之道不越於此不止養生也吕氏雜録東坡蘇文忠公軾奉詔撰上清儲祥宫碑云臣謹按道家者流本出於黄帝老子其道以清靜無爲爲宗以虛明應物爲用以忠儉不事爲行合於易何思何慮論語仁者靜壽之說自秦漢以來始用方士言乃有飛仙變化之術黄庭大洞之法太上天眞木公金母之號天皇太乙紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家嘗竊論之黄帝老子之道本也方士之言末也又蓋公堂記云曹參爲齊相聞膠西蓋公善治黄老言使人請之用其言而齊大治其後以其所以治齊者治天下天下至今稱賢焉吾爲膠西守知公之爲邦人也求其墳墓子孫而不可得慨然懷之師其言想見其爲人夫曹參爲漢宗臣而蓋公爲之師可謂盛矣而史不記其所終豈非古之至人得道而不死者歟見本集蘇子由自題老子解後云予年四十有二謫居筠州筠雖小州而多古禪刹四方遊僧聚焉有道全者徃黄蘖山南公之孫也行高而心通喜從予遊嘗與予談道予告之曰子所談者予于儒書已得之矣全曰此佛法也儒者何自得之予曰不然予忝聞道儒者之所無何苦强以誣之顧誠有之而世莫知耳儒佛之不相通如胡漢之不相諳也子亦何由而知之全曰試爲我言其略予曰孔子之孫子思子思之書曰中庸中庸之言曰喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之達道也致中和天地位焉萬物育焉此非佛法而何顧所從言之異耳全曰何以言之予曰六祖有言不思善不思惡方是時也孰是汝本來面目自六祖以來人以此言悟入者太半矣所謂不思善不思惡則喜怒哀樂之未發也蓋中者佛性之異名而和者六度萬行之緫目也致中極和而天地萬物生於其間此非佛法何以當之全驚喜曰吾初不知也今而後始知儒佛一法也予笑曰不然天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖爲人天師可也而以之治世則亂古之聖人中心行道而不毁法而後可耳全作禮曰此至論也是時予方解老子每出一章輒以示全全輒嘆曰皆佛說也予居筠五年而北歸全不久亦化去逮今二十餘年也凡老子解亦時有所刊定未有不與佛法合者時人無可與語思復見全而示之故書之老子之末大觀二年十二月十日子由題又曰予昔南遷海康與子瞻兄邂逅于藤州相從十餘日語及平生舊學子瞻謂予子所作詩傳春秋傳古史三書皆古人所未至惟解老子差若不及予至海康閒居無事凡所爲書多所更定乃再録老子書以寄子瞻自是蒙恩歸北子瞻至毗陵得疾不起逮今十餘年竟不知此書于子瞻爲可否也政和元年冬得姪邁等所編先公手澤其一曰昨日子由寄老子新解讀之不盡卷廢卷而嘆使戰國有此書則無商鞅韓非使漢初有此書則孔老爲一使晋宋間有此書則佛老不爲二不意老年見此竒特然後知此書當子瞻意然予自居潁川十年之間於此四書復多所删改以爲聖人之言非一讀所能了故每有所得不敢以前說爲定今日以益老自以爲足矣欲復質之子瞻而不可得言及於此涕泗而已十二月十一子由再題眉山蘇籀潁濱文定公之孫也記其遺言曰公爲籀講老子數篇曰高於孟子二三等矣又曰言至道無如五千文又曰公老年作詩云近存八十一章注從道老聃門下人蓋老而所造益妙録録者莫測矣見遺言吕吉甫作道德經傳成以元豐元年表進於朝曰臣惠卿言臣聞庖丁奏刀得養生於文惠輪扁釋鑿議讀書於齊桓志之不分道或有在臣誠惶誠懼頓首頓首臣竊以大制散於智慧之僞含生失其性情之初爰有眞人起明至教獨推原於道德蓋祖述於典墳是以鷄大相聞莊周指謂神農而上谷神不死列子稱爲黄帝之書究其微言中有妙物唯恍唯惚視聽莫得以見聞不古不今迎隨孰知其首尾失之其出彌遠至寳秘於荆山而莫知悟之不召自來玄珠索之象罔而可得軒轅華胥之國唐堯姑射之山皆極至遊遂臻泰定此書之指其詣不殊曹參師於蓋公而相齊國孝文傳之河上而爲漢宗僅得淺膚猶幾康阜夫唯俗學不識道眞徒見其文有異詩書之迹莫知其指乃是皇王之宗故聞不尚賢則謂遺之野而不收不貴貨則謂棄諸地而不用謂絶學則無憂等於禽犢謂絶聖則無法等於鴻荒不知靈府之間有若清眸之上雖留金屑亦翳神光故令善惡之兩遺而極沖虛之一致兹難情度宜使智迷遂以允聖之信言列於百家之珍說發兹微學宜屬至神伏惟皇帝陛下以高眞之質而出應君師以妙本之餘而形爲事業蠱飭而庶政交舉革當而四方己孚方將齊心服形而捐治物養己之累深根固蔕以趣長生久視之門同天下於華胥見神人於姑射深造其極適丁斯時臣性維顓蒙生足憂患每思朝徹以解天弢汎觀以考其散殊又損而期於脗合維日不足歷年於兹晩於斯文忽若有得即動而靜物芸芸而歸根由濁以清中冥冥而見曉遂以其意達之於辭雖云自安未知其可竊謂至人之靜鑑實爲學者之元龜敢用冒聞以占中否龍隨章散固難知其上天馬以智專因可取於辨道倘有一言之補敢辭萬死之誅所著老子道德經傳凡計四册謹奉表投進以聞臣惠卿誠惶誠懼頓首頓首謹言元豐元年正月日資政殿學士通議大夫定州路安撫使馬步軍都緫管兼知定州軍州事及管内勸農使上輕車都尉車平縣開國伯食邑八百户臣吕惠卿上表按李彥平先生遺書云吕吉甫讀莊子至參萬歳而一成純遂大悟性命之理故其老莊二解獨冠諸家陸陶山農師曰自秦以來性命之學不講於世而道德之裂久矣世之學者不幸蔽於不該不徧一曲之書而日汨於傳注之卑以自失其性命之情不復知天地之大醇古人之大體也予深悲之以爲道德者關尹之所以誠心而問老子之所以誠意而言精微之義要妙之理多有之而可以啓學之蔽使之復性命之情不幸亂於傳注之卑千有餘年尚昧故爲作傳以發其既昧之意雖然聖人之在下多矣其著書以道德之意非獨老子也蓋約而爲老子詳而爲列子又其詳爲莊子故予之解述列莊之詳合而論之庶幾不失道德之意見經注眉山唐庚子西曰世疑老子西遊以謂有慈有儉有不爲天下先持是道以遊於世何所不容而猶有所去就邪是大不然惟其無徃而不容則雖蠻貊之邦行矣此所以爲老氏見眉山集淮海秦觀曰班固贊司馬遷以爲是非頗謬於聖人論大道則先黄老而後六經孰謂遷之高才愽洽而至於是乎以臣觀之不然彼實有見而發耳孟子曰仁者人也合而言之道也楊子亦曰道以導之德以得之仁以人之義以宜之禮以體之天也合則渾離則散蓋道德者仁義禮之大全而仁羲者道德之一偏黄老之學貴合而賤離故以道爲本六經之教於渾者略於散者詳故以仁羲禮爲用遷之論大道也先黄老而後六經豈非有見於此而發哉又曰史稱崔浩自比張良謂稽古過之以臣觀之浩曾不及荀賈何敢望子房乎夫以其精治身以緒餘治天下功成事遂奉身而退道家之流也觀天文察時變以輔人事明於末而不知本隂陽家之流也子房始遊下邳受書於圯上老人終曰願棄人間事從赤松遊則其術蓋出於道家也浩精於術數之學其言熒惑之入秦彗星之滅晋與夫兔出後宫姚興獻女之事尤異及黜莊老乃以爲矯誣之言則其術蓋出於隂陽而已此其所以不同也見淮海集晁文元公迥曰古今名賢多好讀老莊之書以其無爲無事之中有至美至樂之理也又曰老子曰五色令人曰盲五音令人耳聾五味令人口爽雖聖人矯激太過而善利之心極於深切人能不耽耳目之娱不縱口腹之美勿問有得决定無失並見昭德新編又曰老子曰知常曰明處世之人止知晝夜是常而人如故出世之人以生死爲晝夜又知生死是常而性如故是以明心坦然視生死而無怖見耄智餘書盱江李泰伯曰韓退之有言老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也爲孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗云爾佛之說吾不能詳曾子問老子列傳則有問禮之事史未足盡信禮記經之屬也亦有妄乎見退居類稿嵩山景遇生晁說之曰伏羲文王周公贊易之後惟老氏得易之變通屈伸知柔而貴虛務應而不得殷勤以立言幸乎此書之存也又曰王弼注老子道德經二篇眞得老子之學歟蓋嚴君平指歸之流也其言仁義與禮不能自用必待道以用之天地萬物各得其一豈特有功於老子哉凡百學者蓋不可不知乎此也又曰弼知佳兵者不祥之器至於戰勝以喪禮處之非老子之言乃不知常善救人故無棄人常善救物故無棄物獨得諸河上公而古本無有也賴傅奕能辨之爾見本集碧虛子陳景元師事張鴻濛嘗著道德經藏室纂微篇蓋采摭古諸家注䟽之精微而參以師傳之秘集而成書熙寧中因召見進呈御筆奬諭又有所注南華經章句音義凡二十餘卷今並入藏見碧虛子傳并纂微篇序道藏目録谿堂謝逸壽亭記曰孔子所謂仁者壽老子所謂死而不亡者壽釋氏所謂無量壽三聖人者其言雖異其意則同蓋仁者盡性盡性則死而不亡死而不亡則其壽豈有量哉彼徒見髮毛爪齒歸於地涕唾津液歸於水暖氣歸火動轉歸風而以爲其人眞死矣然不知湛然常存未嘗死也見谿堂集道郷鄒忠公浩曰玄牝之門取諸吾身則鼻也鼻者息之所由以出入綿綿若存用之不勤則其息深矣孫叔敖鼻間栩栩然是已莊子曰眞人之息以踵衆人之息以喉屈服者其嗌言若哇其嗜慾深者其天機淺素問曰非出入則無以生長壯老已非升降則無以生長化收藏升降出入無器不有四者之有而貴常守知此然後知谷神之所以不死又曰虛其心則腹自實弱其志則骨自强並見道鄉集邵伯温曰康節先公以老子爲知易之體以孟子爲知易之用論文中子謂佛爲西方之聖人不以爲過見邵氏聞見録西塘鄭俠曰俠聞之老子曰知足不辱知止不殆易曰亢之爲言也知進而不知退知存而不知亡知得而不知喪知進退存亡而不失其正者其唯聖人乎然則進退存亡得喪之理其不一致乎何其知退知亡知足知止之難而聖人丁寧讚歎之深乎曰是皆一也進退有道則進不易而退不難存亡有道則存不喜而亡不憂進退存亡一歸於道時止則止時行則行孰不一致哉又曰上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道又曰惟道大故似不肖若肖久矣其細也夫肖也者以所養者小故也俗之所養無非小是以大者爲不肖是皆未足與語夫道又曰道大而物小人之營營而卒乎小者累于物也元者善之長而至於大之謂也至而不知其爲大則同於道而與世俗不相似故天下皆謂我道大似不肖蓋衆方察察髪較而錐競我獨悶悶以天下爲不足爲者宜乎其不相似故能成其大大而有之其去世俗不能以寸矣故卒之不肖下士聞之笑而後庶幾夫道不笑則不足以爲道也又曰水善利萬物又不爭處衆人之所惡故幾於道然則汨之隨變則臭腐濁穢不可以濯足亦其自取不幾於惡乎思復性者以是爲鑒知夫清且眀者自我性而濁且亂者亦自我之有以來之也去其汩且惑者而清眀在躬然後揚波淈泥與之偕而莫吾能化也以其莫吾能化彼將寖寖以明潔而莫之知予力焉又曰水之性清以其出於土也而土汩之是以如是其濁也徐而清之可以鑒毛髮人之識明以其出於物也而物惑之是以如是其亂也徐而明之可以燭日月夫曏也清汩之則濁濁而徐之復清曏也明惑之則亂亂而徐之復明也是濁且亂者常自外加我而清且明者在我而已經曰天地相合以降甘露人莫之令而自均夫雨露之在天地細故也而猶平均如是況於人之靈識乎又曰三代而上無有孔孟老莊釋氏之教遇帝而帝遇王而王而衰周以降乃有三氏之教其實憂世之溺而致所以濟之者云耳又嘗自作大慶居士序曰居士本儒學以孔氏爲宗得老氏之說以明並見西塘集葉夢得曰删書斷自堯舜而易獨及伏羲神農黄帝然後知堯而上蓋有其人六經存而不論嘗試會之以心則其說曰易無思也無爲也寂然不動感而遂通天下之故非天下之至神孰能與於此然後知伏義神農黄帝至於堯舜世而相傳者皆不出乎易退而質諸老氏則與易異者無幾又曰論語記竊比於我老彭後孔子者孟子孟子之於儒蓋秋毫不以少亂也其拒楊墨排儀秦過於桀紂終不及老氏乃其言盡心知性以至於命則老氏之所深致意也然後知老氏之書孔孟所未嘗廢又曰老氏之書其與孔子異者皆矯世之辭而所同者皆合於易後老氏數百年復有佛氏者出其辭益荒遠深妙而要其至到與老氏殆相爲表裏並見經注葉夢得曰老氏論氣欲專氣致柔如嬰兒孟子論氣以至大至剛直養而無害充塞乎天地之間二者正相反從老氏則廢孟子從孟子則廢老氏以吾觀之二說正不相反人氣散之則與物敵而剛專之則反於己而柔剛不可以勝剛勝剛者必以柔則專氣者乃所以爲直也直養而無害於外則不惟持其志毋暴其氣當如曾子之守約約之至積而反於微則直養者乃所以爲柔也蓋知道之至者本自無二見石林巖下放言董思靖云老子之道以清凈無爲自然爲宗以虛明應物不滯爲用以慈儉謙下不爭爲行以無欲無事不先天以開人爲治其於治身治人也至矣如用之則太古之治可復也以其所值之時俗尚文勝淳樸之風無復存者而老子抱純素之道與時偕極必待感而後應故不得位以推是於天下蓋知夫時數之有所忤也然終不能恝然道之無傳是以有教無類而且睠睠於西方之異俗則其憫當時慮後世之心何如哉猶幸斯文不墜故西關伺駕東魯見龍而書與言之尚存也河上丈人黄石公樂臣公蓋公之徒益能究其㫖而體之歛厥用於一身則在我之天下已羲皇矣及其道之有所授則孝文以之爲君子房以之佐漢曹參以之相齊果能通一脉於苛秦之後吁亦一驗也然使又有進於是如其人羲皇之則羲皇矣或者見是書詞意含洪寬大而不知致察於虛極靜篤之時存乎體之至嚴至宻者以爲庶政庶事之本乃徒務爲悶悶若昏之量而習弊反墮於優游姑息遂有清虛不及用之譏故不經而子視之嗚呼惜哉或謂微言隱訣多寓其間以故首章有無在二丹神氣水火也虛心實腹則鍊鉛之㫖用兵善戰則采鉛之方沖字從水從中乃喻氣中眞一之水三十輻共一轂爲取五藏各有六氣之象及準一月火符之數如斯等義今皆略之何則性由自悟術假師傳使其果寓微㫖亦必已成之士口授纖悉然後無惑區區紙上烏足明哉況是經標道德之宗暢無爲之㫖高超象外妙入環中遽容以他說小數雜之乎白樂天云元元皇帝五千言不言藥不言仙不言白日升青天亦確論也邵若愚號本來子紹興中作老子解序其首曰據史記老子爲守藏室之史周衰遂去關令尹喜曰子將隱矣强爲我著書於是著書上下篇言道德之意五千餘言而去莫知其所終縁史有上下篇目之文後人因之上卷說道下卷說德今以理考道德混說無分上下此流俗之言今除去又不知何人不審正文前後本意分爲八十一章惟務其華圖象陽數此皆戲論無益於人今亦除去此書箋注者多雖能於理則不中雖辯於事則無法只如注玄牝爲口鼻是不中理也死之徒爲涅槃是不中事也如是胷懷臆註語言散失者不欲備舉由其未至於道也孔子志於道縁道無形故據於德以德爲基本本立而道生以其漸也豈可殢德而不進道此所謂過其門而不入其室也又多以術爲道者認穢汁爲精以鈍濁爲樸遲速爲性拱手不動爲無爲不食滋味爲恬惔儻來適去爲自然休妻獨寢爲清靜如此之徒不可與言至道如抱朴子第八卷云五千文雖出老子然皆汎論較略耳其中了不肯首尾全舉其事有何按據者也蓋其人多言房中黄白之術執有爲爲事將好利淫心測度無爲之道是故不知首尾又況不及此子者乎又直以輕舉者爲上士修道德者其次夫舉身隱形變化物象在禁爲妖孔子不語怪力亂神以其無益也老子所著長生久視務在進道而不專取且神仙之人居止三山不離於地跨鸞朝帝亦不離天居天地之間兀兀然壽千萬歲暫時易短爲長報盡還復於死若不進道何異大椿耳此非論說是非恐殢神仙之術不進於道也嚴谷山人江袤曰夫道窅然難言哉謂之道者蓋假以名道而實非道也五經之所言言其略老聃列禦寇莊周之所言言其詳詳略雖殊皆有以明道之本問道又曰或問老子著書有道德篇當時所述歟後人詮次歟余曰此不得而知也余昔於藏書家見古文老子其言與今所傳大同而小異考其義一也唯次序先後與今篇章不倫亦頗疑後人析之也曰道無所不該而五千文所紀者可道之道耳又離而爲德恐無是義余曰道德實同而名異曰道曰德亦何所不可也曰惡有是言哉吾嘗讀五經諸子凡言道德皆有小大後先之辨不可槩舉可考而知也余曰莊周言一曲之士判天地之美析萬物之理本於道德之不一重嘆後之學者爲不幸子亦欲蹈之乎曰願聞其㫖曰聞之無乎不在之謂道自其所得之謂德道者人之所共由德者人之所自得也試以水爲喻夫湖海之涵浸與坳堂之所畜固不同也其爲水有異乎江河之傾注與溝澮之湍激固不同也其爲水有異乎水猶道也無乎不之而湖海坳堂江河溝澮自其所得如是也謂之實同名異詎不信然學者之於道會之以心視之以神斟酌飽滿使自足則德成而有立進德者至於德兼於道則同於初矣由是觀之道非有餘於德也道散而德彰德非不足於道也德成而道隱故聖人則備道全美君子則明道全德兹所以爲異也曰道妙無形德審有所覩乎曰道無方體德有成虧有成虧者昭昭於心目之間豈無所覩邪合乎道則無德之可名别於德則有名之可辨故曰道無常名德有定體老子之出當道術之變其立言皆以明至當之歸言雖不一如首有尾稽其至也何彼此之辨問德又曰生於心者不窮是以命於身者無已死而復生生而復死始終之端如循環無窮老氏言出生入死生之徒十有三死之徒十有三動之死地十有三三三而九自十言之則出乎生死者一而已一者謂何意復命之人乎士之志於道者能修身以俟之直而推之曲而任之庶幾乎可以語此問命又曰或問老聃列禦寇莊周孟軻皆古之得道者也其立言各欲取信後世何自相詆忤如此聃曰吾有大患爲吾有身禦寇曰内觀者取信於身周曰吾身非吾有軻則曰萬物皆備於我反身而誠樂莫大焉或厭其身之爲患而非其有或貴其身之皆備而取之足豈不詆忤邪余曰子未之思也子得其言而未得其所以言且四肢百骸五臓六腑該而存焉者謂之身視聽言貌思性所有也亦謂之身身之名則一而所以爲身者殊有所謂體有所謂性老聃莊周蓋即體而言之者禦寇孟軻蓋即性而言之者即體言之則四肢百骸五臓六腑有之則有患無之則無患故不可使之有也而所謂無者非亡夫而身之謂凡動作語嘿不見而已即性言之則視聽言貌思一理所該萬物皆備苟内觀焉可以取足高之於天卑之於地俯仰洞鑒孰有不備於我者乎孰有不足於身者乎以是言之老聃莊周之言身不得不使之無列禦寇孟軻之言身不得不使之觀問身又曰或問何者爲息余曰循隂陽以左右隨子午以消長者是也其運如未嘗止之輪其旋如不可盡之環與元氣交通晝夜不息老子列禦寇所謂沖氣者也子知所以守息則知所以養氣知所以養氣則知所以入道知所以入道則抱一禪定固無殊致也老子曰綿綿若存用之不勤子歸而求之斯有得也問息又曰莊周言養形之士吹呴呼吸此特其淺淺者爾形神俱妙蓋本於襲氣母老子曰玄牝之門是爲天地根不死之道本於是乎問氣又曰孔子曰毋意毋我老子曰及吾無身吾有何患瞿曇曰無眼耳鼻舌身意人之有生形色外具心意内知必使之無者何哉蓋無者萬善之所歸萬法之所宗人能外息諸縁冥心於無則與道俱矣其歸一致若所謂坐忘息氣面壁果殊途哉袤字仲長三衢人嚴谷山人則其自號也養素丘園以經術教諸生紹興間大臣薦於朝召對竟力辭還里士論高之並見嚴谷集老子翼卷之五
