body:
  text: 下篇上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此蘇註聖人從心所欲不踰矩非有意于德而德自足其下知德之貴勉强以求不失蓋僅自完耳而何德之有無爲而有以爲之則猶有爲也唯無爲而無以爲者可謂無爲矣其下非爲不成然猶有以爲之非徒作而無術者也仁義皆不免于爲之矣其所以異者仁以無以爲爲勝義以有以爲爲功耳德有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也自德以降而至于禮聖人之所以齊民者極矣故爲之而不應則至于攘臂而强之强之而又不應于是刑罰興而兵甲起則徒作而無術矣忠信而無禮則忠信不見禮立而忠信之美發越于外君臣父子之間夫婦朋友之際其外燦然而中無餘矣故順之則治違之則亂治亂之相去其間不能以髮故曰亂之首也聖人玄覽萬物是非得失畢陳于前如鑑之照形無所不見而孰爲前後世人視止于目聽止于耳思止于心冥行于萬物之間役智以求識而偶有見焉雖自以爲明而不知至愚之自始也世之鄙夫樂其有得于下而忘其上故喜薄而遺厚采華而弃實非大丈夫孰能去彼取此筆乘首亂始愚極言禮智流弊所至耳莊子舉老子此言而論之曰今己爲物也欲復歸根不亦難乎其易也其惟大人乎雖然既歸其根孰爲物孰爲非物故又曰匿而不可不爲者事也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也此數者雖有上下先後之異而以聖人用之皆道也蓋聖人百慮同歸二際俱泯豈復有彼此去取邪㫺之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴高將恐蹶故貴以賤爲本高以下爲基是以侯王自謂孤寡不穀此其以賤爲本邪非乎故致數輿無輿不欲碌碌如玉落落如石裂破毁也發發泄也歇消滅也竭枯竭也蹶音厥顛仆也數上聲蘇註一道也物之所以得爲物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其爲天下貞而已不知其所以得此者皆道存焉耳致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也萬物不得一未遽滅也侯王不得一未遽蹷也然其極必至此耳天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天地之至微也此所謂賤且下也本也昔之稱孤寡不穀者亦舉其本而遺其末耳輪輻蓋軫衡軛轂轊會而爲車物物可數而車不可數然後知無有之爲車所謂無之以爲用者也然則天地將以大爲天地邪侯王將以貴爲侯王邪大與貴之中有一存焉此其所以爲天地侯王者而人莫或知之耳故一處貴而非貴處賤而非賤非若玉之碌碌貴而不能賤石之落落賤而不能貴也反者道之動弱者道之用天下之物生於有有生于無反復也湏溪云反者動之極則必歸也是其反也正以其動也非動無反蘇註復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也世不知靜之爲動弱之爲强故告之以物之所自生者蓋天下之物聞有母制子未聞有以子制母者也筆乘天下之物生于有所謂有名萬物之母是已有生于無所謂無名天地之始是已無必生有是故貴其反反者反於無也有生於無是故貴其弱弱者無之似也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道故建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晩成大音希聲大象無形道隱無名夫唯道善貸且成建立也偷苟且也渝羊朱反變改也傅奕音義云古本作輸廣雅曰輸愚也或作揄董遇作摇今從王弼傅奕作渝應人之乏而終以見還曰貸趙志堅云貸者暫借非長與也且者權成非久固也欲使蒙貸者不長徃得成者非久住感貸荷成速歸於道蘇註道非形不可見非聲不可聞不先知萬物之妄廓然無蔽卓然有見未免于不信也故下士聞道以爲荒唐謬悠而笑之中士聞道與之存亡出没而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不惰者其回也與斯所謂上士也哉建立也古之立言者有是說而老子取之下之所陳者是也無所不照而非察也若止不行而天下之速者莫之或先也或夷或類所至則平而未嘗削也上德不德如谷之虛也大白若辱者使白而不受汚此則不屑不潔之士而非聖人也廣德若不足者廣大而不可復加則止于此而已非廣也建德若偷因物之自然而無立者外若偷惰而實建也質眞若渝體聖抱神隨物變化而不失其貞者外若渝也大方無隅全其大方不小立圭角也大器晩成器大不可近用也大音希聲非耳之所得聞也大象無形非目之所得見也道之所寓無所不見凡此十二者皆道之見于事者也而道之大全則隱于無名惟其所寓惟其有餘以貸不足物之賴之以成者如此筆乘上士者恬淡寂寞虛無無爲者也勤於此則勤行之至而實無所勤行也斯所謂天然懸解矣而下士惡足以知之君平曰中士所聞非至美也下士所見非至善也中士所眩下士所笑乃美善之美善者也道生一一生二二生三三生萬物萬物負隂而抱陽沖氣以爲和人之所惡惟孤寡不穀而王公以爲稱故物或損之而益或益之而損人之所教我亦教之强梁者不得其死吾將以爲教父凡動物背止於後隂靜也耳目口鼻居前陽動也故曰負隂抱陽植物則背寒向暖而沖氣運乎其間木絶水曰梁木負棟亦曰梁取其力之强也故曰强梁金人銘曰强梁者不得其死好勝者必遇其敵蓋古人嘗以此爲教而我亦教之但老子獨尊之曰教父如言萬物之母之謂母主養父主教故言生則曰母言教則曰父蘇註夫道非一非二及其與物爲偶道一而物不一故以一名道然而道則非一也一與一爲二二與一爲三自是以徃而萬物生物雖有萬不同而莫不負隂抱陽沖氣以爲和者蓋物生于三而三生于一理之自然也世之人不知萬物之所自生莫不賤寡小而貴重大然王公之尊而自稱孤寡不穀古之達者蓋已知之矣天下之至柔馳騁天下之至堅無有入於無間吾是以知無爲之有益不言之教無爲之益天下希及之馳騁役使也堅猶剛强不曰剛强而曰堅變文叶韻也無間無内也至剛者天下莫能勝而至柔能役之無内者天下莫能破而無有能入之二語皆設喻以明無爲之有益也蘇註以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之於物則水是也以有入有捍不相受以無入有無未嘗勞有未嘗覺求之于物則鬼神是也是以聖人唯能無爲故能役使衆强出入群有名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久多猶重也薛云知足者樂今有之已多無求者也無求奚辱知止者懼後進之有損知幾者也知幾奚殆大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辯若訥躁勝寒靜勝熱清靜爲天下正蘇註天下以不缺爲成故成必有敝以不虛爲盈故盈必有窮聖人要于大成而不卹其缺期于大盈而不惡其沖是以成而不敝盈而不窮也直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯于一偏而非其正也唯泊然清淨不染于一非成非缺非盈非沖非直非屈非巧非拙非辯非訥而後無所不勝可以爲天下正矣天下有道却走馬以糞天下無道戎馬生于郊罪莫大于可欲禍莫大于不知足咎莫大于欲得故知足之足常足矣却屏去也糞糞田也吴幼清本糞下有車字以張衡東京賦却走馬以糞車爲證戎馬戰馬也郊交也二國相交之境也戎馬生于郊言兵乆不還也一性之内無欠無餘人能安之無徃不足故曰知足之足常足蘇註天下各安其分則不爭而自治故却是馬而糞田以其可欲者示人固有罪矣而不足其足者其禍又甚所欲必得者其咎最大匹夫有一于身患必及之侯王而爲是則戎馬之所自起也唯知足者所寓而足故無不足不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不爲而成蘇註性之爲體充遍字宙無遠近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人爲物所蔽性分于耳目内爲身心之所紛亂外爲山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌遠而彌少也性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣爲學日益爲道日損損之又損之以至于無爲無爲而無不爲矣故取天下常以無事及其有事不足以取天下取開元䟽云猶攝化也無事即無爲也無爲自化清靜自正故曰取天下常以無事爲者敗之執者失之故曰有事不足以取天蘇註不知道而務學聞見日多而無以一之未免爲累也孔子曰多聞擇其善者而從之多見而識之知之次也苟一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予爲多學而識之者與曰然非與曰非也予一以貫之去妄以求復性可謂損矣而去妄之心猶存及其兼忘此心純性而無餘然後無所不爲而不失于無爲矣人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無爲故無事其心見于外而物安之雖不取天下而天下歸之矣聖人無常心以百姓心爲心善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣聖人在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之無常心心無所主也惵圖恊反爲去聲渾胡本反蘇註虛空無形因萬物之形以爲形在方爲方在圓爲圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以爲心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未嘗渝也可謂德善矣信不信在彼而吾之所以信者未嘗變也可謂德信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉天下善惡信僞方各自是以相非相賊不知所定聖人憂之故惵惵爲天下渾其心無善惡無信僞皆以一待之彼方注其耳目以觀聖人之予奪而吾一以嬰兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不愠釋然皆化而天下始定矣出生入死生之徒十有三死之徒十有三人之生動之死地者亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地出謂自無而見于有入謂自有而歸于無莊子萬物皆出于機入于機又曰其出不忻其入不詎又曰有乎出有乎入皆以出爲生入爲死夫音符攝生如攝政攝官之攝不認生爲己有如暫焉管攝之也不期而會曰遇兕音似山海經兕出湘水之南蒼黑色爾雅云形如野牛一角重千斤蘇註性無生死出則爲生入則爲死用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知默知思而不知忘以趣于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無爲之妙也有生則有死故生之徒即死之徒也人之所頼于生者厚則死之道常十九聖人常在不生不死中生地且無焉有死地哉筆乘生之徒十有三此練形住世者也死之徒十有三此殉欲忘生者也人之生動之死地十有三此斷滅種性者也凡此十分之中率居其九皆生生之厚者也夫有生必有死是生固死之地矣兕虎甲兵將安避之善攝生則無生矣故兕之角無所投虎之爪無所措兵之刃無所容何者彼無地以受之也厚生者九無生者一老子于十者之中闕一自擬其㫖微矣然聖人無生非故薄之也本無生也昔人云愛生者可殺也愛潔者可污也愛榮者可辱也愛完者可破也本無生孰殺之本無潔孰污之本無榮孰辱之本無完孰破之知此者可以出入造化遊戲死生道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有爲而不恃長而不宰是謂玄德畜許六反夫音符長上聲下同蘇註道者萬物之母故生萬物者道也及其運而爲德牧養羣衆而不辭故畜萬物者德也然而道德則不能自形因物而後形見物則不能自成遠近相取剛柔相交積而爲勢而後興亡治亂之變成矣形雖由物成雖由勢而非道不生非德不畜是以尊道而貴德尊如父兄貴如侯王道無位而德有名故也恃爵而後尊貴者非實尊貴也天下有始以爲天下母既得其母以知其子既知其子復守其母殁身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常兊口也人之有口家之有門皆喻物所從出者塞而閉之藏有於無守母者也參同契云耳目己之寳閉固勿發揚兊口勿以談希之順以洪即此義不可目窺曰小不可力得曰柔遺唯季反襲常猶前言襲明宻而不露也記曰揜而充裘曰襲蘇註無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也故謂之始又謂之母其子則萬物也聖人體道以周物譬如以母知其子了然無不察也雖其智能周之然而未嘗以物忘道故終守其母也天下皆具此道然常患忘道而狥物目悅于色耳悅于聲開其悅之之心而以其事濟之是以終身而陷溺不能救夫聖人之所以終身不勤者唯塞而閉之未嘗出而狥之也悅之爲害始小而浸大知小之將大而閉之可謂明矣趨其所悅而不顧自以爲强而非强也唯見悅而知畏之者可謂强矣世人開其所悅以身狥物徃而不反聖人塞而閉之非絶物也以神應物用其光而已身不與也夫耳之能聽目之能見鼻之能臭口之能嘗身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣使我介然有知行于大道惟施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文采帶利劒厭飲食資貨有餘是謂盜竽非道哉介然有知猶言微有知也夸張曰施嗇之反也夷平也路狹而捷爲徑除治也傳曰糞除先人之敝廬是也青赤爲文色絲爲采傅奕云采是古文繡字資貨一作財貨盜竽誤作盜夸今從韓非本蘇註體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道夷易無有險阻世之不知者以爲迂遠而好徑以求捷故凡舍其自然而有所施設者皆欲速者也俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設爲事夸以誨盜哉善建者不拔善抱者不脫子孫祭祀不輟修之于身其德乃眞修之于家其德乃餘修之于鄉其德乃長修之于邦其德乃豐修之于天下其德乃普故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此邦一作國漢人避高帝諱改之於韻不叶今從韓非本蘇註世豈有建而不拔抱而不脫者乎唯聖人知性之眞審物之妄捐物而修身其德充積實無所立而其建有不可拔者實無所執而其抱有不可脫者故至其子孫猶以祭祀不輟也身既修推其餘以及外雖至于治天下可也天地外者世俗所不見矣然其理可推而知也修身之至以身觀身以家觀家以鄉觀鄉以國觀國皆吾之所及知也然安知聖人以天下觀天下亦若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳含德之厚比于赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不嗄和之至也知和曰常知常曰眀益生曰祥心使氣曰强物壯則老謂之不道不道早已毒蟲蜂蠆之類以尾端肆毒曰螫猛獸虎豹之類以爪按拏曰據攫鳥鵰鶚之類以羽距擊觸曰搏趙志堅曰以四指握拇指爲握固䘒子垂反說文云赤子隂也號平聲嗄所嫁反聲嘶也又啼極無聲曰嗄一作嗌不嗄黄茂材云古本無嗌字嗌不嗄莊子之文後人增入之祥吉凶之候也蘇註老子之言道德每以嬰兒况之者皆言其體而已未及其用也夫嬰兒泊然無欲其體則至矣然而物來而不知應故未可以言用也道無形體物莫得而見也况可得而傷之乎人之所以至于有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所以至此者唯無心也無執而自握無欲而自作是以知其精有餘而非心也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常生不可益而欲益之則非其正矣氣惡妄作而又以心使之則强梁甚矣益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣知者不言言者不知塞其兊閉其門挫其銳解其紛和其光同其塵是謂玄同不可得而親不可得而踈不可得而利不可得而害不可得而貴不可得而賤故爲天下貴蘇註道非言說亦不離言說然能知者未必言能言者未必知唯塞兊閉門以杜其外挫銳解紛和光同塵以治其内者默然不同而與道同也可得而親則亦可得而䟽可得而利則亦可得而害可得而貴則亦可得而賤體道者均覆萬物而孰爲親䟽等觀逆順而孰爲利害不知榮辱而孰爲貴賤情計之所不及此所以爲天下貴也以正治國以竒用兵以無事取天下吾何以知天下之然哉天下多忌諱而民彌貧民多利器國家滋昏人多技巧竒物滋起法令滋章盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸蘇註古之聖人柔遠能邇無意于用兵唯不得已然後有征伐之事故以治國爲正以用兵爲竒雖然此亦未足以取天下天下神器不可爲也爲者敗之執者失之唯體道者廓然無事雖不取天下而天下歸之矣人主多忌諱下情不上達則民貧而無告利器權謀也明君在上常使民無知無欲民多權謀則其上眩而昏矣人不務本業而趨末技則非常無益之物作矣患人之詐僞而多爲法令以勝之民無所措手足則日入于盜賊矣其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復爲竒善復爲祅人之迷也其日固久矣是以聖人方而不割廉而不劌直而不肆光而不耀悶音門缺殘缺也一作𡙇𡙇失望貌以其察察宜無不及故人望之而卒失望也極終也竒衰也廉稜也劌居衛反割也皆謂芒利傷物也蘇註天地之大世俗之見有所眩而不知也蓋福倚于禍禍伏于福譬如老稚生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知爲至彼方且自以爲福而不知禍之伏于後方且自以爲善而不知禍之起于中區區以察爲明至于察甚傷物而不悟其非也可不哀哉知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也此則世俗所謂悶悶也治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長乆是謂深根固柢長生乆視之道服一作復柢一作蒂花趺也蘇註凡物方則割廉則劌直則肆光則耀唯聖人方而不割廉而不劌直而不肆光而不耀此所謂嗇也夫嗇者有而不用者也世患無以服人苟誠有而能嗇雖未嘗與物較而物知其非不能也則其服之早矣物既已服歛藏其用至于殁身而終不試則德重積矣德積既厚雖天下之剛强無不能克則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也孟子曰存其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固蒂者是也古之聖人保其性命之常不以外耗内則根深而不可拔蒂固而不可脫雖以長生久視可也蓋治人事天雖有内外之異而莫若嗇則一也治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷之夫兩不相傷故德交歸焉蒞力至反聖人亦不傷之一作傷人以下德交歸焉觀之作之爲是之指神而言也蘇註烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛聖人無爲使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用其神矣非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未嘗傷人故其鬼無能爲耳人鬼所以不相傷者由上有聖人也故德交歸之大國者下流天下之交天下之牝牝常以靜勝牡以靜爲下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜爲下蘇註天下之歸大國猶衆水之趨下流也衆動之赴靜猶衆高之赴下也大國能下則小國附之小國能下則大國納之大國下以取人小國下而取于人
