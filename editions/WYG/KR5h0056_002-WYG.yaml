body:
  text: 老子翼卷二明焦竑撰下篇上徳不德是以有徳下徳不失徳是以無徳上徳無為而無以為下徳為之而有以為上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後徳失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此無以為以用也仍一作扔夫音符前識如釋典前塵之前非有諸巳之謂也處上聲蘇注聖人從心所欲不踰矩非有意于徳而德自足其下知徳之貴勉强以求不失蓋僅自完耳而何徳之有無為而有以為之則猶有為也唯無為而無以為者可謂無為矣其下非為不成然猶有以為之非徒作而無術者也仁義皆不免于為之矣其所以異者仁以無以為為勝義以有以為為功耳徳有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也自徳以降而至于禮聖人之所以齊民者極矣故為之而不應則至于攘臂而强之强之而又不應于是刑罰興而兵甲起則徒作而無術矣忠信而無禮則忠信不見禮立而忠信之美發越于外君臣父子之間夫婦朋友之際其外燦然而中無餘矣故順之則治違之則亂治亂之相去其間不能以髪故曰亂之首也聖人𤣥覽萬物是非得夫畢陳于前如鑑之照形無所不見而孰為前後世人視止于目止于耳思止于心㝠行于萬物之間役智以求識而偶有見焉雖自以為明而不知至愚之自始也世之鄙夫樂其有得于下而忘其上故喜薄而遺厚采華而弃實非大丈夫孰能去彼取此吕注道之可道非常道則庸有得而有之者乎上德者以無得為得唯其無得乃所以得也故曰上德不德是以有德下徳者以不失之為得者也唯其不失故雖得而非徳故曰下徳不失徳是以無徳上徳無為非故無為也率徳之自然而實無以為也下德不知出此而為之故不能不有以為也夫徳無以為足矣而且有仁焉則是為之也然上仁者之于仁無所事仁而仁者也是為之而無以為也仁則不可獨者也必有義焉雖上義不得不為者也是為之而有以為也仁者施之而已義則擇所施之宜者也未責所報也禮則施報矣來而不往非禮往而不來亦非禮施報之義也上禮為之而莫之應則攘臂而仍之以其往而不來雖不以禮繼之猶不為非禮以禮之理固如是也上仁上禮上義猶如此則其下者不論而見矣由是觀之失道而後德失徳而後仁失仁而後義失義而後禮豈虛言哉禮之相責望者如彼則忠信自此薄亂爭自此起而智謀之所以用也是禮雖所以治亂適所以首亂也前識雖所以用智乃所以始愚也夫何故人之治常生于厚厚則其性薄則其偽去性而作偽未有不亂者也人之自知常在于明明則其實智則其蕐離實而務華則未有不愚者也是以大丈夫處其厚不處其薄居其實不居其蕐故忘仁義絶禮學遺智慧而志于道徳之大全是之謂去彼取此息齋注上德不徳則在仁而仁在義而義惟其所之未嘗執也下徳不失徳則仁之不可為義義之不可為禮既已為之則不可得而變故上徳不失道道常無為而無為之之心下徳不失徳徳則有為而有為之之跡矣上徳無為仁是也仁近于道故曰仁者人也合而言之道也仁近于道故亦無為亦無以為降而為義義者宜也以義宜物則有以為為不失宜為而未失又降而為禮禮者理也以禮理物茍莫之應而吾必欲理之則有攘臂而仍之者蓋不可得謂之道可得謂之徳徳在人謂之仁仁不失其宜謂之義義以正物謂之禮故失道而徳失徳而仁失仁而義失義而禮自然之次也自道五降而至于禮五降之後不足觀矣夫禮由亂而作因其有長幼無禮則亂故立禮以救之然至攘臂而仍之則禮亦隨喪然則禮者亂之首也多知不足以為道由其多知惑亂本真知不從真浮無實然則多知者愚之始也故禮為忠信之薄而識為知道之蕐聖人處厚不處薄貴實不貴蕐故常不失道本宏甫注無為也而亦無無為也是謂上徳黄帝是也其次雖為之而實無為是謂上仁堯之仁如天是也又其次不惟為之而且有必為之心是上義也舜禹以下聖人是也夫失道而徳失徳而仁失仁而義至于失義而後禮則所以為之者極矣故為而不應則至于攘臂攘臂不應則刑罰甲兵相因而起矣是亂之首而忠信之薄也凡此者皆以識智在前為道之障不知徳也仁也義也禮也皆道之蕐而愚民之始有真智者所不處也夫蕐者不實實則厚蕐則不厚安有大丈夫而不知處厚乎欲處厚者所當去識求智而後無為大道可幾也嚴君平解虛無無為開導萬物謂之道人清静因應無所不為謂之徳人兼愛萬物博施無窮謂之仁人理名正實處事之宐謂之義人謙退辤遜恭以守和謂之禮人此五者皆可道之陳迹非至至者也至至者一尚不存安有其五故帝王根本道為之元徳為之始道失而徳次之徳失而仁次之仁失而義次之義失而禮次之禮失而亂次之凡此五者道之以一體而世主之長短也故所為非其所欲所求非其所得不務自然而務小薄也夫禮之為事中外相違華盛而實虧末隆而本衰禮薄於忠權輕於威信不及義徳不逮仁為治之末為亂之元詐偽所起忿爭所因故莊子曰聖人行不言之敎道不可致徳不可至仁可為也義可虧也禮相偽也此之謂也韓非解仁者謂其中心欣然愛人也其喜人之有福而惡人之有禍也生心之所不能已也非求其報也故曰上仁為之而無以為也義者君臣上下之禮父子貴賤之差也知交朋友之接也親疎内外之分也臣事君宐下懷上子事父宐賤敬貴宐知交朋友之相助也宐親者内而疎者外宐義者謂其宜也宜而為之故曰上義為之而有以為也禮者所以貌情也羣義之文章也君臣父子之交也貴賤賢不肖之所以别也中心懷而不諭故疾趨卑拜而明之實心愛而不知故好言繁辭以信之禮者外飾之所以諭内也故曰禮以情貌也凡人之為外物動也不知其為身之禮也衆人之為禮也以尊他人也故時勸時衰君子之為禮以為其身故神之為上禮上禮神而衆人貳故不能相應故曰上禮為之而莫之應衆人雖貳聖人之復恭敬盡手足之禮也不衰故曰攘臂而仍之禮為情貌者也文為質飾者也夫君子取情而去貌好質而惡飾夫恃貌而論情者其情惡也須飾而論質者其質衰也何以論之和氏之璧不飾以五采隋侯之珠不飾以銀黄其質至美物不足以飾之夫物之待飾而後行者其質不美也是以父子之間具禮而不明故曰禮薄也凡物不並盛陰陽是也理相奪予威徳是也實厚者貌薄父子之禮是也由是觀之禮繁者實心衰也然則為禮者事通人之樸心者也衆人之為禮也人應則輕歡不應則責怨今為禮者事通人之樸心而資之以相責之分能無爭乎有爭則亂故曰夫禮者忠信之薄也而亂之首乎筆乘首亂始愚極言禮智流弊所至耳莊子舉老子此言而論之曰今已為物也欲復歸根不亦難乎其易也其惟大人乎雖然既歸其根孰為物孰為非物故又曰匿而不可不為者事也逺而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者徳也一而不可不易者道也此數者雖有上下先後之異而以聖人用之皆道也葢聖人百慮同歸二際俱冺豈復有彼此去取邪㫺之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生矦王得一以為天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅矦王無以貞而貴高將恐蹷故貴以賤為本高以下為基是以矦王自謂孤寡不穀此其以賤為本邪非乎故致數輿無輿不欲琭琭如玉落落如石裂破毁也發發泄也歇消滅也竭枯竭也蹷音厥顛仆也數上聲蘇注一道也物之所以得為物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已矦王知其為天下貞而已不知其所以得此者皆道存焉耳致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也萬物不得一未遽滅也矦王不得一未遽蹷也然其極必至此耳天地之大矦王之䝿皆一之致夫一果何物也視之不見執之不得則亦天地之至微也此所謂賤且下也本也㫺之稱孤寡不穀者亦舉其本而遺其末耳輪輻葢軫衡軛轂轊會而為車物物可數而車不可數然後知無有之為車所謂無之以為用者也然則天地將以天為天地邪矦王將以貴為矦王邪大與䝿之中有一存焉此其所以為天地矦王者而人莫或知之耳故一處貴而非貴處賤而非賤非若玉之琭琭䝿而不能賤石之落落賤而不能貴也呂注道一而已而得之則得之者與道為二非一也唯其得之而無得故謂之得一也㫺之得一者莫不然也仰之而天也得一以清故覆焉而不傾俯之而地也得一以寧故載焉而不陷神無形而至寂者也以得一故妙乎有生而靈谷有形而至虛者也以得一故應乎所感而盈其衆為萬物以得一故生而無極其尊為矦王以得一故能制天下之動而貞夫一則一之不可不致也如此故一者天之所以清地之所以寧寂之所以靈虛之所以盈萬物之所以生而矦王之所以為天下貞者也使天無以清則裂地無以寧則發神無以靈則歇谷無以盈則竭萬物無以生則滅而矦王也無以為貞而唯貴高之知其得不蹷邪故貴以賤為本則未有貴者乃貴之所自而立也高以下為基則未有高者乃高之所自而起也然則貴而無其貴高而無其高乃侯王之所以為天下貞而不蹷者邪是以孤寡不榖人之所惡而賤也而貴高以為稱者以其所本為在此也故致數而極之以至于一則貴不異乎賤卑不離乎高而譽出於無譽矣譽無譽則毁無毁矣譽無譽則不可得而貴毁無毁則不可得而賤玉可貴故琭之石可賤故落之不欲琭琭如玉落落如石不可得而貴賤之謂也息齋注孔子曰吾道一以貫之一者何也天之清地之寧神之靈谷之盈物之生矦王之貞極其致無不同知天之所以清即知地之所以寧知神之所以靈即知谷之所以盈知物之所以生即知矦王之所以貞易曰天下殊途而同歸百慮而一致天下何思何慮言其未嘗不一也若不知一則必自異自異則絶物矦王絶物物亦絶之故貴以賤為本高以下為基矦王自稱孤寡不穀此豈非知貴以賤為本邪輪葢輻軫會而為車物物有名而車不可名仁義禮智合而為道仁義可名而道不可名賞罸刑政合而為治賞罰可名而治不可名茍有可執使其跡外見貴者如玉賤者如石皆可以指名而人始得而貴賤之矣宏甫注矦王不知致一之道與庶人同等故不免以貴自高高者必蹷下其基也貴者必蹷賤其本也何也致一之理庶人非下矦王非高在庶人可言貴在矦王可言賤特未知之耳今夫輪輻葢軫衡軛轂轊會而成車人但見有此數者曷嘗有車哉然而名之曰車而不曰輪輻葢軫衡軛轂轊也由此觀之則所謂高下䝿賤者可知矣人見其有貴有賤有高有下而不知其致之一也曷嘗有高下貴賤者哉彼䝿而不能賤賤而不能䝿據吾所見而不能致之一也則亦琭琭落落如玉如石而已矣反者道之動弱者道之用天下之物生於有有生於無反復也須溪云反者動之極則必歸也是其反也正以其動也非動無反蘇注復性則静矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也世不知静之為動弱之為强故告之以物之所自生者葢天下之物聞有母制子未聞有以子制毋者也介甫解道之用所以在于弱者以虛而已即在天者而觀之指我亦勝我䠓我亦勝我則風之行乎太虛可謂弱矣然無一物不在所鼔舞無一形不在所披拂則風之用在乎弱也即在地者而觀之決諸東方則東流決諸西方則西流則水之託于淵虛可謂弱矣然處衆人之所惡而攻堅强者莫之能先則水之用在乎弱也又曰反非所以為動然有所謂動者動于反也弱非所以為强然有所謂强者葢弱則能强也雖然言反而不言静言弱而不言强言動則知反之為静言弱則知用之為强天下之物生于有有生于無亦若此而已矣呂注道之周行萬物非不逝也而其動常在于反所謂樞始得其環中以應無窮者是也運動乎天地非不强也而其用常在于弱所謂天下之至柔馳騁天下之至堅無有入于無間者是也故天下之物生於有有生於無唯有為能生天下之物而無又能生天下之有則道之動在於反而其用在於弱可知已然則欲反而弱者無他致一以極乎無而已矣趙志堅注反歸本也凡人以移故就新為動為道者捨末反本故云道之動盖身安心寂不動也捨有歸無云動也亦猶逺曰返先既不去非逺也為無體名逺也今亦不來非近也為身有之名返也道無來往而有逺返之名心本安然亦有反動之義内心虛静外行柔弱者是反本之行故云弱者道之用有者氣也物雖未形已有是氣故云有天地萬法從一氣而生故云生于有無道也一氣從道生故言生于無推極生源指道為極欲令學者歸心有所前言反者反歸此無也息齋注天下萬物生而為有自有反無然後為道故曰反者道之動天下之有皆生于無有則必强反强為弱則可以漸求于道故曰弱者道之用反者自有而求無弱者致無而求道筆乘天下之物生於有所謂有名萬物之母是已有生於無所謂無名天地之始是已無必生有是故貴其反反者反於無也有生於無是故貴其弱弱者無之似也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道故建言有之明道若昧進道若退夷道若𩔖上徳若谷大白若辱廣徳若不足建德若偷質真若渝大方無隅大器晚成大音希聲大象無形道隱無名夫唯道善貸且成建立也偷茍且也渝羊朱反變改也傳奕音義云古本作輸廣雅曰輸愚也或作揄董遇作揺今從王弼傅奕作渝應人之乏而終以見還曰貸趙志堅云貸者暫借非長與也且者權成非久固也欲使蒙貸者不長往得成者非久住感貸荷成速歸於道希聲注易曰形而上者謂之道道也者通乎形外者也形而下者謂之器器也者止乎形内者也上士知微知彰通乎形外故聞道而信則勤行之中士在微彰之際處道器之間故聞道而疑信相半故若存若亾下士知彰而不知微止乎形内故聞道則大笑之不唯笑之且將非之矣夫道也者微妙𤣥通深不可識茍不為下士所非笑則不足以為道矣夫體道者與日月合其貞明而其光不耀斯明道若昧也與天地合其易簡而其用不可為典要斯夷道若𩔖也與四時合其運行而其動必反於𤣥妙斯進道若退也常處卑下而終不可渝斯上徳若谷也常居溷濁而終不可涅斯大白若辱也衣被天下而不有其仁斯廣徳若不足也生畜萬物而不顯其功斯建徳若偷也復其性以御其情斯質真若渝也正乎内而行乎外斯大方無隅也以若拙之匠陶甄天下而不為近功斯大器晚成也以不言之教鼔動萬物而不事小説斯大音希聲也事无事莫覩其用斯大象无形也為无為莫識其體斯道隱无名也夫唯善濟貸于萬物而不責其報是以萬物受其生成而不知其徳故下士聞此道而笑之不信其能若此耳蘇注道非形不可見非聲不可聞不先知萬物之廓然無蔽卓然有見未免于不信也故下士聞道以為唐謬悠而笑之中士聞道與之存亾出沒而疑之惟了然見之者然後勤行服而不怠孔子曰語之而不惰者其回也與斯所謂上士也哉建立也古之立言者有是説而老子取之下之所陳者是也無所不照而非察也若止不行而天下之速者莫之或先也或夷或𩔖所至則平而未嘗削也上徳不徳如谷之虛也大白若辱者使白而不受汚此則不屑不潔之士而非聖人也廣徳若不足者廣大而不可復加則止于此而已非廣也建徳若偷因物之自然而無立者外若偷惰而實建也質真若渝體聖抱神隨物變化而不失其貞者外若渝也大方無隅全其大方不小立圭角也大器晚成器大不可近用也大音希聲非耳之所得聞也大象無形非目之所得見也道之所寓無所不見凡此十二者皆道之見于事者也而道之大全則隱于無名惟其所寓推其有餘以貸不足物之頼之以成者如此呂注孔子曰朝聞道夕死可矣則聞道者死生固不足以累其心豈茍知之而已哉上士聞道真聞之者也真聞之則無所復疑特勤而行之而已矣夫道亦何以勤行為哉曰觀諸心以契其所聞則勤行之謂也中士聞道聞之而未審焉者也故若存若亾若存若亾則不能勤行之一出焉一入焉而已矣下士聞道聞之而不信者也故大笑之所以大笑者以情求之而不得故也使道而可以情求則彼不笑之矣故曰不笑不足以為道若古之建言者有之凡皆不可以情求之謂也冥冥之中獨見曉焉無聲之中獨聞和焉是之謂明道若昧和之以是非而休乎天均則無物不然無物不可是之謂夷道若𩔖為道者日損損之又損之以至于無為是之謂進道若退上徳者無為而無以為者也然其應如響斯不亦若谷乎大白者滌除𤣥覽而無疵者也然受天下之垢斯不亦若辱乎廣徳者廓乎其無不容也而未嘗自見自是自矜自伐也斯不亦若不足乎善建者不拔而建之以常無有乃然有見者也故曰建徳若偷體性抱神以遊世俗之間而非所驚也故曰質真若渝大方體之無南無北奭然四解淪於不測無東無西始於𤣥冥反於大通此大方之無隅也大成若缺然日計之而不足歲計之而有餘此大器之晚成也大音者聽之不可聞故希聲大象者視之不可見故無形凡此者皆道也然謂之明而若昧謂之夷而若𩔖謂之進而若退以至音而希聲象而無形名與實常若相反者也唯道為能如此故既以為人已愈有既以與人已愈多而生之畜之長之育之成之熟之養之覆之莫非道也故曰夫唯道善貸且成元澤注竊嘗論此篇曰道不逺人而世莫能覩者不明故也故首之以明道大道甚夷而惟明者能由之以進故次曰夷道也進道也進于道而復乎性命之常則不德之徳也故次之以上徳上徳者自得其徳而不同乎庶物者也故不染而白以其白自異于物則安能若谷乎故次之以若辱不辱而潔則是伯夷之隘也安能廣乎故若辱而后曰廣徳上徳而能廣則是與人為徒而可以為君師矣故曰建徳若偷偷者不汲汲乎有建者也建徳則有所立而離本近偽矣故又要在乎不易吾真故次之以質真其序至此則道之在我者體既具矣故曰大方無隅有大方以為體則所以應無方之傳而可以緒餘為人矣故曰大器大器者業也至人以其糠粃土苴為器而器未嘗不大也孔子以管仲為小器則帝王之功其大器乎道雖為此而要其終則未嘗為也未嘗有也故曰大音也大象也然則既盡之矣故能與道為一而供萬物之求成萬物之性也嗚呼是道也不可以識識而况于以言言乎而余論之者亦其粗而已矣息齋注上士聞道雖衆人識詆不能使之不勤中士聞道雖不能無信亦不能使之無疑下士聞道雖聖人復起不能使之不笑葢膠于有者天下皆是彼方以有為實今遂告以有之非實而無之為真其誰不疑且笑故不笑不足以為道亦理之當然不足怪也上士之勤非能勤也有見而勤下士之笑非故笑也無見而笑上不至于勤下不至于笑不能無見而又不能信其所見雖使之不疑不可得也古之立言葢有之矣明道者自明非色之明外不得而見其明故曰其明若昧進道者自進非力之進外不得而知其進故曰其進若退夷道無所不平彼以彼之平猶吾平也故曰若𩔖上德無所不容彼雖恢奇譎怪而吾以一視之故曰若谷大白不汙其性茍性不汙和其塵皆可也故曰若辱廣徳必有見於大茍見于大雖欲使之息不可得也故曰若不足建徳者内立自性自性有立則接物必簡故曰若偷質真者不徇于外外不徇則惟吾所之故曰若變大方無隅非廉隅可得而察也大器晚成非成不成可得而盡也大音希聲非聲音可得而知也大象無形非形器可得而執也中下之人方役其所見而議吾之跡以實昧實退實𩔖實辱實偷實渝其不侮笑者幾希矣葢大道無名隱而不可見至其貸以曲成乃其小小者爾非其實也上士知其無名略其貸而識其大故亦不可以議其名中下之士執其貸且成者以議全此其所以愈議而愈非也筆乘上士者恬惔寂寞虛無無為者也勤於此則勤行之至而實無所勤行也斯所謂天然縣解矣而下士惡足以知之君平曰中士所聞非至美也下士所見非至善也中士所眩下士所笑乃美善之美善者也道生一一生二二生三三生萬物萬物負陰而抱陽沖氣以為和人之所惡惟孤寡不穀而王公以為稱故物或損之而益或益之而損人之所敎我亦教之强梁者不得其死吾將以為教父凡動物背止於後陰静也耳目口鼻居前陽動也故曰負陰抱陽植物則背寒向煖而沖氣運乎其間木絶水曰梁木負棟亦曰梁取其力之强也故曰强梁金人銘曰强梁者不得其死好勝者必遇其敵葢古人嘗以此為教而我亦教之但老子獨尊之曰敎父者如言萬物之母之謂母主養父主教故言生則曰母言教則曰父蘇注夫道非一非二及其與物為偶道一而物不一故以一名道然而道則非一也一與一為二二與一為三自是以往而萬物生物雖有萬不同而莫不負陰抱陽冲氣以為和者葢物生於三而三生於一理之自然也世之人不知萬物之所自生莫不賤寡小而貴重大然王公之尊而自稱孤寡不榖古之達者葢已知之矣呂注道之在天下莫與之偶者英與之偶則一而已矣故曰道生一既謂之一則謂之者與所謂為二故曰一生二有一有二則有三矣故曰二生三故唯無名則已茍謂之一則其適遂至于三三立而萬物生矣故曰三生萬物凡幽而不測者陰也明而可見者陽也有生者莫不背于幽而不測之陰向于明而可見之陽故曰萬物負陰而抱陽負則背之抱則向之也雖然必有冲氣以為之和葢陰與陽二也冲氣一也萬物不得一無以生故也故人之所欲者軒冕富貴也而其所惡者孤寡不榖也軒冕在身非性命也物之儻來寄也而遂有之以為固則向陽而不知反之甚者也古之制名者以其所惡為王公稱者欲其貴而不㤀賤高而不㤀下抱而知所負向而知所反以不失乎沖一之和而已故物或損之而益益之而損滿招損謙受益時乃天道也人之所敎亦我義敎之我之所敎道也敎而不以我義者則亦非道而已葢唯通于道者為得一得一則無我無我不爭夫唯不爭故天下莫能與之爭反是死之徒而已君子之敎人雖或不同然至于反一而無我敎之所自而生也故曰强梁者不得其死吾將以為敎父息齋注道生一方其為道則一亦未生一既不生則安得有二無二則一不散故所以謂之不二言其未有一也及其有一即有二有陽即有陰有陰有陽則又有陰陽之交故有二則有三至于三則無所不有矣萬物抱陽一也負陰二也陰陽交而沖氣為和三也萬物孰不具此三者然要其本則必歸于道道者未有一之謂也由其本生于道故末而不失道是以天下之物或損之而益或益之而損孤寡不榖而王公以為稱葢損之生益也强梁者不得其死葢益之生損也夫惟損益同源故自損則必益自益則必損聖人未嘗益而自以孤寡不榖為稱葢欲使人知强梁者不得其死也是謂人之所敎我亦教之亦其應世之跡不得不然歟天下之至柔馳騁天下之至堅無有入於無間吾是以知無為之有益不言之教無為之益天下希及之馳騁役使也堅猶剛强不曰剛强而曰堅變文叶韻也無間無内也至剛者天下莫能勝而至柔能役之無内者天下莫能破而無有能入之二語皆設喻以明無為之有益也蘇注以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之於物則水是也以有入有捍不相受以無入有無未嘗勞有未嘗覺求之于物則鬼神是也是以聖人唯能無為故能役使衆强出入羣有呂注天下之至柔馳騁天下之至堅觀于物則水是也無有入于無間觀于物則氣是也水以其柔弱故幾于道然而不能無形者也而猶攻堅强者莫之能先氣以其無質故于神然而不能無氣者也猶能入于無間而况以無形之至柔太易之未見氣於以馳騁天下之至堅而入于無間則孰不為之動而亦何入而不自得哉故曰吾是以知無為之有益也而不言之教無為之益天下希及之是亦不知反其宗而已矣息齋注物本非物堅者偽體也雖天下之至堅其極必歸于無今天下之至柔已能馳騁天下之至堅況於無之真豈不足以破有之偽乎故無有能入無間無間者蹈水火入金石其精不亾之謂也無為之為其為以道不言之教其敎以天故無有能及之者名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久多猶重也薛云知足者樂今有之已多無求者也無求奚辱知止者懼後進之有損知幾者也知幾奚殆蘇注先身而後名貴身而賤貨猶未為忘我也忘我者身且不有而況于名與貨乎然貴以身為天下非忘我不能故使天下知名之不足親貨之不足多而后知貴身知貴身而后知㤀我此老子之意也不得者以亾為病及其既得而患失則病又有甚于亾者惟齊有無均得䘮而後無病也愛甚則凡可以求之者無所不為能無費乎藏之多則攻之者必衆能無亾乎呂注烈士之所狥者名也而至于殘生傷性則不知身之親于名也故曰名與身孰親貪夫之所狥者貨也而至于殘生傷性則不知身之多于貨也故曰身與貨孰多所狥者名則世謂之君子所狥者貨則世謂之小人君子小人之所狥雖或不同而亾其所存則一也然則得名與貨而亾其存則不知亾之病于得也故曰得與亾孰病是故愛名欲以貴其身也以甚愛之故并其良貴而失之是大費也蓄貨欲以富其身也以多藏之故并其至富而害之是厚亾也夫唯有徳者知至貴之在已而無待于名也故知足而不辱知至富之在已而無待于貨也故知止而不殆不辱不殆則可以長久矣息齋注名不親于身貨不多于身得不償其亾而世人毎貪于名溺于貨徇于得者由其無所見也我愛于物愛多則我費物藏于我物衆則我勞小則辱大則危有不可勝悔者君子則不然知物之備于我自反而足故于外無求雖欲辱之不可得也知吾之所止止于至道故非道不為雖欲危之不可得也是以為常常故能久大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辯若訥躁勝寒静勝熱清静為天下正蘇注天下以不缺為成故成必有敝以不虚為盈故盈必有窮聖人要于大成而不䘏其缺期于大盈而不惡其沖是以成而不敝盈而不窮也直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能静静之不能躁耳夫躁能勝寒而不能勝熱静能勝熱而不能勝寒皆滯于一偏而非其正也唯泊然清浄不染于一非成非缺非盈非沖非直非屈非巧非拙非辯非訥而後無所不勝可以為天下正矣呂注萬物始乎是終乎是是大成也然始無所始終無所止故若缺唯其若缺故其用日新而不敝萬物酌焉而不竭是盈也然益之而不加益故若沖唯其若沖故其用日給而不窮大直者曲之而全枉之而直者也故若屈大巧者刻彫衆形而不為巧者也故若拙大辯者不言而辯者也故若訥如是無它凡以有本故也本者何也今夫寒熱者天地之所為有形之所不免也而一躁焉則可以勝寒一静焉則可以勝熱以一時之躁静猶可以勝天地之所行況夫體無為之清静以為天下正則安往而不勝者乎故以言其成則若缺而不敝以言其盈則若沖而不窮其直若屈而伸其巧若拙而工其辯若訥而諭此之謂有本息齋注成與缺沖與盈直與屈巧與拙辯與訥皆物之形似者也惟道無名以形求之皆不可得故雖成若缺雖盈若沖雖直若屈雖巧若拙雖辯若訥葢其成不以形其盈不以器其直不以壯其巧不以心其辯不以口故世以形似求之皆不可得也葢世之言道術未有不偏如躁勝寒而不可以勝熱静勝熱而不可以勝寒要其各有所止也惟清静無為雖不求勝物而天下之物莫能勝之故曰清静為天下正葉夢得注寒暑者天地之氣也有人于此躁猶可以勝寒静猶可以勝熱茍知其所勝孰往而不可為則清勝濁静勝動其効亦可見矣而况于缺之勝成沖之勝盈屈之勝直拙之勝巧訥之勝辯惟其不察此故必求其能勝之者茍求勝之終非其正也唯清静為天下正吳注以成為成以盈為盈以直為直以巧為巧以辯為辯小矣若缺則非成若沖則非盈若屈則非直若拙則非巧若訥則非辯乃為成之大盈之大直之大巧之大辯之大者也天下有道卻走馬以糞天下無道戎馬生于郊罪莫大于可欲禍莫大于不知足咎莫大于欲得故知足之足常足矣卻屏去也糞糞田也吳㓜清本糞下有車字以張衡東京賦卻走馬以糞車為證戎馬戰馬也郊交也二國相交之境也戎馬生於郊言兵久不還也一性之内無欠無餘人能安之無往不足故曰知足之足常足希聲注夫天下有道之世雖有甲兵無所用雖有健馬無所乘天下無道之時天子則外攘四夷諸矦則外侵鄰國故兵甲動于境内戎馬馳于四郊桑梓盡于樵薪荆棘生于隴畝矣夫無道之君毒痡天下原其所以其惡有三心見可欲非理而求故罪莫大焉求而不已必害於人故禍莫大焉欲而必得其心愈熾故咎莫重焉然自非聖人不能無欲欲則不能無求求而不知足禍之甚者也嗟乎凡非真性皆外物也夫焉得而有之人皆有至足者能知至足之足則無所不足矣蘇注天下各安其分則不爭而自治故卻走馬而糞田以其可欲者示人固有罪矣而不足其足者其禍又甚所欲必得者其咎最大匹夫有一于身患必及之矦王而為是則戎馬之所自起也唯知足者所寓而足故無不足呂注天下有道民之智能已于耕食之間而盜爭銷于無欲之際而其死已脱矣故曰郤走馬以糞天下無道見可欲以為造兵之本雖有封彊之界不能定也故曰戎馬生于郊然則罪之所由生者何耶可欲而已矣故曰罪莫大于可欲由可欲故不知足則雖有餘而不止也平為福有餘為禍故曰禍莫大于不知足由不知足故欲得欲而得之則怨咎之招而兵之所以不已也故曰咎莫大于欲得故不知足者雖足而不足則知足之足常足也可知矣息齋注天下有道則能使兵為民天下無道則能使民為兵人能知道則能使色為空人不知道則能使空成色可欲者愛也不知足者取也欲得者有也由愛生取由取生有衆有横生遂為無窮之咎若知取不必外是謂知足知足則無不足矣不出户知天下不窺牖見天道其出彌逺其知彌少是以聖人不行而知不見而名不為而成蘇注性之為體充遍宇宙無逺近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人為物所蔽性分于耳目内為身心之所紛亂外為山河之所障塞見不出視聞不出户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌逺而彌少也性之所及非特能知能名而已葢可以因物之自然不勞而成之矣呂注天下之所以為天下者果何邪見天下之所以為天下則不出户而知之矣天道之所以為天道者果何邪見天道之所以為天道則不窺牖而見之矣今夫天下之大固無窮也必待出而後知之則足力之所及者寡矣所知者幾何哉天道之逺固不測也必待窺而後見之則目力之所及者寡矣所見者幾何哉故曰其出彌逺其知彌少是以聖人知天下之所以為天下故不行而知見天道之所以為天道故不見而名夫何故以其備于我故也知之于所不行名之于所不見則不為而成矣章安注出户而知知其所可知爾窺牖而見見其所可見爾天下之大天道之廣豈可以知知以見見乎出户則離此而有所知其知能幾也窺牖則即彼而有所見其見豈逺也聖人密運獨化不以知知故無所不知不以見見故無所不見天下者物之所在使然者也天道者道之所在自然者也其粗在物其妙在道皆不離當體而盡夫知見何事于出何待于窺出户則有行窺牖則有見聖人不行而本乎智不見而本乎心故天下之事皆可得而知天道之妙皆可得而名能知能名故不為而為成其所自成也息齋注出而求天地者求其形也天地不可以形盡而可理盡故其出彌逺其知彌少若知其理之在此則雖閉户可也聖人知不在形故不必行名不在色故不必見成不在事故不必為為學日益為道日損損之又損之以至于無為無為而無不為矣故取天下常以無事及其有事不足以取天下取開元疏云猶攝化也無事即無為也無為自化清静自正故曰取天下常以無事為者敗之執者失之故曰有事不足以取天下羅什注損之者無麤而不遣遣之至乎㤀惡然後無細而不去去之至乎㤀善惡者非也善者是也既損其非又損其是故曰損之又損是非俱㤀情欲既斷徳與道合至于無為已雖無為任萬物之自為故無不為也蘇注不知道而務學聞見日多而無以一之未免為累也孔子曰多聞擇其善者而從之多見而識之知之次也茍一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予為多學而識之者與曰然非與曰非也予一以貫之去以求復性可謂損矣而去之心猶存及其兼㤀此心純性而無餘然後無所不為而不失于無為矣人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無為故無事其心見于外而物安之雖不取天下而天下歸之矣呂注為學者未聞道者也未聞道而求之則不得不博故日益為道者已聞道者也已聞道者而為之則期至于無為而已故日損而損之者未免乎有為也并其損之者而損焉而後至于無為無為者無有而已無不為者乃所以無無也此之謂絶學無憂無憂之謂神神也者物物而非物者也則取于天下也何有由此觀之取天下常以無事及其有事不足以取天下觀莊周之所以應帝王者而深求之則可知已黄茂材注無所不知而後可以言學故學欲日益益者已化然後可以言道故道欲日損然益者可以進損者不可彊損而未能兼㤀其損未為損也直須瞥地脱落前後際斷乃至無為之地故能無所不為而應用不窮施于天下綽綽然矣息齋注為學所以求知故日益為道所以去故日損知不極則損不全故日益者所以為日損也若損之又損去真全則無為矣至于無為則凡有為未嘗不無此又未易以損益論也及其無為之至雖取天下而有之尚猶不見其事若以有事取之取一物尚不可得而况于取天下乎聖人無常心以百姓心為心善者吾善之不善者吾亦善之徳善矣信者吾信之不信者吾亦信之徳信矣聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之無常心心無所主也惵圖協反為去聲渾胡本反蘇注虛空無形因萬物之形以為形在方為方在圓為圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以為心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未嘗渝也可謂徳善矣信不信在彼而吾之所以信者未嘗變也可謂徳信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉天下善惡信偽方各自是以相非相賊不知所定聖人憂之故惵惵為天下渾其心無善惡無信偽皆以一待之彼方注其耳目以觀聖人之予奪而吾一以嬰兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不愠釋然皆化而天下始定矣呂注人心其神矣乎操則存舍則亾出入無時莫知其鄉操存舍亾則無常體之可測出入無時則非今昔之可求莫知其鄉則非方所之可得神則若是人心亦然聖人先得我心之盡者也故無常心而以百姓心為心猶之鑑也無常形以所應之形為形而已聖人之視已心也如此則其視百姓心亦若是而已則善不善信不信亦何常之有哉故善者吾善之不善者吾亦善之知其心之善不善無常而以徳善之故也信者吾信之不信者吾亦信之知其心之信不信亦無常而以德信之故也物得以生之謂徳形體保神各有儀則之謂性性修反徳徳至同于初則徳者性之所自出而無不善不信明矣聖人之在天下惵惵然不已為百姓渾其心渾其心也者使善信者不以自異而不善不信者不自棄故也百姓皆注其耳目唯聖人之為視聽而聖人皆孩之孩之也者遇之以慈侍之以厚雖有不善不信猶善而信之知其心之無常猶已而已矣元澤注善惡生乎見見生乎自私公于大道則雖目覩善惡而心無殊想矣故聖人因世之情强立毁譽而心知善惡本非其實故不善之善非憐而恕之乃不覺有異也㤀善惡之實真善也是以萬法雖殊等為實相信與不信混為一體知一切相無非者故能視不善猶善知一切相無非實者故能視不信猶信當知實當實知此聖智所以異于衆人也息齋注甚矣心之為天下害也莊子曰賊莫大於徳有心而心有眼盖心之為物潜天而天潜地而地無逺不至而世人但以分别為心分别心生有所見遂䘮其全此莊周所以謂之賊也聖人之心常與道俱道無所不在吾心亦無所不在故無常心及其出而應世知其相從于故取捨之心未嘗生也善吾從而善不善亦吾從而善于天下無不善是謂徳善信吾從而信不信亦吾從而信于天下無不信是謂徳信怵怵然常恐天下之人徳有心而心有眼穿鑿取與不見大全故每為天下渾其心百姓用耳目所接者為明而不知其非明也聖人皆孩而畜之使不為非明所亂然則非明者豈釋氏所謂無明者歟宏甫注百姓有善不善而聖人皆善之百姓有信不信而聖人皆信之夫聖人曷嘗有善信之心哉一以百姓之心為善信故也是謂同徳之善而非一人之善同德之信而非一已之信故曰徳善徳信也夫天下之人各一其心也久矣聖人則合天下之人而渾為一心百姓皆注其耳目以我觀彼以此視我各相是非不可一也聖人見此不喜聞彼不怒一以嬰兒遇之是以彼亦不矜此亦不愠釋然皆化而天下定矣聖人無常心以百姓之心為心也如此此太上治世之大㫖所以能無為者哉出生入死生之徒十有三死之徒十有三人之生動之死地者亦十有三夫何故以其生生之厚葢聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地出謂自無而見於有入謂自有而歸于無莊子萬物皆出于機入于機又曰其出不忻其入不詎又曰有乎出有乎入皆以出為生入為死夫音符攝生如攝政攝官之攝不認生為已有如暫焉管攝之也不期而會曰遇兕音似山海經兕出湘水之南蒼黒色爾雅云形如野牛一角重千斤蘇注性無生死出則為生入則為死用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知黙知思而不知㤀以于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無為之妙也有生則有死故生之徒即死之徒也人之所賴于生者厚則死之道常十九聖人常在不生不死中生地且無焉有死地哉呂注生者死之徒死者生之始則生死相為出入而已矣生之徒十有三則由生而得生非幸生者也死之徒十有三則由死而得死非不幸而死者也民之生動之死地十有三則豹養其内而虎食其外毅養其外而病攻其内非不以生為事顧不得其道而動之死地者也夫何故以其生生之厚葢由生得生由死得死者固不必論而以生為事而反之死地其失為在此也葢聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地焉老子之于此固已體之而言葢以疑之言聞以質之何也此莊周所謂重言耶嘗試論之人之所以遇虎兕被甲兵而虎兕甲兵之所以能傷人者以吾有身故也今我視吾心莫知其鄉則吾心不可得吾心不可得則吾身與物亦不可得内不見有身外不見有物則孰為死地孰為虎兕甲兵而投其角措其爪容其刃哉然則善攝生者夫何以加此元澤注至人不知死不知生故亦莫能死亦莫能生故曰未嘗死未嘗生也彼偏乎陰陽而與生死為徒者及徇欲為咎動之死地者凡是三𩔖所見則殊而原其所以迷大道之至正而不免于生死者由有其生而矜生過厚故耳或曰彼為道而至乎枯槁者豈生生之厚乎曰吾之所以為我不死不生湛爾常一唯當息而彼乃執其所見更為枯槁故雖志趨空寂而不知其為有我之尤者也無死地者由其無生彼無生者湛然常生而不自生故未嘗死未嘗生道至乎此則雖其形有禪而神未嘗變安得死乎此中國之神聖而西方之佛也若然者變化無常水火不能焦濡斫撻不能創病乘虛觸實往無不通則物欲有之而不得況能傷之哉或曰然則何以謂之攝生曰降此一等便為死生所有故攝生必至于此然後生常存也是比于含徳之厚者又為至矣筆乘生之徒十有三此練形住世者也死之徒十有三此珣欲㤀生者也人之生動之死地十有三此斷滅種性者也凡此十分之中率居其九皆生生之厚者也夫有生必有死是生固死之地矣兕虎甲兵將安避之善攝生則無生矣故兕之角無所投虎之爪無所措兵之刃無所容何者彼無地以受之也厚生者九無生者一老子于十者之中闕一自擬其旨微矣然聖人無生非故薄之也本無生也昔人云愛生者可殺也愛潔者可汙也愛榮者可辱也愛完者可破也本無生孰殺之本無㓗孰汚之本無榮孰辱之本無完孰破之知此者可以出入造化遊戲死生程俱論萬物之變莫大乎死生人之為道超然于死生之際則無餘事耳生果來乎死果往乎以生為實來則吾之所從來者宜可知矣南北邪東西邪上下邪審不可以言也而謂之實來可乎以死為實住則吾之所從往者宜可知矣心邪物邪人邪天邪審不可以言也而謂之實往可乎然則吾之生也前不知其所起後不知其所斷貫萬古而常存者湛然也然後曉然知我之未嘗生未嘗死也將以奚為死地哉道生之徳畜之物形之勢成之是以萬物莫不尊道而貴徳道之尊徳之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有為而不恃長而不宰是謂𤣥徳畜許六反夫音符長上聲下同希聲注夫物生而後畜畜而後形形而後成其所由生者道也其所以畜者徳也形其材者事也成其用者勢也萬物以能生故尊道以能畜故貴徳道徳以生畜之故自然為萬物所仰豈有授之爵位而後見尊貴哉然道者真精之體徳者妙物之用體可以兼用用不可以兼體道可以體徳徳不可以兼道故稟其精謂之生含其炁謂之畜遂其形謂之長字其材謂之育權其成謂之亭量其用謂之毒保其和謂之養䕶其傷謂之覆此之謂大道既生之而不執有既為之而不矜恃既長之而不宰制此之謂𤣥徳營章言人同于道徳今此章言道徳同于人是以其辭同而其理通也蘇注道者萬物之母故生萬物者道也及其運而為徳牧養羣衆而不辭故畜萬物者徳也然而道徳則不能自形因物而後形見物則不能自成逺近相取剛柔相交積而為勢而後興亾治亂之變成矣形雖由物成雖由勢而非道不生非徳不畜是以尊道而貴徳尊如父兄貴如矦王道無位而徳有名故也恃爵而後尊貴者非實尊貴也呂注萬物之生常本于無名之物而其畜常在于一而未形而物得以生之際無名者道也一而未形物得以生者徳也及其為物則特形之而已非其所以生且畜也已有形矣則躶者不得不躶鱗介羽毛者不得不鱗介羽毛以至于㓜壯老死不得不㓜壯老死皆其勢之必然也故曰道生之徳畜之物形之勢成之然則勢出于形形出于徳徳出于道道徳本也形勢末也本尊而末卑本貴而末賤是以萬物奠不尊道而貴徳道之尊徳之貴夫莫之爵而常自然此其所以能以無為之柔弱而勝形勢之剛强則王矦之所以賓化萬物者在此而不在彼也然則雖曰道生之徳畜之物形之勢成之至本而言之則生之畜之長之育之亭之毒之養之覆之莫非道也而道終無名焉故曰生而不有為而不恃長而不宰是謂𤣥徳元澤注此四者皆道也以其各得其道故但為徳為徳則畜之而已然畜之所以為徳也及乎得其得而成形則物而已矣物有其形則逺近相取剛柔相交各因其勢而成狀故德者道之分物者徳之器勢者物之理明乎道徳則形勢不足知而應酢無難矣命于天則為天子命于天子則為諸矦有所受命則出命者能賤之矣唯道萬物之先而制其命孰能假之故常自然也息齋注物非道不生非徳不畜自其有形以至於勢長莫不以道徳為主道之尊徳之貴至於此極矣然不自尊其尊不自貴其貴其施於物非有心于物也莫之命而常自然自然而生自然而畜凡所以長育成熟以至于養之覆之莫非自然者由其自然故未嘗望物之報生不辭勞施不求報是謂𤣥徳天下有始以為天下母既得其母以知其子既知其子復守其母殁身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常兊口也人之有口家之有門皆喻物所從出者塞而閉之藏有於無守母者也參同契云耳目已之寳閉固勿發揚兌口勿以談希之順以洪即此義不可目窺曰小不可力得曰柔遺唯季反襲常猶前言襲明密而不露也記曰揜而充裘曰襲蘇注無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也故謂之始又謂之母其子則萬物也聖人體道以周物譬如以母知其子了然無不祭也雖其智能周之然而未嘗以物㤀道故終守其母也天下皆具此道然常患㤀道而徇物目悦于色耳悦于聲開其悦之之心而以其事濟之是以終身而陷溺不能救夫聖人之所以終身不勤者唯塞而閉之未嘗出而徇之也悦之為害始小而浸大知小之將大而閉之可謂明矣趨其所悦而不顧自以為强而非强也唯見悦而知畏之者可謂强矣世人開其所悦以身狥物往而不反聖人塞而閉之非絶物也以神應物用其光而巳身不與也夫耳之能聴目之能見鼻之能臭口之能甞身之能觸心之能思皆所謂光也葢光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣呂注天下有始以為天下母則經所謂吾不知其名字之曰道者是也無名天地之始有名萬物之母道常無名而為天下母何也葢有名徒為萬物母而未足為天下母無名天地之始則自天而下皆生于無名故曰天下有始以為天下母也聞道易得道難得道易守道難今我既得其母以與心契矣非特聞之而已也則知天下之物皆我之所出也知天下之物皆我之所出而我常守之而不失則天下孰能以其所出而害其所自出哉此其所以歿身不殆也塞其兊閉其門終身不勤此則守其母之謂也心動于内而吾縱焉是之謂有兊有兊則心出而交物我則塞其兊而不通不通則心不出矣物引于外而吾納焉是之謂有門有門則物入而擾心我則閉其門而不納不納則物不入矣内不出外不入雖萬物之變芸芸于前各歸其根而不知矣夫何勤之有哉古之人有能廢心而用形者以此道也若開其兊而不塞濟其事而不損則我之心直為物之逆旅莫適守者何恃而不亾哉此所以終身不救也夫惟守其母者毎見其心於動之㣲則寂然不動矣寂然不動感而遂通天下之故故曰見小曰明守無形之至柔而物莫之能勝也故曰守柔曰强既用其光以照其動之㣲復歸其明以反于寂然也則未嘗開兊濟事以至于不救何殃之有哉如是則襲于知和而深不可見矣故曰用其光復歸其明無遺身殃是謂襲常息齋注道為物母物為道子古之得道者能使子母不離而道物為一葢物從道出物不異道子從母出子不異母物不異道而世欲棄物以求道子不異母而世欲棄子而求母本不異而自異之是以終不得而一也使人知物即道子即母知之守之則左右逢其原有不難者凡物不自道而用物以遺道者以人開其兊也兊者突也穴其突以濟其欲心蕩而精衰則物隨而䘮必閉其兊塞其門神不外出旋元自歸自然子母不離道與物一矣古之至人保其身而身存者用此道也人之患在于不謹其小不養其㣲若自小而謹之自㣲而養之雖小必明雖㣲必强故曰見小曰明知柔曰强明者本也光者明之所自出也元明為本其末分而為視為聴為覺為觸者皆其光也道自本流于末學自末求其本故曰用其光復其明是謂襲常常即本明光自明而光今以光歸其明故曰襲常使我介然有知行于大道惟施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文采帶利劒厭飲食資貨有餘是謂盗竽非道哉介然有知猶言㣲有知也夸張曰施嗇之反也夷平也路狹而㨗為徑除治也傳曰糞除先人之敝廬是也青赤為文色絲為采傳奕云采是古文繡字資貨一作財貨盗竽誤作盗夸今從韓非本韓非解朝甚除也者獄訟繁也獄訟繁則田田則府倉虛府倉虛則國貧國貧而民俗淫侈民俗淫侈則衣食之業絶衣食之業絶則民不得無飾巧詐飾巧詐則知采文知采文之謂服文采獄訟繁倉庫虛而有以淫侈為俗則國之傷也若以利劒刺之故曰帶利劒諸夫飾智故以至於傷國者其私家必富私家必富故曰資貨有餘國有如是者則愚民不得無術而效之效之則小盗生由是觀之大姦作則小盗隨大姦唱則小盗和竽也者五聲之長者也故竽先則鍾瑟皆隨竽唱則諸樂皆和今大姦作則俗之民唱俗之民唱則小盗必和故服文采帶利劒厭飲食而資貨有餘者是之謂盗竽矣希聲注老氏言若吾囂然略無知道之心始欲希於當世則唯所行之為務務其茍合於當世也使我介然微有知常之明方將行于大道則唯所施而是畏畏其不合於大道也夫大道之云猶亨衢也亨衢平易無往不達以其大直不患小迂而世人欲速由于捷徑是以崎嶇迷惑不達所趨故聖人病之慎所施教畏其導民於邪路終不合于大道焉噫入其國其政教可知也觀朝闕甚修除墻宇甚雕峻則知其君好土木之功多嬉遊之娱矣觀田野甚蕪則知其君好力役奪民時矣觀倉廩甚空虛則知其君好末作廢本業矣觀衣服多文彩則知其君好淫巧蠹女工矣觀佩帶皆利劒則知其君好武勇生國患矣觀飲食常饜飫則知其君好醉飽忘民事矣觀資貨常有餘則知其君好聚斂困民財矣凡此數者皆盗用民力以為夸毗故謂之盗夸盗夸者非有道之治也然則盗用之云陰取之而民不知也所謂唯施是畏其在此乎蘇注體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道夷易無有險阻世之不知者以為迂逺而好徑以求捷故凡舍其自然而有所施設者皆欲速者也俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設為事夸以誨盗哉呂注君子之于道不可以不刳心心刳而無餘雖萬變陳于前而不足以撓吾之静夫何施而畏哉使我不能刳心而有介然之知行于大道則唯施是畏求其周行不殆不可得也况夫開其兊濟其事者耶大道之為體不知而知則夷之甚者也而民乃欲以有知求之是好徑而不知所由也人之生以食為本而食必出于田田治而倉實倉實而食足食足而財豐財豐而廷治以知其本之所自出故也今以介然有知之心而行于大道則已不得其母不得其母則其子非吾有也非吾有而取之猶之洒掃其庭内蕪其田虛其倉而服文采帶利劒厭飲食資財有餘亦非其有而取之矣非盗夸無以為也豈道也哉息齋注道不在知知者邪思也真道必明明而非知知不可及故施之不盡用之不窮使我介然以有知之心而行大道所知有限而道無窮怵怵然恐其施之不足是謂惟施是畏葢大道甚夷而民好徑好徑者知之為賊也使行于無知則凡所見聞無非道者豈不蕩然廣大心逸日休哉後世不然朝甚除除者治也除治其朝廷則外飾者至矣田甚蕪則心不治倉甚虛則行不修方且服文采以眩人帶利劒以威衆積飲食財貨而無所用之是謂盗夸如此則去道逺矣善建者不拔善抱者不脱子孫祭祀不輟修之于身其徳乃真修之于家其徳乃餘修之于鄉其徳乃長修之于邦其徳乃豐修之于天下其德乃普故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此邦一作國漢人避高帝諱改之於韻不叶今從韓非本蘇注世豈有建而不拔抱而不脱者乎唯聖人知性之真審物之捐物而修身其徳充積實無所立而其建有不可拔者實無所執而其抱有不可脱者故至其子孫猶以祭祀不輟也身既修推其餘以及外雖至于治天下可也天地外者世俗所不見矣然其理可推而知也修身之至以身觀身以家觀家以鄉觀鄉以國觀國皆吾之所及知也然安知聖人以天下觀天下亦若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳呂注凡物以建而立者未有不拔者也唯為道者建之以常無有則善建而不抜矣凡物以抱而固者未有不脱者也唯為道者抱神以静則善抱而不脫矣夫唯所建所抱者如此則其傳豈有窮哉此子孫所以祭祀不輟也世之所謂修徳者或修之于天下國家而不知其本真乃在吾身也故曰修之身其徳乃真或修諸其身而不能推之于天下國家者故曰修之家其徳乃餘修之鄉其徳乃長修之國其徳乃豐修之天下其德乃普也莊周以為道之其以治身其緒餘以為國家其土苴以治天下其説出于此也然則何觀而修之身哉以身觀身而已矣何謂以身觀身今吾觀吾身之所有何自也則知吾身之所自而有矣又觀吾身之所以觀者何自也則知吾觀之所自而觀矣既知吾身之所自而有又知吾觀之所自而觀則所以修之身者已足而無待于外也以家觀家以國觀國以天下觀天下亦若是而已矣古之所以藏天下于天下者用是道也含徳之厚比于赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不嗄和之至也知和曰常知常曰明益生曰祥心使氣曰强物壯則老謂之不道不道早已毒蟲蜂蠆之𩔖以尾端肆毒曰螫猛獸虎豹之𩔖以爪按拏曰據攫鳥鵰鶚之𩔖以羽距擊觸曰搏趙志堅曰以四指握拇指為握固䘒子垂反説文云赤子陰也號平聲嗄所嫁反聲嘶也又啼極無聲曰嗄一作嗌不嗄黄茂材云古本無嗌字嗌不嗄莊子之文後人増入之祥凶吉之候也蘇注老子之言道徳每以嬰兒况之者皆言其體而己未及其用也夫嬰兒泊然無欲其體則至矣然而物來而不知應故未可以言用也道無形體物莫得而見也況可得而傷之乎人之所以至于有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所以至此者唯無心也無執而自握無欲而自作是以知其精有餘而非心也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常生不可益而欲益之則非其正矣氣惡作而又以心使之則强梁甚矣益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣呂注人之初生其徳性至厚也比其長也耳目交于外心識受于内而益生日益多則其厚者薄矣為道者損其所益生性修反徳徳至同于初故曰含徳之厚比于赤子夫赤子之為物特以其受冲氣之和積而未散而猶毒蟲不螫猛獸不據攫鳥不搏況夫充純氣之守通乎物之所造而其和大同于物者夫孰能害之魏文侯之間卜商是也葢唯精為能致和何以言之今夫赤子不知所取而握固不知所與而䘒作則精也使赤子也介然有取與之知則不一而粗矣其能如是乎故曰骨弱筋柔而握固未知牝牡之合而䘒作精之至無所憂愠故雖終日號而嗌不嗄則和也使赤子也有所憂愠則氣戾而不和其能若是乎故曰終日號而嗌不嗄和之至夫形全精復與天為一精而又精反以相天精而至于相天則其充沖氣之和以至大同于物不足異也故致道之極則至于復命復命曰常含德之厚則至于知和知和亦曰常則道徳雖有間及其會于常則同也知常則常因其自然而不益生動不知所為行不知所之身若槁木之枝而心若死灰奚以心使氣為哉故益生則曰祥禍福無有則無人灾祥者禍福兆于此而人灾隨之矣心使氣則曰强强梁者死之徒夫致虛而守柔者道也道乃久沒身不殆致實而强則物而已物壯則老其道也哉故曰物壯則老是謂不道不道早已知者不言言者不知塞其兌閉其門挫其鋭解其紛和其光同其塵是謂𤣥同不可得而親不可得而疎不可得而利不可得而害不可得而貴不可得而賤故為天下貴蘇注道非言説亦不離言説然能知者未必言能言者未必知唯塞兑閉門以杜其外挫鋭解紛和光同塵以治其内者黙然不同而與道同也可得而親則亦可得而疎可得而利則亦可得而害可得而貴則亦可得而賤體道者均覆萬物而孰為親疎等觀逆順而孰為利害不知榮辱而孰為貴賤情計之所不及此所以為天下貴也呂注知至于知常則知之至也知之至則黙而成之而無不理也何所容心哉茍為不能無言則不能無我雖知之非真知者也故曰知者不言言者不知塞其兑閉其門挫其鋭解其紛和其光同其塵是謂𤣥同則黙而成之之道也若然者萬物一府死生同狀無所甚親無所甚踈故不可得而親不可得而疎不就利不違害故不可得而利不可得而害不榮通不醜窮故不可得而貴不可得而賤夫可得而親疎利害貴賤者則貴在于物而物能賤之不可得而親疎利害貴賤者貴在于我而物不能賤也其為天下貴不亦宜乎然則知道者固終不言故曰今以言言道則言非道也而知者乃以言為知則是知知矣斯言所以不得不出也以其言出于無言雖言猶不言也夫道豈黙然也哉碧虛注君平曰五味在口五音在耳如甘非甘如苦非苦如商非商如羽非羽而易牙師曠能别之其所以别之者口不能言也音味尚爾况妙道乎所以曰知者不言言者不知也塞兊閉門已見第五十二章然彼則約道清淨以塞耆欲愛悦之端此則宗道無言故興損聰棄明之説夫道無形不可以目眡不可以口傳故心困焉不能知口辟焉不能議此至人不待收視緘口而自塞兊閉門也挫銳解紛和光同塵已見第四章然彼則就道以論功此則據人以明行至人與天同心而無知與道同身而無體則進鋭紛亂之心於何而有光塵分别之意於何而生哉故至人之遊處顯則與萬物共其本晦則與虛無混其根語黙隨時而不殊巵言日出而應變是以謂之𤣥同也元澤注不言者非密而不言誠無所事言何則不見一法故也不見一法故物物而不物于物况可得而親疎貴賤之乎可得而親疎貴賤者物而已矣彼物物而不物于物故冀之爵而常貴也息齋注世之所有皆為夢境故知者不言知言之未盡也世之昧者以夢為實譊譊誦説終不離夢故言不知由其見之未至也塞其兌謹其出也閉其門其入也挫其鋭者治其内也解其紛者理其外也和其光者抑其在已也同其塵者隨其在物也無出無入無内無外無已無物是謂𤣥同既得其同謂之親而逺謂之疎而近謂之利而不喜謂之害而不懼謂之貴而不高謂之賤而不下凡物不足以名之故能為天下貴以正治國以奇用兵以無事取天下吾何以知天下之然哉天下多忌諱而民彌貧民多利器國家滋昏人多技巧奇物滋起法令滋章盗賊多有故聖人云我無為而民自化我好静而民自正我無事而民自富我無欲而民自樸蘇注古之聖人柔逺能邇無意于用兵唯不得已然後有征伐之事故以治國為正以用兵為奇雖然此亦未足以取天下天下神器不可為也為者敗之執者失之唯體道者廓然無事雖不取天下而天下歸之矣人主多忌諱下情不上達則民貧而無告利器權謀也明君在上常使民無知無欲民多權謀則其上眩而昏矣人不務本業而趨末技則非常無益之物作矣患人之詐偽而多為法令以勝之民無所措手足則日入于盜賊矣呂注國容不入軍軍容不入國其來久矣則其所以治國用兵者固不同也治國者不可以不常且久者也故以正而不以奇正者所以常且久也兵者不祥之器非君子之器故有道者不處兵而常且久則是處之也故以奇而不以正奇者應一時之變者也以奇故不能不有以為以正故不以智治國國之福也治國而無所事智則有事之不可以取天下也明矣故曰以正治國以奇用兵以無事取天下何以知無事之足以取天下哉以有事不足以取天下而知之也夫唯為不出于無為而至于有事則天下多忌諱以避其所惡則失業者衆而民彌貧人多利器以趨其所好則下難知而國家滋昏民彌貧而多利巧國家滋昏而奇物滋起此法令所以滋彰而盜賊多有也法禁于法之所加而不能禁于法之所不加令行于令之所聽而不能行于令之所不聴民貧而多利巧則令有所不聴矣國家昏而奇物滋起則法有所不加矣此所以滋彰而盗賊多有也若然者凡以有事取天下之過也故聖人云我無為而民自化我好静而民自正我無事而民自富我無欲而民自樸此則取天下常以無事之證也盖其失之也由有事故天下多忌諱而民彌貧人多利器而國家滋昏惟其如此故民多利巧奇物滋起法令滋彰盗賊多有也其復之也由無為故好静無為故民自化而絶巧棄利奇物不起好静故民自正而盗賊無有由無為好静故無事而無欲以無事故民自富而無忌諱之貧以無欲故民自樸而無利器之昏其序然也息齋注我以正治人由人之本正也以奇用兵由兵之本奇也以無事取天下由天下之本無事也凡我之應物者豈以我哉亦由物而已矣古之聖人能以天下為一身中國為一人者其治自心出也我多忌諱則禁防必設禁防既設則民安得而不貧我以利示民則民多趨利民既趨利則國安得而不昏我以巧示民則民多伎巧伎巧既勝則奇物安得不滋我以法治民則民亦竊法以自便上下相冒則盗賊安得而不多聖人示以無為示以好静示以無事示以無欲天下各以其所示者報之故曰德猶風也民猶草也草上之風必偃其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正邪正復為奇善復為祅人之迷也其日固久矣是以聖人方而不割廉而不劌直而不肆光而不耀悶音門缺殘缺也一作失望貌以其察察宜無不及故人望之而卒失望也極終也奇衺也廉稜也劌居衞反割也皆謂芒利傷物也蘇注天地之大世俗之見有所眩而不知也葢福倚于禍禍伏于福譬如老穉生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知為至彼方且自以為福而不知禍之伏于後方且自以為善而不知妖之起于中區區以察為明至于察甚傷物而不悟其非也可不哀哉知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也此則世俗所謂悶悶也呂注以正治國以無事取天下則其政悶悶悶悶者言其不以察為快也故其民淳淳淳淳者言其不于薄也以智治國以有事為天下則其政察察察察者反悶悶者也故其民缺缺缺缺者言其不全于樸也淳淳故安于徳性而不為禍福奇正善祅之所遷是不染于薄也缺缺故避禍而未必免求福而未必得以為正也而有時乎為奇以為善也而有時乎為祅而禍福奇正善祅未知孰在也徒令智多而難治是不全于樸也何則時有終始世有變化禍福淳淳至有所拂者有所宜有所拂者世所謂禍而有所宜則福所倚也有所宜者世所謂福而有所拂則禍所伏也則孰知其極而避就之耶自殉殊而有所正者有所差則所謂正者果未可知也今為正者後或為奇此為奇者彼或為正善與祅亦然則天下之禍福正奇善祅果未可定也民自有知以來迷而執之其日久矣奈何重之以察察之政而使之不得反樸而全乎是以聖人方而不割故不以一人斷制利天下廉而不劌故勝物而不傷直而不肆故能曲全而枉直光而不耀故用其光復歸其明此無它取此悶悶而去彼察察故也息齋注其政悶悶若無求于民而民不以巧應上故其民醇醇察察若有得于已而民以巧求免故其民缺缺天下之事禍福之相為倚㐲所從來久矣政悶悶者無得在我而有得在民政察察者有失在民而有得在我我得則彼失我福則彼禍自然之理也昧者不知理道之正專以察為明以求僥倖之福遂使正復化而為奇善復化而為祅人之迷其日久矣是以聖人方而不割廉而不劌直而不肆光而不耀賞罰刑政葢有設而不用其極則能使奇者反而為正祅者變而為善故曰敎化之行引中人而納于君子之域敎化之廢引中人而陷于小人之途此不可不知也農師注其無正邪葢有正者有正正者所謂正正者無正是也夫唯無正故能超乎吉凶之表而無禍無福以知其極也若夫未能致于無正之地而流于吉凶之域則一禍一福其運如輪其循如環終于迷而已故曰正復為奇善復為妖民之迷其日固久治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積徳則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是謂深根固柢長生久視之道服一作復柢一作蒂花趺也韓非解衆人之用神也躁躁則多費多費之謂侈聖人之用神也静静則少費少費之謂嗇嗇之為術也生於道理夫能嗇也是從於道而服於理者也衆人離於患陷於禍猶未知退而不服從道理聖人雖未見患禍之形虛無服從於道理以稱蚤服故曰夫唯嗇是謂蚤服知治人者其思慮静知事天者其孔竅虛思慮静故徳不去孔竅虛則和氣日入夫能令故德不去新和氣日至者蚤服者也故曰蚤服是謂重積德蘇注凡物方則割廉則劌直則肆光則耀唯聖人方而不割廉而不劌直而不肆光而不耀此所謂嗇也夫嗇者有而不用者也世患無以服人茍誠有而能嗇雖未嘗與物較而物知其非不能也則其服之早矣物既已服斂藏其用至于歿身而終不試則德重積矣德積既厚雖天下之剛强無不能克則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也孟子曰存其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固蔕者是也古之聖人保其性命之常不以外耗内則根深而不可拔蔕固而不可脱雖以長生久視可也葢治人事天雖有内外之異而莫若嗇則一也呂注治人而不以人之所以為人者治之則人不可得而治矣事天而不以天之所以為天者事之則天不可得而事矣精神四達並流而無所不極化育萬物其名為同帝則人之所以為人而天之所以為天者也純素之道唯神是守守而勿失與神為一則人其有不可得而治天其有不可得而事者乎故曰治人事天莫如嗇也夫唯嗇其精神而不用則早復者也茍為不嗇而費之至于神敝精勞雖欲反其精神亦無由入矣其於復也不亦晚乎故曰夫唯嗇是謂早復人之生也固足于徳夫誠能嗇而早復之則德日益以充故曰早復謂之重積徳重積徳則德之至者也至徳者火不能熱水不能溺寒暑不能害而禽獸不能滅則安往而不克哉故曰重積徳則無不克夫有所不克則其道有時而極也無所不克則執知其極哉故曰無不克則莫知其極夫有土者有大物也有大物者不可以物物而不物故能物物莫知其極則不物而能物物者也雖有土而無其累矣故曰莫知其極可以有國既得其母以知其子既知其子復守其母殁身不殆故曰有國之母可以長久然則嗇之為道是謂深根固蔕長生久視之道也精神者生之根嗇而藏之則根深而生長矣長生者視之蔕衛而保之則蔕固而視久矣息齋注外以治人内以事天皆莫若嗇嗇者無所不嗇之謂也謹于内閑於外内心不馳外心不起之謂嗇故能早服内服其心外服其形寂然不動則徳有所積積于不積則無不勝無不勝則無不治雖有國猶可也人知其可以有國而不知其可以有國者由其有本也本積既厚則其塵垢糠秕猶將陶鑄堯舜况其下者哉此所謂深根固蔕治人事天之道治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷之夫兩不相傷故徳交歸焉蒞力至反聖人亦不傷之一作傷人以下徳交歸焉觀之作之為是之指神而言也韓非解工人數變業則失其功作者數揺徙則亾其功一人之作日亾半日十日則亾五人之功矣萬人之作日亾半日十日則亾五萬人之功矣然則數變業者其人弼衆其虧彌大矣凡法令更則利害易利害易則民務變務變之謂變業故以理觀之事大衆而數揺之則少成功藏大器而數徙之則多敗傷烹小鮮而數撓之則賊其澤治大國而數變法則民苦之是以有道之君貴静不重變法故曰治大國者若烹小鮮人處疾則貴有禍則畏鬼聖人在上則民少欲民少欲則血氣治而舉動理舉動理則少禍害夫内無痤疽癉痔之害而外無刑罰法誅之禍者其輕恬鬼也甚故曰以道蒞天下其鬼不神治世之民不與鬼神相害也故曰非其鬼不傷人也其神不傷人也鬼祟也疾人之謂鬼傷人人逐除之之謂人傷鬼也民犯法令之謂民傷上上刑戮民之謂上傷民民不犯法則上亦不行刑上不行刑之謂上不傷人故曰聖人亦不傷民上不與民相害而人不與鬼相傷故曰兩不相傷民不犯法則上内不用刑罰而外不事利其產業上内不用刑罰而外不事利其産業則民蕃息民蕃息而畜積盛民蕃息而畜積盛之謂有德凡所謂祟者䰟去精神亂精神亂則無徳鬼不祟人則䰟不去䰟不去則精神不亂精神不亂之謂有徳上盛畜積而鬼不亂其精神則徳盡在于民矣故曰兩不相傷則徳交歸焉言其徳上下交盛而俱歸于民也蘇注烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛聖人無為使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用其神矣非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未嘗傷人故其鬼無能為耳人鬼所以不相傷者由上有聖人也故徳交歸之呂注得有國之母以治國雖大無難也烹魚者不可以煩而烹小鮮者尤當全之而不割者也治大國者亦若是而已烹而割之則傷矣以道蒞天下者謂之大制亦不割以傷之而已及其至也則其鬼不神凢以不傷之所致也何以言之鬼之為道非不神也厥與人雜擾而見其神則不能不傷人而所以不神者以聖人為能以道蒞天下使人不淫其性不遷其德無大喜大怒以干陰陽之和所謂處混之中與一世而得澹漢焉者也則是聖人亦不傷人也唯聖人為能不傷人故陰陽和静鬼神不擾萬物不傷羣生不天則其神不傷人也神不傷人則無以見其靈響而神焉由此觀之其鬼不神非其鬼不神也由其神不傷人故不神也非其神不傷人由聖人亦不傷人故其神不傷人也使聖人之于人不能全其樸而傷之而人失其性至于四時不至寒暑之和不成人之所以傷神者為多則神其能不傷人乎夫唯神不傷人則神歸徳于人神不傷人而人亦歸徳于神矣故曰夫兩不相傷故徳交歸焉息齋注治國者聖人之餘事不啻如烹小鮮雖恢奇譎怪道通為一故其鬼不神非其鬼不神使鬼而有神凡恢奇譎怪皆化而為道道豈有傷人者乎本欲吾不傷人故其幽至于鬼神皆不能以神傷物大而政治幽而鬼神兩不傷故人鬼之心交歸焉非至德其能如是乎程俱論聖人不傷氏固也而能使鬼神亦不傷人何哉蓋人之在道道之在人猶魚之在水水之在魚也亦何生死之辨乎方其以道蒞天下天下之民其生也泊焉所以善其生也其死也寂然所以善其死也寂然而已鬼安得而神乎生也如彼死也如此尚安得有靈響祟厲之為哉宏甫注烹小鮮者攪之則爛故聖人以無為治天下雖有神姦無所用之非聖人能絶之使不神也雖神而自不能為人之傷也何也以聖人未嘗傷人也夫聖人不傷人神亦不能為人之傷是兩不相傷也但不傷則徳歸焉豈别有徳以不傷之哉夫徳即傷之矣大國者下流天下之交天下之牝牝常以静勝牡以静為下故大國以下小國則取小國小國而下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲故大者宜為下蘇注天下之歸大國猶衆水之趨下流也衆動之赴静猶衆高之赴下也大國能下則小國附之小國能下則大國納之大國下以取人小國下而取于人呂注知以道治其國固不傷其人矣而不知所以交天下者則已雖不傷人而有傷其人者矣大國者下流天下之交天下之交牝牝常以静勝牡以静為下是乃所以交天下而保其人之道也葢天下之交牝而牝常以静勝牡而所以勝者由以静為下故也大國誠能居下流以致天下之交則牝以静為下而勝牡之道也故大國以下小國則取小國則所謂或下以取之也下以取之者言大之于小宜若可以無下而下之者以取之故也小國以下大國則取大國則所謂或下而取之者也下而取之者言小之于大不得不下而取之故也葢大國不欲兼畜人而小國不過欲入事人今大者下小小復下大兩者各得其所欲則其有不取之者乎取之者言得其心而不失之謂也然則大者小者莫不為宜下而獨曰大者宜為下何也小而不能下大非徒不能取大國而亦災禍及之矣則不嫌于不宜故曰大者宜為下而已息齋注國大而能降以求物則物必交歸之牝以静而下物故牝常勝牡以大國而下小國則必得小國以小國而下大國則必得大國故大國或下小國以取小國或下大國而取者各獲其心之謂也故大國不過欲畜小國小國不過欲事大國夫如是而後兩者各得其所孟子曰以小事大者畏天者也以大事小樂天者也樂天者保天下畏天者保其國故大國尤宜為下吳注交㑹也大國者諸小國之交㑹如水之下流為天下衆水之交㑹也牝不先動以求牡牡常先動以求牝動求者招損静俟者受益故曰以静勝牡動求者居上静俟者居下故曰以静為下或曰牝字其一疑衍大國不恃其尊謙降以下小國則能致小國之樂附小國甘處于卑俯伏以下大國則能得大國之見容下以取謂大國能下以取小國之附下而取謂小國能下而取大國之容也大國下小國者欲兼畜小國而已小國下大國者欲入事大國而已兩者皆能下則大小各得其所欲然小者素在人下不患乎不能下大者非在人下或恐其不能下故曰大者宜為下章首下流之喻以喻大國非在人下而能下者牝牡之喻以喻小國素在人下而能下者林希逸注大國不過欲兼畜乎人小國不過欲入事乎人二者皆非自下不可惟能自下則兩者皆得其欲然則知道之大者常以謙下為宜矣此句乃一章之結語其意但謂强者須能弱有者須能無始為知道一書之意往往如此解者多以其説喻處作真實説以故失之獨黄茂材云此一篇全是借物明道此言最當但不能推之于他章耳道者萬物之奥善人之寳不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不曰求以得有罪以免耶故為天下貴行去聲先悉薦反蘇注凡物之見于外者皆其門堂也道之在物譬如其奥物皆有之而人莫之見耳夫唯賢者得而有之故曰善人之寳愚者雖不能有然而非道則不能安也故曰不善人之所保葢道不逺人而人則逺之今誠有人美言之則可以為市于世尊行之則可以加于人矣朝為不義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄之哉立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能汙也呂注萬物負陰而抱陽沖氣以為和則未有一物而不足于道者也室之有奥深邃燕閒而尊者之所處也萬物莫不有深邃燕閒尊高之處則道是也故曰道者萬物之奥唯其如此故善人之寳而不善人之所保也何則善人知其善之所自出則得之而有無窮不貲之富非其寳耶不善人知其不善至于此而𤣥同則雖有萬惡渙然而釋矣非其所保耶夫言之美者可以市行之尊者可以加人則人無善不善固知美所美而尊所尊也有道者之于人猶天地也天無不覆地無不載非特美言尊行之比也則人之不善何棄之有故立天子置三公雖有拱璧以先駟馬所以享於上者禮之恭幣之重者也然不如坐進此道以道之為天下貴雖坐而進之過于恭禮重幣也天子三公所以坐而論者不過此而已矣古之所以貴此道者何也不曰求以得有罪以免耶求以得則所謂善人之寳有罪以免則所謂不善人之所保也唯其如此此所以為天下貴而古之所以不得不貴也息齋注奥者藏也道為萬物之所貴如奥之能藏物賢者以道為寳故樂得其得不賢者非道莫保故樂免其罪由其根于人心之自然無使之者故言依于道則其美可市行依于道則其尊可加于人茍非人心之自然則言而不從行而不應矣由人各根于道不幸而陷于不善則聖人亦何忍棄之故立天子置三公非茍利其富貴也葢不欲遂棄人於不善還以斯道善之而已使雖有拱璧以先駟馬不如出一善言建一善行使天下之人不失其善則其利豈小補哉由其以道覺民是謂坐進此道古之所以貴此道者何也以其善者不日而得其善使不幸而至于不善則亦足以自免于惡此豈不足以為天下貴邪吳注萬物之奥萬物之最貴者奥室之西南隅寢廟之制有堂有室室在内故室為貴室中之制東南隅曰㝔東北隅曰宦西北隅曰屋漏奥尊者所居故奥為貴道之尊貴猶寢廟堂室之奥拱璧合拱之璧駟馬一乘之馬拱璧先駟馬猶春秋傳言乘韋先十二牛也坐跪也朝聘之享駟馬陳于外執拱璧以將命曰先朝聘以拱璧駟馬為至貴而未足貴也不如跪而進此道之尤貴葉注夫婦之愚未有求道而不得一有聞焉雖向所嘗以為罪者可以一洗皆空則道之為貴果在此不在彼也為無為事無事味無味大小多少報怨以徳圖難于其易為大于其細天下難事必作于易天下大事必作于細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難為營為也純甫云人皆有所為聖人亦人耳獨無所為乎但衆人所為者有為之事聖人所為者無為之道此其所以異也事所為之條件也味所為之理趣也作起也蘇注聖人為無為故無所不為事無事故無所不事味無味故無所不味其于大小多少一以道遇之而已葢人情之所不㤀者怨也然及其愛惡之情㤀則雖報怨猶報徳也世人莫不畏大而侮小難多而易少至於難而後圖大而後為則事常不濟矣聖人齊大小一多少無所不畏無所不難而安有不濟者哉呂注有道者其為常出於不為故為無為為無為故事無事事無事故味無味何則方吾之為也求其為者不可得則為出于不為矣有為則有事為而無為則事亦無事也非徒無事也雖味之而無味矣味之者反覆尋繹之之謂也道之為物視之不見聽之不聞摶之不得雖反覆尋繹之復歸于無物而已矣唯其如此故可以大可以小可以多可以少多少舉在于我而所謂怨者固無常心則不善者吾亦善之徳善不信者吾亦信之徳信而皆報之以徳矣人之所難㤀者怨也而以徳報之則它不足以累其心矣非徒然也而圖難于其易為大于其細以天下之難事必作于易天下之大事必作于細而我常無作也茍有所作必于易與細而見之則所謂知幾其神者是也能得之於吾心則其推之于天下國家無難矣是以聖人終不為大故能成其大以為大於其細而不為大于其大故也出諾易也復言難也不慎重于出諾之際則言難復矣易而圖之則易也難而圖之則難矣不圖之于易圖之始而圖之於難則難矣此俗人之所以寡信而多難也是以聖人由難之故終無難以難之于其易而不難之于難也息齋注為無為則已不勞事無事則人不煩味無味則物不費世所謂大小多少者以形言也聖人遊於形器之外故大小多少等而為一夫大小多少尚等而一之又況於恩怨報施之間乎吾所為所施者惟德而已豈知其有所怨豈知其有所報者哉既無恩怨報施之别又無大小多少之異其于天下之故豈有心于為之哉事必求易大必由細自易而往則難者亦易自細而行則大者亦細是以聖人終不為大而大必歸之者由其無心也惟其無心於事故未嘗先事而期於物豈若世之小夫己未為而先諾事至而多易先諾則必寡信多易則必多難聖人于事未至則常若難之非難之也不以我必于物故若難之惟其難之故終無難筆乘夫事涉於形則有大小係乎數則有多少此怨所由起也惟道非形非數而聖人與之為一以無為為為以無事為事以無味為味愛惡妄除聖凡情盡而泊然棲乎宅則大小多少一以視之而奚怨之可報哉惟德以容之而已然此無為無事無味也不可力得至易也不可目窺至細也雖至易而至難者待此以解雖至細而至大者待此以成豈可以其易與細而忽之哉學道者亦或有見於此而又以為大之心奪之故易與細不常為我有唯聖人自始至終為無為事無事味無味而不以世俗所謂大者分其心故難者大者當處寂然了無留礙而大道自此全矣此所謂成其大者也嗟乎此非特起大丈夫見理明用心剛者不能信不能守而可與輕諾多易之流道哉其安易持其未兆易謀其脆異判其微易散為之於未有治之于未亂合抱之木生於豪末九成之臺起于累土千里之行始於足下為者敗之執者失之是以聖人無為故無敗無執故無失民之從事常於幾成而敗之慎終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以恃萬物之自然而不敢為脆此芮反判一作破成一作層今從傅奕古本未有者心未起時未亂者心未染時幾平聲復反也恃一作輔非既曰自然矣而又輔之非自然也今從韓非本蘇注方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈于既成也故為之于未有者上也治之於未亂者次也木也臺也行也積小成大治亂禍福之來皆如彼三者聖人待之以無為守之以無執故能使福自生使禍自亾譬如種苗深耕而厚耘之及秋自穰譬如被盗危坐而熟視之盗將自卻世人不知物之自然以為非為不成非執不留故常與禍爭勝與福生贅是以禍至于不救福至于不成葢其理然也聖人知有為之害不以人助天始終皆因其自然故無不成者世人心存于得䘮方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以為敗之者矣故曰慎終如始則無敗事人皆狥其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷于物非無學也學而不學故雖學而不害於理然後内外空明廓然無為可以輔萬物之自然而待其自成矣呂注其安易持危而持之則難矣其未兆易謀已動而謀之則難矣其脆易破則不可使至於堅其微易散則不可使至于著物皆然心為甚通諸其心則于天下國家無難矣安也未兆也則是為之于未有也脆也微也則是治之于未亂也合抱之木生于毫末大生于小也九層之臺起于累土高起于下也千里之行起于足下逺起于近也則為之于未有治之于未亂其本末常如此也為之于未有則是以不為為之也治之于未亂則是以不治治之也已有而為之則為之欲成而反敗之已亂而治之則執之欲固而反失之也是以聖人為之于未有則我固無為也故無敗治之于未亂則我固無執也故無失民之從事常在既有之後故至于幾成而敗之以不知其本故也使知大生于小高起于下逺始于近慎終如始則無敗事也是以聖人欲不欲不貴難得之貨則滑欲于俗思以求致其明非知此者也學不學以復衆人之所過以輔萬物之自然而不敢為則繕性于俗學以求復其初者非知此者也元澤注不欲之欲非無欲也欲在于不欲耳故不貴難得之貨而已聖人所謂無為無執者故未至于釋然都㤀也但不于性分之外更生一切耳且民飽食煖衣性所不免欲此而已不為有欲而離性之後更貴難得之貨此乃愚人迷妄失本已逺故也故聖人常欲不欲以捄其迷而反之性不學之學非無學也所學在于不學耳以復衆人之所過故也衆人逐末多事聖人以不學之學捄其過而反之道輔自然者莊子所謂反以相天是也為之則以人滅天矣故不敢為然則萬物安乎性命之常而事物無所兆矣夫豈有脆之可泮㣲之可散者哉息齋注聖人常安其所安故其安無不安而其持無所持故曰易持以不持持其安儻有微心之起自其未兆而謀之自其脆而破之自其微而散之故無有撓其安者由持其安於未有治其心于未亂譬如合抱之木生於毫末九層之臺起于累土千里之行始于足下於無為之中自然而為于無積之中自然而積累日益去善日益積而聖人未嘗知也若有意為之即為敗之有意執之即為失之由其無為故無敗無執故無失世之於道所以難成而易壞者由其有意於為之執之方其始若無所容其勤及其終又不免于怠皆為之執之之咎也使其始不為其始不執則求其勤且不可得而况於怠歟此世所以幾成而敗也惟聖人以不欲為欲故未嘗貴難得之貨所謂難得者不必金玉也身外之物皆難得矣衆人目過于色耳過于聲吾以不學為學收視反聽復衆人之所過以輔道之自然而不敢為夫豈有為之執之之病哉吳注慎終如始又承上文終無難與終不為大二終字而言始雖以為難至終而不以為難始雖不敢以為大至終而自以為大則事幾成而敗于終者有矣故必慎終如始始以為難而終亦以為難始不為大而終亦不為大則終無敗事也劉槩注欲衆人之所不欲故曰欲不欲不欲衆人之所欲故曰不貴難得之貨學衆人之所不學故曰學不學不學衆人之所學故曰復衆人之所過古之善為道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式能知楷式是謂𤣥徳𤣥徳深矣逺矣與物反矣乃至於大順楷模也式法也下㣲曰深㫄周曰逺反乃順者司馬曰物情莫不貴智而有𤣥德者獨賤之雖反於物乃順於道蘇注古之所謂智者知道之大全而覽於物之終始故足貴也凡民不足以知此而溺于小智以察為明則智之害多矣故聖人以道治民非以明之將以愚之耳葢使之無知無欲而聽上之所為則雖有過亦小矣茍以智御人人亦以智應之則上下交相賊耳吾之所貴者德也物之所貴者智也德與智固相反然智之所順者小而徳之所順者大也呂注衆人昭昭我獨若昏俗人察察我獨悶悶我愚人之心也哉古之善為道者在已若此則推之于民也固非明之將以愚之也察察昭昭則所謂明之也若昬悶悶則所謂愚之也民之失性居華而去實故智多而難治誠欲治之則去智與故鎮之以無名之樸則彼將自化而以智治之適所以亂之也葢不識不知順帝之則而毁則為賊治國而以智則毁其則矣故曰以智治國國之賊治國而不以智則無介然之知其道甚夷而無益生之祥則有國之母可以長久故不以智治國國之福知此兩者非特施之於治國而已而於身亦楷式而未嘗違也葢知其子守其母歿身不殆則不以智治之而福者也開其兊濟其事終身不救則以智治之而賊者也則不以智之與以智非亦我之楷式乎誠知楷式而不違其德可謂𤣥矣徳而至於𤣥則深而不可測逺而不可量以情觀之不能莫逆于心及其至也與物反本無所于逆故曰常知楷式是謂𤣥德𤣥德深矣逺矣與物反矣然後乃至大順息齋注夫所謂道者不在耳目聲色之間而世人目視非色耳非聲為聲色之所留礙而不知見聞覺知有出于聲色之外者今遽告人曰爾之見聞覺知皆非真也則人孰不怪且笑哉故道非明民將以為愚而憐之可也夫民之愚留礙于聲色不知自解吾方示之以無為示之以澹泊且猶未悟而況欲以智示之歟生民之患在于多智智不以正其智為邪今吾未能覺其邪而又以智示之是反開其偽也故以智治國為國之賊倘行其所無事而不開民之機心機心不生則純白備謂之國福不亦可乎上之所行下之所效未有我静而彼動我素朴而民多欲者故曰知此兩者亦楷式能知楷式是謂𤣥徳𤣥徳深矣逺矣由其與物反是故不可明民由其與道合是故謂之大順劉仲平注不以智治國者開天者也以智治國者開人者也開天則順順則行其所無事其政所以不嚴而治開人則鑿鑿則失于太察其民所以不淳而缺故曰以智治國國之賊不以智治國國之福江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不能害是以天下樂推而不厭以其不爭故天下莫能與之爭王之為言天下所歸往也處上聲下同樂入聲蘇注聖人非欲上人非欲先人也葢下之後之其道不得不上且先耳呂注江海之所以能為百谷王者以其善下之故能為百谷王則能為天下王者亦善下之而已則𤣥德者乃所以下下之道也莊周以為以此處下則𤣥聖素王之道而舜之在下則曰𤣥徳升聞則𤣥德者固聖人所以處下之道也以處下之道而居人上乃所以下之也聖人之有天下也以言其位則固欲上人也然以孤寡不穀為稱而受國之垢與不祥則以其言下之也以言其序則固欲先人也然迫而後動感而後應不得已而後起則以其身後之也夫惟以其言下之則處上而人不重不重則以戴之為輕矣以其身後之則處前而人不害不害則以從之為利矣不重不害此天下所以樂推而不厭也夫以其言下之以其身後之則不争者也樂推而不厭則天下莫能與之争者也非體𤣥徳者其能若是乎故曰夫唯不争故天下莫能與之争息齋注聖人不得已臨蒞天下其視首出庶物與在民上為何等事哉故有天下而能以言下民能以身後民非㤀天下者不能也是以處民上而民不重不知其有君也處民前而民不害不知其有民也惟其上下相㤀是以天下樂推而不厭葢吾之取者非民之所争也無為之為天下且不見其朕况欲與之争乎天下皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫我有三寳寳而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長今舍其慈且勇舍其儉且廣舍其後且先死矣夫慈以戰則勝以守則固天將救之以慈衛之肖似也夫並音符長舍並上聲衛護也蘇注夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以為大也若似于物則亦一物耳而何足大哉道以不似物為大故其運而為徳則亦悶然以鈍為利以退為進不合于世俗今夫世俗貴勇敢尚廣大夸進銳而吾之所寶則慈忍儉約廉退此三者皆世之所謂不肖者也世以勇决為賢而以慈忍為不及事不知勇决之易挫而慈忍之不可勝其終必至於勇也世以廣大葢物而以儉約為陋不知廣大之易窮而儉約之易足其終必至于廣也世以進鋭為能而以不敢先為耻不知進鋭之多惡于人而不敢先之樂推于世其終卒為器長也葢樸散而為器聖人用之則為官長自樸成器始有屬有長矣勇廣先三者人之所共疾也為衆所疾故常近于死以慈衛物物之愛之如父母雖為之効死而不辭故可以戰可以守天之將救是人也則開其心志使之無所不慈無所不慈則物皆為之衛矣呂注天下徒見我道之大而謂其似不肖而不知其所以大固似不肖也何以言之太道汎兮其可左右無乎不在者也彼見其無乎不在無可擬者謂之似不肖而不知其無不在而似不肖乃道之所以為大也葢萬物莫非道也則道外無物矣道外無物則無所肖者此其所以為大也若有所肖則道外有物矣道外有物則道有所不在其尚得為大乎故曰天下皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫葢我道所以如此之大者以吾無我而不爭故也夫唯無我而不爭故能持人之所難持我有三寶保而持之一曰慈二曰儉三曰不敢為天下先此皆持人之所難持者也何則人不能無我而不爭故勇而不能慈廣而不能儉先而不能後則無我不爭乃其所以能保此三寳而持之也天下有始以為天下母而我守之常寛容于物不削于人非慈乎其行身也徐而不費以約為紀非儉乎未嘗先人而常隨人人皆取先已獨取後非不敢為天下先乎夫慈為柔弱矣而能勝剛强是能勇也儉為不費矣而用之不可既是能廣也不敢為天下先為後人矣而聖人用之以為官長者皆從我者也是能成器長也今舍其慈且勇舍其儉且廣舍其後且先則剛强之徒而已死不亦宜乎夫自事觀之則軍旅之事愛克厥威允罔功則慈宜若有所不行也然自本觀之則所以能立其威者以慈而已故曰夫慈以戰則勝以守則固夫唯慈故儉儉故不敢為天下先則慈者三寶之所自而始也舍其慈則死保其慈則生則慈乃所以衛吾生者也故曰天將救之以慈衛之慈立而三寶舉矣元澤注肖者有所似道為萬物祖故體道者物當似我我豈似物乎葢有所似則是象彼則彼必大而我小矣凡此三寳皆俗情所謂小而乃至人之所以為大也慈主于愛愛物仁也而獨稱慈者仁則廣德以覆下于末為盛矣老子方語其本故不曰仁曰慈慈者父道仁之本而不假為者也儉之為德寡欲也貴本也愛物也一言而三善至者其儉乎若孔子曰禮與其奢也寧儉葢聖人制禮將以為儉而方其為禮也不得獨儉非禮則無末非老子則不知本本乎本乎聖人之道于是為至乎于易則謙是也天地人神皆以謙為貴故聖人寳之慈者不爭而勝勇莫大焉區區以奢侈自廣者其狹甚矣唯無以末傷本無以外滅内者至廣也此聖人之行故但為器長而已若道之長則未嘗在物後也以人滅天以事勝道借使幸免葢失所以生矣三寶皆天徳而立本者也正如正兵之正正兵之言師整而不動也愛民如子則民愛之如父不令而齊矣彼倒戈攻于後以北者上不慈故也一本作以戰則勝戰守主于殺伐而尚以慈為徳則餘事可知韓非解愛子者慈於子重生者慈於身貴功者慈於事慈母之於弱子也務致其福務致其福則事除其禍事除其禍則思慮熟思慮熟則得事理得事理則必成功必成功則其行之也不疑不疑之謂勇聖人之於萬事也盡如慈母之為弱子慮也故見必行之道見必行之道則明其從事亦不疑不疑之謂勇不疑生於慈故曰慈故能勇周公曰冬日之閉凍也不固則春夏之長草木也不茂天地不能常侈常費而况於人乎故萬物必有盛衰萬事必有弛張國家必有文武官治必有賞罰是以智士儉用其材則家富聖人愛寳其神則精盛人君重戰其卒則民衆民衆則國廣是以舉之曰儉故能廣董注此假用兵以明道貴在于守慈也或云若以人身言之則邪念多于敵國利欲勝于鋒銛盍亦寡欲以至于無欲以全其所寳乎夢得注我自處也易物無所不濟難故即三者推慈以為先而終復明之以為戰則勝守則固是今之所急也天若救斯民必使有為慈者出而衞之此老氏之所怛然有期于天下者與善為士者不武善戰者不怒善勝敵者不争善用人者為之下是謂不争之徳是謂用人之力是謂配天古之極古者車戰為士甲士三人在車上左執弓右持矛中御車掌旗鼓皆欲其强武戰卒七十二人在車下葢至争者惟兵故借之以明不爭之徳也羅竹曰心形既空孰能與無物者爭蘇注士當以武為本行之以怯若以武行武則死矣聖人不得已而後戰若出于怒是以我故殺人也以我故殺人天必殃之以吾不爭故能勝彼之争若皆出于争則未必勝矣人皆有相上之心故莫能相為用誠能下之則天下皆吾用也呂注士之為言事道而以將人為任者也事道則以不爭而勝將人則用人之力若然者何所事武哉故曰善為士者不武為士而無所事武則善戰者不怒善勝敵者不争善用人者為之下固其宜也何則體道者不争不爭則天下莫能與之爭則善為士者不武善戰者不怒善勝敵者不爭是謂不爭之徳也體道者能下人能下人者樂為之用而不自用則善用人者為之下是謂用人之力也徳則不爭力則用人雖用兵之危我猶無為況其它乎無為為之之謂天德至于無為則與天同而無以加矣故曰是謂配天古之極息齋注聖人身且不有而況于争由其不争凡所應物者皆其不得已也故為士則不武當戰則不怒勝敵而不必與之爭用人而不必加其上故能以徳服人而人亦樂為之死是謂配天古之極也用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾䘮吾寳故抗兵相加哀者勝矣用兵有言古兵家有此言也行上如宇下户剛反言行列也仍就也詩曰仍執醜虜兵五兵戈矛殳㦸千也説文云拱手執斤曰兵幾平聲䘮去也抗舉也林希逸云此章全是借戰事以喻道推此則書中設喻處其例甚明蘇注主造事者也客應敵者也進者有意於爭者也退者無意於爭者也茍無意於爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵之咎耶聖人以慈為寳輕敵則輕戰輕戰則輕殺人䘮其所以為慈矣兩敵相加而吾出於不得已則有哀心哀心見而天人助之雖欲不勝不可得也呂注道之動常在於迫而能以不争勝其施之于用兵之際宜若有所不行者也而用兵者有言吾不敢為主而為客不敢進寸而退尺則雖兵猶迫而後動而勝之以不争也而況其它乎何則主逆而客順主勞而客逸進驕而退卑進躁而退静以順待逆以逸待勞以卑待驕以静待躁皆非所敵也所以爾者道之為常出於無為故其動常出于迫而其勝常以不争雖兵亦由是故也誠知為常出於無為則吾之行常無行其攘常無臂其仍常無敵其執常無兵安往而不勝哉茍為不能出於無為知主而不知客知進而不知退是之謂輕敵輕敵則吾之所謂三寳保而持之者幾于䘮矣故曰禍莫大于輕敵輕敵幾䘮吾寶夫唯以不争為勝者則未有能勝之者也故曰抗兵相加哀者勝矣吳注此申言慈之寶用兵有言者用兵者嘗有是言為主肇兵端以伐人也為客不得已而應敵也進寸難進也退尺易退也仍就也不為首兵但為應兵雖為應兵亦不欲戰不敢近進寧于逺退進戰者整其行陣而行攘臂以執兵前進以仍敵不行則雖有行如無行不攘則雖有臂如無臂不執則雖有兵如無兵不仍之則雖有敵在前如無敵也吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫唯無知是以不我知也知我者希則我貴矣是以聖人被褐懷玉宗者族之總也道者事之總也蘇注道之大復性而足而性之妙見于起居飲食之間耳聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而況行之乎言者道之筌也事者道之迹也使道可以言盡則聴言而足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其居不可得也葢古之聖人無思無為而有漢然不自然不自知者存焉此則思慮所不及是以終莫吾知也使為衆人所能知亦不足貴矣被褐懷玉者聖人外與人同而中獨異也呂注道法自然其言亦希而自然自然則無為則知之行之也不乃甚易乎而天下不能知不能行何耶以言有宗事有君而天下不知其宗與君是以不吾知也何謂宗無為而自然者言之宗也自其宗而推之則言雖不同皆苗裔而已矣其有不知者乎何謂君無為而自然者事之君也得其君而治之則事雖不同皆臣妾而已矣其有不行者乎惟其不知宗之與君此所以不吾知也夫道之所以為天下貴以其不可以知知不可以識識故為天下貴使道而可以知知識識則何貴于道哉故曰知我者希則我貴矣是以聖人以若辱若愚之容而大白盛徳天下鮮儷者是之謂被褐懷玉息齋注道甚易知易行而亦難知難行所謂易知者無道可道無學可學無為可為無事可事豈不甚易知甚易行者哉然至道不可道而言語皆非學不可學而心動即偽為無為而寂然不為者未必是事無事而終日事事者未必非此其所以為難而天下莫知莫行也葢聖人言有宗事有君故言在此而義在彼事雖是而心不同知言之宗則言之差殊不必問也知事之君則事之差殊不必疑也夫唯人之無知是以不我知夫唯不我知此我之所以為貴使我之知不出于衆之知則為我者亦不足貴矣宏甫注吾言甚易知是以天下莫不知甚易行是以天下莫能行甚矣人之好為茍難也然雖莫能行何者而不行雖莫不知何者而我知乎哉何也以吾言一出于宗而吾行一制于君而我無知焉故也使吾而有知則人亦將以吾之知而知吾矣是以知為天下役也非大君與宗主矣何足貴乎知不知上不知知病夫唯病病是以不病聖人之不病也以其病病是以不病蘇注道非思慮之所及故不可知然方其未知則非知無以入也及其既知而存知則病矣故知而不知者上不知而知者病既不可不知又不可知唯知知為病者久而病自去矣呂注道之為體不知而能知者也知其不知而以不知知之知之至者也故曰知不知上雖知其不知而以知知之則其心庸詎而寧乎故曰不知知病夫唯知知之為病而病之則反乎無知而知不足以病之矣故曰夫唯病病是以不病聖人不病以此而已故曰以其病病是以不病南伯子綦曰我悲人之自䘮者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日逺矣若子綦者可謂病病者乎息齋注知者逐物故多偽不知者返本故近真人能知不知為近真知知為多偽則為上矣儻不知知之為偽而徒益其知則是以病為藥其病有不可勝言者惟知知之為病是以不病聖人所以不病者以其知之也筆乘道以知入以不知化知即釋氏之知無也不知即釋氏之無知也始以知無遣其有隨以不知遣其知萬法歸無無亦不立非上而何彼於虛空之中横生意見清浄之内忽起山河揑目生華迷頭認影則病矣凡有知皆妄也凡有妄皆病也學者方狃以為𤣥覽寶而持之病奚從瘳乎聖人之不能廢知猶夫人也而知不為病者知知之為病故耳知其為病則勿藥而病瘳矣知不知上所謂生而無生真性湛然也不知知病所謂無生而生業果宛然也唯其病病是以不病所謂知幻即離不作方便也民不畏威則大威至矣無狹其所居無厭其所生夫唯不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此威畏古通用人不畏其所當畏則大可畏者至矣下文皆畏其所當畏之事狹胡夾反一作狎厭於豔反蘇注夫性自有威高明光大赫然物莫能加此所謂大威也人常患溺于衆妄畏生死而憚得䘮萬物之威雜然乘之終身惴惴之不暇雖有大威而不自知也茍誠知之一生死齊得䘮坦然無所怖畏則大威然見于前矣性之大可以包絡天地彼不知者以四肢九竅為已也守之而不厭是以見不出視聞不出聴蕞然其甚陋也故敎之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脱而不得不知有厭有慕之方囿于物也故敎之曰無厭其所生夫唯聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也聖人雖自知之而不自見雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未㤀則猶有畏也畏去而後大威至也呂注民不冥于道而唯識知之尚故生生厚生生厚故輕死輕死故不畏威民至于不畏威則無所不為此天之所自以明威而大降其虐也故曰民不畏威則大威至矣夫唯以道治天下者知夫充滿天地包裹六極凡命于天者其居之所同然也勿狹之而已精神四達並流無所不極凡命于天者其生之所同然也勿厭之而已夫民無常在我而已夫唯我不厭是以民亦不厭也則奚不畏威之有哉是故聖人自知以常而不自見以外其身知常而外其身乃所以不狹其居也自愛以嗇而不自貴以遺其生愛嗇而遺其生乃所以不厭其生也故去彼知識之病而取此不識不知之不病也元澤注民樸而主厚則畏威上失其道多乎有為以小其道塞其生故民巧偽彫薄而威不能服也夫如是則天誅所加禍亂將起故曰大威至民性本自廣大流通而世教下衰不能使之復樸乃蹙其居之廣而使狹厭其生之通而使塞夫唯狹其居故民不淳而偽唯厭其生故民不厚而薄聖人不然使民逍遥乎天下之廣居而各遂其浩然之性則其有干威者乎莊子曰狶韋氏之國黄帝之囿堯舜之宮湯武之室此明世世下衰漸狹其居也彼聖人豈有優劣乎而居乃漸狹者所遭之時則然也上不自厭其生而盡性故民亦得盡性也莊子曰不厭其天此之謂也厭者天厭之之厭自見則矜成自貴則賤物此所以自狹其居自厭其生亦以狹民之居厭民之生也自知則明乎性而不為妄自愛則保其身而不為非夫然則豈至于干天之威也董注居者性之地居天下之廣居則與太虛同其體矣生者氣之聚含太一之至精則與造化同其用矣惟曲士不可以語道茍不溺于小術而實所無以自狹其居則必棄有著無而蔽于斷滅以厭其所生矣是以告之以無狹無厭使學者知夫性者氣之帥而其大無量當擴而充之以全其大生者道之寓而其用不窮當葆而養之以致其用則養氣全生盡性至命而不生厭慕之心所以體無非彊無而無非頑也長生非貪生而生非礙也夫如是則生與道居而道亦未嘗厭棄于人矣見賢遍切顯也去上聲自知則返照無畏而不狹其居自愛則絶外嗜欲而不厭其生惟自知自愛所以居之安也而不自見以矜能不自貴以賤物故無知之之見忘愛之之心也息齋注夫欲人之畏愛者皆内不足而外慕者也聖人足於内視人之喜不加益其不畏不加損是以皆與之無為葢居物之上使人畏已者易使人不畏已者難使我㤀人者易使天下兼㤀我者難民不畏威非天下兼㤀我者不能也此豈非所謂道德之威乎聖人之遇物随所遇而安故不狹其所居不厭其所生葢知其所居所生者皆非其實也我惟不自厭故生亦莫吾厭由其自知而不自見其有知由其自愛而不自貴其有愛使其有自見自貴之心則狹其所居厭其所生有不能一日安矣吳注威可畏者損壽戕身之事大威大可畏者死也人不畏其所可畏必戕身損壽以速其死有大可畏者至矣莊子曰人之所取畏者衽席之上飲食之間而不知為之戒者過也狎玩習也所居身之所處厭猶惡而棄之也平日所處凡損壽戕身之事無所畏憚狎習為常安然為之言不畏威也厭所生謂傷生速死是厭惡其所生而棄其命大威至矣夫惟不狎舊本作不厭廬陵劉氏云上句不厭當作不狎今從之夫惟不狎其所居而畏所畏是以不厭其所生而大可畏者不至矣自知自知愛身之道自見自顯著所知以示人自貴即後章貴生言貪生之心太重也聖人于自愛之道雖自知于中然含德襲明知若不知不表表示人自見于外雖自愛之篤然體道自然若無以生為亦不切切貪生自貴之過彼謂自見自貴此謂自知自愛上文言不畏則有大威之禍不狎則有不厭之福皆為衆人言爾若聖人則不侍畏而自無可畏不待毋狎而自無所狎内有自知自愛之實而外無自見自貴之迹所無者所去也所有者所取也勇于敢則殺勇于不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來繟然而善謀天恢恢踈而不失殺猶死也利謂活害謂殺惡去聲繟音闡舒緩也王作坦嚴作黙不如作繟為長葢黙則重不言坦則近不爭也蘇注勇于敢則死勇于不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂僥倖其或然而忍其常理夫天道之逺其有一或然者孰知其好惡之所從來哉故雖聖人猶以常為正其于勇敢未嘗不難之列子曰迎天意揣利害不如其已患天道之難知是以歴陳之不與物爭于一時要于終勝之而已天何言哉四時行焉百物生焉未有求而不應者也神之格思不可度思矧可射思夫誰召之哉繟然舒緩若無所營而其謀度非人之所及也世以耳目觀天見其一曲而不覩其大全有以善而得禍惡而得福者未有不疑天網之疎而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖踈而不失也呂注用其剛强而必於物者勇于敢者也則死之徒是已故曰勇于敢則殺致其柔弱而無所必者勇于不敢者也則生之徒是已故曰勇于不敢則活勇于敢者人以為利而害或在其中矣勇于不敢者人以為害而利或在其中矣然則天之所惡殆非可以知知而識識也故曰此兩者或利或害天之所惡孰知其故是以聖人之動也豫若冬涉川猶若畏四鄰猶難之若此者以天之惡為不可知故也夫唯不可知則不識不知乃所以順帝之則也葢天之生物因其材而篤焉栽者培之傾者覆之則未嘗與物争者也而物莫能違之者故曰不争而善勝天何言哉四時行焉百物生焉其行其生未嘗差也故曰不言而善應莫之為而為者天也莫之致而至者命也故曰不召而自來易則易知而其道盈虛與時消息而未嘗違故曰坦然而善謀天聦明自我民聦明天明威自我民明威其聦明明威未嘗自用而惠吉逆凶猶影響也故曰天網恢恢疎而不失夫唯天之道不可知為如此聖人所以勇于不敢而不識不知乃而所以順之也息齋注人皆知勇于敢不知勇于不敢勇于敢者蹈白刃也勇于不敢者蹈中庸也故曰白刃可蹈也中庸不可能也以兩者較之蹈白刃者有害而人輕其害蹈中庸者有利而人不知其利此中庸所以為難者歟輕于用勇人之所嫉天之所惡孰知其故雖聖人猶難之況衆人乎葢天之道不争而善勝不言而善應不召而自來繟然而善謀知其惡于用勇也自其天之未勝天之未應及來之未至謀之未定而言之則强者或得勇者或勝葢有之矣要其後而徐觀之然後知天網恢恢疎而不夫也吳注敢為惡之人乃天所惡然天之所惡深昧難測何以知其果為天所惡之人乎其人雖可殺聖人猶有難之之意而不敢輕易殺之也聖人不輕易殺之則為惡者皆得漏網而天網不漏也天之于惡人非如人之以力與争而天定自能勝人非如人之以口與言而其應如響應聲其報應之速不待召之而自來至惡有惡報雖用智計不可逃免天雖無心坦然平易而巧于報應有非人謀之所能及此天網恢恢廣大似若疏而不宻然未嘗失一惡人無得漏網者聖人雖不殺之而天自殺之也宏甫注勝以不争應以不言求以不召正天之疎而不失也若争而後勝雖不疎必有失矣民常不畏死奈何以死懼之若使人常畏死而為奇者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斵夫代大匠斵希有不傷其手矣斵陟角反蘇注政煩刑重民無所措手足則常不畏死雖以死懼之無益也民安于政常樂生畏死然後執其詭異亂羣者而殺之孰敢不服哉司殺者天也方世之治而有詭異亂羣之人恣行于其間則天之所棄也而吾殺之則是天殺之而非我也非天之所殺而吾自殺之是代司殺者殺也代大匠斵則傷其手矣代司殺者殺則及其身矣呂注民之為道固常不畏死者也唯無狹其所居無厭其所生則可以使之畏威而重死矣奈何以死而懼之而欲其畏死乎何以知其然也若使民常畏死而為奇者吾得執而殺之則孰敢不畏死而為奇乎然而執之而不勝殺之而不止者則民之不畏死而不可以死懼之明矣然則以道治天下者宜如何哉常有司殺者殺勿代之而已矣何謂常有司殺者殺天網恢恢疎而不失天討有罪五刑五用則司殺者天之謂也刑戮有出于好惡而不用于天討則是代司殺者殺也代司殺者殺是代大匠斵代大匠斵希有不傷其手者矣則代司殺者殺其傷可知也張耒夫人之生不殺之于袵席飲食之疾病則殺之盗賊刑戮者過半矣則人之于死實未嘗知畏也而世之馭物者而欲物之畏不過示之以死亦惑矣故曰民不畏死奈何以死懼之茍畏死邪則吾取為奇者而殺之宜民之不復為奇也天下未嘗無刑而為奇者不止則死之不足以懼物也明矣故曰若使人畏死而為奇者吾得執而殺之孰敢也夫物不患無殺之者也萬物冺冺必歸于滅盡而後止則常有司殺者殺矣竊司殺者之常理而移之以行其畏非徒不足以懼物而亦有所不及者也故曰常有司殺者殺夫代冇司殺是代大匠斵希有不傷其手矣然則操政刑死生之柄驅一世之民使從之殆非也息齋注此言世之刑法不足恃以為治也民不畏死吾奈何以死懼之使民果畏死有為奇者執而殺之則殺一人足以為治矣然愈殺而愈不可禁則刑之不足恃也秦人用法嚴其網密而姦宄不勝漢用法疎網漏吞舟之魚而天下歸於漢此亦足以見矣天道福善禍淫是有司殺者于㝠㝠之中不可逃也若必代司殺者殺如代大匠斵未有不傷手者也薛注我朝太祖皇帝道徳經序曰朕自即位以來罔知前代哲王之道問道諸人人皆我見一日試覽羣書有道徳經一卷見其文淺意奥久之見本經云民不畏死奈何以死懼之當是時天下初定民頑吏弊雖朝有十人棄市暮有百人仍為之如此者豈不應經之所云朕乃罷極刑而囚役之不逾年而朕心減朕知斯經乃萬物之至根王者之上師臣民之極寳非金丹之術也於戲太祖盖天縱大聖人故其聰明睿智知言之奥如此亶聰明作元后太祖之謂矣仁人之言其利溥哉老子之謂矣民之飢以其上食税之多也是以飢民之難治以其上之有為也是以難治民之輕死以其生生之厚也是以輕死夫唯無以生為者是賢于貴生税租也純甫云無以生為者賢于貴生即吾無吾身吾有何患之意此章之言由粗及精要歸其重于此耳蘇注上以有為導民民亦以有為應之故事多而難治上以利欲先民民亦争厚其生故雖死而求利不厭貴生之極必至于輕死惟無以生為而生自全矣呂注一夫之耕足以食數口則奚至於飢哉而至於飢者非以其上食税之多故飢邪織而衣耕而食是謂同徳奚難治哉而至于難冶者非以其上之有為故難治耶甘其食美其服安其俗樂其居則奚至于輕死哉而至於輕死者非以其生生之厚故輕死耶是以聖人無事而民自富無欲而民自樸則至于食税之多而飢無有也無為而民自化好静而民自正則至于有為而難治無有也自富自樸自化自正而不飢以難治則至於生生之厚而輕死無有也葢所以生生之厚而至于輕死者以其踶跂好知争歸于利而不可止故也夫唯生生之厚遂至于輕死則無以生為者賢于貴生可知矣是故聖人不自見以外其身不自貴以遺其生知其無以生為而已矣息齋注上多取則下貧上有為則下亂必然之理也我欲厚其生則不顧人之生我厚而彼薄彼安得不輕死聖人之于生葢不得已彼視其生若無以生為也豈肯厚吾之生而奪人之生哉是之謂賢於貴生人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則共强大處下柔弱處上脆輭也徒𩔖也合手曰共商桑榖生於朝七日大共秦伯怒蹇叔曰墓木拱矣皆合拱也董音如字言人共伐之也處上聲蘇注冲氣在焉則體無堅强之病至理在焉則事無堅强之累兵以義勝者非强也强而不義其敗必速木自拱把以上必伐矣物之常理精者在上粗者在下其精必柔弱其粗必强大呂注道之為物無形而不爭則天下之至柔弱而人莫之喻也故以有形喻之人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁則雖有形者亦以堅强而死柔弱而生而況體無形之道而不致其柔弱其可得乎是以兵强則恃之而驕而敵國之所謀也我驕而敵謀所以不勝也木强則伐伐之所以共而舉之也非徒然也而以位言之則天以氣在上地以形在下氣則柔弱形則堅强臣以有為事上君以無為畜下有為則堅强無為則柔弱堅强居下柔弱處上物之理也然則柔弱之能勝剛强可知矣息齋注此章汎言柔弱之必生剛强之必死柔弱雖非所以為道而近于無為剛强雖木離于道而涉于有為無為則去道不逺有為則吉凶悔吝隨之益逺于道矣吳注用兵示弱者謀深而工敵輕而玩之故勝恃强者慮淺而驕敵懼而備之故不勝兵法始如處女敵人開户示之弱也後如脱兎敵不及距則能勝之矣秦兵過周超乘三百竟敗于殽齊兵入晉桀石投人竟敗于鞌此侍强不勝之驗也共兩手所圍也禾之弱而揺動者為近末之小枝强而不揺動者則為近根合共之大榦也因言兵而并及于木上文言兵强者為人所勝是處下也不能如勝人者之處上木强者近根之榦是處下也不得如小枝之處上推此物理則知人之德行凡堅强者矜已凌人必蹷其貴髙而反處人下矣柔弱者衆所尊戴而得一處人上矣天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足人之道則不然損不足而奉有餘孰能以有餘奉天下唯有道者是以聖人為而不恃成功而不居其不欲見賢耶抑之舉之二句言張弓有餘不足二句言天道凡弛弓俯其體則弣在上弰向下張之而仰其體則弣向下弰在上是抑弣之高者使之向下舉弰之下者使之在上天之損有餘如抑其弣而使之下其補不足如舉其弰而使之高見賢遍反希聲注易曰立天之道曰陰與陽陽主升陰主降陽升極天則降陰降極地則升此則抑高舉下葢張弓之象也天道盈虛一章七閏損日之有餘補月之不足人道則不然損其不足之民而奉有餘之君孰能法天之道以為人道損已之有餘以奉天下之不足其唯有道者乎在易損下益上曰損損上益下曰益以下為本也是以聖人能為之而不恃其事能成功而不居其所以其不欲見賢于人故天下謂之似不肖皆損有餘奉不足之㫖也蘇注張弓上筋弛弓上角故以况天之抑高舉下天無私故均人多私故不均有道者贍足萬物而不辭既以為人已愈有既以予人已愈多非有道者無以堪此為而恃成而處則賢見于世賢見于世則是以有餘自奉也呂注天之道無為而已矣無為則無私無私則均猶之張弓也高者抑之下者舉之有餘者損之不足者補之適于均而已矣夫天之道非故以抑高而舉下也無為任物之自然則高者為有餘不得不抑而損下者為不足不得不舉而益滿招損謙受益時乃天道是也人之道不能無為不能無為則不能無私不能無私則至于損不足以奉有餘不足異也夫唯有道者知未始有物而有為之與功名皆我所餘而天下之所不足而爭之故損之以奉天下而不有此故曰孰能損有餘以奉天下唯有道者聖人則有道者也是以為而不恃功成不居其不欲見賢者無它凡以法天之道而已矣息齋注裒多以益寡者天之道也裒寡而益多者人之道也惟聖人能以己有餘而奉人不足故其能及萬物而不恃其能功葢天下而不居其功利澤施于天下而不欲見其賢唯有道者而後如此天下莫柔弱于水而攻堅彊者莫之能先以其無以易之也故柔之勝剛弱之勝彊天下莫不知莫能行是以聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反蘇注正言合道而反俗俗以受垢為辱受不祥為殃故也呂注天下之物唯水為能因物之曲直方圓而從之則是柔弱莫過于水者也而流大物轉大石穿突陵谷浮載天地唯水為能則是攻堅强者無以先之也所以然者以其雖曲折萬變而終不失其所以為水是其無以易之也夫水之為柔弱而柔弱之勝剛强天下莫不知而老子數數稱之何也以天下雖莫不知而莫能行也夫聦明睿智足以有臨矣則其患者豈在于材力之不足也顧未能損有餘以奉天下持之以柔弱而常為名尸智主事任謀府之所累耳故老子論道徳之將終而數數及此又引聖人言以信之曰受國之垢是謂社稷主受國之不祥是謂天下王明所以服天下者在此而不在彼也夫三代之王必先其令聞而曰受國之垢與不祥而為社稷主為天下王何也葢必先其令聞非過名之言也不及名之言也受國之垢與不祥則過名之言也名不足以言之也不及名之言應事應事言之變也過名之言體道體道言之正也正言而曰受國之垢與不祥故曰正言若反湯武之言曰萬方有罪在予一人此知以國之垢與不祥而受之者也宏甫注以堅强攻堅强雖能勝之終必缺陷故攻堅强者莫勝于柔弱柔弱者不期勝而自勝也故又戒之曰其無以輕易柔弱為也畢竟柔弱能勝剛强而剛强者不與焉夫山藪藏疾至柔也川澤納汙至弱也茍為社稷之主而不能受多方之垢為天下之王而必欲國家之無夭孽四海之無凶人可得耶雖欲剪除而撲滅之祗自勞耳此葢若反于正言其實天下之正言也不可不察也和大怨必有餘怨安可以為善是以聖人執左契而不責于人故有徳司契無徳司徹天道無親常與善人契苦訃反徹徹法也直列反蘇注夫怨生於妄而妄出于性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未㤀也契之有左右所以為信而息爭也聖人與人均有是性人方以妄為常馳騖于爭奪之塲而不知性之未始少妄也是以聖人以其性示人使知除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不侍責之而自服也然則雖有大怨懟將渙然氷解知其本非有矣而安用和之彼無徳者乃欲人人而通之則亦勞而無功矣徹通也天道無私惟善人則與之契之無私也呂注復讎者不折鏌干雖有忮心不怨飄瓦是以天下平均不由此道則怨之所生也而人欲和之不可勝解矣故曰和大怨者必有餘怨不善者吾亦善之乃所以為徳善和大怨而不免于有餘怨安可以為善哉是以聖人執左契而不責于人是乃使復讎者不折鏌干雖有忮心不怨飄瓦而天下平均之道也葢古之獻車馬執右契右契所以取左契所以與則左契者常以與人而不為物主者也聖人為而不恃功成不居毎以有餘奉天下至于殺人則有司殺者殺而未嘗尸之則是執左契以與人而不為物主此其所以無怨而不責于人之道也夫豈以和之為悦乎故有德司契則不責于人而己無德司徹以通物為事者也天道無親常與善人無親而唯善人之與是亦以執左契而不責于人之道也息齋注怨之不可和猶火之不可寒水之不可熱若强和之必有餘怨以此為善未足也是以聖人治天下如執左契以求于右契恩怨取與吾何心哉如契之合適於符而已茍有不合不强其所無不責之也葢大小長短彼各有契自合其合而吾無容私焉若必欲强通之是司徹非司契也天道亦然天道無親常不失善葢亦司契而已吳注執左契不責于人無心待物也契者刻木為劵中分之各執其一而合之以表信取財物于人曰責契有左右左契在主財物者之所右契以付來取財物之人王元澤曰史記云操右契以責事禮記云獻田宅者操右契則知左契為受責者之所執澂謂執左契者已不責于人待人來責于已有持右契來合者即與之無心計較其人之善否和怨者有心于為善人也不若無心待物如執左契而不責于人静中觀物而任其自然也有德無心待物無徳有心待物徹通也古者助法周改助為徹法恐八家私田所收之不均故八家私田亦令通力合作而均收之八家所得均平而無多寡之異司左契者任人來取無心計較其人故曰有德司徹法者患其不均有心計較故曰無徳和怨者恐善人受害有心為之亦如司徹者有心于為力弱之家恐其所得者寡矣小國寡民使有什伯之器而不用使民重死而不逺徙雖有舟車無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之音相聞民至老死不相往來漢書詔天下吏舍無得置什器顔師古注云五人為伍十人為什則共器物故通謂什伍之具為什物不用者無往來免儲俯省徭役也舟輿甲兵舉其重者言之樂入聲望平聲相望相聞近也至老死久也近而且久不相往來者各足故也道足則無事咨詢財足則不相乞假蘇注老子生于衰周文勝俗弊將以無為救之故于書之終言其所志願得小國寡民以試焉而不可得耳民各安其分則小有材者不求用于世什伯人之器則材堪什夫伯夫之長者也事少民朴雖結繩足矣内足而外無所慕故以其所有為美以其所處為樂而不復求也民物繁夥而不相求則彼此皆足故也呂注三代以來至于周衰其文弊甚矣民失其性命之情故老子之言救之以質以反太古之治小國寡民使有什伯之器而不用使民重死而不逺徙雖有舟輿無所乘之雖有甲兵無所陳之此救之以質而反乎太占之道也莊周稱至德之世曰昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏犧氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞犬之音相聞民至老死而不相往來則若此者非特老子之言而已古固有是道也然詩書之所言則止于堯舜三代而老子欲反太古之治何哉曰夫道與世之交相䘮久矣非大道不足使人反性命之情言道而不及其世不足以知大道之已試此其所以必反太古之治也然則世去太古也久矣遂可以盡復乎曰未可也然則其言之何也曰禮至于兼三王樂至於備六代其文極矣然而禮不以𤣥水大羮而措之醴酒和羮之下樂不以嘒管清聲加之朱絃疏越之上者使人知禮樂之意所不得已者如彼而所欲反本復始如此也方斯時也孔子方求文武周公之墜緒而賡之老子論其道與世如此其意猶是而已矣譬之月建已而火始王而金氣已生于其間矣此五材所以相繼而不絶也故聞古之治雖有什伯之器而不用有舟輿而不乘有甲兵而不陳則舉大事用大衆非得已也聞其民結繩而用之鄰國相望雞犬相聞至老死而不相往來則煩文倦令督稽留而足迹接乎諸矦之境車軌結乎千里之外非得已也則不得已者常在於此而所欲復者常在於彼也則其肯煩事為以深治人之過乎然則欲天下不安平泰不可得也即歿而不言猶屏𤣥水徹疏越其孰知禮之能儉而樂之節樂為反本復始之意乎夫聖人之言豈小補哉元澤注小國寡民則民淳厚葢國大民衆則利害相摩巧偽日生觀都邑與聚落之民質詐殊俗則其驗也無道之世民貧土瘠而利欲勝乎好生末盛本衰而貪求在乎外慕故觸刑犯險如履平地而車轍足跡交乎四方矣樂生遂性則重死安土無求則不逺徙此盡性之治民亦盡其性者也竊嘗考論語與孟子之終篇皆稱堯舜禹湯聖人之事業葢以為舉是書而加之政則其効可以為此也老子大聖人也而所遇之變適當反本盡性之時故獨明道徳之意以收斂事物之散而一之于樸誠舉其書以加之政則化民成俗此篇其効也故經之義終焉吳注十人為什百人為伯什伯之器重大之器衆所共也不用者不營為不貪求重大之器無所用也重死者視死為重事而愛養其生不逺徙者生於此死于此不他適也老子欲挽衰周復還太古國大則民衆難治得小國寡民而治之使其民母慕于外自足于内如此也舟車甲兵非一人所可獨用謂什伯之器也無所乘無所陳不用也無所往則無用乎舟輿無所爭則無用乎甲兵民淳事簡上古結繩之治可復雖有書契亦可不用不但不用什伯之器而已以所食之食為甘以所服之服為美充然自足愛養其生言重死也以此身之居為安而安之以此地之俗為樂而樂之言不逺徙也惟老死于所生之處孰肯輕易逺徙哉民皆懷土雖相鄰之國目可以相望雞犬之聲耳可以相聞如此至近至老死不相往來不但不逺徙而已信言不美美言不信善言不辯辯言不善知者不博博者不知聖人不積既以為人已愈有既以與人已愈多天之道利而不害聖人之道為而不爭為人之為去聲蘇注信則為實而已故不必美美則為觀而已故不必信以善為主則不求辯以辯為主則未必善有一以貫之則無所用博博學而日益者未必知道也聖人抱一而已他無所積也然施其所能以為人推其所有以與人人有盡而一無盡然後知一之為貴也勢可以利人則可以害人矣力足以為之則足以争之矣能利能害而未嘗害能為能争而未嘗争此天與聖人大過人而為萬物宗者也凡此皆老子之所以為書與其所以為道之大略也故于終篇復言之呂注道之為物視之不見聴之不聞摶之不得可以黙契不可以情求者也則信言者信此而已安事美善言者善此而已安事辯知言者知此而已安事博由是觀之則美者不信辯者不善博者不知可知已何則雖美與辯與博而不當于道故也道之為物未始有物者也聖人者與道合體夫何積之有哉唯其無積故萬物與我為一萬物與我為一則至富者也故既以為人已愈有既以與人已愈多使其有積也則用之有時而既矣安能愈有而愈多乎老子之言也内觀諸心外觀諸物仰觀諸天俯觀乎地無有不契是信也然而下士聞而笑之天下以為似不肖是不美也言之至近而指至逺是善也然而非以言為悦是不辯也其知至于無知是知也而其約不離乎吾心是不博也而學者以美與辯與博求之則疏矣老子之道也以有積為不足雖聖智猶絶而棄之是無積也故至無而供萬物之求則是愈有而愈多也而學者于是不能刳心焉則不可得而至也凡物有所利則有所不利有所不利則不能不害矣唯天之道無所利則無所不利無所不利則利而不害矣凡物之有為者莫不有我有我故有爭聖人之道雖為而無為無為故無我無我故不爭是天之道而已矣筆乘或曰老氏之為書使人得以受而味焉則近乎美窮萬物之理而無不至則近乎辯察萬事之變而無不該則近乎博然不知其有信而不美善而不辯知而不博者存何也則以五千言所言皆不積之道耳不積者心無所住之謂也夫積而不積則言而無言矣言而無言故非不為人也而未嘗分已之有非不予人也而未嘗損已之多斯何惡於辯且博哉茍非不積之道而苐執其意見以與天下争則多言數窮者流非天道也天之道利而不害聖人之道為而不爭學者于此而刳心焉老氏之書亦思過半矣故曰敎而無敎何必杜口於毗耶言乃㤀言自可了心于柱下讀者其勉旃哉老子翼卷二
