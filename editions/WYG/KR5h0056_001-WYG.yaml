body:
  text: 老子翼卷一明焦竑撰上篇道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之𤣥𤣥之又𤣥衆妙之門可道如禮不虚道之道常者恒乆不變也母者言物自此生也欲如性之欲也之欲猶意也情也徼竅通物所出之孔竅也又邊際也歸也陳景元曰大道邊有小路曰徼丁易東云無名天地之始有名萬物之母或以無名有名為讀或以無與有為讀然老子又曰道常無名始制有名是可以無與有為讀乎常無欲以觀其妙常有欲以觀其徼有常無常有為讀者有無欲有欲為讀者莊子曰建之以常無有正指老子此語則於常無常有斷句似也然老子又曰常無欲可名於小是又不當以莊子為證據老子以讀老子可也程俱論可道之道以之制行可名之名以之立言至於不可道之常道不可名之常名則聖人未之敢以示人非藏於密而不以示人也不可得而示人焉耳故西方之聖人其所示見設為乘者三演為分者十二命之曰敎若夫傳於教外者則其不可道與不可名者也中國之聖人祖唐虞憲文武以訂詩書禮樂之文命之曰經若夫其所以言猶履之非迹者則其不可道與不可名者也故老子著五千之文將以示天下迪後世蓋非退於道冥而獨於已者故其發言之首以謂可道之道可名之名者五千文之所具也若夫于聖之所不傳者不可得而言也蘇子由注莫非道也而可道不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以為義而禮不可以為智可道之不可常也惟不可道然後在仁為仁在義為義禮智亦然彼皆不常而道常不變不可道之能常如此夫道不可道況可得而名之乎凡名皆其可道者也名既立則圓方曲直之不同不可常矣自其無名形而為天地天地位而名始矣自其有名播而為萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以為天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於徼而不知其妙則麤而不神留於妙而不知其徼則精而不變矣以形而言有無信兩矣安知無運而為有有復而為無未嘗不一哉其名雖異其本則一知本之一也則𤣥矣凡逺而無所至極者其色必𤣥故老子常以𤣥寄極也言𤣥則至矣然猶有𤣥之心在焉𤣥之又𤣥則盡矣不可以有加矣衆妙之所從出也吕吉甫注凡天下之道其可道者莫非道也而有時乎而殆則非常道也凡天下之名其可名者莫非名也而有時乎而去則非常名也萬物芸芸各歸其根而不知曰静静曰復命復命曰常為道而至乎常則心凝形釋物我皆忘夫孰知道之可道而名之可名哉則常道者固不可道也故曰道乃乆没身不殆常名者固不可名也故曰自古及今其名不去不殆不去是之謂常道常無名則無名者道也天地之所自而始也故曰無名天地之始太初有無無有無名有無無則一亦不可得有無名則一之所起有一而未有形也既謂之一則雖未有形且已有名矣名為一而名之者為二二與一為三萬物紛紛自此生矣故曰有名萬物之母知常曰明明則無所不見也故惟常為可以觀方其無欲也則滌除𤣥覽而無疵于此觀其妙故曰常無欲可名于小矣方其有欲也則萬物並作而芸芸于此觀其徼故曰萬物皆往歸焉而不知主可名于大矣惟小所以見其妙惟大所以見其徼也此兩者其出則同顧其名異而已其名異也其實未嘗異其實未嘗異則有欲之與無欲求其所出皆不可得不可得則其所出也故同謂之𤣥𤣥之為色黒與赤同乎一也天之色𤣥隂與陽同乎一也名之出𤣥有欲與無欲同乎一也同乎一固妙矣然妙乎一矣未妙乎多也妙乎我矣未妙乎物也𤣥之又𤣥則同者亦不可得同者不可得則一之與多我之與物莫不皆妙也萬物之所以妙出于此而已故曰𤣥之又𤣥衆妙之門李息齋注常者不變之謂也物有變而道無變物之變至于念念遷謝俯仰之間未嘗少停至所謂道則無始無終天地有盡而此道無盡是之謂常常之為道不可行而至不可名而得使其可行即非常道使其可名即非常名自未始有天地而眞常之理已具于無名之初故無名為天地之始及天地既判髙下之名生萬物自是而滋故可以名者物之母也聖人體真常之道以出入于有無之間故妙者大道也無也徼者小道也有也吾欲觀其妙則與妙同入而歸於無吾欲觀其徼則與徼同出而遊于有妙即徼徼即妙有即空空即有其本同其末異故同謂之𤣥不獨此也至于𤣥之又𤣥即能使衆徼之間無非衆妙是謂衆妙之門言其于徼妙有無之間無揀擇而皆妙也筆乘徼讀如邊徼之徼言物之盡處也晏子曰徼也者徳之歸也列子曰死者徳之徼皆指盡處而言蓋無之為無不待言已方其有欲之時人皆執以為有然有欲必有盡及其盡也極而無所更往必復歸于無斯與妙何以異哉故曰此兩者同謂之𤣥雖然老子亦不得已為未悟者言耳實非舍有以求無也茍其舍有以求無則是有外更有無安得為無蓋當其有時實未嘗有此乃眞無也故不滅色以為空色即空不事以為空事即空不然其所謂無者為對有之無而所謂有者為對無之有亦惡得謂之常無常有哉噫安得知常者而與之一論此天下皆知美之為美斯惡已皆知善之為善斯不善已故有無相生難易相成長短相形髙下相傾聲音相和前後相隨是以聖人處無為之事行不言之敎萬物作焉而不辭生而不有為而不恃功成而不居夫唯不居是以不去傾不平也生成形傾和隨皆以喻美惡善不善相形而有處上聲夫音符陸希聲注夫人之所謂美惡皆生於情以適情為美逆情為惡以至善不善亦然然所美者未必美所惡者未必惡所善者未必善所不善者未必不善如此者何情使然也夫人之性大同而其情則異以殊異之情外感于物是以好惡相繆美惡無主將何以正之哉在乎復性而已何則情之所生必由於性故聖人化情復性而至乎大同所謂有無之相生者情性也情性之相因猶難易之相成也夫為治者以情化性則難成以性正情則易成所謂長短之相形者美惡也美惡之相奪猶髙下之相傾也所謂聲音之相和者善不善也善不善之相資猶先後之相隨也於乎世之多故由此六者天下所以不治萬物莫得遂性聖人將復其性先化其情善者固已善不善者吾亦因而善之使善信者固已信不信者吾亦因而信之使信故用無棄物敎無棄人使在物無惡在人無不善而天下不治者未之有也易曰其道甚大百物不廢此之謂也是以聖人體無名則無為而事自定用有名則不言而敎自行使萬物各遂其性若無使之然者如天地之生物而不有其用如百工之為器而不恃其成如四時之成歲而不居其所夫惟如此是以其道可常其名不去也蘇注天下以形名言美惡其所謂美且善者豈信美且善哉彼不知有無長短難易高下聲音前後之相生相奪皆非其正也方且自以為長而有長於我者臨之斯則短矣方且自以為前而有前於我者先之斯則後矣茍從其所美而信之則失之逺矣當事而為無為之之心當敎而言無言之之意夫是以出于長短之度離于先後之數非美非惡非善非不善而天下何足以知之萬物為我作而我無所辭我生之為之而未嘗有未嘗恃至于成功亦未嘗以自居也此則無為不言之報聖人且不知其為美且善也豈復有惡與不善繼之哉聖人居于貧賤而無貧賤之憂居于富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也呂注天下皆知美之為美善之為善而欲之知惡與不善而惡之然自離道言之則雖美與善皆離乎道矣自出于道言之則雖惡與不善皆非道之外也由是觀之則美斯惡善斯不善豈虛言哉是故天下之物生于有有生于無是之謂有無之相生難事作于易而易亦由難之故無難是之謂難易之相成有鶴脛之長而後知有鳬脛之短有鳬脛之短而後知有鶴脛之長是之謂長短之相形以髙為是而百谷為川瀆之源則髙有以傾乎下以下為是而川瀆為百谷之歸則下有以傾乎髙是之謂髙下之相傾黄鐘為君則餘律和之餘律為君則黄鍾和之是之謂聲音之相和自秋冬而望春夏則春夏前而秋冬後自春夏而望秋冬則秋冬前而春夏後是之謂前後之相隨凡此六者當其時適其情天下謂之美謂之善不當其時不適其情天下謂之惡謂之不善夫豈知所謂至美至善哉則美與惡善與不善亦迭相為往來興廢而已豈常也哉是故聖人知其如此也以常道處事而事出于無為以常名行敎而教出于不言事出於無為則終日為而未嘗為敎出於不言則終日言而未嘗言則美與惡善與不善吾何容心哉若然者無往不妙無往不妙則萬物之作吾不見其作與作之者不見其生與生之者不見其為與為之者則雖作不作雖生不生雖為不為吾何辭何有何恃哉此所以功成而不居也夫冇居則有去在已無居夫將安去哉陸農師注美至於無美者天下之眞美也善至於無善者天下之眞善也眞美離斯天下皆知美之為美眞善散斯天下皆知善之為善故有無者以言乎其道難易者以言乎其徳長短者以言乎其體髙下者以言乎其位聲音者以言乎其交感前後者以言乎其始終此勢之然也夫聖人處無為之事行不言之敎者將以使人㝠于眞善混于眞美復歸于朴而與天地為徒與造化為友者矣若然者萬物之息與之入而不逆萬物之作與之出而不辭吾何容心哉王无咎義聖人處無為之事行不言之敎彼無心于為與言者順萬物性命之理而已則萬物之作也吾亦與之作而不辭萬物之生也吾亦與之生而不有萬物之為也吾亦與之為而不恃萬物之成也吾亦與之成而不居蓋其作也生也為也成也皆順性命自然之理因物與時而非我也則吾亦何必辭何必有何必恃何必居故曰萬物並作而不辭生而不有為而不恃功成而不居作然後生生然後為為然後成此其序也息齋注老子五千言上可以通于妙下可以通于徼以之求道則道得以之治國則國治以之修身則身安其言常通於是三者此其所以微妙𤣥通深不可識者歟此章言吾之本性自未始有物孰為美孰為惡孰為善孰為不善及有生既立形名遂分人皆知美之為美而不知惡之名已從美生人皆知善之為善而不知不善之名已從善起蓋天下之物未有無對者有無之相生難易之相成長短之相形髙下之相傾聲音之相和前後之相隨有其一未有無其二聖人知之必立于物之先順物自然為無為之事行不言之敎不取善不捨惡未嘗執一未嘗不一終日為未嘗為終日言未嘗言是以萬物並作吾從而與之作作而不辭萬物並生吾從而與之生生而不有方其有為非我之為順物而已故為而不恃及其有功非我之功應物而已故功成而不居由其不居于末而居于先以吾所居者不可得而去是以物不能去呉幼清注五者皆言其偶獨聲音不言者蓋止曰闢翕清濁則人不知其為言聲音也言聲音則其有闢翕清濁之相偶自可知故止言其實而不言其偶也聖人以不事而事故其事無所為以不敎而敎故其敎無所言無為不言則雖有美有善而人不知是以其美其善獨尊獨貴而無可與對若有為之事冇言之教則人皆知其為美為善而美與惡對善與不善對非獨尊獨貴不可名之美善矣老子一書之中凡諸章所言皆不出此不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢為也為無為則無不治治去聲無知之知如字知者之知去聲夫音符王輔嗣曰心懐智腹懐食虛有智而實無知也骨無知以幹故强之志生事以亂故弱之蘇注尚賢則民恥于不若而至于争貴難得之貨則民病于無有而至于盜見可欲則民患于不得而至于亂雖然天下知三者之為患而欲舉而廢之則惑矣聖人不然未嘗不用賢也獨不尚賢耳未嘗棄難得之貨也獨不貴之耳未嘗去可欲也獨不見之耳夫是以賢者用而民不争難得之貨可欲之事畢效于前而盜賊禍亂不起是不亦虛其心而不害腹之實弱其志而不害骨之强也哉今將舉賢而尚之寳貨而貴之可欲以示之則是心與腹皆實也若舉而廢之則是志與骨皆弱也心與腹皆竇則民争志與骨皆弱則無以立矣不以三者之則民不知所慕澹然無欲雖有智者無所用巧矣即因三者之自然而不尚不貴不見所謂為無為也呂注聖人知夫美斯惡善斯不善而我無容心焉故雖縻天下之爵因任而已而賢非所尚也聚天下之財養人而已而難得之貨非所貴也民之争常出于相賢知賢非上之所尚則不争矣故曰舉賢則民相軋民之盜常出于欲利知貨非上之所貴則不為盜矣故曰茍子之不欲雖賞之不竊君子之所欲者賢也小人之所欲者貨也我皆不見其可欲則心不亂矣然不尚賢者非遺于野而不用也不貴難得之貨者非委之地而不收也内不以存諸心外不以遺其迹而已矣是以聖人之治也虛其心實其腹弱其志强其骨心藏神而腹者心之宅虛其心則神不虧而腹實矣腎藏志而骨者腎之餘弱其志則精不搖而骨强矣虛其心而腹實則常使民無知也弱其志而骨强則常使民無欲也智者知賢非上之所尚而貨非上之所貴則為之非所利故不敢為也夫唯如此則為無為而無不治也李宏甫注争盜之原聖人啓之也故上者争善其次盗國皆起于見可欲焉耳可欲者衆則民志亂矣惡能治乎太上於此豈眞有以治之哉亦曰不見可欲而已夫腹之所以不充者心累之也今一不見有可欲可尚可貴之事則心虛而腹自實矣骨之所以不剛者志敗之也令一不敢為悖亂争盜之事則志弱而骨自强矣所以然者無欲故也夫民生有欲無知則已聖人者又日引之使有知也陳之仁義禮樂導之法制禁令設為宮室衣服車馬冠婚䘮祭之事以啟其無涯之知而後從而節其無窮之欲是猶汎濫滔天而徐以一葦障之也胡可得歟太上則不然常使混混沌沌無有知也無有欲也縱有聰明知識者出欲有所作為而自不敢則天下皆歸于無為矣夫無為由于無欲無欲由于無知夫一人何以能使民之無知哉曰太上者固自謂未嘗有知也固不見有可以治乎民者而使吾心之欲之也道沖而用之或不盈淵兮似萬物之宗挫其銳解其紛和其光同其塵湛兮似或存吾不知其誰之子象帝之先沖本作盅器之虛也李約云帝生物之主也羣化皆處後唯道獨居其先象似也道性謙故不言定處其先而云似蘇注夫道沖然至無耳然以之適衆有雖天地之大山河之廣無所不遍以其無形故似不盈者淵兮深眇吾知其為萬物宗也而不敢正言之故曰似萬物之宗人莫不有道也而聖人能全之挫其銳恐其流于妄也解其紛恐其與物搆也不流于妄不搆于物外患已去而光生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其棄萬物也如是而後全則湛然常存矣雖存而人莫之識故曰似或存耳道雖常存終莫得而名然亦不可謂無也故曰此豈帝之先帝先矣而又先于帝則莫或先之者矣呂注萬物負隂而抱陽沖氣以為和則沖者隂陽和也隂為虛陽為盈道之體則沖而其用之則或不盈其體沖也故有欲無欲同謂之𤣥其用之不盈也故虛心弱志而常使民無知無欲唯其如此故淵兮似萬物之宗而求其為宗者固不可得也似之而已然則何以得此道哉挫其銳解其紛和其光同其塵而已心出而入物為銳挫其鋭而勿行物至而交心為紛解其紛而勿擾銳挫而紛解則知常之明發乎天光光者塵之外在光不皦故和之而不别塵者光之内在塵不昩故同之而不異夫唯如此則所謂宗者湛兮似或存矣淵兮者言乎其深也湛兮者言乎其清也或不盈者非可以為定虛也似或存者非可以為定存也盈虛存亡吾無所容心則吾安能知其所自生哉見其生天神帝而已故曰吾不知誰之子象帝之先蓋有吾有知有誰而道隱矣吾不知誰則亦不知吾矣此眞道之所自出也生天以先象神帝以始帝則其為形器之先可知矣息齋注道沖虛而妙迫而之若不可得故曰或不盈然其深妙愈用而愈不窮物物自道而道未嘗物故曰似萬物之宗古之學道者未嘗有進而必為之志挫其銳者不必為也未嘗有畏而不為之心解其紛者無不為也未嘗取善而為美和其光者不取善也未嘗惡惡以為非同其塵者不捨惡也湛然自住而不住于湛然故似或存吾不知其始故不知誰之子吾不知其先故象帝之先邵弁注銳者所以争挫其銳則解紛矣光者所以辨和其光則同塵矣上二其字以巳言下二其字以人言宏甫注夫沖漠而不盈者道也而用之者或見其盈則失其所以沖漠者矣故淵乎常止雖萬流歸之而不見其盈聖人體道於身淵深静逺無有涯涘一似萬物之宗而非有以宗之也故常挫其銳以示不能解其紛以示不用和光以遊于世同塵以諧于俗湛兮常寂似亡若存焉耳然此果伊誰之子乎吾恐此道也雖黄帝未易當之意者其在帝之先歟夫海為衆流之宗而海無有也但見其淵乎而已矣聖人為萬物之宗而聖人無有也但見其湛兮而已矣彼騁能挾才露光駴衆者皆自以其有而求通于物者也非萬物之宗矣夫惟無其宗者乃可以為萬物之宗而其誰能信之天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中橐他各反橐籥冶鑄所用致風之器也橐者外之櫝所以受籥也籥者内之管所以鼓橐也屈鬰也抑而不伸之意數音朔屢也蘇注天地無私而聽萬物之自然故萬物自生自死死非吾虐之生非吾仁之也譬如結芻以為狗設之于祭祀盡飾以奉之夫豈愛之時適然也既事而棄之行者踐之夫豈惡之亦適然也聖人之于民亦然特無以害之則民全其性死生得䘮吾無與焉雖未嘗仁之而仁亦大矣排之有橐與籥也方其一動氣之所及無不靡也不知者以為機巧極矣然橐籥則何為哉蓋亦虛而不屈是以動而愈出耳天地之間其所以生殺萬物雕刻衆形者亦若是而已矣見其動而愈出不知其為虛中之報也故告之以多言數窮不如守中之不窮也呂注夫道㝠于象帝之先而不知誰之所自出則體此道者仁惡足以名之哉夫仁人心而已矣天地體此道者也無所事仁以萬物為芻狗聖人體此道者也無所事仁以百姓為芻狗芻狗之為物無所事仁而畜之者也萬物者與天地同體者也百姓者與聖人同體者也天地聖人自視猶芻狗則其視萬物百姓亦若是而已則生之畜之長之育之何所事仁哉夫唯不仁是之謂大仁然則天地之間其猶橐籥固可見矣蓋橐籥之為物唯其虛而不屈所以動而愈出者也則人也而體此道者言出于不言而已言無言則為無為可知也發于身而為言見于事而為為或言或為其實一也何則言為之體如是而已不知此則言不出于不言言不出于不言則異乎橐籥之虚動矣其多而數窮不亦宜乎孔子曰夫今之歌者其誰乎知此則知言出于不言矣言出于不言人莫不然也然而不能者以其心不麗乎有則麗乎無不麗乎取則麗乎捨不能適與道相當故也不有不無不取不捨而適與道相當者是之謂守中守中而不已則知言之所以言矣則多言數窮不如守中之為務也王純甫注芻狗喻聖人過化之妙橐籥喻聖人存神之妙多言數窮不如守中則老子自危自戒之言也蓋道本不可言而斥之以不仁道本不可名而狀之以橐籥知者固得意而忘言矣不知者不賭其眞而徒與我嘵嘵也則吾說窮矣中也者中也虚也無也不可言且名者也守此而心思路絶言語道斷其何窮之足慮老子著書談道而其言如此則其不得巳之心為何如也後世學者果不得于芻狗百姓之言而遂疑其有土芥斯民之意且曰申韓之慘刻原于道徳也自史遷已然況其他乎此即多言數窮之一騐也老子蓋預知之矣谷神不死是謂𤣥牝𤣥牝之門是謂天地根綿綿若存用之不勤谷喻也以其虛而能受受而不有微妙莫測故曰谷神牝能生物猶前章所謂母也謂之𤣥牝亦幽深不測之意薛君采曰老子書其遣詞多變文以叶韻非取義于一字之間也如是謂𤣥牝則讀牝如七以叶上句曰𤣥牝之門則特衍其詞與下句相叶或隨語生解既叶𤣥牝又指一處為𤣥牝之門則失之矣蘇注谷至虛而猶有形谷神則虛而無形也虛而無形尚無有生安有死邪謂之谷神言其徳也謂之𤣥牝言其功也牝生萬物而謂之𤣥焉言見其生之而不見其所以生也𤣥牝之門言萬物自是出也天地根言天地自是生也綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞矣呂注谷有形者也以得一故虛而能盈神無形者也以得一故寂而能靈人也能守中而得一則有形之身可使虛而如谷無形之心可使寂而如神則有形與無形合而不死矣古之人以體合于心心合於氣氣合於神神合於無其說是也合則不死不死則不生不生者能生生是之謂𤣥牝𤣥者有無之合牝者能生者也故曰谷神不死是謂𤣥牝道之生天地由此而已故曰𤣥牝之門是謂天地根以為亡邪則綿綿而未嘗絶以為存邪則惡覩其存哉若存而已若亡而非絶若存而非存則吾之用之存之無所容心脗合而已何勤之有哉杜道堅注列子亦有此章然不言出于老子而言黄帝書則知老子五千文引用墳典古語為多如經中凡稱是以聖人稱古之所謂稱建言有之稱故聖人云稱用兵有言是皆明述古聖遺言故孔子述而不作竊有比焉惟信而好古者可與言此道天長地乆天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私蘇注天地雖大而未離于形數則其長乆蓋有量矣然老子之言長乆極于天地蓋以人所見者言之耳若夫長乆之至則所謂天地始者是也天地生物而不自生立于萬物之外故能長生聖人後其身而先人外其身而利人處於衆人之表故能先且存如使天地與物競生而聖人與人争得則天地亦一物耳聖人亦一人耳何以大過之哉雖然彼其無私非求以成私也而私以之成道則固然耳呂注長短形也乆近時也天以時行者也嫌不足于形故以長言之地以形運者也嫌不足于時故以乆言之天地之根出于𤣥牝𤣥牝之體立于谷神之不死不死則不生不生者能生生天地之所以能長且乆者以其不自生不自生故能長生猶谷神而已矣然則聖人豈以有其身為累哉縁于不得已而物莫之能止故曰後其身而身先立于無何有而物莫之能害故曰外其身而身存身者吾之私也後其身外其身則公而無私矣無私也乃能成其私程俱論天地人一原耳天之所以為天地之所以為地人之所以為人固同而天地之能長且乆而人獨不然何哉天不知其為天地不知其為地今一受其形而為人則認以為已曰人耳人耳謂其養生不可以無物也則騁無益之求謂其有身不可以不愛也而營分表之事厚其生而生愈傷養其軀而身愈病其不為中道天者亦幸矣老氏之旨如此而未之思者以謂黄老之徒率畏死而求長生者豈不惑哉夫人而無生道安所載然世之喪其生者蓋反以有其生為累有其生者且猶老氏之深戒而謂其外于道而求生者乎未之思也息齋注天施地生施生之道在天地未嘗一日捨由其施物不已其生物不測天未嘗愛其施地未嘗息其生是之謂不自生由其不自生萬物恃之以生故能長生聖人亦然知此心不變不壊浩然與天地同流故于此身無可愛者一心之運知無不為舉措之間無非善利由其所得以非身為身故天下之有身莫我若也是謂後其身而身先外其身而身存人所以不能成物者以其自私也我無自私故能成人之私物得其私我得其得是謂兩得上善若水水善利萬物而不爭處衆人之所惡故㡬于道居善地心善淵與善仁言善信政善治事善能動善時夫唯不爭故無尤處上聲惡去聲㡬平聲治去聲夫音符尤過也蘇注易曰一隂一陽之謂道繼之者善也成之者性也又曰天以一生水蓋道運而為善猶氣運而生水也故曰上善若水二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而既已麗于形則于道有間矣故曰㡬于道然而可名之善未有若此者也故曰上善避髙趨下未嘗有所逆善地也空虛静黙深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止決必流善信也洗滌羣檅平準髙下善治也遇物賦形而不留于一善能也冬凝春泮涸溢不失節善時也有善而不免于人非者以其争也水唯不爭故兼七善而無尤呂注傳曰一陰一陽之謂道繼之者善也謂之繼則已離道而非道之體矣上善者道之所謂善者也非天下皆知善之為善者也故若水焉蓋水善利萬物而不争處衆人之所惡而上善亦然則雖未足以為道㡬于道矣江海所以能為百谷王者以其下之也故以居則善地蜺桓之審為淵止水之審為淵流水之審為淵故以心則善淵注焉而不滿酌焉而不竭故以與則善仁行險而不失其信故以言則善信其派為川谷其委為瀆海故以政則善治天下莫柔弱于水而攻堅强者莫之能先故以事則善能原泉混混不舍晝夜盈科而後進故以動則善時要之出于不争而以居善地為本故曰夫唯不争則天下莫能與之争故無尤呉注上善若水者蓋水之善以其灌溉浣濯有利萬物之功而不争處髙潔迺處衆人所惡卑污之地故㡬于有道者之善也彼衆人所善則居之善必得地心之善必如淵淵謂静深與之善必親仁與謂伴侶仁謂仁人言之善必有信政之善貴其治事之善貴其能動之善貴其時時謂當其可七者之善皆擇取衆人之所好者為善可謂之善而非上善也夫唯有道者之上善不争處上而甘于處下有似于水故人無尤之者尤謂怨咎衆人惡處下而好處上欲上人者有争心有争則有尤矣宏甫注言天下之善者莫善于水而聖人之善若之何謂善蓋凡利于物者或不能以無争而能不争者又木必能澤于物也水之善固利萬物而不争者也何以見其不争也衆人處上彼獨處下衆人處髙彼獨處卑衆人處易彼獨處險衆人處順彼或處逆衆人處潔彼或處穢所處盡處衆人之所惡夫誰與之争乎不争則無尤矣此所以為上善也居善地七句皆聖人利萬物而不争之實持而盈之不如其已揣而銳之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道揣初委反遺唯季反持而盈之謂盈而持之也揣而銳之謂銳而揣之也古文多倒語耳懼其溢而左右以枝之曰持懼其折而節量以治之曰揣蘇注知盈之必溢而以持固之不若不盈之安也知銳之必折而以揣先之不知揣之不可必恃也若夫聖人有而不有尚安有盈循理而後行尚安有銳無盈則無所用持無銳則無所用揣矣日中則移月滿則虧四時之運成功者去天地尚然而況于人乎呂注持所以防溢而盈之則重溢也如欲勿溢則如勿盈故曰持而盈之不如其已揣所以慮失而銳之則重失也如欲勿失則如勿銳故曰揣而銳之不可長保滿而不溢所以長守富也持而盈之則金玉滿堂莫之能守矣髙而不危所以長守貴也揣而銳之則富貴而驕自遺其咎矣然則何以免此患哉法天之道而已矣蓋功成名遂身退天之道此所以無私而成其私也封人之告堯曰退已其法天之道之謂乎元澤注持而盈之有意于有所以失之唯忘有有之為有而有之以為有則無失無溢矣揣者巧于度情銳者利于入物且事物無盡而吾持一身以遇其變則揣銳之工有時而困矣豈可長保乎故至人因時乘理而接以無我則其出無方而所應不窮也寒暑相推物極則返隂陽代運天道固然而世之愚者一遭其變一犯其名則終身有之認以為巳曾不知造化之密移吉凶之倚伏故終至于坐䝉憂患無以自存唯至人不然藏金玉而不寳居富貴而不榮凡物之來寄者如隂影集身窅然不知其在彼邪在我邪然則豈持盈以為慎揣銳以為工乎茍非無我之妙其何以與于此天之道大矣而莫尚乎是劉師立解盈則必虛戒之在滿銳則必鈍戒之在進金玉必累戒之在貪富貴易淫戒之在傲功成名遂必危在乎知止而不失其正此言深欲救人謂非必處山林絶人事然後可以入道雖居功名富貴之域皆可勤而行之息齋注知其盈而持之不若未嘗盈之為善也知其銳而揣之不若未嘗銳之為得也知盈而持知銳而揣巳為不善況盈而不持銳而不揣者乎盈而益貪銳而益驕金玉滿堂莫知其止富貴而驕未能驕物先喪巳心是為自遺其咎四時之運功成者退天道如此況于人乎載營魄抱一能無離乎專氣致柔能嬰兒乎滌除𤣥覽能無疵乎愛民治國能無為乎天門開闔能為雌乎明白四達能無知乎生之畜之生而不有為而不恃長而不宰是謂𤣥德載乘也營如經營怔營之營白虎通曰營營不定貌是也營魄雖滯載而乘之言無住著也訓營為魂為衛為止皆于義未協言魂載魄者雖近但不曰魂載魄而曰載營魄後人亦何從而知其指言魂也況以此載彼離而二之亦非抱一之㫖乎滌如水之濯除如糞之除天門以此心而言開闔以心之運動變化而言莊子入出而無見其形是謂天門本此畜許六反養也長上聲宰制也蘇注魄之所以異于魂者魄為物魂為神也易曰精氣為物遊魂為變是故知鬼神之情狀魄為物故雜而止魂為神故一而變謂之營魄言其止也蓋道無所不在其于人為性而性之妙為神言其純而未雜則謂之一言其聚而未散則謂之樸其歸皆道也各從其實言之耳聖人性定而神凝不為物遷雖以魄為舍而神所欲行魄無不從則神常載魄矣衆人以物役性神昬而不治則神聽于魄耳目困以聲色鼻口勞于臭味魄所欲行而神從之則魄常載神矣故敎之以抱神載魄使兩者不相離此固聖人所以修身之要至于古之眞人深根固蔕長生乆視其道亦由是也神不治則氣亂强者好鬬弱者喜畏不自知也神治則氣不妄作喜怒各以其𩔖是之謂專氣神虛之至也氣實之始也虛之極為柔實之極為剛純性而亡氣是之謂致柔嬰兒不知好惡是以性全性全而氣微氣微而體柔專氣致柔如嬰兒極矣聖人外不為魄所載内不為氣所使則其滌除塵垢盡矣于是其神廓然𤣥覽萬物知其皆出于性等觀浄穢而無所瑕疵矣既以治身又推其餘以及人雖于愛民治國一以無心遇之茍其有心則愛民者適以害之治國者適以亂之也天門者治亂廢興所從出也既以身任天下方其開闔變㑹之間衆人貴得而患失則先事以徼福聖人循理而知天命則待唱而後和易曰先天而天弗違非先天也後天而奉天時非後天也言其先後常與天命㑹耳不然先者必蚤後者必莫皆失之矣故所謂能為雌者亦不失時而已内以治身外以治國至于臨變莫不有道也非明白四達而能之乎明白四達心也是心無所不知然而未嘗有能知之心也大心一而已茍又有知之者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之于物來而應之則已矣又安得知應物者乎本則無有而以意加之此妄之源也其道既足以生畜萬物又能不有不恃不宰雖有大徳而物莫之知也故曰𤣥徳呂注夫人之有其身乆矣而欲退之以體天之道而不為功名之所累者豈不難哉然亦有道矣人生始化曰魄魄與精為一則寂然而已既生魄陽曰魂魂與神往來而魄㫄精出入則魄隙而不營一離而不抱矣載者終而復始之謂也營者環而無隙之謂也雖巳為人矣而載營魄抱一湛然無為如其生之始化則能無離矣能無離則專氣而不分致柔而無忤而能如嬰兒矣能如嬰兒則滌除悔吝𤣥覽觀妙凡動之微我必知之而能無疵矣所以養中者如此則雖愛民治國不以事累其心而能無為矣内之滌除𤣥覽而無疵外之愛民治國而無為則天門開闔常在于我而能為雌矣不將不迎應而不藏則明白四達而能無知矣道至于無知則眞知也是其所以人貌而天也夫何功名之累哉生之畜之生而不有為而不恃長而不宰者乃其所以為天也𤣥徳無他天徳之謂也息齋注載初也營造也魂者人之陽魄者人之隂自初造魄抱魂于魄能使魂魄相抱一而不離乎嬰兒者陽氣未散内和以柔非嬰兒之能然乃専氣之效不期致而致之故專氣致和一而不雜能如兒子乎超然𤣥覽非不善也然此心未忘則不足以語道故能滌除𤣥覽使之無疵乎以愛愛民愛始不周以事治國國始不治清静臨民民將自化故曰能無為乎陽動而開隂静而闔一開一闔變化所出然動而不已必窮動已而闔守静養動故曰能為雌乎内外明白中心洞然雖不渉事為然猶為静塵所累必能自知無自然後知不為礙故曰能無知乎聖人于物生之若父母畜之若子孫然生而不取以為有為而不恃以為功長而不自以為主非體𤣥徳不能矣宏甫注人知魄之載神而不知神之載魄載魄則神營魄載之則不神然則一神焉耳矣抱元守一則神魄自不相離而庶乎知神之為矣營營衛也夫嬰兒百無一知也而其氣至專百無一能也而其氣至柔專氣致柔能如嬰兒則可為抱一矣瑕疵未滌則𤣥闗不開𤣥闗不開則形質留閡滌除𤣥覽而能無疵則可為抱一矣愛民治國非神其誰為之而不能以無為也故知抱一者不欲分心以愛民務愛民者不免役神以治國是二之也安能抱一而無離乎天門開闔非神其誰主之而不能以自主也故有開則將不待迫之而自起有闔則逆不能無事而常定是内淫也安能抱一而無離乎此無他皆起于不知神之所為故也夫神至虛也虛則自然明白神至靈也靈則自然四達而其誰能離之然惟其有知也是以無知能無知斯知之矣有知則魄載神無知則神載魄神載魄則一魄載神則二故不可以有知也又不可以不知也知此者是謂𤣥徳夫𤣥徳深且逺矣是故可生而不可有可為而不可恃可長而不可宰嗚呼盡之矣筆乘古者魂魄或合而言之左氏心之精爽是謂魂魄是也或分而言之左氏人生始化曰魄既生魄陽曰魂是也大抵清虛則魄即為魂住著則魂即為魄如水凝則為冰泮則為水其實一耳夫魄之營營日趨于有而此云載者知七情無體四大本空如人載於車舟載於水乘乗然無所歸也如此則化有為無滌情歸性衆人離之而為二我獨抱之而為一入道之要孰切于此專氣致柔者老子曰心使氣曰强莊子曰無聽之以心而聽之以氣氣也者虚而待物者也蓋心有是非氣無分别故心使氣則强專于氣而不以心間之則柔夫專氣致柔所謂純氣之守也非嬰兒其孰能之𤣥覽𤣥妙之見也疵病也衆人之疵粗而易除學者之疵微而難遣何以故道之所謂疵則學者狃之為獨見者也金屑雖精入眼成翳以覺為礙以解為縳可勝病乎是故當滌除之也老子之示人可謂盡矣然智者除心不除事昩者除事不除心茍其誤認前言不至以輐斷為學者㡬希故又示之曰我言載營魄者非拱黙之謂也即愛民治國而能無為也所謂為無為也專氣致柔者非鬰閉之謂也即天門開闔而能為雌也所謂雄守雌也滌除𤣥覽者非晦昧之謂也即明白四達而能無知也所謂知不知也夫愛民治國天門開闔明白四達其于生之畜之為之長之皆不廢矣而無為也為雌也無知也則生而不有為而不恃長而不宰者也非𤣥徳而何闗尹子曰在已無居形物自著莊子曰老子以空虛不毁萬物為實其說亦甚明矣絀老子者猶謂其棄人事之實而獨任虚無也則未攷其文而先有意以誣之者耳豈不妄哉三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用轂古木反輪所輳也考功記曰轂也者所以為利轉也當平聲埏始然反埴市力反考功記曰埏和埴黏也和水土燒以為陶也半門曰户牖窻也蘇注竭知盡物以為器而器之用常在無有中非有則無無以致其用非無則有無以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之為一而不可分則至矣呂注三十輻共一轂當其無有車之用車吾所乗也埏埴以為器當其無有器之用器吾所用也鑿户牖以為室當其無有室之用室吾所居也乘則觀乎車用則觀乎器居則觀乎室其用未嘗不在于無其則不逺矣至于身則不知吾之所以用者何邪故有之以為利無之以為用有有之為利而無無之為用則所謂利者亦廢而不用矣有無之為用而無有之為利則所謂用者亦害而不利矣是故聖人入而未嘗有物也所以為無之之用出而未嘗無物也所以為有之之利故曰精義入神以致用也利用安身以崇徳也呉注輻輪之轑也轂輪之心也無空虛之處也埏和土也埴土之黏膩者為器謂以水和黏膩之土為陶器也凡室之前東户西牖户以出入牖以通明車載重行逺器物所貯藏室人所寢處故有此車有此器有此室皆所以為天下利也故曰有之以為利然車非轂錧空虚之處可以轉軸則不可以行地器非中間空虗之處可以容物則不可以貯藏室非户牖空虚之處可以出入通明則不可以寢處車以轉軸者為用器以容物者為用室以出入通明者為用皆在空虚之處故曰無之以為用人之實腹有氣所以存身所謂為利也虚心無物所以生氣所謂為用也故取三物為喻薛君采解章内雖互舉有無而言顧其指意實即有而發明無之為貴也蓋有之為利人莫不知而無之為用則皆忽而不察故老子借數者而曉之五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此令並平聲爽平聲差也行去聲鳩摩羅什曰不知即色之空與聲之空與聾盲何異為腹猶易艮其背之意不為目猶隂符機在目之意李約云目無厭聖人不為腹知足聖人為之目視外故云彼腹實内故云此蘇注視色聽音嘗味其本皆出于性方其為性而未有物也至矣及目縁五色耳縁五音口縁五味奪於所縁而忘其本則雖見而實盲雖聞而實聾雖嘗而實爽也聖人視色聽音嘗味皆與人同至于馳騁田獵未嘗不為而難得之貨未嘗不用也然人皆以為病而聖人獨以為福何也聖人為腹而衆人為目目貪而不能受腹受而未嘗貪故也彼物之自外至者也此性之凝于内者也呂注目之所以為目者色色而非色也屬乎五色則失其所以為目而無異乎盲矣耳之所以為耳者聲聲而非聲也屬乎五音則失其所以為耳而無異乎聾矣口之所以為口者味味而非味也屬乎五味則失其所以為口而無異乎爽矣萬物無足以撓之者心之所以静而聖也逐乎外則罔念而發狂矣事莫不然而馳騁田獵為尤甚知足不辱知止不殆行所以全也求乎外則辱殆而行妨矣物莫不然而難得之貨為尤甚腹無知者也目有見者也是以聖人為腹不為目故去彼有見有欲之追求取此無知無欲之虛静也息齋注目能視色然目以色盲耳能聽音然耳以聲聾口能嘗味然口以味亡田獵馳騁取貨無厭皆由心能取而生然亦由能取而喪蓋神藏于内而耳目心口分神之用為視為聽為嘗為知若視不出色是以色奪視也聽不出聲是以聲奪聽也嘗止于味是以味奪口也心止于取是以取奪心也四者奪于物則目猶盲也耳猶聾也口猶爽也心猶狂也曷若返而求之使見不以色見見為目聞不以聲聞聞為耳嘗不以味嘗嘗為口知不以心知知為心是以聖人為腹不為目腹者受而不取納而不畱易足以無情非如目之無厭愈見而愈不足也目馳于外腹止于内聖人專内而忘外故去彼取此呉注凡所欲之外物皆害身者也聖人但為實腹而養已不為恱目而徇物也故悉去彼在外之諸妄而獨取此在内之一眞上言目盲耳聾口爽心狂行妨五者下但言不為目蓋舉一以包其四董思靖曰前章言虚中之用此則戒其為外邪所實然目必視耳必聽口必味形必役心必感是不可必静惟動而未嘗離静則雖動而不著于物乃湛然無欲矣染塵逐境皆失其正而要在于目是以始終言之夫子四勿必先曰視釋氏六根眼色居首皆此意也寵辱若驚貴大患若身何謂寵辱若驚寵為下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者為吾有身及吾無身吾有何患故貴以身為天下者可以寄天下愛以身為天下者可以託天下為吾之為去聲貴大患若身當云貴身若大患倒而言之古語𩔖如此蘇注古之達人驚寵如驚辱知寵之為辱先也貴身如貴大患知身之為患本也是以遺寵而辱不及忘身而患不至所謂寵辱非兩物也辱生于寵而世不悟以寵為上而以辱為下者皆是也若知辱生于寵則寵固為下矣故古之達人得寵若驚失寵若驚未嘗安寵而驚辱也所謂若驚者非實驚也若驚而已貴之為言難也有身大患之本而世之士難于履大患不難有其身故聖人因其難于履患而敎之以難于有身知有身之為難而大患去矣性之于人生不能加死不能損其大可以充塞天地其精可以蹈水火入金石凡物莫能患也然天下常患亡失本性而惟身之為見愛身之情篤而物始能患之矣生死疾病之變攻之于内寵辱得失之交攖之于外未有一物而非患也夫惟達人知性之無壊而身之非實忽然忘身而天下之患盡去然後可以涉世而無累矣人之所以騖于權利溺于富貴犯難而不悔者將以厚其身耳今也祿之以天下而重以身任之則其忘身也至矣如此而以天下與之雖天下之大不能患之矣呂注寵者畜于人者也下道也寵而有其寵則辱矣吾之所以有辱者以吾有驚未得之則驚得之既得之則驚失之若吾無驚吾有何辱則寵之有辱者亦若是而已貴者畜人者也上道也貴而有其貴則有患矣吾之所以有大患者為吾有身故吉亦我所患凶亦我所患若吾無身吾有何患則貴之有大患者亦若是而已言身則知驚之為心言驚則知身之為累也無心則無驚無驚則無辱無身則無累無累則無患昔者舜以匹夫而友天子則可謂寵矣而若固冇之則何辱之有巍巍乎有天下可謂貴矣而不與有焉則何大患之有故貴以身為天下若可寄天下寵而招辱則賤其身矣非可以寄天下者也愛以身為天下若可託天下貴而罹患則危其身矣非可以託天下者也若夫寵而不有其寵貴而不有其貴如舜者乃眞可以寄託天下者也元澤注貴者在物之上而有國家有之而不能忘則為患大矣譬人有身而珍之則寒署疾痛萬緒皆作豈非大患乎市南子有曰堯非有人非見有于人者也貴者有人寵者見有于人唯聖人能免此二者萬物與我為一則與道𤣥同而萬變皆忘吉凶息矣而愚者不能自解恃形為已故形之所遭觸途生患老子先明寵貴之累而寵貴之累皆縁冇身而生故因譬貴之若身遂及無身之妙莊子曰忘其所不忘而不忘其所忘是之謂誠忘亦明此意而孔子母我理與是同學期於此而已然所謂無者豈棄而去之乎但有之而未嘗有則不累矣且崇髙莫大乎富貴誠能有之以無有則聖人所為濟世也亦何患之有其于寵也亦若斯而已矣筆乘人情率上寵而下辱不知辱不自生生于寵也則寵為下矣寵為下故得寵失寵皆若驚然驚者觸于物而無著者也過則虛矣貴重也謂難之也人情率有身而難患不知患不自生生于身也無其身則無患矣由此言之世之上寵者是上辱也驚寵與辱同則何辱有身者是有大患也貴身與貴患同則何患夫不以身視身而以大患視身無身者也而顧可以無患所謂後其身而身先外其身而身存也譬而言之如不輕以身為天下者天下反可寄惜以身為天下者天下反可託則知不有其身而其身反可保也莊子曰越人三世弑其君王子搜患之逃之丹穴越人薰之以艾乘以王輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡為君也惡為君之患也此固越人之所欲得為君也夫王子搜惡為君而越人愈迫欲得之則不有其身而身可有也復奚疑哉視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而為一其上不曒其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀摶音團執也詰契吉反曒吉曉反明也李約注夷平也漠漠然無異見也希無也少也或終身不得或亦得之微細也妙也彷彿似有追之又失此三者不可致詰不可致詰則一尚不立何況于三凡物皆上明下暗道無上故不曒無下故不昧繩繩長逺不絶也及責其實復歸于無故曰繩繩不可名復歸於無物恍有也惚無也謂有不可謂無不可故以恍惚名之不見其首無來時也不見其後無去日也自古有之謂之曰道今欲執之未得其方惟虚其心道將自至然後執之以御羣有無不理矣蘇注視之而見者色也所以見色者不可見也聽之而聞者聲也所以聞聲者不可聞也摶之而得者觸也所以得觸者不可得也此三者雖智者莫能詰也要必混而歸于一而可爾所謂一者性也三者性之用也人始有性而已及其與物搆然後分裂四出為視為聽為觸日用而不知反其本非復混而為一則日逺矣若推廣之則佛氏所謂六入皆然矣首楞嚴有云反流全一六用不行此之謂也物之有形者皆麗於隂陽故上曒下昧不可逃也道雖在上而不曒雖在下而不昧不可以形數推也繩繩運而不絶也人見其運而不絶則以為有物矣不知其卒歸于無也狀其著也象其微也無狀之狀無象之象皆非無也有無不可名故謂之惚恍道無所不在故無前後可見古者物之所從生也有者物之今則無者物之古也執其所從生則進退疾徐在我矣呂注視者無有也故視之不見雖不見也然能𤣥能黄不可名之以無色也曰夷而已聽者無有也故聽之不聞雖不聞也然能宮能商不可名之以無聲也曰希而已摶者無有也故摶之不得雖不得也然能隂能陽能柔能剛能短能長能圓能方能生能死能暑能涼能浮能沉能出能没能甘能苦能羶能香不可名之以無形也曰微而已凡物求之而不得者或可以致詰而得之此三者終不可致詰者也不可以致詰則隳聰明離形去智而吾得之矣則視也聽也摶也混而為一矣視以目聽以耳摶以心混而為一則耳如目目如耳心如耳目矣夫失道者上見光而下為土吾得之也其上非光也故不曒其下非土也故不昧繩繩兮調直而有信雖有信也而不可名故復歸于無物而已雖無物也是謂無狀之狀無物之象而未嘗無物也是謂惚恍惚則不曒不曒則疑于無物也而非無物也恍則不昧不昧則疑于有物也而非有物也其始無前故迎之而不見其首其卒無尾故隨之而不見其後無前無後則不古不今矣雖不古不今而未嘗無古今也則長于上古而不為老者吾得之以日用矣故曰執古之道以御今之有所謂古者非異于今也以知古之所自始也所謂今者非異于古也以知今之所從來也誠知古之所自始則知今之所從來矣始無所自來無所從所謂無端之紀也紀者道紀也道不可執也得此則可執之以為徳矣執徳之謂紀元澤注三者本一體而人所以求之者或以視或以聽或以摶故隨事强名雖然所用求者與夫所欲求者未嘗不一也唯了吾一則與彼一脗然為一矣推而上之至于無初之初乃知物無所從來則道之情得矣李榮注三者希微夷也俱非聲色並絶形名有無不足詰長短莫能議混沌無分寄名為一一不自一由三故一三不自三由一故三由一故三三是一三由三故一一是三一一是三一一不成一三是一三三不成三三不成三則無三一不成一則無一無一無三自叶忘言之理執三執一翻滯𤣥通之教息齋注視之不見不可以色求也聽之不聞不可以聲取也摶之不得不可以形索也既不為色形器之所囿則所謂元明者乃一精明耳方其未散混而為一雖寄于明而不可謂明故曰其上不曒雖不可謂明亦不可謂不明故曰其下不昧未嘗須臾可離可去也故曰繩繩不可名復歸于無物雖歸于無物不可謂之無物故曰無狀之狀無物之象是謂惚恍惚恍者出入變化不主故常之謂也其來無始故迎之不見其首其去無終故隨之不見其後試執古道以御今有則今猶古也以今之猶古則知古之猶今是謂道紀道紀者無去來古今之謂也古之善為士者微妙𤣥通深不可識夫唯不可識故强為之容豫若冬涉川猶若畏四鄰儼若客渙若氷將釋敦兮其若樸曠兮其若谷渾兮其若濁孰能濁以静之徐清孰能安以乆動之徐生保此道者不欲盈夫唯不盈故能敝不新成强其丈反豫猶皆獸名豫象屬也瓏右謂犬為猶象能前知其行遲疑犬先人行尋又囘轉故遲囘不果謂之猶豫儼矜莊貌渙散也木未斲曰樸曠空也冬涉川常難之也畏四鄰慎自持也儼若客不敢僭也氷將釋如恐陷也若樸質而無文章也若谷虚而無所藏也若濁晦而不分明也皆所謂强為之容也能敝不新成邵弁曰能敝能不新能成也不盈則若敝缺能敝也無事更改能不新也同然皆得能成也純甫曰能讀如耐耐敝者雖舊不壊新成再造之也蘇注麤盡而微微而妙妙極而𤣥𤣥則無所不通而深不可識矣戒而後動曰豫其所欲為猶迫而後應豫然若冬涉川逡巡如不得巳也疑而不行曰猶其所不欲遲而難之猶然如畏四鄰之見之也若客無所不敬未嘗惰也若氷將釋知萬物之出于妄未嘗有所畱也若樸人偽已盡復其性也若谷虚而無所不受也若濁和其光同其塵不與物異也世俗之士以物汨性則濁而不後清枯槁之士以定滅性則安而不復生今知濁之亂性也則静之静之而徐自清矣知滅性之非道也則動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳盈生于極濁而不能清安而不能生所以盈也物未有不敝者也夫唯不盈故其敝不待新成而自去呂注古之善為士者將以成聖而盡神也則其為士也雖未至乎聖神所以成聖而盡神者其聞之固已全盡矣微妙𤣥通深不可識乃所以成聖而盡神也微而後妙妙而後𤣥𤣥而後通則深不可識矣唯不可識則其形容安得以擬議哉强為之容而已豫若冬涉川迫而後動不得已而後起也猶若畏四鄰閑邪存其誠非物將之則其心不出也儼若客不為主也渙若氷將釋方終之以心凝形釋骨肉俱融也敦兮其若樸復其初也曠兮其若谷應而不藏也渾兮其若濁無是非彼我之辨也人皆昭昭也孰能濁以静之徐清者乎徐清則無所不照矣人皆取先也孰能安以動之徐生者乎徐生則無所不出矣蓋欲静則平氣欲神則順心有為也而欲當則縁于不得已平氣也順心也乃所以徐清也縁于不得已乃所以徐生也此士之所以能成聖而盡神也道之體沖沖也者隂陽之和而盈虚之守而保此道者不欲盈則虚而已然不曰虚而每曰不盈者恐人之累于虚也累于虚則不虚矣故曰或不盈不欲盈而已天下之物有新則有敝有敝則有壊則能不敝者鮮矣夫唯不盈則新敝成壊無所容心是以雖敝不敝不敝則不壊不敝不壊則不新不成矣元澤注士者事道之名微而妙𤣥而通有此道而退藏于密密者性本之内故無迹可見當時為士者異于此矣故稱古之善為士者豫者先事而戒之謂至人無心于物迫而後動冬涉者臨事逡巡若不得已也莊子曰不從事于務可以無戒而猶戒曰猶至人静密幽深不出性宅故常如畏鄰斂行而不縱也儼若客不以事為巳任故其容寂也人生之始同于大空凝為我體如水有氷故為道有氷解凍釋者事至于此其容已不滯于一體渙然將釋矣竊嘗原之人性如水為造化所凝故結而不通彼釋者反本而已矣材未為器謂之樸喻性之全體由氷釋之後乃能存天性之全而不雕于人偽故若樸也性全不虧而不自有其全故曠然空虚如谷之受且應也水性本淸而濁者混于物至人不自潔于物故渾然若濁者也澄性與澄水同加功則動而彌濁唯静以俟之則徐自清矣有道之士所以物莫能濁者以其静之徐清歸于寂定感而遂通故徐徐以生終則有始也動之徐生則變動不居非物能止夫誰能安之為此者信隂陽之理乘自然之運而無心其間故皆曰徐言濁則知安之清言安則知動之濁與上篇徼妙之文同不盈之盈乃大盈也如見道之後盈而有之則是自有此道違道逺矣道本無體非器所盛用則有餘求之不得故有道者未嘗盈而其用不窮也得道者未嘗盈則成道者未嘗新也道之為用通萬物而不敝以其無敝無新不成不敗故也敝生于新敗生于成士雖成道而常若敝敗矣茍得道之初矜其新成則與道異意非大成也經曰大成若缺其用不敝此篇句句有序以至于成成而若敝則盡之矣致虛極守静篤萬物並作吾以觀其復夫物芸芸各歸其根歸根曰静静曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃乆没身不殆開元疏致者令必自來如春秋致師之致作動也如日出而作之作芸芸作之状也常即常道之常以其為萬象主故曰王以其為衆父父故曰天蘇注致虛不極則有未亡也守静不篤則動未亡也丘山雖去而微塵未盡未為極與篤也蓋致虛存虛猶未離有守静存静猶䧟于動而況其他乎不極不篤而責虛静之用難已虚極静篤以觀萬物之變然後不為變之所亂知凡作之未有不復也茍吾方且與萬物皆作則不足以知之矣萬物皆作于性皆復于性譬如華葉之生于根而歸于根濤瀾之生于水而歸于水茍未能自復于性雖止動息念以求静非静也故惟歸根然後為静命者性之妙也性可言至于命則不可言矣易曰窮理盡性以至于命聖人之學道必始于窮理中于盡性終于復命仁義禮樂聖人之所以接物也而仁義禮樂之用必有所以然者不知其所以然而為之世俗之士也知其所以然而後行之君子也此之謂窮理雖然盡心以窮理而後得之不求則不得也事物日搆于前必求而後能應則其為力也勞而其為功也少聖人外不為物所蔽其性湛然不勉而中不思而得物至而能應此之謂盡性雖然此吾性也猶有物我之辨焉則㡬于妄矣君之命曰命天之命曰命以性接物而不知其為我是以寄之命也此之謂復命方其作也雖天地山河之大未有不變壊不常者惟復于性而後湛然常存矣不以復性為明則皆世俗之智雖自謂明非明也不知復性則緣物而動無作而非凶雖得于一時而失之逺矣方迷于妄則自是而非彼物皆吾敵吾何以客茍知其皆妄則雖仇讐將哀而憐之何所不容哉無所不容則彼我之情盡尚誰私乎無所不公則天下將往而歸之矣無所不懐雖天何以加之天猶有形至于道則極矣然而雖道亦不能復進于此矣呂注保此道者不欲盈致虛而不極守静而不篤則非不盈之至也衆人之于萬物也息而後見其復衰而後見其歸根而我以虚静之至故見萬物之所以作與其所以芸芸在我而不在彼其所以作者乃其所以復也方其所以芸芸者乃其所以歸根也故以其並作而觀其復則方其芸芸而各復歸其根也然則所謂虚者非虚之而虛也直莫之盈故虛也所謂静者非静之而静也夫物芸芸各歸其根而不知莫足撓心故静也故歸根曰静命者吾之所受以生者也夫唯静則復其所以生而能命物矣故静曰復命道至于能命物則常而不去矣故復命曰常自常觀之則吉凶悔吝常見乎動之微明孰加焉故知常曰明不知常者反此則所作不免妄而已能知常而體之則萬物與我為一矣故知常容萬物與我為一則不内其身而私矣故容乃公萬物與我為一而無私焉大也大則聖内聖外王故公乃王聖然後至于神故王乃天天則神矣道者所以成聖而盡神也故天乃道為道而至于常則盡矣故道乃乆没身不殆乆而至于没身不殆者常之謂已筆乘致虛而不知實之即虛虛未極也守静而不知動之即静静未篤也若此者觀無于無而未嘗于有觀無故耳試觀萬物方其並作若動且實而實無纖毫動與實者能如是觀是為觀復復者復其始也夫未能觀復即止動求静欲静轉動當物芸芸復歸其根則一切諸念當處寂滅不求静而自静乃真静也静則復命矣不曰性而曰命者性可言也命不可言也易曰窮理盡性以至於命夫理性非不妙矣而猶有妙在焉舉此而窮之盡之了不可得斯為至命則命又非性之方矣有作必有變復命則作而無作謂之眞常此非明者不能知也知常則静則吉不知常則妄作則凶方其迷于妄也自是而非彼必不能容知常則善惡兩忘是非無朕何所不容哉容乃公公乃王王乃天天即命也至此于道乃全而可以乆可以不殆特其餘事耳太上不知有之其次親之譽之其次畏之其次侮之信不足有不信猶兮其貴言功成事遂百姓皆謂我自然不知有之一作下知有之今從呉㓜清本陸希聲注太古有徳之君無為無迹故下民知有其上而已謂帝力何有于我哉徳既下衰仁義為治天下被其仁故親之懐其義故譽之仁義不足以治其心則以刑法為政故下畏之刑法不足以制其意則以權譎為事故衆庶侮之於乎心之有孚謂之誠言之可復謂之信誠既不孚言則不復而猶貴重爽言謂之誠信可乎哉道徳既隠仁義乃彰仁義不行刑法斯作而猶尊尚末術謂之道徳可乎哉聖人則不然執古御今斲雕為樸功成而不執事遂而無為有法無法因時為業使百姓咸遂其性皆曰我自然而然則親譽畏侮之心皆不生于世矣蘇注太上以道在宥天下而未嘗治之民不知其所以然故亦知有之而已其次以仁義治天下其徳可懷其功可見故民得而親譽之其名雖美而厚薄自是始矣又其次以政齊民民非不畏也然力之所不及則侮之矣吾誠自信則以道御天下足矣唯不自信而加以仁義重以刑政而民始不信聖人自信有餘其于言也猶然貴之不輕出諸口而民信之矣及其功成事遂則民日遷善逺罪而不自知也呂注執大象天下往由天下方且釋我而忘之其迹孰得而見哉故下知有之而已下知有之者無以尚之故謂之太上則親之譽之者其次畏之侮之又其次可知已何以論之今夫父子愛欽不言而喻至賓主之際朋友之交欲致其欽之之意必有以文之而後喻何則信之足與不足而已則親之譽之已出于信之不足而有不信況于畏之侮之乎然則欲使信至足而不至有不信者宜何如哉猶其貴言以復乎道而已貴言者行不言之敎也行不言之教則處無為之事可知已至夫功成事遂百姓謂我自然而莫知為之者則孰得而親譽之哉呉注太上猶言最上最上謂大道之世相忘于無為民不知有其上也其次謂仁義之君民親之如父母及仁義益著則不但親之而又譽之矣又其次謂智慧之主民畏之如神明及智慧漸窮則不但畏之而又侮之矣信者大道之實也自大道之實有所不足不能如上古之時則君之于民有不以其實者焉而日趨于華於是一降則用仁義再降則用智慧也此下言太上不知有之之事猶兮見前章貴寳重也然如此也寳重其言不肯輕易出口如犬行之疑遲退却蓋聖人不言無為俾民隂受其賜得以各安其生及其功既成事既遂而百姓皆謂我自如此不知其為君上之賜也大道廢有仁義智慧出有大偽六親不和有孝慈國家昬亂有忠臣六親王輔嗣云父子兄弟夫婦也孝慈孝子慈孫也蘇注大道之隆也仁義行于其中而民不知大道廢而後仁義見矣世不知道之足以澹足萬物也而以智慧加之于是民始以偽報之矣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽叟也伊尹周公非不忠也而獨稱龍逢比干無桀紂也涸澤之魚相呴以沫相濡以溼不如相忘于江湖王介甫注道𨼆于無形名生于不足道𨼆于無形則無小大之分名生于不足則有仁義智慧差等之别仁者有所愛也義者有所别也以其有愛有别此大道所以廢也智者知也慧者察也以其有知有察此大偽所以生也孝者各親其親慈者各子其子此六親所以不和也忠者忠于己之君謂之忠忠于他人謂之叛呂注道不可名名之為道已非道也則又分而為仁義豈道之全哉則有仁義者固大道之廢也賊莫大乎徳有心而心有眼及有眼而内視内視則敗矣則智慧出固所以有大偽也偽者徳之反也冇仁義則其弊至于六親不和而有孝慈矣有大偽則具弊至于國家昏亂而有忠臣矣是故有瞽叟之頑嚚弟象之傲而後有舜有桀紂之暴而後有龍逢比干此無他去本日逺而已矣息齋注道散則降而生非偽勝則反而貴道降者道之微反者哀之極也方道之未散仁義濳乎其中不可分别指數及其煦煦為仁而人以煦煦懐其仁孑孑為義而人以孑孑懐其義使大道之行以公天下則仁義又何足以進于其前哉不幸而又有小智小慧者竊仁義而行之則偽自此滋亂自此始是之謂降而生非及其末流人偽既多無非非者羣非之中稍有自異于是從而貴之故六親不和然後知有孝慈國家昏亂然後知有忠臣是謂反而貴道方其散則見其似而忘其全及其衰則蕩然無餘而貴具似此其所以每降而愈下也絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以為文不足故令有所屬見素抱樸少私寡欲令平聲屬之欲反蘇注非聖智不足以知道使聖智為天下其有不以道御物者乎然世之人不足以知聖智之本而見其末以為巧勝物者也於是馳騁于其末流而民始不勝其害矣故絶聖棄智民利百倍未有仁而遺其親者也未有義而後其君者也仁義所以為孝慈矣然及其衰也竊仁義之名以要利于世於是子有違父而父有虐子此則仁義之迹為之也故絶仁棄義則民復孝慈巧所以便事也利所以濟物也二者非以為盜而盗賊不得則不行故絶巧棄利盗賊無有世之貴此三者以為天下之不安由文之不足故也是以或屬之聖智或屬之仁義或屬之巧利蓋將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有三者無所用之矣故曰我無為而民自化我好静而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也然孔子以仁義禮樂治天下老子絶而棄之或者以為不同易曰形而上者謂之道形而下者謂之器孔子之慮後世也深故示人以器而晦其道使中人以下守其器不為道之所眩以不失為君子而中人以上自是以上達也老子則不然志于明道而急于開人心故示人以道而薄于器以唯學者惟器之知則道𨼆矣故絶仁義棄禮樂以明道夫道不可言可言皆其似者也達者因似以識眞而昧者執似以陷于偽故後世執老子之言以亂天下者有之而學孔子者無大過因老子之言以達道者不少而求之于孔子者常若其無所從入二聖人者皆不得已也全于此必略于彼矣呂注聖人知天下之亂始于迷本而失性惟無名之樸為可以鎮之絶聖棄智絶仁棄義絶巧棄利乃所以復吾無名之樸而鎮之也夫絶聖棄智絶仁棄義則不以美與善累其心矣絶巧棄利則不以惡與不善累其心矣内不以累其心而外不以遺其迹則民利百倍民復孝慈盜賊無有固其理也蓋絶聖棄智絶仁棄義不尚賢之盡也絶而棄之則非特不尚而已絶巧棄利不貴難得之貨之盡也絶而棄之則非特不貴而已人之生也萬物皆備于我矣則有至足之富能絶聖棄智而復其初則其利百倍矣民復孝慈則六親皆和而不知有孝慈矣盜賊無有則國家明治而不知有恵臣矣不尚賢使民不争民利百倍民復孝慈則非特不争而已不貴難得之貨使民不為盜盜賊無有則非特不為盗而已聖智也仁義也巧利也此三者以為文而非質不足而非全故絶而棄之令有所屬見素抱樸少私寡欲乃其所屬也見素則知其無所與雜而非文抱樸則知其不散而非不足素而不雜樸而不散則復乎性而外物不能惑而少私寡欲矣少私寡欲而後可以語絶學之至道也息齋注聖者不自以為聖智者不自以為智使聖智而可絶皆非聖智也仁者不自以為仁義者不自以為義使仁義而可絶皆非仁義也大巧不見其巧大利不見其利使巧利而可絶皆非巧利也聖人用其實不取其文故其見于外者無其形衆人竊其似以亂其眞故今見于外者有所屬無其形者利物而物不知有所屬者徒足以亂天下而已聖人惡偽之足以亂真故欲絶其本原以救末流之弊使天下之人不復懷利心而竊聖智之行假仁義而棄孝慈之實用盜賊而棄巧利之便惟以素樸先民民見其見素抱樸則不敢以文欺物不以私欲示民民見其少私寡欲則不敢以文自欺筆乘屬如莊子屬其性乎仁義之屬猶附著也聖智仁義巧利三者繇世道日趨于文故有此名自知道者觀之此文也文不足以治天下不若使之屬意乎見素抱樸見素抱樸則少私寡欲而天下無事矣素未受采樸未斲器此所謂性之初也實也夫遊于性之初故雖有身而實無身其有私焉者少矣雖有心而實無心其有欲焉者寡矣然則見素抱樸乃聖智仁義之精也焉用文之蓋老子絶之于彼正欲其屬之于此學者不察其意而但知其絶而棄之猥云老子之論蕩而不法也斯所謂不得於言者乎絶學無憂唯之與阿相去㡬何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙如享太牢如春登臺我獨怕兮其未兆如嬰兒之未孩乘乘兮若無所歸衆人皆有餘而我獨若遺我愚人之心也哉沌沌兮俗人昭昭我獨若昏俗人察察我獨悶悶忽兮若晦寂兮似無所止衆人皆有以我獨頑似鄙我獨異於人而貴食母唯上聲阿烏何反皆應聲唯㳟而阿慢也荒廣逺也怕古泊字静也兆如龜兆之坼動之微也孩小兒笑也笑則情動而識生矣有歸必稅駕而不乘乘乘兮無所歸無住著也馬巨濟曰性無餘欠有餘皆分外也享太牢登春臺則所得皆分外故曰衆人皆有餘遺失也沌如渾沌之沌無知也一作純小明為昭察苛細也悶莫奔反頑不知痛痒也古謂都為美郊為鄙食音嗣食母乳母也見禮記内則篇蘇注為學日益為道日損不知性命之正而以學求益增所未聞積之不已而無以一之則以害方以直害曲其中紛然不勝其憂矣患夫學者之至此故曰絶學無憂若夫聖人未嘗不學而以道為主不學而不少多學而不亂廓然無憂而安用絶學邪學者溺于所聞而無以一之則唯之為㳟阿之為慢不可同日言矣而況夫善惡之相反乎夫唯聖人知萬物同出于性而皆成于妄如畫馬牛如刻虎彘皆非其實湣焉無是非同異之辨孰知其相去㡬何哉茍知此矣則萬物並育而不相害道並行而不相悖無足怪矣聖人均彼我一同異其心無所復留然豈以是忽遺世法犯分亂理而不顧哉人之所畏吾亦畏之人之所為吾亦為之雖列于君臣父子之間行于禮樂刑政之域而天下不知其異也其所以不嬰于物者惟心而已人皆徇其所知故介然不出畦畛聖人兼涉有無無入而不可則荒兮其未可央也人各溺于所好其美如享太牢其樂如春登臺囂然從之而不知其非唯聖人深究其妄遇之泊然不動如嬰兒之未能孩也乘萬物之理而不自私故若無所歸衆人守其所知各自以為有餘聖人包舉萬物而不主于一超然其若遺也沌沌若愚而非愚也世俗以分别為知聖人知羣妄之不足辨也故其外若昏其中若悶忽焉若海不見其津涯漂然無定不見其止宿也人各有能故世皆得而用之聖人才全徳備若無所施故疑于頑鄙道者萬物之母衆人徇物忘道而聖人脫遺萬物以道為宗譬如嬰兒無所雜食食于母而已呂注上絶棄乎聖智仁義之善下絶棄乎巧利之惡不以累其心則絶學矣絶學則無為無為則神神也者鼔萬物而不與聖人同憂者也故曰絶學無憂唯之與阿出于聲一也其相去㡬何善之與惡離乎道一也其相去何若此所以雖聖知猶絶而棄之不以累其心也憂悔吝者存乎介震無咎者存乎悔則人之所畏不可不畏也荒兮其未央哉未央者以言其大而無極則不獨畏人之所畏而已何則人之所畏不可不畏所以同乎人也荒兮其未央哉所以同乎天也衆人熙熙則不知塞其兌閉其門也如享太牢則不知夫淡乎其無味也如春登臺則不知夫視之不足見也我獨怕兮其未兆若嬰兒之未孩則塞其兌閉其門而無味之足嗜無見之足恱也乘乘兮若無所歸以言唯萬物之乘而在已無居也衆人如享太牢如春登臺故皆有餘我獨怕兮其未兆如嬰兒之未孩故獨若遺凡此者以言其遺物而離形也我愚人之心也哉以言其無知也純純兮以言其不雜也俗人昭昭我獨若昏則異乎俗人之昭昭俗人察察我獨閂閂則異乎俗人之察察矣忽若晦晦則都無所見也都無所見則非特若昏悶悶而已其動也乘乘兮若無所歸其静也寂兮似無所止俗人昭昭俗人察察故皆有以我獨若昏我獨若悶故頏似鄙凡此者言其去智而忘心也夫視聽思慮道之所自而生者也故于道為子而道則為之母衆人逐物役智以資其視聽思慮則養其子而已而我則遺而去之凡貴養母故也故曰我獨異于人而貴食母夫老子神矣何所事養而與衆人俗人為異而已欲使為道者知如此而後可以至于道故也然則絶學之大指可知矣而先儒以謂人而不學雖無憂如禽何其未知所以絶學無憂之意矣息齋注學不至于無所學非絶學也道以無得為得學以無學為學使道而可得皆仁義也使學而可學皆名數也故聖人以無得為得道以無學為眞學故曰絶學無憂若未至于無學則天下之學無窮得其一而遺其二得于此而失于彼則必以得為喜失為憂無時而息矣道之本原未始不同若不揣其本而齊其末則末必至于大異且唯之為恭阿之為慢方其唯阿之間其相去㡬何及其為恭與慢則相去逺矣嚮理為善背理為惡方其嚮背之間相去㡬何及其為善與惡則相去逺矣聖人嘗觀其始知其本同故反慢而為恭反惡而為善在俄頃之間耳若知唯阿善惡之本同則造于絶學有不難者然聖人出而應世豈能易一世之所欲以隨吾之所欲同一世之所見以齊吾見人之所樂吾亦從而樂之人之所畏亦從而畏之但所以異于衆者衆人樂無央熙熙然其樂如春登臺其美如享太牢其明昭昭然謂英我若其智察察然謂莫我過蓋其心實以為樂實以為美實以為明實以為智昧于心性而惟實之知故心外無所見聖人心遊于道其應物者非其實也故怕兮其未兆如嬰兒之未孩乘乘兮若無所歸怱兮若海漂兮若無所止衆人皆有餘我獨若遺衆人皆有以我獨頏且鄙豈眞愚人之心哉蓋我所異于衆人識本達原不流于末是謂貴食母筆乘人之為學憂不得善也吾能絶學則奚憂之有然非强絶也知性本無善也彼為善者雖異于惡而離性則一其少異者如唯與阿之間耳夫以善惡之同而聖人亦不廢善者蓋人之所畏不得不畏所謂吉凶與民同患也至其心㳺于性初方且兮未央而豈若善之有涯涘可限量哉故人之樂善如享太牢春登臺而我獨泊兮如嬰兒之未孩無朕兆也乘乘兮無所歸無棲泊也人之得善皆有贏餘而我獨若遺若愚人之沌沌無知識也人皆昭昭察察皆若有所以而我獨昏也悶悶也忽兮若海漂兮無所止也此豈聖人眞頑且鄙哉以衆皆逐其子我獨貴其母不能不與衆異耳蓋性無善惡而善惡萬法皆從此而生故謂之食母董思靖或曰唯阿同出于聲善惡同出于為達人大觀本實非異正如臧榖亡羊之說也此故太上忘情是非俱冺者之所為然學者直須于善惡不可名處著眼始得若直以為善與惡同耳則是任天下至于惡而不之顧豈理也哉純甫注天非日無以煜物人非學無以致道故曰學者心之白日也聖人乃曰絶學無憂豈誠莽莽然無所用其心哉蓋所絶者世俗之學而所貴者食母之學也母者何也徳者萬物之母而道又徳之母則聖人所謂母兼道徳而言之也食者味之以自養也味道徳而自養則無為而無不為而其樂不可量矣又奚暇為彼俗學以自取憂也哉聖人所以異于人者以此孔徳之容唯道是從道之為物惟怳惟惚惚兮怳兮其中有象怳兮惚兮其中有物窈兮冥兮其中有精其精甚眞其中有信自古及今其名不去以閱衆甫吾何以知衆甫之然哉以此孔大也窈烏了反怳惚窈冥皆不可見之意鄧錡云怳惚便是物非怳惚之中更别有物經云無狀之狀無物之象是謂惚怳是也窈冥便是精非窈冥之中更别有精張平叔云窈冥莫測是眞精是也王輔嗣曰信驗也閱自出門者一一而數之言道如門萬物皆自此往也漢書此如傳舍所閱多矣陸機賦川閱水而成川世閱人而為世其用字之義並同一訓經歴亦同此義甫美也又始也蘇注道無形也及其運而為徳則有容矣故徳者道之見也自是推之則衆冇之容皆道之見于物者也道非有無故以怳惚言之然及其運而成象著而成物未有不出于怳惚者也方有無之未定怳惚而不可見及夫有無之交則見其窈冥深眇雖木成形而精存乎其中矣物至于成形則眞偽雜矣方其有精不容偽也眞偽既雜自一而為二自二而為三紛然錯出不可復信矣方其有精不吾欺也古今雖異而道則不去故以不去名之唯未嘗去故能以閱衆有之變矣甫美也雖萬物之美不免于變也聖人所以知萬物之所以然者以能體道而不去故耳呂注其遺物離形至于若遺其去智忘心至于若鄙則其容之甚徳者也夫將何從哉唯道之從而已道之為物惟恍惟惚方惚而恍恍則不昩不昩則明明則疑于有物也然其中有象象者疑于有物而非物也故曰無物之象又曰大象無形方恍而惚惚則不曒不曒則晦晦則疑于無物也然其中有物物者疑于無物而有物者也故曰無狀之狀又曰有物混成恍惚則不測不測則神矣窈冥者神之又神者也神之又神而能精焉故曰窈兮冥兮具中有精精者得道之一而不雜者也天下之物眞而不偽信而不忒常而不變未有加于此而天下之始吾于是乎閱之故曰其精甚眞其中有信自古及今其名不去以閱衆甫故為道者不曒不昩存其恍惚無視無聽致其窈冥有象此有物有物此有精有精此有信為道至于有信則與吾心符而至物得矣欲知天地萬物之所以為天地萬物者莫不始于此而已故曰吾何以知衆甫之然哉以此息齋注孔者大也徳之大者其容亦大道未嘗有容而孔徳之容亦依于道故起以道起吾不知其起滅以道滅吾不知其滅道之為物恍惚窈冥而不可常然于恍惚之中有象于恍惚之中有物于窈冥之中有精則無中無不有也有中之有衆皆以為有不知有本不實有中反無無中之有人所不知而初不知無中反有蓋有中之有有之粗者也唯無中之有然後為有中之眞唯其眞而不假故不以有而存不以無而亡是謂有信自古及今不變不異其精不去聖人所以能觀羣有之始而知羣有之所由然以其體于至無故能觀衆有也純甫注孔徳之容即前章泊兮未兆以下是也惟道是從言此盛徳容貌皆從道出此聖人所以貴食母也下乃反覆形容道體之妙怳惚窈冥皆幽深微𣺌不可為象之意物即象也眞即精也信即眞也變文叶韻與詩體相似逐句而為之說則鑿矣閱厯也衆甫天地萬物凡自道而出者皆是也衆甫與化遷流而道則終古自若故曰自古及今其名不去以閱衆甫然指閱而言此指怳惚窈冥而言言吾何以知衆甫為道所閱哉正以道體怳惚窈冥無可變壊故衆甫往而道常存若傳舍之閱過客然也蘇子瞻曰逝者如斯而未嘗往也盈虚者如彼而卒莫消長也與此意合至禪伯云有物先天地無形本寂寥能為萬象主不逐四時彫則更明白矣筆乘道無形容一可形容即屬之徳然知徳容則道亦可從而識如所謂怳惚窈冥是也人之學道喜于有作至怳惚窈冥𩔖苦其芒蕩難于湊泊矣不知怳惚無象即象也怳惚無物即物也窈冥無精即精也如釋典云若見諸相非相即見如來也暫為假常為眞怳惚窈冥則不以有而存不以無而亡夫孰眞且信于此故曰自古及今其名不去也昩者乃謂怳惚窈冥之中眞有一物者夫怳惚窈冥則無中邊之謂也而物奚麗乎況有居必有去又何以亘古今而常存乎然則曷謂閱衆甫也甫始也人執衆有為有而不能𤣥㑹于徼妙之間者未嘗閱其始耳閱衆有之始則知未始有始知未始有始則衆有皆衆妙而其為怳惚窈冥也一矣是所以知衆有即眞空者以能閱而知之故也釋氏多以觀門示人悟入老子之言豈復異此故閱衆始則前際空觀其徼則後際空萬物並作觀其復則當處空一念歸根三際永斷而要以能觀得之學者誠有意乎知常也則必自此始矣曲則全枉則直窪則盈敝則新少則得多則惑是以聖人抱一為天下式不自見故明不自是故彰不自伐故有功不自矜故長夫唯不争故天下莫能與之争古之所謂曲則全者豈虛言哉誠全而歸之窪烏𤓰反夫音符蘇注聖人動必循理理之所在或直或曲要於通而已通故與物不迕不迕故全也直而非理則非直也循理雖枉天下之至直也衆之所歸者下也雖欲不盈不可得矣昭昭察察非道也悶悶若將敝矣而日新之所自出也道一而已得一則無所不得多學而無以一之則惑矣抱一者復性者也蓋曲則全枉則直窪則盈敝則新少則得皆抱一之餘也故以抱一終之目不自見故能見物鏡不自照故能照物如使自見自照則自為之不暇而何暇及物哉不自見不自是不自伐不自矜皆不争之餘也故以不争終之世以直為是以曲為非將循理而行于世則有不免于曲者矣故終篇復言之曰此豈虚言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其為直也大矣呂注能知衆甫之然則能抱一致柔能抱一致柔則能曲能枉能窪能敝矣曲者曲之自然者也枉者曲之使然者也天下之物唯水為㡬于道一西一東而物莫之能傷是曲則全也避礙萬折而必東是枉則直也善下而百谷歸之是窪則盈也受天下之垢而莫清焉是敝則新也唯得一者為足以與此故曰少則得衆人所以不能然者以其不一故也故曰多則惑制財用必有式傳土木必有式所持者約而所應者博也聖人抱一以為天下式亦如是而已故可以曲可以枉可以窪可以敝無往而非一也故因天下之所見而見之而我不自見也則所見無不察故曰不自見故明因天下之所是而是之而我不自是也則所是莫之能蓋故曰不自是故彰歸天下以功而我不自有也故有功任萬物以能而我不自矜也故長如是者無他得一則無我無我則不争夫唯不争天下莫能與之争矣古之所謂曲則全其要如是而已知所以曲則全則知所以枉則直窪則盈敝則新矣而不自見故明不自是故彰不自伐故有功不自矜故長皆由是也豈非所謂全而歸之哉息齋注物不可以終曲故曲則全物不可以終枉故枉則直窪則必盈敝則必新少則易得多則易惑此盈虛之至理也古之聖人所以能為萬物宗者以其抱一也抱一者常與道俱故不自見而因人之見不自是而因物之是不自有其功而因人之功不自矜其長而因人之長唯其立于物之獨而不與物争故天下莫能與之争聖人循理而動求其不全不可得以未嘗不全而又能致曲以養之其全之也至矣是謂誠全歸之宏甫注夫人無不欲全也而失其所以全之道往往以全求全而卒不能全者此天下之通弊也不知五臓六腑四肢百骸至曲也而人賴以全若不曲則不能全矣引繩而直之故以繩為直而不知其枉也茍非枉安能直哉海窪也而常盈日月舊也而常新飲酒食肉少也而以飽以適若務多不已則吐噦隨而反傷矣是惑也知此則知聖人抱一之道矣夫一之能多也猶少之能得敝之能新窪之盈枉之直曲之全也是倒行逆流之理而聖人之所以為式于天下者惜乎其不知也由此觀之學道者可以反矣夫目至明也而不能自見其目使其見目則不見明矣安能明然則不自是者人必是之不自功者人必推功不自長者人必以為長不争者人必不與之争皆曲全之道也嗚呼能全而歸之者果誰乎筆乘曲則全枉則直窪則盈敝則新凡以明少則得也一少之極也抱一而天下式則其得多矣故一國三公不知誰適十羊九牧詎可得芻喪生者繇其多方亡羊者苦于岐路希言自然飄風不終朝驟雨不終日孰為此者天地天地尚不能乆而況于人乎故從事於道者道者同于道徳者同于徳失者同于失同于道者道亦樂得之同于徳者徳亦樂得之同于失者失亦樂得之信不足有不信飄風疾風也驟雨暴雨也自旦及晡為終朝自早及莫為終日風雨震蕩飄忽必不能乆岐伯所謂亢則害承乃制也樂入聲蘇注言出于自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣隂陽不争風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏于下否而不得洩于是為飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故乆而不窮世或厭之以為不若詭辯之悅耳怪行之驚世不知其不能乆也孔子曰茍志于仁矣無惡也故曰仁者之過易辭志于仁猶若此而況志于道者乎夫茍從事于道矣則其所為合于道者得道合于徳者得徳不幸而失雖失于所為然必有得于道徳矣不知道者信道不篤因其失而疑之于是益以不信夫唯知道然後不以得失疑道也呂注聽之不聞名曰希言而知其所以言則言出于不言而聽之不聞矣故曰希言希言者以道言也故曰自然飄風驟雨成之暴戾非出于常然也故雖天地為之尚不能終朝終日之乆人之言不出于自然則多而數窮宜矣故唯從事于道者為能無我無我則道也徳也失也吾不見其所以異故道者我則同于道徳者同于徳失者同于失而恢詭譎怪通為一也夫唯不見其所以異而與之同則彼雖有以異我而未嘗去我也故曰同于道者道亦得之同于徳者徳亦得之同于失者失亦得之唯其信不足則于是乎有道有徳有失而不同矣故曰信不足有不信筆乘道以自然為至而世希言之者喜于作也有作必有輟惡能乆乎即飄風驟雨之不能乆焉亦可見也從事于道者不然從事于道則自然矣自然則本無可得亦復何失無得無失而隨世之得失故為徳為失皆信其所至而無容心焉無不同矣無不同亦無不樂乃其理也夫無不同則求其信且不可得況不信乎茍離道而為徳不能同于失矣離徳而為失不能同于徳矣不能同于徳同于失而欲其同于道者禾之有也所謂信不足焉有不信也皆飄風驟雨之𩔖也或曰首楞嚴言非因縁非自然而老氏以自然為宗有以異乎余曰無以異也夫所惡夫自然者有所自而自有所然而然也有所自而自有所然而然則是自然也在有物之上出非物之下是釋氏之所訶也老明自然矣獨不曰無名天地之始乎知無名則其自也無自其自也無自則其然也無然其自無自其然無然而因若縁曷能囿之故曰精覺妙明非因非縁非自然非不自然離一切相即一切法蓋所謂不可道之常道如此跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處跂與企同薛云舉踵曰跂張足曰跨立欲増髙則反害其立行欲増闊則反害其行贅疣贅也行當作形古字通也食餘人必惡之形贅人必醜之左氏人將不食吾餘莊子附疣縣贅出乎形而侈于性是也惡去聲處上聲蘇注人未有不能立且行者也茍以立為未足而加之以跂以行為未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜者亦若是矣譬如飲食適飽則已有餘則病譬如四體適完則已有贅則累呂注之為立非立之常也跨之為行非行之常也則不可乆故雖立不立雖行不行也道固無我無我則不争則夫自見自是自矜者亦非其常也故其為道也為餘食贅行而已夫俗人皆嗜之矣而吾復取焉是餘食也性本無是而特侈之是贅行也餘食贅行物或惡之則有道宜其不處也夫道處衆人之所惡而曰物或惡之故有道者不處何也蓋卑虛柔弱者衆人之所惡而去之者也故有道者處之見是矜伐者衆人之所惡而争之者也是以不處則或處或不處其為不争一也息齋注石無足而立風無足而行蓋由立者不知其立行者不知其行也足不至地曰跂足越于行曰跨立而跂立必不乆行而跨行必不長古之學道者必全于天及其遇物而應不作思慮如人手足耳目内應于心無使之者若使手足耳目思而後應則舉動之間莫知所措矣是以自見者不明自是者不彰自伐者無功自矜者不長由其有自心也學道而有自心是為餘食贅行夫食者適于飽行者適于事既飽之餘芻豢滿前唯恐其不持去行不適事雖仲子之亷尾生之信猶可厭也故食之餘與行之贅此二者物或惡之有道者常行其所自然故食不餘行不贅有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道强為之名曰大大曰逝逝曰逺逺曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然混渾通先悉薦反强上聲介甫云寂止也寥逺也羅什曰妙理常存故曰有物萬道不能分故曰混成鍾㑹曰廓然無偶曰獨立古今常一曰不改無所不在曰周行所在皆通曰不殆蘇注夫道非清非濁非髙非下非去非來非善非惡混然而成體其于人為性故曰有物混成此未有知其生者蓋湛然常存而天地生于其中耳寂兮無聲寥兮無形獨立無匹而未嘗變行于羣有而未嘗殆俯以化育萬物則皆其母矣道本無名聖人見萬物之無不由也故字之曰道見萬物之英能加也故强為之名曰大然其實則無得而稱之也自大而求之則逝而往矣自往而求之則逺不及矣雖逝雖逺然反而求之一心足矣由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣呂注有氣也有形也有質也而天地人之位分可聞也可見也可搏也而耳目心之官辨是物也未見氣與形質者也氣形質渾淪而未相離者也而視之不可見聽之不可聞摶之不可得則其形不可得而見也故吾不知其名而命之其義可言也故字之曰道不知其名以心契之也字之曰道以義言之也道之為物用之則彌滿六虛而廢之莫知其所則大豈足以名之哉强為之名而已大則周行而無不在不止于吾身而已故大曰逝逝則逺而不禦故逝曰逺逺而不禦則吾求其際而不可得也復歸其根而未始離乎吾身也故逺曰反道大天大地大王亦大在六合之外則大不足以言之所謂四大者域中而已王者人之復命知常容容乃公公乃王者也故域中有四大而王處一焉王者人道之盡者也人以有形而合于無形于地亦然則地之所至人亦至焉故曰人法地天之所至地亦至焉故曰地法天道之所至天亦至焉故曰天法道道則自本自根未有天地自古以固存而以無法為法者也無法也者自然而已故曰道法自然息齋注謂之有物者不可名也謂之混成者不可修也先天地生不見其始不見其始則不知其終既無始終則獨立不改然雖獨立未嘗獨立周行萬物無所不入而無有危殆天下之物無不由之而出生生不窮故可以為天下母然謂之獨立非獨立謂之周行非周行謂之天下母非天下母吾皆莫知其名字之曰道强名之曰大謂之大矣然其大未嘗見大而嘗化故曰逝謂之逝矣然其實未嘗去無所不周故曰逺謂之逺矣然其一念之間無所不具故曰反由其大而能逝逺而能反故非大非細非逺非近皆不可名是之謂道及道降而生物天地區分域中四大自世人言之則王之大不及天地之大天地之大不及道之大而此言四大王居一焉遂以王配道若無難者夫以一人之身喜怒哀樂之節尚可位天地肓萬物而況于王乎茍能轉以相法人法地地法天天法道則王之配道人何難哉李約注道大天大地大王亦大是謂域中四大蓋王者法地法天法道之三自然而理天下也天下得之而安故謂之法凡言人屬者耳其義云法地地如地之無私載法天天如天之無私覆法道道如道之無私生成而已如君君臣臣父父子子之例也後之學者謬妄相傳皆云人法地地法天天法道道法自然則域中有五大非四大矣豈王者只得法地而不得法天法道乎天地無心而亦可轉相法乎又況地法天天法道道法自然是道為天地之父自然之子支離決裂義理疎逺矣重為輕根静為躁君是以聖人終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失根躁則失君根本也躁者動之甚而煩擾也君主也韓非云制在已曰重不離位曰静重則能使輕静則能使躁故曰重為輕根静為躁君菅子曰動則失位静則自得離去聲輜莊持反古者凡吉行乘乘車師行乘兵車皆有輜車在後輜車衣車前後有蔽所以載行者之衣食器械以其累重故稱輜重榮觀紛華之觀也公羊傳曰常事曰視非常曰觀處上聲燕處猶燕居超然髙出而無繫著也奈如也乘去聲失根一作失本一作失臣非今從王輔嗣本蘇注凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重為根躁以静為君行欲輕而不離輜重榮觀雖樂而必有燕處重静之不可失如此人主以身任天下而輕其身則不足以任天下矣輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志于利故曰輕則失臣躁則失君呂注輕者先感重者後應應者感之所自生則重為輕之根矣静者役物躁者役于物躁常為静之所役則静為躁之君矣是以君子終日之間其行為可以約齎矣然猶不離輜重則輕之不可以無重也雖有榮觀為足以適矣而必有超然之燕處則躁之不可以無静也終日之行與其榮觀猶且如此況乎萬乘之主任重道逺以觀天下其可不静且重乎蓋迫而後動感而後應不得已而後起則重矣無為焉則静矣茍其動常在于得已之際而不能無為則是以身輕天下而不重不重則躁而不静矣故曰上無為也下亦無為也是下與上同徳下與上同徳則不臣下有為也上亦有為也是上與下同道上與下同道則不主蓋輕則任臣之勞而代之而臣則無為而與上同道則不臣不臣則是失臣也躁則忘君之而為天下用則君亦有為而與下同道則不主不主則是失君也故曰輕則失臣躁則失君息齋注輕必歸重躁必歸静故重為輕根静為躁君聖人終日行不離輜重無所不至而不離其本也雖有榮觀燕處超然無所不為而常無為也奈何萬乘之君不自量其重而徒以身驅馳于天下之細故若以細故自嬰則一物足以役之矣又何足以宰制天下邪雖然輕與躁皆足以為病而躁之病猶甚于輕蓋輕者役其心淺而躁者役其心深輕之失不過失于所輕而止躁之失則中君内擾失静之全故輕則失臣躁則失君宏甫注有輜重則雖終日行而不為輕何也以重為之根也常燕處則雖榮觀而不為躁何也以静為之君也故輕則失重根躁則失静君善行無轍迹善言無瑕謫善計不用籌策善閉無闗楗而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是為要妙瑕玉玷也謫直革反責也籌策計數者所用之筭以竹為之楗其偃反拒門木也横曰闕豎曰楗結繫也繩索也約束也襲相傳襲也一作掩襲之襲言密用也傅奕云是以聖人常善救人二十字獨見河上本古本無之蘇注乗理而行故無迹時然後言故言滿天下無口過萬物之數畢陳于前不計而知安用籌筭全徳之人其于萬物如母之于子雖縱之而不去故無闗而能閉無繩而能約彼方挾策以計設闗以閉持繩以結其力之所及者少矣聖人之于人非特容之又善救之我不棄人而人安得不歸我乎夫救人于危難之中非救之大者也方其流轉生死為物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則謂善救人矣聖人無心于教故不愛其資天下無心于學故不貴其師聖人非獨吾忘天下亦能使天下忘我故也聖人之妙雖智者有所不喻故曰要妙呂注車行則有轍徒行則有迹則行固不能無轍迹者也知行之所以行則行出于不行故曰善行無轍迹知者不言言者不知則言固不能無瑕謫者也知言之所以言則言出于不言故曰善言無瑕謫一與言為二二與一為三自此以往巧厯不能筭唯得一而忘言者為能致數致數則其計不可窮矣故曰善計不用籌筭天門無有闢闔在我我則不闢誰能開之故曰善閉無闗楗而不可開天下有常然者約束不以纆索因其常然而結之故曰善結無繩約而不可解故行而不以此則行不能無轍迹言而不以此則言不能無瑕謫計也閉也結也而不以此則雖用籌筭而亂雖有闗楗而開雖有繩約而解所存于已者不能無敝何暇人物之救哉聖人唯能體道以善此五者是以常善救人而無棄人常善救物而無棄物矣何則此五者性命之理所同然者也唯聖人以知常之明而救之于所同然之際耳行之言之計之閉之結之而莫知其所以然則其明襲而不可得見故曰是謂襲明唯其善救也故善人不善人之師不善人善人之資明人之不善何棄之有哉雖然志道者忘心善人者雖不善人之師而吾不知其師之為可貴也不善人雖善人之資而吾不知其資之為可愛也不貴其師不愛其資則雖智者有所不知而逺迷矣夫唯以智求之而不得此道之所以為要妙也故曰雖智大迷是謂要妙董注輪輾地為轍迹夫與道為一何迹之有謫過也惟和以天倪故無口過道一而已總括萬有是謂善計無門無房四達皇皇而天地之大亦不能出乎其外是謂善閉妙本湛然不為法縛不求法脫堂堂密密了無間然所謂不可須臾離也茍溺于刻意尚行執言滯句用心計度以求道而不達方便之門則反為教相所縛不能徹見萬法根元矣所謂善結者無為而已夫救人于危難特救其形耳而且未必能搏豈足善哉惟彼方執著有為迷其性于暗蔽之中而我以兼容容之以先覺覺之使彼之天光自發如明燈之傳襲無盡而在我者既以與人已愈多則其明亦何限量哉故曰常善常之為言無時不然也息齋注行未有無迹言未有無瑕計未有非籌閉未有非闗楗結未有非䋲約唯得道者行不以足故無轍迹言不以口故無瑕謫計不以心故無籌筭閉不以闗楗故不可開結不以䋲約故不可解由其以至常為體而妙于用常故能無所不善常之為道人人而有物物而得既謂之常則不以人而多不以物而少由人與物雖有常而失其眞常故聖人每以眞常救之以眞常救人則人無棄人以眞常救物則物無棄物然亦豈聖人能為此哉由人與物皆有此明聖人還以其元明示之故曰是謂襲明至于襲明則均于一惟人無善無不善故善人不善人之師言不善人之可以為善人也不善人善人之資言不善人之本同善人也若不貴其師而不師其善不愛其資而甘于為惡雖有多智祇益為迷反本還原是謂要妙程俱論善行善言善計善閉善結皆常善也唯常善也故能救人無棄人救物無棄物有為之善其能爾乎唯無積也故能為人已愈有與人已愈多住相之施其能爾乎推是道以濟天下而度羣生亦何儒釋老之分哉宏甫注自謂有法可以救人是棄人也聖人無救是以善救然則無闗者善閉無約者善結無䇿善計無謫善言無迹善行皆可知矣知其雄守其雌為天下谿為天下谿常徳不離復歸于嬰兒知其白守其黑為天下式為天下式常徳不忒復歸于無極知其榮守其辱為天下谷為天下谷常徳乃足復歸于樸樸散則為器聖人用之則為官長故大制不割守保守也復並扶又反谿谷衆水所注天下極言之也式法也忒爽也足全也長上聲制裁斷也割分裂也呂注雄動而雌静雄剛而雌柔雄倡而雌和知其雄守其雌則篤静致柔和而不倡者也故為天下谿谿之為物受于谷而輸于江海受而不拒輸而不積物之能通而無迕者也能通則常徳不離矣人之生也常徳内全與物無迕及為物之所遷則日益以離唯能篤静致柔和而不倡則常徳不離而復歸于嬰兒矣白于色為受采于物為明于行為金于數為四黒于色為不受染于物為晦于行為水于數為一知其白守其黒不受萬物之染若晦若水終之于抱一抱一則能曲能枉能窪能敝故可以為天下式為天下式無往而非一則常徳不忒矣不離者不離其故處而已而未必能不忒也不忒則不差矣嬰兒之為物專氣致柔不失其一體之和而已復歸于無極則嬰兒不足以言之也草木之蕃也為榮其謝也為辱人之所以為榮辱亦若是而已知其榮守其辱去華歸根雖被以天下之所甚惡而不能累焉故為天下谷谷之為物虚而能盈應而不藏而江海之源所自出者也能為天下谷則反乎其源矣故常徳乃足則又非特不忒而已復歸其樸樸者眞之全而物之混成者也唯其混成而未為器故能大能小能曲能直能短能長能圜能方無施而不可則無極不足以言之也然則守其雌守其黒守其辱足矣安用知其雄與白與榮哉蓋守之以為母知之以為子守之以為經知之以為變也樸散則為器器之為物能大而不能小能曲而不能直能短而不能長能圜而不能方故聖人用之為官長而已非容乃公公乃王之道也若夫抱樸以制天下其視天下之理猶庖丁之視牛未當見全牛也行之于所無事而已恢恢乎其于游刃有餘地矣何事于割哉故曰大制不割息齋注雄動而作雌静而處動必歸静雄必歸雌故為天下谷白者欲其有知黑者欲其無知有知以無知為貴知白以守黑為賢故為天下式榮者我加于人辱者人加于我我加于人而人能受則其益在人人加于我而我能受則其益在我故為天下谷然道之常豈有所謂雄雌白黒榮辱者哉曰知曰守者非常徳也及散而為徳以徳自處若用其雄用其白用其榮則失常徳矣若用其雌常徳不離復歸于嬰兒用其黒常徳不忒復歸于無極用其辱常徳乃足復歸于樸所謂嬰兒曰無極曰樸者眞常也故眞常不可得而知不可得而守必使可知可守者復歸于常然後為道及樸散為器聖人以道制器猶不失于道故用之為官長官長者視天下猶官長之非如家而私之也故官而不私長而不宰是謂大制不割純甫注此言聖人以無御有徼妙同𤣥之道知知子之知也有運用之意守守母之守也有主宰之意雌雄以剛柔言黒白以明晦言榮辱以貴賤言谿谷在下衆流所歸也式法也亦歸之之意常徳眞常之徳嬰兒言其和也無極言其虚也樸言其質也皆指常徳言之此章變文叶韻反覆吟咏亦與詩體相𩔖既曰守雌為谿矣又曰常徳不離覆而言之非為谿之後復有不離之功也既曰常徳不離矣又曰復歸嬰兒申而言之非常徳之外復有嬰兒可歸也下二者放此蓋天下之事非柔所能獨濟者固有時而用剛也非晦所能獨理者固有時而用明也非賤而在下所能獨成者固有時而在上也此聖人所以必知其雄知其白知其榮也然剛不生于剛而生于柔明不生于明而生于晦貴不生于貴而生于賤是剛也明也貴也物之末也子也去道逺者也柔也晦也賤也物之本也母也去道近者也此聖人所以必守其雌守其黒守其辱也聖人守此而天下之母在我矣其子焉往所以為谿為谷為式而天下歸之者正以此真常之徳未之離焉耳其常徳不離則雖至剛以決天下之事至明以燭天下之情至貴以蒞天下之賤然為而不恃長而不宰功成而不居未嘗不復歸其根也聖人之有天下而不與也以此嬰兒無極樸實人固有之道故以復歸言之官長羣有司之長也樸可以割而為器而器不可以為樸官長可以統羣有司而羣有司不可以為官長聖人為母不為子猶之為樸不為器為官長不為羣有司正其本而已不然逐子忘母紛紛然惟雄白榮之求與物相刃相摩而莫之能止則身之不暇治而況天下之歸哉將欲取天下而為之吾見其不得已天下神器不可為也為者敗之執者失之故物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰取如左氏取我田疇而伍之史記取髙帝約束紛更之之取為治之也司馬温公曰為之則傷自然執之則乖通變呴音許一音虚羸力為反載始也又任載也隳許規反去上聲陸農師云去甚慈也去奢儉也去泰不敢為天下先也三者聖人所以取天下也蘇注聖人之有天下非取之也萬物歸之不得已而受之其治天下非為之也因萬物之自然而除其害耳若欲取而為之則不可得矣凡物皆不可為也雖有百人之聚不循其自然而妄為之必有齟齬不服者而況天下乎雖然小物寡衆猶有可以力取而智奪者至于天下之大有神主之不待其自歸則叛不聽其自治則亂矣隂陽相盪髙下相傾大小相使或行于前或隨于後或呴而暖之或吹而寒之或益而强之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也世之愚人私已而務得乃欲拒而違之其禍不覆則折唯聖人則知其不可逆順以待之去其甚去其奢去其泰使不至于過而傷物而天下無患矣此不為之至也堯湯之于水旱雖不能免而終不至于敗者由此故也易之泰曰后以財成天地之道輔相天地之宜以左右民三陽在内三隂外物在泰極矣聖人懼其過而害生故財成而輔相之使不至于過此所謂去甚去奢去泰也呂注聖人抱樸以治天下故大制不割則其取天下常以無事而已取之也者得天下之心使之不去者也則將欲取天下而為之者非所以取天下也非所以取而取之吾是以見其不得也形而上者謂之道形而下者謂之器天下之為器神器也唯神道可以御神器神無思也無為也而為之則御之非其道矣故不可為也為者所以求成而適足以敗之執者所以求得而適足以失之也堯非有人非見有于人巍巍乎舜禹有天下而不與焉凡此者眞知所以取天下者也非為而執之者也是以凡物有行則有隨有呴則有吹有强則有羸有載則有隳事勢之相生不得不然也則安可以執而為之哉是以聖人去甚去奢去泰凡以輔萬物之自然而已其敢為也哉元澤注至人體神合變與物為一雖兼制天下而未嘗有有故能從容無為而業無不濟糠粃土苴將陶鑄帝王若夫塊然有而以已遇物則雖六尺之身運轉妨滯若將不容而況天下之大歟取者取物是其有我為者造作是其有為有已有為之人方且存乎憂患之間而何暇治人乎聖人心超有無不物于物故隂陽交代而我法不遷茍為有有則物與為敵萬變糾錯不可勝圖矣故獨行于前而不知隨者在后如形影之不舍呴之欲温而不知吹者之已至如寒暑之相生知强而已則羸者有時而來知載而已則隳者應乎而至此皆造化之大情朝暮之常態有有者不知由已不了故有此患而更與為競夫如是則雖介然一物之㣲而憂患之大充塞天壤安能操神器而不累乎聖人心合于無以酬萬變方其為也不以經懐如鏡應形適可而止分外之事理所不為彼有有者妄見諸相矜已樂能為之不已故事輒過分此由不知行隨呴吹强羸載隳之反覆故爾息齋注聖人體道以為質不得已而受形于天地之間由天下不得聖人則不治故不得已取天下而為之然聖人視此身猶寄也以天下寄其所寄豈肯强其所無以失眞常之道哉由不知道者以天下為實有而我始君之于是以有為撓之以有物執之而不知其所為者反足以敗之其所執者反足以失之蓋物之在天下或往可以行或止可以隨或嘘之可暖或吹之可寒或强而壯或羸而損或任而載或弱而隳物之不齊物之情也若必欲為之執之使行者為隨嘘者為吹强者為羸載者為隳則雖天且不可而況於人乎聖人因其自然知其所受受者有不可變但去其甚去其奢去其泰使可行可嘘可强可載者不至于過而或隨或吹或羸或隳者不至于不及是謂以吾自然輔其自然薛注物各有自然之性豈可作為以害之是以聖人去甚去奢去泰惟因其自然而已聖人所謂甚奢泰者非謂後世夸淫踰侈之事凡増有為於易簡之外者皆是也漢書黄霸傳凡治道去其泰甚者耳其言本此而意實不同事有太過者去之小而無害不必改作此漢人之意也物有固然不可强為事有適當不可復過此老子之本意也以道佐人主者不以兵强天下其事好還師之所處荆棘生焉大兵之後必有凶年善者果而已不敢以取强果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂不道不道早已好去聲還旋通易曰師衆也處上聲善即有道者也不得已為之難也莊子曰不得已而後動又一宅而寓於不得已又託不得已以養中皆與老子語合果而勿矜以下五而字當讀如於字人方果於彼我獨果于此也矜自恃也伐夸大也驕恣肆也已止也早已言不乆也蘇注聖人用兵皆出于不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而況以兵强天下者邪果決也徳所不能綏政所不能服不得已而後以兵決之耳勿矜勿伐勿驕不得已四者所以為勿强也壯之必老物無不然者惟有道者成而若缺盈而若沖未嘗壮故未嘗老未嘗以兵强天下壯亦甚矣能無老乎無乎呂注人主者無為者也佐人主者有為者也取天下不能無事而為之不已其弊至于以兵强之雖佐人主者任在于有為猶為不以道也況于主道之無為乎所以然者以其事好還而已以道服天下則天下莫敢不服而以兵强天下亦將阻是而抗我矣出乎爾者反乎爾者也師之所處荆棘生焉大軍之後必有凶年師之毒天下如此故善用兵者果而已果者克敵者也敵而克之造攻自鳴條朕哉自毫克敵之謂也此出于不得已非所恃以取强也果而勿矜其能果而勿伐其功果而勿驕其勢其果常出于不得已是乃果而勿强之道也如果而矜其能果而伐其功果而驕其勢則是果于强非果于不得已者也凡少則壯壯則老物之情也道也者貴于守柔以為强乃所以乆而不殆者也若以兵强天下則是棄柔而用壯壯而必老則物而已豈道之所以物物哉故曰物壯則老是謂不道不道早已息齋注殺人之父人亦殺其父殺人之兄人亦殺其兄是謂好還兵之不勝其害未易一二數使幸而勝其殺氣之應地不能使之生天不能使之和故荆棘生于屯戰之所饑饉起于軍旅之後則其不勝者可知矣故善戰者因其不得已果于一决而不以是取强果者不乆之謂也内持不得已之心外為一戰之决故未嘗矜未嘗驕未嘗伐未嘗强皆生于不得已也若得已而不巳兵老而氣衰猶人壯之必老是為不道人之不道尚猶不盡年而死而況于兵之老乎宏甫注天道好還而以兵强佐人主者不知道者也夫知其不可以取强而遂已非果斷不能也而惟善者能果故厯言當果數事其㫖深矣物壯則老此天道也惟知强壯之可恃不知老敗之將至是謂不道不道之事不可以不早已夫夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹為上勝而不美而美之者是樂殺人夫樂殺人者不可得志于天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之佳謂佳之也温公曰兵愈佳則害人愈多惡去聲處上聲下並同左為陽為生右為隂為死恬澹安静也美即佳也樂去聲純甫云此章自兵者不祥之器以下似古之義疏混入于經者詳其文義可見蘇注以之濟難而不以為常是謂不處呂注文覿而武匿者天地之道隂陽之理也兵而佳之是乃器之不祥而物之或惡也是以有道者不處故君子居則貴左用兵則貴右其所貴異乎平居之時則是固以不祥之器處之而非君子之器也非所以佳之也必不得已而用之恬淡為上故勝而不美也非所以佳之也天將救之以慈衛之慈者天下所以樂推而不厭也則殺人者豈其樂哉而美之則是樂殺人也樂殺人者不可得志于天下也故吉事尚左凶事尚右偏將軍處左上將軍處右言以䘮禮處之殺人衆多以悲哀泣之戰勝以䘮禮處之夫以䘮禮處之則是不祥之器而不美之可知巳以悲哀泣之則是不樂殺人也可知已老子之察于禮學者如此而謂老子絶滅禮學豈知其所以絶滅之意乎息齋注兵不可佳而佳猶人不可殺而殺故不樂殺人然後可以言兵孫呉之論兵審虚實辨奇正其言詳矣然虚實奇正之本孫呉本必知之也老氏曰恬淡為上勝而不美夫以恬淡言兵誠若不𩔖然不知恬淡則静静者勝之本也狂躁則動動者敗之基也梁襄問孟子曰天下惡乎定曰定于一曰孰能一之曰不嗜殺人者能一之使果不嗜殺人則定天下有不難者自古及今不嗜殺人者必興嗜殺人者必亡嗜殺人而暫成者有己未有嗜殺人而多歴年者也故君子戰勝以䘮禮處之不祥之器有道者不處道常無名樸雖小天下不敢臣侯王若能守萬物將自賓天地相合以降甘露人莫之令而自均始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之於江海王輔嗣注道無形不繫常不可名以無名為常故曰道常無名也樸之為物無心亦無名故將得道莫若守樸夫智者可以能臣也勇者可以武使也巧者可以事役也力者可以重任也樸之為物憒然不偏近于無有故曰莫能臣也抱樸無為不以物累其眞不以欲害其神則物自賓而道自得天地相合則甘露不求而自降我守其眞性無為則民不令而自均也始制謂樸散始為官長之時也遂任名以號物則失治之母故知止所以不殆川谷求于江與海非江海召之世行道于天下者不令而自均不求而自得故曰猶川谷之于江海也蘇注樸性也道常無名則性亦不可名矣故其為物舒之無所不在而斂之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢糠粃足以陶鑄堯舜而侯王之尊不能守則萬物不賓矣沖氣升降相合為一而降甘露脗然被于萬物無不均遍聖人體至道以樸應諸有亦露之無不及者此所以能賓萬物也聖人散為器因器制名豈其徇名而忘樸逐末而喪本哉蓋亦知復于性是以乘萬變而不殆也江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賓其所宗呂注道常無名名之為道則與道乖矣方其無名固未始有物也其樸可謂小矣而天下不敢臣夫何故天地資之以始萬物恃之以生則天下孰有敢臣其所自始與其所自生哉夫是之謂眞君萬物莫不有眞君焉是之謂也侯王若能守則是以眞君君萬物萬物孰有得其眞君而不賓者乎故曰聖人作而萬物覩至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生馬或為之紀而莫見具形天地相合以降甘露則交通成和之至也侯王執道紀而萬物賓之也亦若是而已孰得見其形哉故人莫之令而自均也無名之樸無思也無為也工宰一動則始制有名而名亦既有矣於是之時亦將知止則其安易持其未兆易謀其脆易破其微易散為之于未有治之于未亂則何殆之有哉此王侯所以守之之道也譬道之在天下猶川谷之於江海其有不歸之者邪息齋注此言道與器相與為循環輕重也道常無名不可得而見然匹夫得之樸雖小天下不敢臣知尊之無以加于我也侯王雖大若不能守則萬物不賓蓋能賓之者在此而不在彼也譬如天地雖有髙下然至合以降甘露非有人使之而無不齊者是天地未嘗不同也由是觀之道雖小不必輕侯王雖大不必貴天地雖判不必離雖道散而為物物各有名而天亦未嘗遂棄物也唯其未嘗棄物物立于天地之間而不殆者以天猶生之也故物不以道散而虧道不以物生而散譬猶川谷之為雲雨江海之為浸潤川谷之氣未嘗不通于江海而江海之氣未嘗不通于川谷若以道觀之則未嘗一日而不循環若以器取之則水陸之分有不同者矣筆乘道常首章所謂常道也無名首章所謂無名也以其未彫未琢故謂之樸以其曰希曰微故謂之小然能見小而守之者鮮矣侯王若能守是見小曰明者也知子守母者也如此則静為動君而動為之臣一為萬主而萬為之賓又孰有臣樸者哉始即無名天地之始制者裁其樸而分之也始本無名制之則有名矣茍其逐於名而莫止則一生二二生三將巧歴不能筭而種種名相皆以為實與接為搆窮萬世而不悟隂陽之慘殆孰甚焉所謂不知常妄作凶也誠知無可以適有則有亦可以之無是故貴其止止者鎮以無名之樸也知止則不隨物遷淡然自足殆無從生矣此非强之也物生以道生物滅以道滅萬物皆作于道萬物皆歸于道我之性宅我自復之夫何難之有故江海水之宗也川谷水之派也異派必㑹于宗殊名必統于道知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所者乆死而不亡者壽不失其所即易之止其所也羅什曰在生而不生曰乆在死而不死曰壽蘇注分别為智蔽盡為明分别之心未除故止于知人而不能自知蔽盡則無復分别故能自知而又可以及人也力能及人而不能及我能克已復性則非力之所及故可謂之强也知足者所遇而足則未嘗不冨矣雖有天下而常挾不足之心以處之是終身不能富也不與物争而自强不息物莫能奪其志也物變無窮而心未嘗失則乆矣死生之變亦大矣而其性湛然不亡此古之至人能不生不死者也呂注知人者智自知者明自知然後能知人則明者固智之所自出也勝人者有力自勝者强自勝然後能勝人則强者固力之所自出也復命曰常知常曰明不能自知非所以知常也則知常者乃所以自知也明至于自知則其于知人也何有守柔曰强與接為搆日以心鬬非所以守柔也則守柔者乃所以自勝也强至于自勝則其于勝人也何有有自知之明則知萬物皆備于我而無待于外慕也故曰知足者富有自勝之强則于道也勤行而已矣無事于他求也故曰强行者有志知其足于已而强行之則能存其所存而不為物之所遷矣故曰不失其所者乆能存其所存則雖死而未嘗亡也故曰死而不亡者夀息齋注知在外為智在内為明勝在外為力在内為强智與力為妄明與强為眞入道之門皆由于此人所以不能入道者以自見不明而為物所勝也若内明則自不騖外不騖外則漸能勝物積日既深自然入道凡不足者葢不知我之有也萬物皆備于我返照内觀知取諸一身而足不亦富乎知足心生漸離諸有有力未全未能充其所見必有强志乃能力行見清静根漸返于道虚中證實所得不移無古無今浩然常住是謂不失其所等視死生有如旦暮生而不有死而不亡是之謂夀農師注列子之不化莊子之不死佛氏之不滅與死而不亡同意是以聖人之生也與死同謂之神聖人之死也與生同謂之壽言其生死之未有異也夫唯生死同狀而萬物一府故夫身如蜩甲蛇蛻寓之而已蓋蜩之甲巳死而其蜩未嘗亡蛇之蛻已腐而其蛇未嘗喪何則其眞者雖死不滅也曰夫至人不焚于火不溺于水虎不能搏兕不能觸乘虚不墜觸石不礙而未嘗有死則又曰死而不亡何也蓋聖人之于時隨之而已時之所當行聖人不强避時之所當止聖人不强為視其天而已故有能之而能不為之是以有生而不死有死而不亡者也大道汎兮其可左右萬物恃之以生而不辭功成不名有愛養萬物而不為主常無欲可名於小萬物歸焉而不知主可名於大是以聖人終不為大故能成其大汎無繫著也蘇注汎兮無可無不可故左右上下周旋無不至也世有生物而不辭者必將名之以為已有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已大而有為大之心則小矣呂注可以左而不可以右可以右而不可以左在物一曲者非大道也大道則無乎不在故汎兮其可左右也凡物之大者則不可名于小小則不可名于大是道也以其可以左右也故萬物恃之以生而不辭成功不居衣被萬物而不為主夫唯不居不為主故常無欲常無欲則妙之至者也故可名于小萬物歸焉而不知主則容之至者也故可名于大雖然既大矣而可名于小則非大也既小矣而可名于大則非小也非大非小此道之所以隱于無名也然則道之所以為大也果不在大也聖人體道者也則其所以能成其大者豈自大也哉息齋注大道汎兮充滿八極及其用之如在左右萬物非道不生而道木嘗言其能也萬物非道不成而道未嘗自名其功也萬物非道不養而道未嘗自以為主也方其小則不見其朕及其大則未嘗主萬物萬物悉歸焉聖人亦然終不自以為大而萬物終無以過之唯其不取大故能成其大筆乘可名于小爾言不可名小可名於大爾言不可名大既云可左可右所以非小非大非小非大所以成其大執大象天下往往而不害安平泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既林希云大象者無象之象也天下往者執此而往行之天下也既盡也希聲注大象者道也夫能執古之道以御今之有則天下萬物皆歸往之矣夫聖人視民如赤子唯恐具傷而況有事傷之乎未嘗有以傷之則歸而往之者莫有受其傷矣莫受其傷則天下皆安其夷泰矣夫樂司以恱耳餌可以適口則旅人為之畱連為之歡饜然非其所安不可乆處故易曰鳥焚其巢旅人先後號咷也夫執大象者則不然不以欲樂示於人故言之出口淡乎其無味敎之入心泊乎其不美希乎夷乎雖不足以視聽然用之不窮酌之不竭彌乎千萬年而不可以既蘇注道非有無故謂之大象茍其昭然有形則有同有異同者好之異者惡之好之則來惡之則去不足以使天下皆往矣有好有惡則有所利有所害好惡旣盡則其于萬物皆無害矣故至者無不安無不平無不泰作樂設餌以待來者豈不足以止過客哉然而樂闋餌盡彼將舍之而去若夫執大象以待天下天下不知好之又況得而惡之乎雖無臭味形色聲音以恱人而其用不可盡矣呂注道之在天下猶川谷之與江海萬物歸焉而不知主是無形也無形也者大象也則孰將保我而不往哉故曰執大象天下往失道而天下往則去之而已則其往也不能無害執道而天下往則雖相忘于道術而未嘗相離也故往而不害安平泰平者安之至泰者平之至有樂之可樂有餌之可嗜則止者過客而已道之出言淡乎其無味則非餌之可嗜視之不足見聽之不足聞則非樂之可樂若然者用之豈可既乎過客止則為之蘧廬而已非可乆者也用之不可既則百姓日用而不知而安平泰之所自出也息齋注道降而有象象生則物往從之愚者往而不返智者往而不害往而不返者失道而從物也往而不害者與道俱也既與道俱往不離道無所不安無所不平無所不泰與道為一心不知道道不知心若知道而行則有不安有不平有不泰矣聖人之于形器如過客之寓于旅亭暫住而去未嘗有顧惜之心茍為欲樂所餌過客止于所寓畱而不去未有不為患者故聖人執大象而往雖從於物其心常與道俱味無味之味視無色之色聽無聲之聲用無用之用即于形器之間全收道用此其所以安平泰也將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔勝剛弱勝强魚不可脫於深淵邦之利器不可以示人歙音吸斂也聚也張開大也深淵原作淵邦原作國今從韓非本蘇注未嘗與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾于用智也與管仲孫武無異聖人與世俗其迹固有相似者也聖人乘理而世俗用智乗理如醫藥巧於應病用智如商賈巧于射利聖人知剛强之不足恃故以柔弱自處天下之剛强方相傾相軋而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其斃此所謂勝也雖然聖人豈有意為此以勝物哉知勢之自然而居其自然耳魚之為物非有爪牙之利足以勝物也然方託於深淵雖强有力者莫能執之及其脫淵而陸則蠢然一物耳何能為哉聖人居于柔弱而剛强者莫能傷非徒莫能傷也又將以全制其後此不亦天下之利器也哉魚惟脫于淵然後人得制之聖人唯處于柔弱而不厭故終能服天下此豈與衆人共之者哉呂注將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之天之道物之理人之事其勢未嘗不如此者也於張知歙於强知弱於興知廢於與知奪非知㡬者孰能與于此哉故曰是謂微明然則能歙之張之弱之强之廢之興之奪之與之者無形而柔弱者也為其所歙所張所弱所强所廢所興所奪所與者有形而剛强者也則柔弱之勝剛强也明矣人之不可以離柔弱猶魚之不可以脫于淵魚脫于淵則獲人離于柔弱則死之徒而已矣天下之至柔馳騁天下之至堅無有入于無問馳騁天下之至堅而入于無問則器之利者也操利器以馭天下國家則其所以圖維運動者常在于無形之際安可使知其所自來哉故曰國之利器不可以示人元澤注隂陽之情如循環然往窮必反盛極必衰觀乎月滿之虧日中之昃則萬物一致斷可知矣唯至人深達先㡬明乎無朕故養生則裕於屈伸處已則適乎消長蒞事則知成敗之數御敵則達擒縱之權古之人所以酬酢萬變而澹然無事者以此道也然則雖鬼神之幽將不能窺而況于人乎易曰尺蠖之屈以求信也龍蛇之蟄以存身也見形則知剛强之制柔弱識理則悟柔弱之勝剛强至人深達微明之義故謙而不元沖而不盈不與物争而亦莫能與之争也雖然此道本之言丼若夫變化無常則一柔一剛一弱一强孰能定之顧雖剛强而柔弱不能勝者動契乎理而心不離乎柔弱也由此觀之又知柔弱之勝剛强矣此所謂利器者也魚㢲伏柔弱而自藏于深𣺌之中以活身者也聖人退處幽密而操至權以獨運斡萬物于不測故力旋天地而世莫覩其健威服海内而人不名以武豈暴神靈而使衆得而議之哉嘗竊論之聖人之所以異于人者知㡬也夫以剛强遇物則物之剛强不可勝敵矣天下皆以剛强勝物也吾獨寓于柔弱不争之地則發而用之其孰能禦之者觀夫天道則秋冬之為春夏亦一驗矣彼聖人者自藏于深渺之中而託柔弱以為表故行萬物於術内而神莫能知其所自此所謂密用獨化者邪易曰㢲以行權莊子曰于魚得計義協于此純甫注將欲云者將然之辭也必固云者已然之辭也造化有消息盈虛之運人事有吉凶倚伏之理故物之將欲如彼者必其已嘗如此者也將然者雖未形已然者則可見能據其已然而逆覩其將然則雖若幽𨼆而實至明白矣故曰是謂㣲明柔之勝剛弱之勝强正此理也雖然謂之微明則微而明可也明其微不可也何謂微而明韜此理以自養静深斂退優游自得如魚之不脫于淵是也何謂明其微炫此理以示人啟釁招尤借寇誨盜如以邦之利器示人是也莊子胠篋一篇蓋明此意利器兵也設喻之言蓋微明之理聖人用之則為大道姦雄竊之則為縱横捭闔之術其害有甚于兵刃也故聖人喻之以利器云息齋注此聖人制心奪情之道心之為物出入無時莫知其鄉欲以止止之轉止轉動聖人知其不可强止故欲歙反張之欲弱反强之欲廢反興之欲奪反與之夫止動以止止之止不可得必固反之以動求止自動觀妄動已而竭妄廢真還自然歸止動雖欲動動心不起心既不起止亦不生此聖人歙心弱志廢情奪欲之道微而難見故曰是謂㣲明此之㣲明既柔且弱而能勝天下剛强之欲以其不離道母也若離道母則如魚之脫于淵魚既不可脫于淵則國之利器亦不可示人以此示人人亦將有不信者矣此篇世之解者不循其本多以孫呉之兵說雜之此詩禮之所以發冡也道常無為而無不為侯王若能守萬物將自化化而欲作吾將鎮之以無名之樸無名之樸亦將不欲不欲以静天下將自正道常言道之天常也介甫云言道之主故曰萬物將自賓言道之變故曰萬物將自化作動也鎮者壓定之使不動也羅什曰心得一空資用不失萬神從化伏邪歸正希聲注道之所以為常者以其體無名故無為用有名故無不為侯王能守此始與母之術則萬物之理得而天下正所謂我無為而民自化也茍利欲之情一有萌兆必以此大道之質奠而正之使無得動夫上徳無為而無以為則同于道矣下徳為之而有以為則同于徳矣得于徳者必失于道故有無為之心必有無為之跡後世將尋其跡而忘其本或為無為而至有為故云無名之樸亦將不欲者將使心跡兼忘至于𤣥之又𤣥也夫能心跡兼忘事理𤣥㑹則天下各正性命而無累于物之迹矣首篇以常道為體常名為用而極之于重𤣥此篇以無為為體無不為為用而統之以兼忘始末相貫盡其體用也蘇注道常者無所不為而無為之之意耳聖人以無為化物萬物化之始于無為而漸至于作譬如嬰兒之長人偽日起故三代之衰人情之變日以滋甚方其欲作而上之人與天下皆靡故其變至有不可勝言者茍其方作而不為之動終以無名之樸鎮之庶幾可得而止也聖人中無抱撲之念外無抱樸之迹故樸全而用大茍欲樸之心尚存于胸中則失之逺矣呂注萬物皆有名也而道常無名則有名者莫不為之賓故言萬物將自賓則以無名言之雖然此知無為而已無為而無不為則未嘗有夫無為也故萬物將自化自化則我與萬物莫非道也孰知萬物之賓與其所以賓哉故方其自賓也始制有名名亦既有夫亦將知止知止者復于無名之樸而已方其自化也化而欲作吾將鎮之以無名之樸而無名之樸亦將不欲也無名之樸亦將不欲則豈特無為而已而亦未始有夫無為音也天下之動正夫一者也侯王守道以至于此則可謂不欲以静矣天下其有不自正者乎夫老子眞人也宐不弊弊然以天下萬物為事而于侯王如此其諄諄何也道以修之身為眞以修之天下為普使侯王者知而守之則修之天下不亦普乎夫不嗇其道而欲與天下同之仁也欲同之天下而先之侯王義也而學者顧見其言有絶棄仁義則曰老子槌提吾仁義而小之也吾所不取嗚呼彼不見其所以絶棄之意宜其不取焉耳息齋注道自無而入有始于喜怒哀樂之萌而極于禮樂刑政之備極而不反化化無窮則愈失道矣故聖人于其將流則復以樸鎮之既鎮以樸樸亦無名雖用無名之樸亦將若不欲茍有用樸之心則樸非其樸矣不欲以静民將自正老子翼卷一
