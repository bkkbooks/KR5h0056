  text: 老子翼卷之一
  hash: sha256:abfe233d66ffaedeb3db54107138e6c38946ff48dcaa9c699cda2cb800a8ef48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0056_SJB_001-360531a, image: sjb/36/360531a.png}
body:
  text: 上篇道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門可道如禮不虛道之道常者恒久不變也母者言物自此生也欲如性之欲也之欲猶意也情也徼竅通物所出之孔竅也又邊際也歸也陳景元曰大道邊有小路曰徼丁易東云無名天地之始有名萬物之母或以無名有名爲讀或以無與有爲讀然老子又曰道常無名始制有名是可以無與有爲讀乎常無欲以觀其妙常有欲以觀其徼有常無常有爲讀者有無欲有欲爲讀者莊子曰建之以常無有正指老子此語則於常無常有斷句似也然老子又曰常無欲可名於小是又不當以莊子爲證據老子以讀老子可也蘇註莫非道也而可道不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以爲義而禮不可以爲智可道之不可常也惟不可道然後在仁爲仁在義爲義禮智亦然彼皆不常而道常不變不可道之能常如此夫道不可道況可得而名之乎凡名皆不可道者也名既立則圓方曲直之不同不可常矣自其無名形而爲天地天地位而名始矣自其有名播而爲萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以爲天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於徼而不知其妙則麤而不神留於妙而不知其徼則精而不變矣以形而言有無信兩矣安知無運而爲有有復而爲無未嘗不一哉其名雖異其本則一知本之一也則玄矣凡遠而無所至極者其色必玄故老子常以玄寄極也言玄則至矣然猶有玄之心在焉玄之又玄則盡矣不可以有加矣衆妙之所從出也筆乘徼讀如邊徼之徼言物之盡處也晏子曰徼也者德之歸也列子曰死者德之徼皆指盡處而言蓋無之爲無不待言已方其有欲之時人皆執以爲有然有欲必有盡及其盡也極而無所更徃必復歸於無斯與妙何以異哉故曰此兩者同謂之玄雖然老子亦不得已爲未悟者言耳實非舍有以求無也苟其舍有以求無則是有外更有無安得爲無蓋當其有時實未嘗有此乃眞無也故不滅色以爲空色即空不捐事以爲空事即空不然其所謂無者爲對有之無而所謂有者爲對無之有亦惡得謂之常無常有哉噫安得知常者而與之一論此天下皆知美之爲美斯惡已皆知善之爲善斯不善已故有無相生難易相成長短相形高下相傾聲音相和前後相隨是以聖人處無爲之事行不言之教萬物作焉而不辭生而不有爲而不恃功成而不居夫唯不居是以不去傾不平也生成形傾和隨皆以喻美惡善不善相形而有處上聲夫音符蘇註天下以形名言美惡其所謂美且善者豈信美且善哉彼不知有無長短難易高下聲音前後之相生相奪皆非其正也方且自以爲長而有長於我者臨之斯則短矣方且自以爲前而有前於我者先之斯則後矣苟從其所美而信之則失之遠矣當事而爲無爲之之心當教而言無言之之意夫是以出于長短之度離于先後之數非美非惡非善非不善于天下何足以知之萬物爲我作而我無所辭我生之爲之而未嘗有未嘗恃至于成功亦未嘗以自居也此則無爲不言之報聖人且不知其爲美且善也豈復有惡與不善繼之哉聖人居于貧賤而無貧賤之憂居于富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治治去聲無知之知如字知者之知去聲夫音符王輔嗣曰心懷智腹懷食虛有智而實無知也骨無知以幹故强之志生事以亂故弱之蘇註尚賢則民耻于不若而至于爭貴難得之貨則民病于無有而至于盜見可欲則民患于不得而至于亂雖然天下知三者之爲患而欲舉而廢之則惑矣聖人不然未嘗不用賢也獨不尚賢耳未嘗弃難得之貨也獨不貴之耳未嘗去可欲也獨不見之耳夫是以賢者用而民不爭難得之貨可欲之事畢效于前而盜賊禍亂不起易不亦虛其心而不害腹之實弱其志而不害骨之强也哉今將舉賢而尚之寳貨而貴之衒可欲以示之則是心與腹皆實也若舉而廢之則是志與骨皆弱也心與腹皆實則民爭志與骨皆弱則無以立矣不以三者衒之則民不知所慕澹然無欲雖有智者無所用巧矣即因三者之自然而不尚不貴不見所謂爲無爲也道沖而用之或不盈淵兮似萬物之宗挫銳解其紛和其光同其塵湛兮似或存吾不知其誰之子象帝之先冲本作盅器之虛也李約云帝生物之主也羣化皆處後唯道獨居其先象似也道性謙故不言定處其先而云似蘇註夫道冲然至無耳然以之適衆有雖天地之大山河之廣無所不遍以其無形故似不盈者淵兮深眇吾知其爲萬物宗也而不敢正言之故曰似萬物之宗人莫不有道也而聖人能全之挫其銳恐其流于妄也解其紛恐其與物搆也不流于妄不搆于物外患已去而先生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其弃萬物也如是而後全其湛然常存矣雖存而人莫之識故曰似或存耳道雖常存終莫得而名然亦不可謂無也故曰此豈帝之先帝矣而又先于帝則莫或先之者矣天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地之間其猶橐籥乎虛而不屈動而愈出多言數窮不如守中橐他各反橐籥冶鑄所用致風之器也橐者外之櫝所以受籥也籥者内之管所以鼓橐也屈鬱也抑而不申之意數音朔屢也蘇註天地無私而聽萬物之自然故萬物自生自死死非吾虐之生非吾仁之也譬如結芻以爲狗設之于祭祀盡飾以奉之夫豈愛之時適然也既事而弃之行者踐之夫豈惡之亦適然也聖人之于民亦然特無以害之則民全其性死生得喪吾無與焉雖未仁之而仁亦大矣排之有橐與籥也方其一動氣之所及無不靡也不知者以爲機巧極矣然橐籥則何爲哉蓋亦虛而不屈是以動而愈出耳天地之間其所以生殺萬物雕刻衆形者亦若是而已矣見其動而愈出不知其爲虛中之報也故告之以多言數窮不如守中之不窮也谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤谷喻也以其虛而能受受而不有微妙莫測故曰谷神牝能生物猶前章所謂母也謂之玄牝亦幽深不測之意南君采曰老子書其遣詞多變文以叶韻非取義于一字之間也如是謂玄牝則讀牝如匕以叶上句曰玄牝之門則特衍其詞與下句相叶或隨語生解既什玄牝又指一處爲玄牝之門則失之矣蘇註谷至虛而猶有形谷神則虛而無形也虛而無形尚無有生安有死耶謂之谷神言其德也謂之玄牝言功也牝生萬物而謂之玄焉言見其生之而不見其所以生也玄牝之門言萬物自是出也天地根言天地自是生也綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞矣天長地乆天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私蘇註天地雖大而未離于形數則其長乆蓋有量矣然老子之言長久極于天地蓋以人所見者言之耳若夫長乆之至則所謂天地始者是也天地生物而不自生立于萬物之外故能長生聖人後其身而先人外其身而利人處于衆人之表故能先且存如使天地與物競生而聖人與人爭得則天地亦一物耳聖人亦一人耳何以大過之哉雖然彼其無私非求以成私也而私以之成道則固然耳上善若水水善利萬物而不爭處衆人之所惡故幾于道居善地心善淵與善仁言善信政善治事善能動善時夫唯不爭故無尤處上聲惡去聲幾平聲治去聲夫音符尤過也蘇註易曰一隂一陽之謂道繼之者善也成之者性也又曰天以一生水蓋道運而爲善猶氣運而生水也故曰上善若水二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而既已麗于形則于道有間矣故曰幾于道然而可名之善未有若此者也故曰上善避高趨下未嘗有所逆善地也空虛靜默深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止决必流善信也洗滌羣穢平準高下善治也遇物賦形而不留于一善能也冬凝春泮涸溢不失節善時也有善而不免于人非者以其爭也水唯不爭故兼七善而無尤持而盈之不如其已揣而銳之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道揣初委反遺唯季反持而盈之謂盈而持之也揣而銳之謂銳而揣之也古文多倒語耳懼其溢而左右以枝之曰持懼其折而節量以治之曰揣蘇註知盈之必溢而以持固之不若不盈之安也知銳之必折而以揣先之不知揣之不可必恃也若夫聖人有而不有尚安有盈循理而後行尚安有銳無盈則無所用持無銳則無所用揣矣日中則移月滿則虧四時之運成功者去天地尚然而况于人乎載營魄抱一能無離乎專氣致柔能嬰兒乎滌除玄覽能無疵乎愛民治國能無爲乎天門開闔能無雌乎明白四達能無知乎生之畜之生而不有爲而不恃長而不宰是謂玄德載乘也營如經營怔營之營白虎通曰營營不定貌是也營魄雖滯載而乘之言無住著也訓營爲魂爲衛爲止皆于義未恊言魂載魄者雖近但不曰魂載魄而曰載營魄後人亦何從而知其指言魂也况以此載彼離而二之亦非抱一之㫖乎滌如水之濯除如糞之除天門以此心而言開闔以心之運動變化而言莊子入出而無見其形是謂天門本此畜許六反養也長上聲宰制也蘇註魄之所以異于魂者魄爲物魂爲神也易曰精氣爲物遊魂爲變是故知鬼神之情狀魄爲物故雜而止魂爲神故一而變謂之營魄言其止也蓋道無所不在其于人爲性而性之妙爲神言其純而未雜則謂之一言其衆而未散則謂之樸其歸皆道也各從其實言之耳聖人性定而神凝不爲物遷雖以魄爲舍而神所欲行魄無不從則神常載魄矣衆人以物役性神昏而不治則神聽于魄耳目困以聲色鼻口勞于臭味魄所欲行而神從之則𩲸常載神矣故教之以抱神載𩲸使兩者不相離身固聖人所以修身之要至于古之真人培根固蔕長生乆視其道亦猶是也神不治則氣亂强者好鬭弱者喜畏不自知也神治則氣不妄作喜怒各以其類是之謂專氣神虛之至也氣實之始也虛之極爲弱實之極爲剛純性而亡氣是之謂致柔嬰兒不知好惡是以性全性全而氣微氣微而體柔專氣致柔如嬰兒極矣聖人外不爲𩲸所載内不爲氣所使則其滌除塵垢盡矣于是其神廓然玄覽萬物知其皆出于性等觀淨穢而無所瑕疵矣既以治身又惟其餘以及人雖于愛民治國一以無心遇之苟其有心則愛民者適以害之治國者適以亂之也天門者治亂廢興所從出也既以身任天下方其開闔變會之間衆人貴得而患失則先事以徼福聖人循理而知天命則待唱而後和易曰先天而天弗違非先天也後天而奉天時非後天也言其先後常與天命會耳不然先者必蚤後者必莫皆失之矣故所謂能爲雌者亦不失時而已内以治身外以治國至于臨變莫不有道也非明白四達而能之乎明白四達心也是心無所不知然而未嘗有能知之心也夫心一而已苟又有知之者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之于物來而應之則已矣又安得知應物者乎本則無有而以意加之此妄之源也其道既足以生畜萬物又能不有不恃不宰雖有大德而物莫之知也故曰玄德筆乘古者䰟𩲸或合而言之左氏心之精爽是謂䰟𩲸是也或分而言之左氏人生始化曰𩲸既生魄陽曰魂是也大氐清虛則魄即爲魂住著則魂即爲魄如水凝而爲冰泮則爲水其實一耳夫魄之營營日趨于有而此云載者知七情無體四大本空如人載于車舟載于水乘乘然無所歸也如此則化有爲無滌情歸性衆人離之而爲二我獨抱之而爲一入道之要孰切于此專氣致柔者老子曰心使氣曰强莊子曰無聽之以心而聽之以氣氣也者虛而待物者也蓋心有是非氣無分别故心使氣則强專于氣而不以心間之則柔夫專氣致柔所謂純氣之守也非嬰兒其孰能之玄覽玄妙之見也疵病也衆人之疵粗而易除學者之疵微而難遣何以故道之所謂疵則學者狃之爲獨見者也金屑雖精内眼成翳以覺爲礙以解爲縛可勝病乎是故當滌除之也老子之示人可謂盡矣然智者除心不除事昧者除事不除心苟其誤認前言不至以輐斷爲學者幾希故又示之曰我言載營魄者非拱默之謂也即愛民治國而能無爲也所謂爲無爲也專氣致柔者非鬱閉之謂也即天門開闔而能爲雌也所謂雄守雌也滌除玄覽者非晦昧之謂也即明白四達而能無知也所謂知不知也夫愛民治國天門開闔明白四達其于生之畜之爲之長之皆不廢矣而無爲也爲雌也無知也則生而不有爲而不恃長而不宰者也非玄德而何關尹子曰在己無居形物自著莊子曰老子以空虛不毁萬物爲實其說亦甚明矣絀老子者猶謂其弃人事之實而獨任虛無也則未考其文而先有意以誣之者耳豈不妄哉三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用轂古木反輪所輳也考功記曰轂也者所以爲利轉也當平聲埏始然反埴力反考功記曰埏和埴黏也和水土燒以爲陶也半門曰户牖窗也蘇註竭知盡物以爲器而器之用常在無有中非有則無無以致其用非無則有無以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之爲一而不可分則至矣五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂難得之貨令人行妨是以聖人爲腹不爲目故去彼取此令並平聲爽平聲差也行去聲鳩摩羅什曰不知即色之空與聲相空與聾盲何異爲腹猶易艮其背之意不爲目猶隂符機在目之意李約云目無厭聖人不爲腹知足聖人爲之目視外故云彼腹實内故云此蘇註視色聽音嘗味其本皆出于性方其爲性而未有物也至矣及目縁五色耳縁五音口縁五味奪於所縁而忘其本則雖見而實盲雖聞而實聾雖嘗而實爽也聖人視色聽音嘗味皆與人同至于馳騁田獵未嘗不爲而難得之貨未嘗不用也然人皆以爲病而聖人獨以爲福何也聖人爲腹而衆人爲目目貪而不能受腹受而未嘗貪故也彼物之自外至者也此性之凝于内者也寵辱若驚貴大患若身何謂寵辱若驚寵爲下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患故貴以身爲天下者可以寄天下愛以身爲天下者可以託天下爲吾之爲去聲貴大患若身當云貴身若大患倒而言之古語類如此蘇註古之達人驚寵如驚辱知寵之爲辱先也貴身如貴大患知身之爲患本也是以遺寵而辱不及忘身而患不至所謂寵辱非兩物也辱生于寵而世不悟以寵爲上而以辱爲下者皆是也若知辱生于寵則寵固下矣故古之達人得寵若驚失寵若驚未嘗安寵而驚辱也所謂若驚者非實驚也若驚而已貴之爲言難也有身大患之本而世之士難于履大患不難有其身故聖人因其難于履患而教之以難于有身知有身之爲難則大患去矣性之于人生不能加死不能損其大可以充塞天地其精可以蹈水火入金石凡物莫能患也然天下常患亡失本性而惟身之爲見愛身之情篤而物始能患之矣生死疾病之變攻之于内寵辱得失之交攖之于外未有一物而非患也夫惟達人知性之無壞而身之非實忽然忘身而天下之患盡去然後可以涉世而無累矣人之所以騖于懽利溺于富貴犯難而不悔者將以厚其身耳今也禄之以天下而重以身任之則其忘身也至矣如此而以天下與之雖天下之大不能患之也筆乘人情率上寵而下辱不知辱不自生生于寵也則寵爲下矣寵爲下故得寵失寵皆若驚然驚者觸于物而無著者也過則虛矣貴重也謂難之也人情率有身而難患不知患不自生生于身也無其身則無患矣由此言之世之上寵者是上辱也驚寵與辱同則何辱有身者是有大患也貴身與貴患同則何患夫不以身視身而以大患視身無身者也而顧可以無患所謂後其身而身先外其身而身存也譬而言之如不輕以身爲天下者天下反可寄惜以身爲天下者天下反可託則知不有其身而其身反可保也莊子曰越人三世弑其君王子搜患之逃之丹宄越人薰之以艾乘以王輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡爲君也惡爲君之患也此固越人之所欲得爲君也夫王子搜惡爲君而越人愈迫欲得之則不有其身而身可有也復奚疑哉視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而爲一其上不皦其下不昧繩繩兮不可名復歸于無物是謂無狀之狀無物之象是謂惚恍迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀摶音團執也詰契吉反皦吉曉反明也蘇註視之而見者色也所以見色者不可見也聽之而聞者聲也所以聞聲者不可聞也摶之而得者觸也所以得觸者不可得也此三者雖智者莫能詰也要必混而歸于一而可爾所謂一者性也三者性之用也人始有性而已既其與物搆然後分裂四出爲視爲聽爲觸日用而不知反其本非復混而爲一則日遠矣若推廣之則佛氏所謂六入皆然矣首楞嚴有云反流全一六用不行此之謂也物之有形者皆麗于隂陽故上皦下昧不可逃也道雖在上而不皦雖在下而不昧不可以形數推也繩繩運而不絶也人見其運而不絶則以爲有物矣不知其卒歸于無也狀其著也象其微也無狀之狀無象之象皆非無也有無不可名故謂之惚恍道無所不在故無前後可見古者物之所從生也有者物之今則無者物之古也執其所從生則進退疾徐在我矣古之善爲士者微妙玄通深不可識夫唯不可識故强爲之容豫若冬涉川猶若畏四鄰儼若客涣若冰將釋敦兮其若樸曠兮其若谷渾兮其若濁孰能濁以靜之徐清孰能安以久動之徐生保此道者不欲盈夫唯不盈故能敝不新成强其丈反豫猶皆獸名豫象屬也隴右謂犬爲猶象能前知其行遲疑犬先人行尋又回轉故遲回不果謂之猶豫儼矜莊貌涣散也木未斲曰樸曠空也冬涉川常難之也畏四鄰愼自持也儼若客不敢僣也冰將釋如恐陷也若樸質而無文章若谷虛而無所藏也若濁晦而不分明也皆所謂强爲之容也能敝不新成邵弁曰能敝能不新能成也不盈則若敝缺能敝也無事更改能不新也同然皆得能成也紀甫曰能讀如耐耐敝者雖舊不壞新成再造之也蘇註粗盡而微微而妙妙極而玄玄則無所不通而深不可識矣戒而後動曰豫其所欲爲猶迫而後應豫然若冬涉川逡巡如不得已也疑而不行曰猶其所不欲遲而難之猶然如畏四鄰之見之也若客無所不敬未嘗惰也若冰將釋知萬物之出于妄未嘗有所留也若樸人僞已盡復其性也若谷虛而無所不受也若濁和其光同其塵不與物異也世俗之士以物汨性則濁而不復清枯槁之士以定滅性則安而不復生今知濁之亂性也則靜之靜之而徐自清矣知滅性之非道也則動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳盈生于極濁而不能清安而不能生所以盈也物未有不敝者也夫唯不盈故其敝不待新成而自去致虛極守靜篤萬物竝作吾以觀其復夫物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃乆没身不殆開元䟽致者令必自來如春秋致師之致作動也如日出而作之作芸芸作之狀也常即常道之常以其爲萬象主故曰王以其爲衆父父故曰天蘇註致虛不極則有未亡也守靜不篤則動未亡也丘山雖去而微塵未盡未爲極與篤也蓋致虛存虛猶未離有守靜存靜猶陷于動而况其他乎不極不篤而貴虛靜之用難矣虛極靜篤以觀萬物之變然後不爲變之所亂知凡作之未有不復也苟吾方且與萬物皆作則不足以知之矣萬物皆作于性皆復與性譬如華葉之生于根而歸于根濤瀾之生于水而歸于水苟未能自復于性雖止動息念以求靜非靜也故唯歸根然後爲靜命者性之妙也性可言至于命則不可言矣易曰窮理盡性以至于命聖人之學道必始于窮理中于盡性終于復命仁義禮樂聖人之所以接物也而仁義禮樂之用必有所以然者不知其所以然而爲之世俗之士也知其所以然而後行之君子也此所謂窮理雖然盡心以窮理而後得之不求則不得也事物日搆于前必求而後能應則其爲力也勞而其爲功也少聖人外不爲物所敝其性湛然不勉而中不思而得物至而能應此之謂盡性雖然此吾性也猶有物我之辨焉則幾于妄矣君之命曰命天之命曰命以性接物而不知其爲我是以寄之命也此之謂復命方其作也雖天地山河之大未有不變壞不常者惟復于性而後湛然常存矣不以復性爲明則皆世俗之智雖自謂明非明也不知復性則縁物而動無作而非凶雖得于一時而失之遠矣方迷于妄則自是而非彼物皆吾敵吾何以容苟知其皆妄則雖仇讐將哀而憐之何所不容哉無所不容則彼我之情盡尚誰私乎無所不公則天下將徃而歸之矣無所不懷雖天何以加之天猶有形至于道則極矣然而雖道亦不能復進于此矣筆乘致虛而不知實之即虛虛未極也守靜而不知動之即靜靜未篤也若此者觀無于無而未嘗于有觀無故耳試觀萬物方其並作若動且實而實無纖毫動與實者能如是觀是爲觀復復者復其始也夫未能觀復即止動求靜欲靜轉動當物芸芸復歸其根則一切諸念當處寂滅不求靜而自靜乃眞靜也靜則復命矣不曰性而曰命者性可言也命不可言也易曰窮理盡性以至于命夫理性非不妙矣而猶有妙在焉舉此而容之盡之了不可得斯爲至命則命又非性之方矣有作必有變復命則作而無作謂眞常此非明者不能知也知常則靜則吉不知常則妄作則凶方其迷于妄也自是而非彼必不能容知常則善惡兩忘是非無朕何所不容哉容乃公公乃王王乃天天即命也至此于道乃全而可以久可以不殆特其餘事耳太上不知有之其次親之譽之其次畏之其次侮之信不足有不信猶兮其貴言功成事遂百姓皆謂我自然不知有之一作下知有之今從吴幼清本蘇註太上以道在宥天下而未嘗治之民不知所以然故亦知有之而已其次以仁義治天下其德可懷其功可見故民得而親譽之其名雖美而厚薄自是始矣又其次以政齊民民非不畏也然力之所不及則侮之矣吾誠自信則以道御天下足矣唯不自信而加以仁義重以刑政而民始不信聖人自信有餘其于言也猶然貴之不輕出諸口而民信之矣及其功成事遂則民日遷善遠罪而不自知也大道廢有仁義智慧岀有大僞六親不和有孝慈國家昏亂有忠臣六親王輔嗣云父子兄弟夫婦也孝慈孝子慈孫也蘇註大道之隆也仁義行于其中而民不知大道廢而後仁義見矣世不知道之足以澹足萬物也而以智慧加之于是民始以僞報之矣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽叟也伊尹周公非不忠也而獨稱龍逢比干無桀紂也涸澤之魚相呴以沬相濡以濕不如相忘于江湖絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以爲文不足故令有所屬見素抱樸少私寡欲令平聲屬之欲反蘇註非聖智不足以知道使聖智爲天下其有不以道御物者乎然世之人不足以知聖智之本而見其末以爲巧勝物者也於是馳騁于其末流而民始不勝其害矣故絶聖弃智民利百倍未有仁而遺其親者也未有義而後其君者也仁義所以爲孝慈矣然及其衰也竊仁義之名以要利于世於是子有違父而父有虐子此則仁義之跡爲之也故絶仁棄義則民復孝慈巧所以便事也利所以濟物也二者非以爲盜而盜賊不得則不行故絶巧弃利盜賊無有世之貴此三者以爲天下之不安由文之不足故也是以或屬之聖智或屬之仁義或屬之巧利蓋將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有二者無所用之矣故曰我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也孔子以仁義禮樂治天下老子絶而弃之或者以爲不同易曰形而上者謂之道形而下者謂之器孔子之慮後世也深故示人以器而晦其道使中人以下守其器不爲道之所眩以不失爲君子而中人以上自是以上達也老子則不然志于眀道而急于開人心故示人以道而薄于器以唯學者惟器之知則道隠矣故絶仁義弃禮樂以明道夫道不可言可言皆其似者也達者因似以識眞而昧者執似以陷于僞故後世執老子之言以亂天下者有之而學孔子者無大過因老子之言以達道者不少而求之于孔子者常苦其無所從入二聖人者皆不得已也全于此必略于彼矣
