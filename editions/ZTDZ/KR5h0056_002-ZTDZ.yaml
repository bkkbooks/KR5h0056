body:
  text: 下篇上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此蘇註聖人從心所欲不踰矩非有意于德而德自足其下知德之貴勉强以求不失蓋僅自完耳而何德之有無爲而有以爲之則猶有爲也唯無爲而無以爲者可謂無爲矣其下非爲不成然猶有以爲之非徒作而無術者也仁義皆不免于爲之矣其所以異者仁以無以爲爲勝義以有以爲爲功耳德有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也自德以降而至于禮聖人之所以齊民者極矣故爲之而不應則至于攘臂而强之强之而又不應于是刑罰興而兵甲起則徒作而無術矣忠信而無禮則忠信不見禮立而忠信之美發越于外君臣父子之間夫婦朋友之際其外燦然而中無餘矣故順之則治違之則亂治亂之相去其間不能以髮故曰亂之首也聖人玄覽萬物是非得失畢陳于前如鑑之照形無所不見而孰爲前後世人視止于目聽止于耳思止于心冥行于萬物之間役智以求識而偶有見焉雖自以爲明而不知至愚之自始也世之鄙夫樂其有得于下而忘其上故喜薄而遺厚采華而弃實非大丈夫孰能去彼取此筆乘首亂始愚極言禮智流弊所至耳莊子舉老子此言而論之曰今己爲物也欲復歸根不亦難乎其易也其惟大人乎雖然既歸其根孰爲物孰爲非物故又曰匿而不可不爲者事也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也此數者雖有上下先後之異而以聖人用之皆道也蓋聖人百慮同歸二際俱泯豈復有彼此去取邪㫺之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴高將恐蹷故貴以賤爲本高以下爲基是以侯王自謂孤寡不穀此其以賤爲本邪非乎故致數輿無輿不欲碌碌如玉落落如石裂破毁也發發泄也歇消滅也竭枯竭也蹷音厥顛仆也數上聲蘇註一道也物之所以得爲物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其爲天下貞而已不知其所以得此者皆道存焉耳致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也萬物不得一未遽滅也侯王不得一未遽蹷也然其極必至此耳天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天地之至微也此所謂賤且下也本也昔之稱孤寡不穀者亦舉其本而遺其末耳輪輻蓋軫衡軛轂轊會而爲車物物可數而車不可數然後知無有之爲車所謂無之以爲用者也然則天地將以大爲天地邪侯王將以貴爲侯王邪大與貴之中有一存焉此其所以爲天地侯王者而人莫或知之耳故一處貴而非貴處賤而非賤非若玉之碌碌貴而不能賤石之落落賤而不能貴也反者道之動弱者道之用天下之物生於有有生于無反復也湏溪云反者動之極則必歸也是其反也正以其動也非動無反蘇註復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也世不知靜之爲動弱之爲强故告之以物之所自生者蓋天下之物聞有母制子未聞有以子制母者也筆乘天下之物生于有所謂有名萬物之母是已有生于無所謂無名天地之始是已無必生有是故貴其反反者反於無也有生於無是故貴其弱弱者無之似也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道故建言有之明道若昧進道若退夷道若類上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晩成大音希聲大象無形道隱無名夫唯道善貸且成建立也偷苟且也渝羊朱反變改也傅奕音義云古本作輸廣雅曰輸愚也或作揄董遇作摇今從王弼傅奕作渝應人之乏而終以見還曰貸趙志堅云貸者暫借非長與也且者權成非久固也欲使蒙貸者不長徃得成者非久住感貸荷成速歸於道蘇註道非形不可見非聲不可聞不先知萬物之妄廓然無蔽卓然有見未免于不信也故下士聞道以爲荒唐謬悠而笑之中士聞道與之存亡出没而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不惰者其回也與斯所謂上士也哉建立也古之立言者有是說而老子取之下之所陳者是也無所不照而非察也若止不行而天下之速者莫之或先也或夷或類所至則平而未嘗削也上德不德如谷之虛也大白若辱者使白而不受汚此則不屑不潔之士而非聖人也廣德若不足者廣大而不可復加則止于此而已非廣也建德若偷因物之自然而無立者外若偷惰而實建也質眞若渝體聖抱神隨物變化而不失其貞者外若渝也大方無隅全其大方不小立圭角也大器晩成器大不可近用也大音希聲非耳之所得聞也大象無形非目之所得見也道之所寓無所不見凡此十二者皆道之見于事者也而道之大全則隱于無名惟其所寓惟其有餘以貸不足物之賴之以成者如此筆乘上士者恬淡寂寞虛無無爲者也勤於此則勤行之至而實無所勤行也斯所謂天然懸解矣而下士惡足以知之君平曰中士所聞非至美也下士所見非至善也中士所眩下士所笑乃美善之美善者也道生一一生二二生三三生萬物萬物負隂而抱陽沖氣以爲和人之所惡惟孤寡不穀而王公以爲稱故物或損之而益或益之而損人之所教我亦教之强梁者不得其死吾將以爲教父凡動物背止於後隂靜也耳目口鼻居前陽動也故曰負隂抱陽植物則背寒向暖而沖氣運乎其間木絶水曰梁木負棟亦曰梁取其力之强也故曰强梁金人銘曰强梁者不得其死好勝者必遇其敵蓋古人嘗以此爲教而我亦教之但老子獨尊之曰教父如言萬物之母之謂母主養父主教故言生則曰母言教則曰父蘇註夫道非一非二及其與物爲偶道一而物不一故以一名道然而道則非一也一與一爲二二與一爲三自是以徃而萬物生物雖有萬不同而莫不負隂抱陽沖氣以爲和者蓋物生于三而三生于一理之自然也世之人不知萬物之所自生莫不賤寡小而貴重大然王公之尊而自稱孤寡不穀古之達者蓋已知之矣天下之至柔馳騁天下之至堅無有入於無間吾是以知無爲之有益不言之教無爲之益天下希及之馳騁役使也堅猶剛强不曰剛强而曰堅變文叶韻也無間無内也至剛者天下莫能勝而至柔能役之無内者天下莫能破而無有能入之二語皆設喻以明無爲之有益也蘇註以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之於物則水是也以有入有捍不相受以無入有無未嘗勞有未嘗覺求之于物則鬼神是也是以聖人唯能無爲故能役使衆强出入群有名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久多猶重也薛云知足者樂今有之已多無求者也無求奚辱知止者懼後進之有損知幾者也知幾奚殆大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辯若訥躁勝寒靜勝熱清靜爲天下正蘇註天下以不缺爲成故成必有敝以不虛爲盈故盈必有窮聖人要于大成而不卹其缺期于大盈而不惡其沖是以成而不敝盈而不窮也直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯于一偏而非其正也唯泊然清淨不染于一非成非缺非盈非沖非直非屈非巧非拙非辯非訥而後無所不勝可以爲天下正矣天下有道却走馬以糞天下無道戎馬生于郊罪莫大于可欲禍莫大于不知足咎莫大于欲得故知足之足常足矣却屏去也糞糞田也吴幼清本糞下有車字以張衡東京賦却走馬以糞車爲證戎馬戰馬也郊交也二國相交之境也戎馬生于郊言兵久不還也一性之内無欠無餘人能安之無徃不足故曰知足之足常足蘇註天下各安其分則不爭而自治故却是馬而糞田以其可欲者示人固有罪矣而不足其足者其禍又甚所欲必得者其咎最大匹夫有一于身患必及之侯王而爲是則戎馬之所自起也唯知足者所寓而足故無不足不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不爲而成蘇註性之爲體充遍字宙無遠近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人爲物所蔽性分于耳目内爲身心之所紛亂外爲山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌遠而彌少也性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣爲學日益爲道日損損之又損之以至于無爲無爲而無不爲矣故取天下常以無事及其有事不足以取天下取開元䟽云猶攝化也無事即無爲也無爲自化清靜自正故曰取天下常以無事爲者敗之執者失之故曰有事不足以取天蘇註不知道而務學聞見日多而無以一之未免爲累也孔子曰多聞擇其善者而從之多見而識之知之次也苟一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予爲多學而識之者與曰然非與曰非也予一以貫之去妄以求復性可謂損矣而去妄之心猶存及其兼忘此心純性而無餘然後無所不爲而不失于無爲矣人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無爲故無事其心見于外而物安之雖不取天下而天下歸之矣聖人無常心以百姓心爲心善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣聖人在天下惵惵爲天下渾其心百姓皆注其耳目聖人皆孩之無常心心無所主也惵圖恊反爲去聲渾胡本反蘇註虛空無形因萬物之形以爲形在方爲方在圓爲圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以爲心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未嘗渝也可謂德善矣信不信在彼而吾之所以信者未嘗變也可謂德信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉天下善惡信僞方各自是以相非相賊不知所定聖人憂之故惵惵爲天下渾其心無善惡無信僞皆以一待之彼方注其耳目以觀聖人之予奪而吾一以嬰兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不愠釋然皆化而天下始定矣出生入死生之徒十有三死之徒十有三人之生動之死地者亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地出謂自無而見于有入謂自有而歸于無莊子萬物皆出于機入于機又曰其出不忻其入不詎又曰有乎出有乎入皆以出爲生入爲死夫音符攝生如攝政攝官之攝不認生爲己有如暫焉管攝之也不期而會曰遇兕音似山海經兕出湘水之南蒼黑色爾雅云形如野牛一角重千斤蘇註性無生死出則爲生入則爲死用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知默知思而不知忘以趣于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無爲之妙也有生則有死故生之徒即死之徒也人之所頼于生者厚則死之道常十九聖人常在不生不死中生地且無焉有死地哉筆乘生之徒十有三此練形住世者也死之徒十有三此殉欲忘生者也人之生動之死地十有三此斷滅種性者也凡此十分之中率居其九皆生生之厚者也夫有生必有死是生固死之地矣兕虎甲兵將安避之善攝生則無生矣故兕之角無所投虎之爪無所措兵之刃無所容何者彼無地以受之也厚生者九無生者一老子于十者之中闕一自擬其㫖微矣然聖人無生非故薄之也本無生也昔人云愛生者可殺也愛潔者可污也愛榮者可辱也愛完者可破也本無生孰殺之本無潔孰污之本無榮孰辱之本無完孰破之知此者可以出入造化遊戲死生道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然故道生之畜之長之育之亭之毒之養之覆之生而不有爲而不恃長而不宰是謂玄德畜許六反夫音符長上聲下同蘇註道者萬物之母故生萬物者道也及其運而爲德牧養羣衆而不辭故畜萬物者德也然而道德則不能自形因物而後形見物則不能自成遠近相取剛柔相交積而爲勢而後興亡治亂之變成矣形雖由物成雖由勢而非道不生非德不畜是以尊道而貴德尊如父兄貴如侯王道無位而德有名故也恃爵而後尊貴者非實尊貴也天下有始以爲天下母既得其母以知其子既知其子復守其母殁身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常兊口也人之有口家之有門皆喻物所從出者塞而閉之藏有於無守母者也參同契云耳目己之寳閉固勿發揚兊口勿以談希之順以洪即此義不可目窺曰小不可力得曰柔遺唯季反襲常猶前言襲明宻而不露也記曰揜而充裘曰襲蘇註無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也故謂之始又謂之母其子則萬物也聖人體道以周物譬如以母知其子了然無不察也雖其智能周之然而未嘗以物忘道故終守其母也天下皆具此道然常患忘道而狥物目悅于色耳悅于聲開其悅之之心而以其事濟之是以終身而陷溺不能救夫聖人之所以終身不勤者唯塞而閉之未嘗出而狥之也悅之爲害始小而浸大知小之將大而閉之可謂明矣趨其所悅而不顧自以爲强而非强也唯見悅而知畏之者可謂强矣世人開其所悅以身狥物徃而不反聖人塞而閉之非絶物也以神應物用其光而已身不與也夫耳之能聽目之能見鼻之能臭口之能嘗身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣使我介然有知行于大道惟施是畏大道甚夷而民好徑朝甚除田甚蕪倉甚虛服文采帶利劒厭飲食資貨有餘是謂盜竽非道哉介然有知猶言微有知也夸張曰施嗇之反也夷平也路狹而捷爲徑除治也傳曰糞除先人之敝廬是也青赤爲文色絲爲采傅奕云采是古文繡字資貨一作財貨盜竽誤作盜夸今從韓非本蘇註體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道夷易無有險阻世之不知者以爲迂遠而好徑以求捷故凡舍其自然而有所施設者皆欲速者也俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設爲事夸以誨盜哉善建者不拔善抱者不脫子孫祭祀不輟修之于身其德乃眞修之于家其德乃餘修之于鄉其德乃長修之于邦其德乃豐修之于天下其德乃普故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此邦一作國漢人避高帝諱改之於韻不叶今從韓非本蘇註世豈有建而不拔抱而不脫者乎唯聖人知性之真審物之妄捐物而修身其德充積實無所立而其建有不可拔者實無所執而其抱有不可脫者故至其子孫猶以祭祀不輟也身既修推其餘以及外雖至于治天下可也天地外者世俗所不見矣然其理可推而知也修身之至以身觀身以家觀家以鄉觀鄉以國觀國皆吾之所及知也然安知聖人以天下觀天下亦若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳含德之厚比于赤子毒蟲不螫猛獸不據攫鳥不搏骨弱筋柔而握固未知牝牡之合而䘒作精之至也終日號而不嗄和之至也知和曰常知常曰眀益生曰祥心使氣曰强物壯則老謂之不道不道早已毒蟲蜂蠆之類以尾端肆毒曰螫猛獸虎豹之類以爪按拏曰據攫鳥鵰鶚之類以羽距擊觸曰搏趙志堅曰以四指握拇指爲握固䘒子垂反說文云赤子隂也號乎聲嗄所嫁反聲嘶也又啼極無聲曰嗄一作嗌不嗄黄茂材云古本無嗌字嗌不嗄莊子之文後人增入之祥吉㐫之候也蘇註老子之言道德每以嬰兒况之者皆言其體而已未及其用也夫嬰兒泊然無欲其體則至矣然而物來而不知應故未可以言用也道無形體物莫得而見也况可得而傷之乎人之所以至于有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所以至此者唯無心也無執而自握無欲而自作是以知其精有餘而非心也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常生不可益而欲益之則非其正矣氣惡妄作而又以心使之則强梁甚矣益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣知者不言言者不知塞其兊閉其門挫其銳解其紛和其光同其塵是謂玄同不可得而親不可得而䟽不可得而利不可得而害不可得而貴不可得而賤故爲天下貴蘇註道非言說亦不離言說然能知者未必言能言者未必知唯塞兊閉門以杜其外挫銳解紛和光同塵以治其内者默然不同而與道同也可得而親則亦可得而踈可得而利則亦可得而害可得而貴則亦可得而賤體道者均覆萬物而孰爲親踈等觀逆順而孰爲利害不知榮辱而孰爲貴賤情計之所不及此所以爲天下貴也以正治國以竒用兵以無事取天下吾何以知天下之然哉天下多忌諱而民彌貧民多利器國家滋昏人多技巧竒物滋起法令滋章盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸蘇註古之聖人柔遠能邇無意于用兵唯不得已然後有征伐之事故以治國爲正以用兵爲竒雖然此亦未足以取天下天下神器不可爲也爲者敗之執者失之唯體道者廓然無事雖不取天下而天下歸之矣人主多忌諱下情不上達則民貧而無告利器權謀也明君在上常使民無知無欲形而精存乎其中矣物至于成形則真僞雜矣方其有精不容僞也眞僞既雜自一而爲二自二而爲三紛然錯出不可復信矣方其有精不吾欺也古今雖異而道則不去故以不去名之唯未嘗去故能以閱衆有之變矣甫美也雖萬物之美不免于變也聖人所以知萬物之所以然者以能體道而不去故耳筆乘道無形容不可形容即屬之德然知德容則道亦可從而識如所謂恍惚窈冥是也人之學道喜于有作至恍惚窈冥類若其芒蕩難於凑泊矣不知惚恍無象即象也恍惚無物即物也窈冥無精即精也如釋典云若見諸相非相即見如來也暫爲假常爲眞恍惚窈冥則不以有而存不以無而亡夫孰眞且信于此故曰自古及今其名不去也昧者乃謂恍惚窈冥之中真有一物者夫怳惚窈冥則無中邊之謂也而物奚麗乎況有居必有去又何以亘古今而常存乎然則曷謂閱衆甫也甫始也人執衆有爲有而不能玄會于徼妙之間者未嘗閱其始耳閱衆有之始則知未始有始則衆有皆衆妙而其爲恍惚窈冥也一矣是所以知衆有即真空者以能閱而知之故也釋氏多以觀門示人悟入老子之言豈復異此故閱衆始則前際空觀其徼則後際空萬物並作觀其復則當處空一念歸根上際永斷而要以能觀得之學者誠有意乎知常也則必自此始矣曲則全枉則直窪則盈敝則新少則得多則惑是以聖人抱一爲天下式不自見故明不自見故彰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之窪烏瓜反夫音符蘇註聖人動必循理理之所在或直或曲要於通而已通故與物不迕不迕故全也直而非理則非直也循理雖枉天下之至直也衆之所歸者下也雖欲不盈不可得矣昭昭察察非道也悶悶若將敝矣而日新之所自出也道一而已得一則無所不得多學而無以一之則惑矣抱一者復性者也蓋曲則全枉則直窪則盈敝則新少則得皆抱一之餘也故以抱一終之目不自見故能見物鏡不自照故能照物如使自見自照則自爲之不暇而何暇及物哉不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之世以直爲是以曲爲非將循理而行于世則有不免于曲者矣故終篇復言之曰此豈虛言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其爲直也大矣筆乘曲則全枉則直窪則盈敝則新凡以明少則得也一少之極也抱一而天下式則其得多矣故一國三公不知誰適十羊九牧詎可得芻喪生者繇其多方亡羊者苦于岐路希言自然飄風不終朝驟雨不終日孰爲此者天地天地尚不能乆而況于人乎故從事於道者道者同于道德者同于德失者同于失同于道者道亦樂得之同于德者德亦樂得之同于失者失亦樂得之信不足有不信飄風疾風也驟雨暴雨也自旦及晡爲終朝自早及莫爲終日風雨震蕩飄忽必不能乆岐伯所謂亢則害承乃制也樂入聲蘇註言出于自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣隂陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏於下否而不得洩于是爲飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故乆而不窮世或厭之以爲不若詭辯之悅耳怪行之驚世不知其不能久也孔子曰苟志于仁也無惡也故曰仁者之過易辭志于仁猶若此而况志于道者乎夫苟從事于道矣則其所爲合于道者得道合于德者得德不幸而失雖失于所爲然必有得於道德矣不知道者信道不篤因其失而疑之于是益以不信夫唯知道然後不以得失疑道也筆乘道以自然爲至而世希言之者喜于作也有作必有輟惡能乆乎即飄風驟雨之不能久焉亦可見也從事于道者不然從事于道則自然矣自然則本無所得亦復何失無得無失而隨世之得失故爲德爲失皆信其所至而無容心焉無不同矣無不同亦無不樂乃其理也夫無不同則求其信且不可得況不信乎苟離道而爲德不能同于失矣離德而爲失不能同于德矣不能同于德同于失而欲其同于道者未之有也所謂信不足焉有不信也皆飄風驟雨之類也或曰首楞嚴言非因縁非自然而老氏以自然爲宗有以異乎余曰無以異也夫所惡夫自然者有所自而自有所然而然也有所自而自有所然而然則是自然也在有物之上出非物之下是釋氏之所訶也老聃明自然矣獨不曰無名天地之始乎知無名則其自也無自其自也無自則其然也無然其自無自其然無然而因若縁曷能囿之故曰精覺妙明非因非縁非自然非不自然離一切相即一切法蓋所謂不可道之常道如此跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處跂與企同薛云舉踵曰跂張足曰跨立欲增高則反害其立行欲增闊則反害其行贅疣贅也行當作形古字通也食餘人必惡之形贅人必醜之左氏人將不食吾餘莊子附疣縣贅出乎形而侈乎性是也惡去聲處上聲有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然混渾通先悉薦寥遠也羅什曰妙理常存故曰有物萬道不能分故曰混成鍾會曰廓然無偶曰獨立古今常一曰不改無所不在曰周行所在皆通曰不殆蘇註夫道非清非濁非高非下非去非來非善非惡混然而成體其于人爲性故曰有物混成此未有知其生者蓋湛然常存而天地生于其中耳寂兮無聲寥兮無形獨立無匹而未常變行于群有而未嘗殆俯以化育萬物則皆其母矣道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也自大而求之則逝而徃矣自徃而求之則遠不及矣雖逝雖遠然反而求之一心足矣由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重爲輕根靜爲躁君是以聖人終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失根躁則失君根本也躁者動之甚而煩擾也君主也韓非云制在己曰重不離位曰靜重則能使抱樸則少𥝠寡欲而天下無事矣素未受采樸未斷器此所謂性之初也寳也夫遊于性之初故雖有身而寳無身其有𥝠馬者少矣雖有心而寳無心其有欲馬者寡矣然則見素抱相乃聖智仁義之精也馬用文之蓋老子絶之于彼正欲其屬之于此學者不察其意而但知其絶而棄之猥云老子之論蕩而不法也斯所謂不得於言者乎絶學無憂唯之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙如享太牢如春登臺我獨怕兮其未兆如嬰兒之未孩乘乘兮若無所歸衆人皆有餘而我獨若遺我愚人之心也哉沌沌兮俗人昭昭我獨若昏俗人察察我獨悶悶忽兮若晦寂兮無似所止衆人皆有以我獨頑似鄙我獨異於人而貴食母唯上聲阿烏何反皆應聲唯恭而阿慢也荒廣遠也怕古泊字靜也兆如龜兆之坼動之微也孩小兒笑也笑則情動而識生矣有歸必稅駕而不乘乘乘兮無所歸無住著也馬巨濟曰性無餘欠有餘皆分外也享太牢登春臺則所得皆分外故曰衆人皆有餘遺失也沌如渾沌之沌無知也一作純小明爲昭察苛細也悶莫奔反頑不知痛痒也古謂都爲美郊爲鄙食音嗣食母乳母也見禮記内則篇蘇註爲學日益爲道日損不知性命之正而以學求益增所未聞積之不已而無以一之則以圜害方以直害曲其中紛然不勝其憂矣患夫學者之至此故曰絶學無憂若夫聖人未嘗不學而以道爲主不學而不少多學而不亂廓然無憂而安用絶學邪學者溺于所聞而無以一之則唯之爲恭阿之爲慢不可同日言矣而況夫善惡之相反乎夫唯聖人知萬物同出于性而皆成于妄如畫馬牛如刻虎彘皆非其實湣焉無是非同異之辨孰知其相去幾何哉苟知此矣則萬物並育而不相害道並行而不相悖無足怪矣聖人均彼我一同異其心無所復留然豈以是忽遺世犯分亂理而不顧哉人之所畏吾亦畏之人之所爲吾亦爲之雖列于君臣父子之間行于禮樂刑政之域而天下不知其異也其所以不嬰于物者惟心而已人皆狥其所知故介然不出畦畛聖人兼涉有無無入而不可則荒兮其未可央也人各溺于所好其美如享太牢其樂如春登臺囂然從之而不知其非唯聖人深究其妄遇之泊然不動如嬰兒之未能孩也乘萬物之理而不自私故若無所歸衆人守其所知各自以爲有餘聖人包舉萬物而不主于一超然其若遺也沌沌若愚而非愚也世俗以分别爲知聖人知群妄之不足辨也故其外若昏其中若悶忽焉若海不見其津涯漂然無定不見其宿止也人各有能故世皆得而用之聖人才全德備若無所施故疑于頑鄙道者萬物之母衆人狥物忘道而聖人脫遺萬物以道爲宗譬如嬰兒無所雜食食于母而已筆乘人之爲學憂不得善也吾能絶學則奚憂之有然非强絶也知性本無善也彼爲學者雖異于惡而離性則一其少異者如唯與阿之間耳夫以善惡之同而聖人亦不廢善者蓋人之所畏不得不畏所謂吉凶與民同患也至其心游于性初方且荒兮未央而豈若善之有涯涘可限量哉故人之樂善如享太牢春登臺而我獨泊兮如嬰兒之未孩無朕兆也乘乘者無所歸無棲泊也人之得善皆有所止而我獨若遺若愚人之沌沌無知識也人皆昭昭察察皆若有所以而我獨昏也悶悶也忽兮若海漂兮無所止也此豈聖人眞頑且鄙哉以衆皆逐其子我獨貴其母不能不與衆異耳蓋性無善惡而善惡萬法皆從此而生故謂之食母孔德之容唯道是從道之爲物惟恍惟惚惚兮恍兮其中有象恍兮惚兮其中有物窈兮冥兮其中有精其精甚眞其中有信自古及今其名不去以閱衆甫吾何以知衆甫之然哉以此孔大也窈烏了反恍惚窈冥皆不可見之意鄧錡云恍惚便是物非恍惚之中更别有物經云無狀之狀無物之象是謂怳惚是也窈冥便是精非窈冥之中更别有精張平叔云窈冥莫測是眞精是也王輔嗣曰信驗也閱自門出者一一而數之言道如門萬物皆自此徃也漢書此如傳舍所閱多矣陸機賦川閱水而成川世閱人而爲世其用字之義並同一訓經歷亦同此義甫美也又始也蘇註道無形也及其運而爲德則有容矣故德者道之見也自是推之則衆有之容皆道之見于物者也道非有無故以恍惚言之然及其運而成象著而成物未有不出于恍惚者也方有無之未定恍惚而不可見及夫有無之交則見其窈冥深眇雖未成形而精存乎其中矣物至于成形則眞僞雜矣方其有精不容僞也真僞既雜自一而爲二自二而爲三紛然錯出不可復信矣方其有精不吾欺也古今雖異而道則不去故以不去名之唯未嘗去故能以閱衆有之變矣甫美也雖萬物之美不免于變也聖人所以知萬物之所以然者以能體道而不去故耳筆乘道無形容不可形容即屬之德然知德容則道亦可從而識如所謂恍惚窈冥是也人之學道喜于有作至恍惚窈冥類若其芒蕩難於凑泊矣不知惚恍無象即象也恍惚無物即物也窈冥無精即精也如釋典云若見諸相非相即見如來也暫爲假常爲眞恍惚窈冥則不以有而存不以無而亡夫孰眞且信于此故曰自古及今其名不去也昧者乃謂恍惚窈冥之中眞有一物者夫恍惚窈冥則無中邊之謂也而物奚麗乎況有居必有去又何以亘古今而常存乎然則曷謂閱衆甫也甫始也人執衆有爲有而不能玄會于徼妙之間者未嘗閱其始耳閱衆有之始則知未始有始則衆有皆衆妙而其爲恍惚窈冥也一矣是所以知衆有即眞空者以能閱而知之故也釋氏多以觀門示人悟入老子之言豈復異此故閱衆始則前際空觀其徼則後際空萬物並作觀其復則當處空一念歸根上際永斷而要以能觀得之學者誠有意乎知常也則必自此始矣曲則全枉則直窪則盈敝則新少則得多則惑是以聖人抱一爲天下式不自見故明不自見故彰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之窪烏瓜反夫音符蘇註聖人動必循理理之所在或直或曲要於通而已通故與物不迕不迕故全也直而非理則非直也循理雖枉天下之至直也衆之所歸者下也雖欲不盈不可得矣昭昭察察非道也悶悶若將敝矣而日新之所自出也道一而已得一則無所不得多學而無以一之則惑矣抱一者復性者也蓋曲則全枉則直窪則盈敝則新少則得皆抱一之餘也故以抱一終之目不自見故能見物鏡不自照故能照物如使自見自照則自爲之不暇而何暇及物哉不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之世以直爲是以曲爲非將循理而行于世則有不免于曲者矣故終篇復言之曰此豈虛言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其爲直也大矣筆乘曲則全枉則直窪則盈敝則新凡以明少則得也一少之極也抱一而天下式則其得多矣故一國三公不知誰適十羊九牧詎可得芻喪生者繇其多方亡羊者苦于岐路希言自然飄風不終朝驟雨不終日孰爲此者天地天地尚不能乆而況于人乎故從事於道者道者同于道德者同于德失者同于失同于道者道亦樂得之同于德者德亦樂得之同于失者失亦樂得之信不足有不信飄風疾風也驟雨暴雨也自旦及晡爲終朝自早及莫爲終日風雨震蕩飄忽必不能乆岐伯所謂亢則害承乃制也樂入聲蘇註言出于自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣隂陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏於下否而不得洩于是爲飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故久而不窮世或厭之以爲不若詭辯之悅耳怪行之驚世不知其不能久也孔子曰苟志于仁也無惡也故曰仁者之過易辭志于仁猶若此而况志于道者乎夫苟從事于道矣則其所爲合于道者得道合于德者得德不幸而失雖失于所爲然必有得於道德矣不知道者信道不篤因其失而疑之于是益以不信夫唯知道然後不以得失疑道也筆乘道以自然爲至而世希言之者喜于作也有作必有輟惡能乆乎即飄風驟雨之不能乆焉亦可見也從事于道者不然從事于道則自然矣自然則本無所得亦復何失無得無失而隨世之得失故爲德爲失皆信其所至而無容心焉無不同矣無不同亦無不樂乃其理也夫無不同則求其信且不可得況不信乎苟離道而爲德不能同于失矣離德而爲失不能同于德矣不能同于德同于失而欲其同于道者未之有也所謂信不足焉有不信也皆飄風驟雨之類也或曰首楞嚴言非因縁非自然而老氏以自然爲宗有以異乎余曰無以異也夫所惡夫自然者有所自而自有所然而然也有所自而自有所然而然則是自然也在有物之上出非物之下是釋氏之所訶也老聃明自然矣獨不曰無名天地之始乎知無名則其自也無自其自也無自則其然也無然其自無自其然無然而因若縁曷能囿之故曰精覺妙明非因非縁非自然非不自然離一切相即一切法蓋所謂不可道之常道如此跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道曰餘食贅行物或惡之故有道者不處跂與企同薛云舉踵曰跂張足曰跨立欲增高則反害其立行欲增闊則反害其行贅疣贅也行當作形古字通也食餘人必惡之形贅人必醜之左氏人將不食吾餘莊子附疣縣贅出乎形而侈乎性是也惡去聲處上聲有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然混渾通先悉薦寥遠也羅什曰妙理常存故曰有物萬道不能分故曰混成鍾會曰廓然無偶曰獨立古今常一曰不改無所不在曰周行所在皆通曰不殆蘇註夫道非清非濁非高非下非去非來非善非惡混然而成體其于人爲性故曰有物混成此未有知其生者蓋湛然常存而天地生于其中耳寂兮無聲寥兮無形獨立無匹而未常變行于群有而未嘗殆俯以化育萬物則皆其母矣道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也自大而求之則逝而徃矣自徃而求之則遠不及矣雖逝雖遠然反而求之一心足矣由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重爲輕根靜爲躁君是以聖人終日行不離輜重雖有榮觀燕處超然奈何萬乘之主而以身輕天下輕則失根躁則失君根本也躁者動之甚而煩擾也君主也韓非云制在己曰重不離位曰靜重則能使輕靜則能使躁故曰重爲輕根靜爲躁君管子曰動則失位靜則自得離去聲輜莊持反古者凡吉行乘乘車師行乘兵車皆有輜車在後輜車衣車前後有蔽所以載行者之衣食器械以其累重故稱輜重榮觀紛華之觀也公羊傳曰常事曰視非常曰觀處上聲燕處猶燕居超然高出而無繫著也奈如也乘去聲失根一作失本一作失臣非今從王輔嗣本蘇註凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重爲根躁以靜爲君行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此人主以身任天下而輕其身則不足以任天下矣輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志于利故曰輕則失臣躁則失君善行無轍迹善言無瑕謫善計不用籌策善閉無關楗而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖知大迷是爲要妙瑕玉玷也謫直革反責也籌策計數者所用之筭以竹爲之楗其偃反拒門木也横曰關堅曰楗結繫也繩索也約束也襲相傳襲也一作掩襲之襲言宻用也傅奕云是以聖人常善救人二十字獨見河上本古本無之蘇註乘理而行故無迹時然後言故言滿天下無口過萬物之數畢陳于前不計而知安用籌筭全德之人其于萬物如母之于子雖縱之而不去故無關而能閉無繩而能約彼方挾策以計設關以閉持繩以結其力之所及者少矣聖人之于人非特容之又善救之我不棄人而人安得不歸我乎夫救人于危難之中非救之大者也方其流轉生死爲物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則謂善救人矣聖人無心于教故不愛其資天下無心于學故不貴其師聖人非獨吾忘天下亦能使天下忘我故也聖人之妙雖智者有所不喻故曰要妙知其雄守其雌爲天下谿爲天下谿常德不離復歸于嬰兒知其白守其黑爲天下式爲天下式常德不忒復歸于無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸于樸樸散則爲器聖人用之則爲官長故大制不割守保守也復并扶又反谿谷衆水所注天下極言之也式法也忒爽也足全也長上聲制裁斷也割分裂也吕註雄動而雌靜雄剛而雌柔雄倡而雌和知其雄守其雌則篤靜致柔和而不倡者也故爲天下谿谿之爲物受于谷而輸于江海受而不拒輸而不積物之能通而無迕者也能通則常德不離矣人之生也常德内全與物無迕反爲物之所遷則日益以離唯能篤靜致柔和而不倡則常德不離而復歸于嬰兒矣白于色爲受采于物爲明于行爲金于數爲四黑于色爲不受染于物爲晦于行爲水于數爲一知其白守其黑不受萬物之染若晦若水終之于抱一抱一則能曲能枉能窪能蔽故可以爲天下式爲天下式無徃而非一則常德不忒矣不離者不離其故處而已而未必能不忒也不忒則不差矣嬰兒之爲物專氣致柔不失其一體之和而已復歸于無極則嬰兒不足以言之也草木之蕃也爲榮其謝也辱人之所以爲榮辱亦若是而已知其榮守其辱去華歸根雖被以天下之所甚惡而不能累焉故爲天下谷谷之爲物虛而能盈應而不藏而江海之源所自出者也能爲天下谷則反乎其源矣故常德乃足則又非特不忒而已復歸其樸樸者眞之全而物之混成者也唯其混成而未爲器故能大能小能曲能直能短能長能圜能方無施而不可則無極不足以言之也然則守其雌守其黑守其辱足矣安用知其雄與白與榮哉蓋守之以爲母知之以爲子守之以爲經知之以爲變也樸散則爲器器之爲物能大而不能小能曲而不能直能短而不能長能圜而不能方故聖人用之爲官長而已非容乃公公乃王之道也若夫抱樸以制天下其視天下之理猶庖丁之視牛未嘗見全牛也行之于所無事而已恢恢乎其于游刃有餘地矣何事于割哉故曰大制不割將欲取天下而爲之吾見其不得已天下神器不可爲也爲者敗之執者失之故物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰取如左氏取我田疇而伍之史記取高帝約束紛更之之取爲治之也司馬温公曰爲之則傷自然執之則乖通變呴音許一音虛羸力爲反載始也又任載也隳許規反去上聲陸農師云去甚慈也去奢儉也去泰不敢爲天下先也三者聖人所以取天下也蘇註聖人之有天下非取之也萬物歸之不得已而受之其治天下非爲之也因萬物之自然而除其害耳若欲取而爲之則不可得矣凡物皆不可爲也雖有百人之聚不循其自然而妄爲之必有齟齬不服者而況天下乎雖然小物寡衆猶有可以力取而智奪者至于天下之大有神主之不待其自歸則叛不聽其自治則亂矣隂陽相盪高下相傾大小相使或行于前或隨于後或呴而暖之或吹而寒之或益而强之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也世之愚人私己而務得乃欲拒而違之其禍不覆則折唯聖人則知其不可逆順以待之去其甚去其奢去其泰使不至于過而傷物而天下無患矣此不爲之至也堯湯之于水旱雖不能免而終不至于敗者由此故也易之泰曰後以財成天地之道輔相天地之宜以左右民三陽在内三隂外物在泰極矣聖人懼其過而害生故財成而輔相之使不至于過此所謂去甚去奢去泰也矣以道佐人主者不以兵强天下其專好還師之所處荆棘生焉大兵之後必有凶年善者果而已不敢以取强果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂不道不得早已好去聲還旋通易曰師衆也處上聲善即有道者也不得已爲之難也莊子曰不得已而後動又一宅而寓于不得已又託不得已以養中皆與老子語合果而勿矜以下五而字當讀如於字人方果於彼我獨果于此也矜自恃也伐夸大也驕恣肆也已止也早已言不乆也蘇註聖人用兵皆出于不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而况以兵强天下者邪果決也德所不能綏政所不能服不得已而後以兵决之耳勿矜勿伐勿驕不得已四者所以爲勿强也壯之必老物無不然者惟有道者成而若缺盈而若沖未嘗壯故未嘗老未嘗死以兵强天下壯亦甚矣能無老乎無死乎夫佳兵者不祥之器物或惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志于天下矣吉事尚左凶事尚右偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之佳謂佳之也温公曰兵愈佳則害人愈多惡去聲處上聲下並同左爲陽爲生右爲隂爲死恬澹安靜也美即佳也樂去聲純甫云此章自兵者不祥之器以下似古之義䟽渾入于經者詳其文義可見蘇註以之濟難而不以爲常是謂不處道常無名樸雖小天下不敢臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均始制有名名亦既有夫亦將知止知止所以不殆譬道之在天下猶川谷之於江海蘇註樸性也道常無名則性亦不可名焉故其爲物舒之無所不在而歛之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣沖氣升降而合爲一而降甘露脗然被于萬物無不均遍聖人體至道以應諸有亦露之無不及者此所以能賔萬物也聖人散樸爲器因器制名豈其狥名而忘樸逐末而喪本哉蓋亦知復于性是以乘萬變而不殆也江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗筆乘道常首章所謂常道也無名首章所謂無名也以其未彫未琢故謂之樸以其曰希曰微故謂之小然能見小而守之者鮮矣侯王若能守是見小曰明者也知子守母者也如此則靜爲動君而動爲之臣一爲萬主而萬爲之賔又孰有臣樸者哉始即無名天地之始制者裁其樸而分之也始本無名制之則有名矣苟其逐于名而莫止則一生二二生三將巧歷不能筭而種種名相皆以爲實與接爲構窮萬世而不悟隂陽之慘殆孰甚焉所謂不知常妄作凶也誠知無可以適有則有亦可以之無是故貴其止止者鎮以無名之樸也知止則不隨物遷淡然自足殆無從生矣此非强之也物生于道生物滅以道滅萬物皆作于道萬物皆歸于道我之性宅我自復之夫何難之有故江海水之宗也川谷水之派也異派必會于宗殊名必統于道知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所者久死而不亡者壽不失其所即易之止其所也羅什曰在生而不生曰久在死而不死曰壽蘇註分别爲智蔽盡爲明分别之心未除故止于知人而不能自知蔽盡則無復分别故能自知而又可以及人也力能及人而不能及我能克己復性則非力之所及故可謂之强也知足者所遇而足則未嘗不富矣雖有天下而常挾不足之心以處之是終身不能富也不與物爭而自强不息物莫能奪其志也物變無窮而心未嘗失則乆矣死生之變大亦大矣而其性湛然不亡此古之至人能不生不死者也大道汎兮其可左右萬物恃之以生而不辭功成不名有愛養萬物而不爲主常無欲可名於小萬物歸焉而不知主可名於大是以聖人終不爲大故能成其大汎無繫著也蘇註汎兮無可無不可故左右上下周旋無不至也世有物而不辭者必將名之以爲己有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已大而有爲大之心則小矣筆乘可名于小爾言不可名小可名于大爾言不可名大既云可左可右所以非小非大非小非大所以成其大執大象天下徃徃而不害安平泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既林希逸云大象者無象之象也天下徃者執此而徃行之天下也既盡也蘇註道非有無故謂之大象苟其昭然有形則有同有異同者好之異者惡之好則來之惡則去之不足以使天下皆徃矣有好有惡則有所利有所害好惡既盡則其千萬物皆無害矣故至者無不安無不平無不泰作樂設餌以待來者豈不足以止過客哉然而樂關餌盡彼將捨之而去若夫執大象以待天下天下不知好之又况得而惡之乎雖無臭味形色聲音以悅人而其用不可盡矣將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔勝剛弱勝强魚不可脫於深淵邦之利器不可以示人歙音吸也聚也張開大也深淵原作淵邦原作國今從韓非本蘇註未嘗與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾于用智也與管仲孫武無異聖人與世俗其迹固有相似者也聖人乘理而世俗用智乘理如醫樂巧於應病用智如商賈巧于射利聖人知剛强之不足恃故以柔弱自處天下之剛强方相傾相軋而吾以不校坐待其斃此所謂勝也雖然聖人豈有意爲此以勝物哉知勢之自然而居其自然耳魚之爲物非有爪牙之利足以勝物也然方託於深淵雖强有力者莫能執之及其脫淵而陸則蠢然一物耳何能爲哉聖人居于柔弱而剛强者莫能傷非徒莫能傷也又將以全制其後此不亦天下之利器也哉魚惟脫于淵然後人得制之聖人唯處于柔弱而不厭故終能服天下此豈與衆人共之者哉道常無爲而無不爲侯王若能守萬物將自化化而欲作吾將鎮之以無名之樸無名之樸亦將不欲不欲以靜天下將自正道常言道之大常也介甫云言道之主故曰萬物將自賔言道之變故曰萬物將自化作動也鎮者壓定之使不動也羅什曰心得一空資用不失萬神從化伏邪歸正蘇註道常者無所不爲而無爲之之意耳聖人以無爲化物萬物化之始于無爲而漸至于作譬如嬰兒之長人僞日起故三代之衰人情之變日以滋甚方其欲作而上之人與天下皆靡故其變至有不可勝言者苟其方作而不爲之動終以無名之樸鎮之庶幾可得而止也聖人中無抱樸之念外無抱樸之迹故樸全而用大苟欲樸之心尚存于胷中則失之遠矣老子翼卷之二
