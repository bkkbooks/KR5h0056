front:
  text: 道者萬物之奥善人之寳不善人之所保美言可以市尊行可以加人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道者何不曰求以得有罪以免耶故爲天下貴蘇註
  hash: sha256:c18eb73e8c1dfd0696ef6ac5cd35d3d8715a02bf17e0fc9e7682b13a673aca93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0056_SJB_004-360569a, image: sjb/36/360569a.png}
body:
  text: 凡物之見于外者皆其門堂也道之在物譬如其奥物皆有之而人莫之見耳夫唯賢者得而有之故曰善人之寳愚者雖不能有然而非道則不能安也故曰不善人之所保蓋道不遠人而人則遠之今誠有人美言之則可以爲市于世尊行之則可以加于人矣朝爲不義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄之哉立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能汙也爲無爲事無事味無味大小多少報怨以德圖難于其易爲大于其細天下難事必作于易天下大事必作于細是以聖人終不爲大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難爲營爲也純甫云人皆有所爲聖人亦人耳獨無所爲乎但衆人所爲者有爲之事聖人所爲者無爲之道此其所以異也事所爲之條件也味所爲之理趣也作起也蘇註聖人爲無爲故無所不爲事無事故無所不事味無味故無所不味其于大小多少一以道遇之而已蓋人情之所不忘者怨也然及其愛惡之情忘則雖報怨猶報德也世人莫不畏大而侮小難多而易少至於難而後圖大而後爲則事常不濟矣聖人齊大小一多少無所不畏無所不難而安有不濟者哉筆乘夫事涉於形則有大小係乎數則有多少此怨所由起也惟道非形非數而聖人與之爲一以無爲爲爲以無事爲事以無味爲味愛惡妄除聖凡情盡而泊然棲乎性宅則大小多少一以視之而奚怨之可報哉惟德以容之而已然此無爲無事無味也不可力得至易也不可目窺至細也雖至易而至難者待此以解雖至細而至大者待此以成豈可以其易與細而忽之哉學道者亦或有見於此而又以爲大之心奪之故易與細不常爲我有唯聖人自始至終爲無爲事無事味無味而不以世俗所謂大者分其心故難者大者當處寂然了無留礙而大道自此全矣此所謂成其大者也嗟乎此非特起大丈夫見理明用心剛者不能信不能守而可與輕諾多易之流道哉其安易持其未兆易謀其脆易判其微易散爲之於未有治之於未亂合抱之木生於豪末九成之臺起於累土千里之行始於足下爲者敗之執者失之是以聖人無爲故無敗無執故無失民之從事常於幾成而敗之愼終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以恃萬物之自然而不敢爲脆此芮反判一作破成一作層今從傅奕古本未有者心未起時未亂者心未染時幾平聲復反也恃一作輔非既曰自然矣而又輔之非自然也今從韓非本蘇註方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈于既成也故爲之于未有者上也治之于未亂者次也木也臺也行也積小成大治亂禍福之來皆如彼三者聖人待之以無爲守之以無執故能使福自生使禍自亡譬如種苗深耕而厚耘之及秋自穰譬如被盜危坐而熟視之盜將自郤世人不知物之自然以爲非爲不成非執不留故常與禍爭勝與福爭贅是以禍至于不救福至于不成蓋其理然也聖人知有爲之害不以人助天始終皆因其自然故無不成者世人心存于得喪方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以爲敗之者矣故曰愼終如始則無敗事人皆狥其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷于物非無學也學而不學故雖學而不害于理然後内外空明廓然無爲可以輔萬物之自然而待其自成矣古之善爲道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式能知楷式是謂玄德玄德深矣遠矣與物反矣乃至於大順楷模也式法也下徹曰深旁周曰遠反乃順者司馬曰物情莫不貴智而有玄德者獨賤之雖反於物乃順於道蘇註古之所謂智者知道之大全而覽於物之終始故足貴也凡民不足以知此而溺于小智以察爲明則智之害多矣故聖人以道治民非以明之將以愚之耳蓋使之無知無欲而聽上之所爲則雖有過亦小矣苟以智御人人亦以智應之則上下交相賊耳吾之所貴者德也物之所貴者智也德與智固相反然智之所順者小而德之所順者大也江海所以能爲百谷王者以其善下之故能爲百谷王是以聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不能害是以天下樂推而不厭以其不爭故天下莫能與之爭王之爲言天下所歸徃也處上聲下同樂入聲蘇注聖人非欲上人非欲先人也蓋下之後之其道不得不上且先耳天下皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫我有三寳寳而持之一曰慈二曰儉三曰不敢爲天下先夫慈故能勇儉故能廣不敢爲天下先故能成器長今捨其慈且勇捨其儉且廣捨其後且先死矣夫慈以戰則勝以守則固天將救之以慈衛之肖似也夫並音符長舍並上聲衛護也蘇註夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以爲大也若似于物則亦一物耳而何足大哉道以不似物爲大故其運而爲德則亦悶然以鈍爲利以退爲進不合于世俗今夫世俗貴勇敢尚廣大誇進銳而吾之所寳則慈忍儉約廉退此三者皆世之所謂不肖者也世以勇决爲賢而以慈忍爲不及事不知勇决之易挫而慈忍之不可勝其終必至于勇也世以廣大蓋物而以儉約爲陋不知廣大之易窮而儉約之易足其終必至于廣也世以進銳爲能而以不敢先爲耻不知進銳之多惡于人而不敢先之樂推于世其終卒爲器長也蓋樸散而爲器聖人用之則爲官長自樸成器始有屬有長矣勇廣先三者人之所共疾也爲衆所疾故常近于死以慈衛物物之愛之如父母雖爲之效死而不辭故可以戰可以守天之將救是人也則開其心志使之無所不慈無所不慈則物皆爲之衛矣善爲士者不武善戰者不怒善勝敵者不爭善用人者爲之下是謂不爭之德是謂用人之力是謂配天古之極古者車戰爲士甲士三人在車上左執弓右持矛中御車掌旗鼓皆欲其强武戰卒七十二人在車下蓋至爭者惟兵故借之以明不爭之德也羅什曰心形既空孰能與無物者爭蘇註士當以武爲本行之以怯若以武行武則死矣聖人不得已而後戰若出于怒是以我故殺人也以我故殺人天必殃之以吾不爭故能勝彼之爭若皆出于爭則未必勝矣人皆有相上之心故莫能相爲用誠能下之則天下皆吾用也用兵有言吾不敢爲主而爲客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵幾喪吾寳故抗兵相加哀者勝矣用兵有言古兵家有此言也行上如字可户剛反言行列也仍就也詩曰仍執醜虜兵五兵戈矛殳戟干也說文云拱手執斤曰兵幾平聲喪去也抗舉也林希逸云此章全是借戰事以喻道推此則書中設喻䖏其例甚明蘇註主造事者也客應敵者也進者有意于爭者也退者無意于爭者也苟無意于爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵之咎耶聖人以慈爲寳輕敵則輕戰輕戰則輕殺人喪其所以爲慈矣兩敵相加而吾出于不得已則有哀心哀心見而天人助之雖欲不勝不可得也吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫惟無知是以不我知也知我者希則我貴矣是以聖人被褐懷玉宗者族之緫也道者事之緫也蘇註道之大復性而足而性之妙見于起居飲食之間耳聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而况行之乎言者道之筌也事者道之迹也使道可以言盡則聽言而足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其君不可得也蓋古之聖人無思無爲而有漠然不自然不自知者存焉此則思慮所不及是以終莫吾知也使爲衆人所能知亦不足貴矣被褐懷玉者聖人外與人同而中獨異也知不知上不知知病夫唯病病是以不病聖人之不病也以其病病是以不病蘇註道非思慮之所及故不可知然方其未知則非知無以入也及其既知而存知則病矣故知而不知者上不知而知者病既不可不知又不可知唯知知爲病者久而病自去矣筆乘道以知入以不知化知即釋氏之知無也不知即釋氏之無知也始以知無遣其有隨以不知遣其知萬法歸無無亦不立非上而何彼於虛空之中横生意見清淨之内忽起山河捏目生華迷頭認影則病矣凡有知皆妄也凡有妄皆病也學者方狃以爲玄覽寳而持之病奚從瘳乎聖人之不能廢知猶夫人也而知不爲病者知知之爲病故耳知其爲病則勿藥而病瘳矣知不知上所謂生而無生眞性湛然也不知知病所謂無生而生業果宛然也唯其病病是以不病所謂知幻即離不作方便也民不畏威則大威至矣無狹其所居無厭其所生夫唯不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此威畏古通用人不畏其所當畏則大可畏者至矣下文皆畏其所當畏之事狹胡夾反一作狎厭於豔反蘇註夫性自有威高明光大赫然物莫能加此所謂大威也人常患溺于衆妄畏生死而憚得喪萬物之威雜然乘之終身惴惴之不暇雖有大威而不自知也苟誠知之一生死齊得喪坦然無所怖畏則大威燁然見于前矣性之大可以包絡天地彼不知者以四肢九竅爲己也守之而不厭是以見不出視聞不出聽蕞然其甚陋也故教之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脫而不得不知有厭有慕之方囿于物也故教之曰無厭其所生夫唯聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也聖人雖自知之而不自見雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未忘則猶有畏也畏去而後大威至也勇于敢則殺勇于不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之天之道不爭而善勝不言而善應不召而自來繟然而善謀天之道不爭而善謀天網恢恢䟽而不失殺猶死也利謂活害謂殺惡去聲繟音闡舒緩也王作坦嚴作默不如作繟爲長蓋默則重不言坦則近不爭也蘇註勇于敢則死勇于不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂僥倖其或然而忽其常理夫天道之遠其有一或然者孰知其好惡之所從來哉故雖聖人猶以常爲正其于勇敢未嘗不難之列子曰迎天意揣利害不如其已患天道之難知是以歷陳之不與物爭于一時要于終勝之而已天何言哉四時行焉百物生焉未有求而不應者也神之格思不可度思矧可射思夫誰召之哉繟然舒緩若無所營而其謀度非人之所及也世以耳目觀天見其一曲而不覩其大全有以善而得禍惡而得福者未有不疑天網之䟽而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖䟽而不失也民常不畏死奈何以死懼之若使人常畏死而爲竒者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斲夫代大匠斲希有不傷其手矣斲陟角反蘇註政煩刑重民無所措手足則常不畏死雖以死懼之無益也民安于政常樂生畏死然後執其詭異亂群者而殺之孰敢不服哉司殺者天也方世之治而有詭異亂群之人恣行于其間則天之所棄也而吾殺之則是天殺之而非我也非天之所殺而吾自殺之是代司殺者殺也代大匠斲則傷其手矣代司殺者殺則及其身矣民之饑以其上食稅之多也是以饑民之難治以其上之有爲也是以難治民之輕死以其生生之厚也是以輕死夫唯無以生爲者是賢于貴生稅租也純甫云無以生爲者賢于貴生即吾無吾身吾有何患之意此章之言由粗及精要歸其淨于此耳蘇註上以有爲導民民亦有爲應之故事多而難治上以利欲先民民亦爭厚其生故雖死而求利不厭貴生之極必至于輕死惟無以生爲而生自全矣人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則共强大處下柔弱處上脆輭也徒類也合手曰共商桑穀生于朝七日大共秦伯怒蹇叔曰墓木拱矣皆合拱也董音如字言人共代之也處上聲蘇註冲氣在焉則體無堅强之病至理在焉則事無堅强之累兵以義勝者非强也强而不義其敗必速木自拱把以上必伐矣物之常理精者在上粗者在下其精必柔弱其粗必强大天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足人之道則不然損不足而奉有餘孰能以有餘奉天下唯有道者是以聖人爲而不恃成功而不居其不欲見賢耶抑之舉之二句言張弓有餘不足二句言天道凡弛弓俯其體則弣在上弰向下張之而仰其體則弣向下弰在上是抑弣之高者使之向下舉弰之下者使之在上天之損有餘如抑其弣而使之下其補不足如舉其弰而使之高見賢遍反蘇註張弓上筋弛弓上角故以况天之抑高舉下天無私故均人多私故不均有道者贍足萬物而不辭既以爲人己愈有既以予人己愈多非有道者無以堪此爲而恃成而處則賢見于世賢見于世則是以有餘自奉也天下莫柔弱于水而攻堅彊者莫之能先以其無以易之也故柔之勝剛弱之勝彊天下莫不知莫能行是以聖人云受國之垢是謂壮稷主受國之不祥是謂天下王正言若反蘇註正言合道而反俗俗以受垢爲辱受不祥爲殃故也和大怨必有餘怨安可以爲善是以聖人執左契而不責于人故有德司契無德司徹天道無親常與善人契苦計反徹徹法也直列反蘇註夫怨生于妄而妄出于性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未忘也契之有左右所以爲信而息爭也聖人與人均有是性人方以妄爲常馳騖于爭奪之場而不知性之未始少妄也是以聖人以其性示人使之除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不待責之而自服也然則雖有大怨懟將涣然冰解知其本非有矣而安用和之彼無德者乃欲人人而通之則亦勞而無功矣徹通也天道無私惟善人則與之契之無私也小國寡民使有什伯之器而不用使民重死而不遠徙雖有舟車無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其居樂其俗鄰國相望鷄犬之音相聞民至老死不相徃來漢書詔天下吏舍無得置什器顔師古註云五人爲伍十人爲什則共器物故通謂什伍之具爲什物不用者無徃來免儲待省徭役也舟輿甲兵舉其重者言之樂入聲望平聲相望相聞近也至老死久也近而且乆不相徃來者各足故也道足則無事咨詢財足則不相乞假蘇註老子生于衰周文勝俗弊將以無爲救之故于書之終言其所志願得小國寡民以試焉而不可得耳民各安其分則小有材者不求用于世什伯人之器則材堪什夫伯夫之長者也事少民樸雖結繩足矣内足而外無所慕故以其所有爲美以其所處爲樂而不復求也民物繁夥而不相求則彼此皆足故也信言不美美言不信善言不辯辯言不善知者不愽愽者不知聖人不積既以爲人已愈有既以與人己愈多天之道利而不害聖人之道爲而不爭爲人之爲去聲蘇註信則爲實而已故不必美美則爲觀而已故不必信以善爲主則不求辯以辯爲主則未必善有一以貫之則無所用愽愽學而日益者未必知道也聖人抱一而已他無所積也然施其所能以爲人推其所有以與人人有盡而一無盡然後知一之爲貴也勢可以利人則可以害人矣力足以爲之則足以爭之矣能利能害而未嘗害能爲能爭而未嘗爭此天與聖人大過人而爲萬物宗者也凡此皆老子之所以爲書與其所以爲道之大略也故于終篇復言之筆乘或曰老氏之爲書使人得以受而味焉則近乎美窮萬物之理而無不至則近乎辯察萬事之變而無不該則近乎愽然不知其有信而不美善而不辯知而不愽者存何也則以五千言所言皆不積之道耳不積者心無所住之謂也夫積而不積則言而無言矣言而無言故非不爲人也而未嘗分己之有非不予人也而未嘗損己之多斯何惡於辯且愽哉苟非不積之道而第執其意見以與天下爭則多言數窮者流非天道也天之道利而不害聖人之道爲而不爭學者于此而刳心焉老氏之書亦思過半矣故曰教而無教何必杜口於毗耶言乃忘言自可了心於柱下讀者其勉旃哉老子翼卷之四終
